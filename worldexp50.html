    <!-- Google Fonts for modern typography -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* Custom styles to complement Tailwind */
        body {
            font-family: 'Inter', sans-serif;
            transition: background 1s ease;
        }
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
        }
        .timer-bar {
            transition: width 0.2s linear;
        }
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-background {
            background: linear-gradient(-45deg, #e0f7fa, #e8eaf6, #fce4ec, #f3e5f5);
            background-size: 400% 400%;
            animation: gradient-animation 30s ease infinite;
        }
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #fff;
            border-radius: 50%;
            opacity: 1;
            animation: firework-explode 0.7s forwards;
        }
        @keyframes firework-explode {
            to {
                transform: scale(25);
                opacity: 0;
            }
        }
        .badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: #4b5563;
        }
        .badge i {
            font-size: 1.5rem;
            padding: 0.5rem;
            border-radius: 50%;
            color: white;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body class="text-slate-800 animated-background">

    <!-- Main Container -->
    <div id="app-container" class="container mx-auto p-4 md:p-8">

        <!-- Home Page -->
        <div id="home-page">
            <header class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-bold text-slate-800">Select a Unit to Begin</h1>
            </header>
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
                <div class="mb-6">
                    <label for="name" class="block text-lg font-semibold text-slate-700 mb-2">Enter Your Name:</label>
                    <input type="text" id="name" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="Your Name">
                </div>
                <div id="unit-selection" class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                    <!-- Unit buttons will be inserted here by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-page" class="hidden">
            <header class="text-center mb-8">
                <div class="flex justify-center items-center gap-4">
                    <i id="quiz-icon" class="text-4xl fas"></i>
                    <h1 id="quiz-title" class="text-3xl md:text-4xl font-bold text-slate-800"></h1>
                </div>
                <div class="flex justify-between items-center mt-4 text-lg">
                    <div id="question-counter" class="font-semibold"></div>
                    <div id="token-counter" class="font-semibold flex items-center text-xl"><i class="fas fa-star text-yellow-400 mr-2"></i><span id="token-count">0</span></div>
                    <div id="total-timer" class="font-semibold"></div>
                </div>
            </header>
            <div class="bg-white p-8 rounded-lg shadow-lg">
                <div id="question-timer-bar-container" class="w-full bg-slate-200 rounded-full h-4 mb-4 overflow-hidden">
                    <div id="question-timer-bar" class="h-4 rounded-full"></div>
                </div>
                <h2 id="question-text" class="text-2xl font-semibold mb-6"></h2>
                <div id="options-container" class="space-y-4"></div>
            </div>
        </div>

        <!-- Review Page -->
        <div id="review-page" class="hidden text-center relative">
             <div id="fireworks-container" class="absolute inset-0 overflow-hidden -z-10"></div>
            <header class="mb-8">
                <h1 class="text-4xl md:text-5xl font-bold text-slate-800">Quiz Complete!</h1>
            </header>
            <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
                <h2 id="final-score" class="text-3xl font-bold mb-2"></h2>
                <p id="final-tokens" class="text-2xl mb-4 flex items-center justify-center"></p>
                <div id="badge-container" class="flex justify-center space-x-4 mb-4"></div>
                <p id="completion-time" class="text-lg mb-8"></p>
                <button id="back-to-home" class="w-full bg-sky-600 text-white font-bold py-3 rounded-lg hover:bg-sky-700 transition-transform transform hover:scale-105">Back to Homepage</button>
            </div>
        </div>

    </div>

                    { question: "What does 'Rot' mean in the context of the 5 Rs?", options: ["To let food go bad", "To throw away old things", "To compost food scraps", "To recycle plastic"], answer: "To compost food scraps" },
                    { question: "Paragraph 1 says that the zero-waste idea requires a new...", options: ["Law", "Mindset", "Tax", "Technology"], answer: "Mindset" },
                    { question: "What are the 5 Rs mentioned in paragraph 1?", options: ["Refuse, Reduce, Reuse, Recycle, Rot", "Read, Rethink, Repair, Recycle, Rot", "Refuse, Repair, Reuse, Recycle, Reward", "Reduce, Reuse, Repair, Rebuy, Recycle"], answer: "Refuse, Reduce, Reuse, Recycle, Rot" },

                    { question: "According to paragraph 2, what is the most important step of the 5 Rs?", options: ["Recycle", "Reuse", "Reduce", "Refuse"], answer: "Refuse" },
                    { question: "What is an example of 'Reuse' from paragraph 2?", options: ["Composting apples", "Using cloth bags instead of plastic ones", "Buying less stuff", "Recycling paper"], answer: "Using cloth bags instead of plastic ones" },
                    { question: "In the 5R hierarchy, recycling should be seen as a...", options: ["First option", "Last option", "Fun activity", "Way to make money"], answer: "Last option" },
                    { question: "What does paragraph 2 say is the goal of the zero-waste movement?", options: ["To achieve perfection", "To make conscious choices", "To ban all plastic", "To live without stuff"], answer: "To make conscious choices" },
                    { question: "What does 'Reduce' mean in the 5 Rs?", options: ["To cut things into small pieces", "To lower your consumption of goods", "To refuse free items", "To make things smaller"], answer: "To lower your consumption of goods" },

                    { question: "Paragraph 3 states that the zero-waste philosophy challenges which model?", options: ["The circular 'reuse-repair-recycle' model", "The linear 'take-make-dispose' model", "The sustainable 'grow-eat-compost' model", "The service 'lease-use-return' model"], answer: "The linear 'take-make-dispose' model" },
                    { question: "What is 'pre-cycling' as described in paragraph 3?", options: ["Recycling before you use something", "Preventing waste from being created in the first place", "A special type of bicycle", "Sorting your trash"], answer: "Preventing waste from being created in the first place" },
                    { question: "According to paragraph 3, why is recycling positioned near the end of the 5R hierarchy?", options: ["Because it is the most important step", "Because it is difficult to do", "Because it still consumes significant energy", "Because it is a new idea"], answer: "Because it still consumes significant energy" },
                    { question: "What does paragraph 3 suggest that trash is?", options: ["A personal failing only", "A sign of wealth", "A design flaw in our systems", "A necessary part of life"], answer: "A design flaw in our systems" },
                    { question: "What does a personal waste audit help you do?", options: ["Get paid for your trash", "Understand your impact and find alternatives", "Separate compost from recycling", "Meet your neighbors"], answer: "Understand your impact and find alternatives" },
                ]
            },
            6: {
                title: "Unit 6: AI for Global Good",
                theme: { icon: 'fa-robot', color: 'teal' },
                questions: [
                    // Keywords
                    { question: "What is Artificial Intelligence (AI)?", options: ["A type of human intelligence", "The ability of computers to perform human-like tasks", "A new kind of computer", "A type of algorithm"], answer: "The ability of computers to perform human-like tasks" },
                    { question: "A set of rules for a computer to follow is an...", options: ["Algorithm", "Data Set", "Prediction", "Diagnosis"], answer: "Algorithm" },
                    { question: "What is Machine Learning?", options: ["When a person learns to use a machine", "When a machine learns from experience", "A type of computer", "A collection of data"], answer: "When a machine learns from experience" },
                    { question: "A collection of related information is a...", options: ["Data Set", "Bias", "Diagnosis", "Prediction"], answer: "Data Set" },
                    { question: "Relating to moral principles is being...", options: ["Biased", "Ethical", "Automated", "Optimized"], answer: "Ethical" },
                    { question: "A prejudice in favor of or against something is a...", options: ["Bias", "Prediction", "Diagnosis", "Data Set"], answer: "Bias" },
                    { question: "The use of automatic equipment in a system is...", options: ["Optimization", "Automation", "Diagnosis", "Prediction"], answer: "Automation" },
                    { question: "A statement about what might happen in the future is a...", options: ["Diagnosis", "Prediction", "Data Set", "Bias"], answer: "Prediction" },
                    { question: "The identification of an illness is a...", options: ["Prediction", "Diagnosis", "Bias", "Data Set"], answer: "Diagnosis" },
                    { question: "Making the best or most effective use of a resource is...", options: ["Automation", "Optimization", "Prediction", "Bias"], answer: "Optimization" },

                    // Reading Comprehension (Paragraph 1)
                    { question: "According to paragraph 1, what can AI help a farmer do?", options: ["Plant seeds faster", "Tell if plants are sick", "Water the crops", "Harvest the food"], answer: "Tell if plants are sick" },
                    { question: "In hospitals, what can AI help doctors with, according to paragraph 1?", options: ["Performing surgery", "Making a faster diagnosis", "Talking to patients", "Cleaning the rooms"], answer: "Making a faster diagnosis" },
                    { question: "What is a potential problem with an AI's algorithm mentioned in paragraph 1?", options: ["It can be too slow", "It can have a bias", "It can break easily", "It uses too much energy"], answer: "It can have a bias" },
                    { question: "What does it mean if an AI has a bias?", options: ["It is very smart", "It is always correct", "It can be unfair", "It is very creative"], answer: "It can be unfair" },
                    { question: "Paragraph 1 concludes that we must make sure AI is...", options: ["Fast and cheap", "Available to everyone", "Safe and ethical", "Smarter than humans"], answer: "Safe and ethical" },

                    // Reading Comprehension (Paragraph 2)
                    { question: "What can machine learning do with enormous data sets, according to paragraph 2?", options: ["Delete them", "Find patterns that humans might miss", "Make them smaller", "Create new data"], answer: "Find patterns that humans might miss" },
                    { question: "What is an example of an AI prediction mentioned in paragraph 2?", options: ["Predicting the weather", "Predicting where a natural disaster might strike", "Predicting stock prices", "Predicting who will win a game"], answer: "Predicting where a natural disaster might strike" },
                    { question: "What is one of the biggest ethical risks of using AI, according to paragraph 2?", options: ["The AI will become too powerful", "The AI will be too expensive", "Bias in the AI's decisions", "The AI will take all our jobs"], answer: "Bias in the AI's decisions" },
                    { question: "How can an AI become biased?", options: ["By making its own decisions", "If it is trained on a biased data set", "If it learns too quickly", "By talking to biased people"], answer: "If it is trained on a biased data set" },
                    { question: "Paragraph 2 warns that as we use AI for more tasks, we must ensure it does not create new problems of...", options: ["Unemployment", "Inequality", "Pollution", "Data loss"], answer: "Inequality" },

                    // Reading Comprehension (Paragraph 3)
                    { question: "Paragraph 3 describes machine learning as a 'paradigm shift'. What does this mean?", options: ["A small improvement", "A new type of computer", "A fundamental change in approach", "A temporary trend"], answer: "A fundamental change in approach" },
                    { question: "What is an example of AI optimization mentioned in paragraph 3?", options: ["Optimizing traffic flow", "Optimizing energy grids to reduce waste", "Optimizing your computer's speed", "Optimizing your daily schedule"], answer: "Optimizing energy grids to reduce waste" },
                    { question: "What is 'encoded bias'?", options: ["A secret code", "When historical biases are reflected in the AI's algorithm", "A type of ethical AI", "A secure way to store data"], answer: "When historical biases are reflected in the AI's algorithm" },
                    { question: "What does paragraph 3 say is a concern about automation?", options: ["It is not fast enough", "Job displacement and economic inequality", "The machines will use too much power", "It is too difficult to program"], answer: "Job displacement and economic inequality" },
                    { question: "Developing AI for good requires a multi-disciplinary approach that integrates computer science with...", options: ["History and art", "Ethics, sociology, and public policy", "Mathematics and physics", "Business and marketing"], answer: "Ethics, sociology, and public policy" },
                ]
            },
            7: {
                title: "Unit 7: The Sun and the Sea",
                theme: { icon: 'fa-water', color: 'cyan' },
                questions: [
                    { question: "What is 'Desalination'?", options: ["Removing pollution from water", "Removing salt from seawater", "Adding salt to water", "Making water hot"], answer: "Removing salt from seawater" },
                    { question: "Water that is safe to drink is called...", options: ["Saline", "Brackish", "Potable", "Vapor"], answer: "Potable" },
                    { question: "The concentration of dissolved salt in water is its...", options: ["Salinity", "Purity", "Efficiency", "Scarcity"], answer: "Salinity" },
                    { question: "The process of a liquid turning into a vapor is...", options: ["Condensation", "Evaporation", "Purification", "Scarcity"], answer: "Evaporation" },
                    { question: "The process of a vapor turning into a liquid is...", options: ["Condensation", "Evaporation", "Desalination", "Salinity"], answer: "Condensation" },
                    { question: "A device that uses heat from the sun to purify water is a...", options: ["Solar Panel", "Solar Still", "Solar Heater", "Solar Light"], answer: "Solar Still" },
                    { question: "Water that is slightly salty is called...", options: ["Potable", "Brackish", "Pure", "Vapor"], answer: "Brackish" },
                    { question: "Working in a well-organized way without waste is...", options: ["Scarcity", "Efficiency", "Salinity", "Purification"], answer: "Efficiency" },
                    { question: "The process of removing harmful substances is...", options: ["Purification", "Evaporation", "Condensation", "Desalination"], answer: "Purification" },
                    { question: "When something is in short supply, there is a...", options: ["Scarcity", "Surplus", "Still", "Salinity"], answer: "Scarcity" },
                ]
            },
            8: {
                title: "Unit 8: The Pulse of Progress",
                theme: { icon: 'fa-heart-pulse', color: 'fuchsia' },
                questions: [
                    { question: "Data related to the body, like a heartbeat, is called...", options: ["Biometric", "Sensor", "Monitor", "Gamification"], answer: "Biometric" },
                    { question: "A device that detects or measures something is a...", options: ["Monitor", "Sensor", "Tracker", "Calorie"], answer: "Sensor" },
                    { question: "To observe and check the progress of something is to...", options: ["Monitor", "Gamify", "Track", "Sense"], answer: "Monitor" },
                    { question: "A device for tracking fitness metrics is an...", options: ["Activity Tracker", "Smartwatch", "Pedometer", "Heart Rate Monitor"], answer: "Activity Tracker" },
                    { question: "Spending a lot of time seated or inactive is being...", options: ["Active", "Sedentary", "Healthy", "Fit"], answer: "Sedentary" },
                    { question: "Applying game-like elements to other activities is...", options: ["Gamification", "Competition", "Playing", "Wellness"], answer: "Gamification" },
                    { question: "The state of being free from observation by others is...", options: ["Privacy", "Security", "Wellness", "Health"], answer: "Privacy" },
                    { question: "The state of being in good health as an actively pursued goal is...", options: ["Fitness", "Wellness", "Happiness", "Activity"], answer: "Wellness" },
                    { question: "A unit of energy from food is a...", options: ["Gram", "Calorie", "Joule", "Watt"], answer: "Calorie" },
                    { question: "Information about your performance is...", options: ["Data", "Feedback", "Privacy", "Metrics"], answer: "Feedback" },
                ]
            },
            9: {
                title: "Unit 9: The Electric Avenue",
                theme: { icon: 'fa-bicycle', color: 'lime' },
                questions: [
                    { question: "The ability to move freely and easily is...", options: ["Mobility", "Emission", "Congestion", "Transit"], answer: "Mobility" },
                    { question: "The discharge of gas from a vehicle's tailpipe is an...", options: ["Emission", "Congestion", "Subsidy", "Infrastructure"], answer: "Emission" },
                    { question: "The state of being crowded with traffic is...", options: ["Mobility", "Congestion", "Transit", "Planning"], answer: "Congestion" },
                    { question: "Basic systems like roads and charging stations are...", options: ["Infrastructure", "Subsidies", "Mobility", "Emissions"], answer: "Infrastructure" },
                    { question: "Money from the government to help people buy something is a...", options: ["Tax", "Fine", "Subsidy", "Loan"], answer: "Subsidy" },
                    { question: "A feature on an e-bike where the motor helps you pedal is...", options: ["Throttle", "Pedal-assist", "Gear-shift", "Turbo-boost"], answer: "Pedal-assist" },
                    { question: "Transportation using very light vehicles like e-bikes is...", options: ["Public Transit", "Mass Transit", "Micro-mobility", "Sustainable Mobility"], answer: "Micro-mobility" },
                    { question: "Buses, trains, and subways are forms of...", options: ["Public Transit", "Private Transit", "Micro-mobility", "Active Transit"], answer: "Public Transit" },
                    { question: "Something that causes little or no damage to the environment is...", options: ["Sustainable", "Renewable", "Efficient", "Economical"], answer: "Sustainable" },
                    { question: "The planning of the physical development of cities is...", options: ["Urban Planning", "City Design", "Architecture", "Civil Engineering"], answer: "Urban Planning" },
                ]
            },
            10: {
                title: "Unit 10: A Festival of Values",
                theme: { icon: 'fa-landmark', color: 'orange' },
                questions: [
                    { question: "A period of celebration for cultural reasons is a...", options: ["Festival", "Holiday", "Ritual", "Tradition"], answer: "Festival" },
                    { question: "The ideas, customs, and social behavior of a society is its...", options: ["Culture", "Heritage", "Identity", "Value"], answer: "Culture" },
                    { question: "A belief or custom passed down from generation to generation is a...", options: ["Ritual", "Tradition", "Value", "Celebration"], answer: "Tradition" },
                    { question: "A ceremony with a series of actions performed in a specific order is a...", options: ["Ritual", "Festival", "Tradition", "Celebration"], answer: "Ritual" },
                    { question: "A person's principles or judgment of what is important in life is their...", options: ["Value", "Identity", "Heritage", "Culture"], answer: "Value" },
                    { question: "The state of being diverse or having variety is...", options: ["Diversity", "Culture", "Heritage", "Identity"], answer: "Diversity" },
                    { question: "Valued traditions passed down from previous generations are our...", options: ["Heritage", "Identity", "Culture", "Values"], answer: "Heritage" },
                    { question: "The characteristics that determine who a person is are their...", options: ["Identity", "Heritage", "Culture", "Values"], answer: "Identity" },
                    { question: "Someone who identifies with being part of a world community is a...", options: ["Global Citizen", "Tourist", "Immigrant", "Local"], answer: "Global Citizen" },
                    { question: "Marking a significant event with a social gathering is a...", options: ["Celebration", "Ritual", "Tradition", "Festival"], answer: "Celebration" },
                ]
            },
        };

        // Application State
        let currentUnit = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let tokens = 0;
        let streak = 0;
        let badges = [];
        let missedQuestions = [];
        let questionTimer;
        let totalTimer;
        let totalTime = 500; // 25 questions * 20 seconds
        let questionsForCurrentUnit = [];

        // DOM Elements
        const homePage = document.getElementById('home-page');
        const quizPage = document.getElementById('quiz-page');
        const reviewPage = document.getElementById('review-page');
        const unitSelection = document.getElementById('unit-selection');
        const quizTitle = document.getElementById('quiz-title');
        const quizIcon = document.getElementById('quiz-icon');
        const questionCounter = document.getElementById('question-counter');
        const totalTimerDisplay = document.getElementById('total-timer');
        const tokenCountDisplay = document.getElementById('token-count');
        const questionTimerBar = document.getElementById('question-timer-bar');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const finalScore = document.getElementById('final-score');
        const finalTokens = document.getElementById('final-tokens');
        const badgeContainer = document.getElementById('badge-container');
        const completionTime = document.getElementById('completion-time');
        const backToHomeBtn = document.getElementById('back-to-home');
        const fireworksContainer = document.getElementById('fireworks-container');

        // Sound Effects (using Tone.js)
        let synth, polySynth;

        const correctSounds = [
            () => synth.triggerAttackRelease("C5", "8n"),
            () => polySynth.triggerAttackRelease(["E5", "G5", "B5"], "8n"),
            () => synth.triggerAttackRelease("G5", "16n", Tone.now(), 0.8)
        ];
        const incorrectSound = () => synth.triggerAttackRelease("C3", "8n");
        const badgeSound = () => polySynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "4n");

        // Praise Messages
        const praiseMessages = ["Great job!", "Excellent!", "You're a star!", "Amazing!", "Keep it up!", "Fantastic!", "Well done!"];

        // Initialize
        function init() {
            for (let i = 1; i <= 10; i++) {
                if (quizData[i] && quizData[i].questions.length > 0) {
                    const button = document.createElement('button');
                    button.textContent = `Unit ${i}`;
                    button.className = "w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition-transform transform hover:scale-105";
                    button.onclick = () => startQuiz(i);
                    unitSelection.appendChild(button);
                }
            }
            backToHomeBtn.onclick = () => location.reload();
        }

        async function startQuiz(unit) {
            await Tone.start();
            // Initialize synths here after user interaction
            synth = new Tone.Synth().toDestination();
            polySynth = new Tone.PolySynth(Tone.Synth).toDestination();

            const name = document.getElementById('name').value;
            if (!name) {
                showModal("Please enter your name to begin.");
                return;
            }
            currentUnit = unit;
            currentQuestionIndex = 0;
            score = 0;
            tokens = 0;
            streak = 0;
            badges = [];
            missedQuestions = [];
            totalTime = 500;
            questionsForCurrentUnit = [...quizData[unit].questions];
            tokenCountDisplay.textContent = tokens;

            homePage.classList.add('hidden');
            reviewPage.classList.add('hidden');
            quizPage.classList.remove('hidden');
            quizTitle.textContent = quizData[unit].title;
            startTotalTimer();
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questionsForCurrentUnit.length) {
                if (missedQuestions.length > 0) {
                    questionsForCurrentUnit = [...missedQuestions];
                    missedQuestions = [];
                    currentQuestionIndex = 0;
                    showModal("Let's try the questions you missed one more time!");
                } else {
                    endQuiz();
                    return;
                }
            }

            const question = questionsForCurrentUnit[currentQuestionIndex];
            questionCounter.textContent = `Question ${currentQuestionIndex + 1} of ${questionsForCurrentUnit.length}`;
            questionText.textContent = question.question;
            optionsContainer.innerHTML = '';
            const shuffledOptions = [...question.options].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.className = "w-full bg-white border-2 border-slate-300 text-slate-700 font-semibold py-3 rounded-lg hover:bg-slate-100 transition-colors";
                button.onclick = () => selectAnswer(option, question.answer, button);
                optionsContainer.appendChild(button);
            });
            startQuestionTimer();
        }

        function selectAnswer(selected, correct, button) {
            clearInterval(questionTimer);
            const buttons = optionsContainer.getElementsByTagName('button');
            for(let btn of buttons) {
                btn.disabled = true;
            }

            if (selected === correct) {
                score += 4;
                tokens += 1;
                streak += 1;
                tokenCountDisplay.textContent = tokens;
                button.className = "w-full bg-green-500 text-white font-bold py-3 rounded-lg";
                correctSounds[Math.floor(Math.random() * correctSounds.length)]();
                showModal(praiseMessages[Math.floor(Math.random() * praiseMessages.length)], 'success');
                checkBadges();
            } else {
                streak = 0;
                button.className = "w-full bg-red-500 text-white font-bold py-3 rounded-lg";
                incorrectSound();
                missedQuestions.push(questionsForCurrentUnit[currentQuestionIndex]);
                for(let btn of buttons) {
                    if (btn.textContent === correct) {
                        btn.className = "w-full bg-green-500 text-white font-bold py-3 rounded-lg";
                    }
                }
                 showModal(`Not quite! The correct answer was: ${correct}`, 'error');
            }
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 2000);
        }

        function checkBadges() {
            if (streak === 5 && !badges.includes('streak5')) {
                badges.push('streak5');
                showModal("5 in a row! You're on fire!", 'badge');
                speak("You are on fire!");
                badgeSound();
            }
        }

        function startQuestionTimer() {
            let timeLeft = 20;
            questionTimerBar.style.transition = 'none'; // Reset transition for instant change
            questionTimerBar.style.width = '100%';
            // Force reflow to apply the change immediately
            void questionTimerBar.offsetWidth; 
            questionTimerBar.style.transition = 'width 1s linear';

            questionTimer = setInterval(() => {
                timeLeft--;
                questionTimerBar.style.width = `${(timeLeft / 20) * 100}%`;
                if (timeLeft <= 0) {
                    clearInterval(questionTimer);
                    incorrectSound();
                    showModal("Time's up!", 'error');
                    missedQuestions.push(questionsForCurrentUnit[currentQuestionIndex]);
                    setTimeout(() => {
                        currentQuestionIndex++;
                        loadQuestion();
                    }, 2000);
                }
            }, 1000);
        }

        function startTotalTimer() {
            if(totalTimer) clearInterval(totalTimer);
            totalTimer = setInterval(() => {
                totalTime--;
                const minutes = Math.floor(totalTime / 60);
                const seconds = totalTime % 60;
                totalTimerDisplay.textContent = `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                if (totalTime <= 0) {
                    endQuiz();
                }
            }, 1000);
        }

        function endQuiz() {
            clearInterval(totalTimer);
            clearInterval(questionTimer);
            quizPage.classList.add('hidden');
            reviewPage.classList.remove('hidden');
            finalScore.textContent = `Your Score: ${Math.round(score)} / 100`;
            finalTokens.innerHTML = `<i class="fas fa-star text-yellow-400 mr-2"></i> You earned ${tokens} tokens!`;
            const timeTaken = 500 - totalTime;
            const minutes = Math.floor(timeTaken / 60);
            const seconds = timeTaken % 60;
            completionTime.textContent = `Completed in ${minutes} minutes and ${seconds} seconds.`;
            
            // Add completion badge
            if (!badges.includes('completed')) {
                badges.push('completed');
            }
            displayBadges();
            
            if (score >= 80) {
                launchFireworks();
                speak("Excellent work! You are a superstar!");
            }
        }
        
        function displayBadges() {
            badgeContainer.innerHTML = '';
            badges.forEach(badgeId => {
                const badge = document.createElement('div');
                badge.className = 'p-2 bg-yellow-400 rounded-full text-white';
                let icon = '';
                if (badgeId === 'streak5') icon = 'fa-fire';
                if (badgeId === 'completed') icon = 'fa-check-circle';
                badge.innerHTML = `<i class="fas ${icon}"></i>`;
                badgeContainer.appendChild(badge);
            });
        }

        function launchFireworks() {
            for (let i = 0; i < 30; i++) {
                const fw = document.createElement('div');
                fw.className = 'firework';
                fw.style.left = `${Math.random() * 100}%`;
                fw.style.top = `${Math.random() * 100}%`;
                fw.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                fireworksContainer.appendChild(fw);
            }
            setTimeout(() => fireworksContainer.innerHTML = '', 2000);
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            if (!synth) {
                console.error("Speech Synthesis not supported");
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices().filter(voice => voice.lang.startsWith('en'));
            const microsoftVoice = voices.find(voice => voice.name.includes('Microsoft') && voice.name.includes('Female'));
            utterance.voice = microsoftVoice || voices.find(voice => voice.lang === 'en-US');
            utterance.rate = 0.85;
            synth.speak(utterance);
        }

        function showModal(message, type = 'info') {
            const modal = document.createElement('div');
            modal.className = 'fixed top-0 left-0 w-full h-full bg-black bg-opacity-50 flex justify-center items-center z-50';
            
            const modalContent = document.createElement('div');
            let bgColor = 'bg-sky-500';
            if (type === 'success') bgColor = 'bg-green-500';
            if (type === 'error') bgColor = 'bg-red-500';
            if (type === 'badge') bgColor = 'bg-purple-600';
            
            modalContent.className = `p-8 rounded-lg shadow-lg text-white text-2xl font-bold ${bgColor}`;
            modalContent.textContent = message;
            
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            
            setTimeout(() => {
                modal.remove();
            }, 1500);
        }

        init();
    </script>
</body>
