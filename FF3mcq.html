<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 3 Speaking Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .font-header { font-family: 'Fredoka', sans-serif; }
        
        .btn-3d {
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #d1d5db;
            border: 2px solid #e5e7eb;
        }
        .btn-3d:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d1d5db;
        }
        .btn-unit-complete {
            background-color: #dcfce7;
            border-color: #86efac;
            box-shadow: 0 4px 0 #86efac;
        }

        .pop-in { animation: pop 0.3s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        .choice-btn {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 1.25rem;
            padding: 0.75rem;
            font-weight: 800;
            color: #475569;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .choice-btn.correct {
            background: #dcfce7;
            border-color: var(--secondary);
            color: #065f46;
            box-shadow: 0 4px 0 #10b981;
        }
        .choice-btn.wrong {
            background: #fee2e2;
            border-color: var(--danger);
            color: #991b1b;
            box-shadow: 0 4px 0 #ef4444;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .blank-line {
            display: inline-block;
            min-width: 80px;
            border-bottom: 4px solid var(--primary);
            margin: 0 6px;
            height: 10px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="h-16 flex-shrink-0 bg-white/95 backdrop-blur-sm shadow-md z-50 px-4 flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-2">
            <button onclick="goHome()" class="btn-3d bg-slate-100 px-3 py-1.5 rounded-xl font-bold text-slate-600 flex items-center gap-1.5 text-sm">
                🏠 <span class="hidden sm:inline">Home</span>
            </button>
            <button id="header-back-btn" onclick="prevQuestion()" class="btn-3d bg-slate-100 px-3 py-1.5 rounded-xl font-bold text-slate-600 hidden text-sm">
                ⬅ Back
            </button>
            <div id="badge-bar" class="hidden sm:flex gap-1 ml-2"></div>
        </div>

        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white px-3 py-1 rounded-full font-black shadow-inner text-xs">
                ⭐ <span id="star-count">0</span>
            </div>
            <button id="header-next-btn" onclick="nextQuestion()" class="btn-3d bg-secondary text-white px-5 py-1.5 rounded-xl font-black text-sm hidden">
                Next ➜
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main id="app" class="flex-1 overflow-hidden relative">
        
        <!-- Screen 1: Unit Selection -->
        <div id="screen-menu" class="screen h-full flex flex-col p-4">
            <div class="text-center mb-4">
                <h1 class="font-header text-3xl text-indigo-700 leading-tight">Speaking Quest! 🏰</h1>
                <p class="text-slate-500 font-bold text-xs italic">Complete 10 challenges to win a badge!</p>
            </div>
            <div id="unit-grid" class="flex-1 overflow-y-auto no-scrollbar grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 pb-6"></div>
        </div>

        <!-- Screen 2: Practice Interface -->
        <div id="screen-practice" class="screen hidden h-full flex flex-col p-4 pop-in">
            <div class="flex justify-between items-center mb-3">
                <div class="flex flex-col">
                    <h2 id="current-unit-title" class="font-header text-xl text-indigo-600 leading-none">Unit</h2>
                    <p id="current-grammar-focus" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Focus</p>
                </div>
                <div class="bg-white px-3 py-1 rounded-xl border border-slate-100 font-black text-xs text-slate-400">
                    <span id="q-index" class="text-indigo-600">1</span> / 10
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center gap-4 max-w-2xl mx-auto w-full">
                <!-- Listening Zone -->
                <div id="question-box" onclick="playQuestion()" class="btn-3d bg-white rounded-[2rem] p-6 md:p-10 cursor-pointer hover:bg-indigo-50/40 transition-all relative flex flex-col justify-center items-center min-h-[100px]">
                    <div class="absolute top-4 right-5 text-indigo-200 text-xl">🔊</div>
                    <div id="question-text" class="font-header text-xl sm:text-2xl md:text-3xl text-slate-800 text-center leading-tight"></div>
                </div>

                <!-- Choice Zone -->
                <div id="choices-grid" class="grid grid-cols-2 gap-3 md:gap-4"></div>
            </div>

            <!-- Hint Button (Only visible after answering) -->
            <div class="mt-4 flex justify-center pb-2">
                <button id="btn-hint" onclick="showHint()" class="btn-3d bg-amber-100 text-amber-700 px-10 py-3 rounded-2xl font-black text-lg w-full sm:w-auto invisible">
                    💡 Listen to Answer
                </button>
            </div>
        </div>

        <!-- Screen 3: Results -->
        <div id="screen-results" class="screen hidden h-full flex flex-col items-center justify-center p-6 pop-in text-center">
            <div class="bg-white rounded-[2.5rem] p-8 border-4 border-indigo-50 shadow-xl w-full max-w-sm">
                <div class="text-7xl mb-4">🌟</div>
                <h2 class="font-header text-4xl text-indigo-700 mb-2">Great Quest!</h2>
                <p class="text-slate-500 font-bold text-sm mb-6">You are a grammar champion!</p>
                <div class="flex justify-center gap-4 mb-8">
                    <div class="bg-amber-50 px-5 py-3 rounded-2xl border border-amber-200">
                        <p class="text-amber-600 font-black text-[10px] uppercase">Stars</p>
                        <p class="text-3xl font-black text-amber-700">+10</p>
                    </div>
                    <div class="bg-indigo-50 px-5 py-3 rounded-2xl border border-indigo-200">
                        <p class="text-indigo-600 font-black text-[10px] uppercase">Badge</p>
                        <p id="awarded-badge-icon" class="text-3xl font-black">🏅</p>
                    </div>
                </div>
                <button onclick="goHome()" class="btn-3d bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-xl w-full">Finish</button>
            </div>
        </div>
    </main>

    <!-- Hint Modal -->
    <div id="modal-hint" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center pop-in">
            <div class="text-5xl mb-4">🦜</div>
            <h3 class="font-header text-2xl text-slate-800 mb-2">Speak Clearly:</h3>
            <div id="hint-full-text" class="bg-indigo-50 p-6 rounded-2xl font-black text-indigo-700 text-xl mb-6 border border-indigo-100"></div>
            <button onclick="closeHint()" class="btn-3d bg-indigo-600 text-white w-full py-4 rounded-xl font-black text-lg">I said it!</button>
        </div>
    </div>

            grid.innerHTML = '';
            units.forEach(u => {
                const isDone = state.completedUnits.includes(u.id);
                const btn = document.createElement('button');
                btn.className = `btn-3d p-4 rounded-[2rem] flex flex-col items-center justify-center gap-1 ${isDone ? 'btn-unit-complete bg-green-50' : 'bg-white'}`;

                if (u) {
                    const badge = document.createElement('span');
                    badge.className = 'text-xl mx-0.5';
                    badge.textContent = u.badge;
                    bar.appendChild(badge);
                }
            });
        }

            state.currentIndex = 0;
            const pool = questionBank[unit.id];
            if (!pool) return goHome();
            
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            state.questions = shuffled.slice(0, 10).map(item => ({
                q: item.q,
                a: item.a,
                options: item.o,
                aFull: item.q.replace(/______/g, item.a)
            }));
            
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-practice').classList.remove('hidden');
            document.getElementById('header-back-btn').classList.remove('hidden');
            document.getElementById('current-unit-title').innerText = unit.name;
            document.getElementById('current-grammar-focus').innerText = unit.focus;

                btn.innerText = opt;
                btn.onclick = () => handleChoice(opt, btn);
                choicesGrid.appendChild(btn);
            });

            playQuestion();

                    document.getElementById('header-next-btn').classList.remove('hidden');
                    document.getElementById('btn-hint').classList.remove('invisible');
                }, 500);
                
                speak(q.aFull);
            } else {
                btn.classList.add('wrong', 'animate-shake');
                speak("Try again!");
                setTimeout(() => btn.classList.remove('wrong', 'animate-shake'), 600);
            }
        }

        function prevQuestion() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                loadQuestion();
            } else {
                goHome();
            }
        }

        function playQuestion() { 
            const q = state.questions[state.currentIndex];
            if (q) speak(q.q.replace(/______/g, "blank")); 
        }

        function speak(text) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            
            // Premium fallback logic
            const pref = state.voices.find(v => v.name.includes("Microsoft") && v.name.includes("Online") && v.lang.startsWith("en")) 
                         || state.voices.find(v => v.lang.startsWith("en"))
                         || state.voices[0];
            
            if (pref) utter.voice = pref;
            utter.rate = 0.85; // Grade 3 ESL clarity
            synth.speak(utter);
        }

        function nextQuestion() {
            if (state.currentIndex < 9) {
                state.currentIndex++;
                loadQuestion();
            } else {
                finishUnit();
            }
        }

        function finishUnit() {
            if (!state.completedUnits.includes(state.currentUnit.id)) {
                state.completedUnits.push(state.currentUnit.id);
                state.stars += 10;
                try {
                    localStorage.setItem('units_q3', JSON.stringify(state.completedUnits));
                    localStorage.setItem('stars_q3', state.stars);
                } catch(e) {}
            }
            document.getElementById('header-next-btn').classList.add('hidden');
            document.getElementById('header-back-btn').classList.add('hidden');
            document.getElementById('screen-practice').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('awarded-badge-icon').innerText = state.currentUnit.badge;
            updateStats();
        }

        function goHome() {
            if (synth) synth.cancel();
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('header-next-btn').classList.add('hidden');
            document.getElementById('header-back-btn').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
            renderMenu();
        }

        function updateStats() { 
            const starSpan = document.getElementById('star-count');
            if (starSpan) starSpan.innerText = state.stars; 
        }

        function showHint() {
            const full = state.questions[state.currentIndex].aFull;
            document.getElementById('hint-full-text').innerText = full;
            document.getElementById('modal-hint').classList.remove('hidden');
            speak(full);
        }

        function closeHint() { document.getElementById('modal-hint').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
