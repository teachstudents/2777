<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Mitchell's B1 Listening Test - Test 15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }
        .card {
            background-color: white;
            border-radius: 1.5rem;
            padding: 1.5rem; /* Reduced padding */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem; /* Reduced padding */
            font-size: 0.875rem; /* Smaller base font size */
            border-radius: 0.75rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-primary {
            background-color: #4f46e5;
            color: white;
            font-size: 1rem; /* Keep primary buttons larger */
            padding: 0.75rem 1.5rem;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #374151;
            border-color: #d1d5db;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #d1d5db;
        }
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .option-btn {
            flex: 1; /* Allow buttons to grow and fill space */
            background-color: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }
        .option-btn.selected {
            background-color: #6366f1;
            color: white;
            border-color: #4f46e5;
        }
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #059669;
        }
        .option-btn.incorrect {
            background-color: #ef4444;
            color: white;
            border-color: #dc2626;
        }
        #speaker-icon path {
            transition: fill 0.3s ease;
        }
        .speaking #speaker-icon {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="w-full max-w-3xl mx-auto">
        <!-- Start Screen -->
        <div id="start-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Joel Mitchell's B1 Listening - Test 15</h1>
            <div class="mb-6 w-full max-w-sm mx-auto">
                <label for="player-name-input" class="block text-gray-700 text-lg mb-2 font-medium">Enter your name to begin</label>
                <input type="text" id="player-name-input" class="w-full p-3 border border-gray-300 rounded-lg text-center text-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Player Name">
                <p id="name-error" class="text-red-500 text-sm mt-2 h-4"></p>
            </div>
            <p class="text-gray-600 mb-8 text-base">This is a 50-question test. Each correct answer is worth 2 points. The audio will play automatically for each group.</p>
            <button id="start-btn" class="btn btn-primary text-xl px-12 py-4">Start Test</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="card hidden">
            <div class="flex justify-between items-center mb-4">
                <div id="player-display" class="text-lg font-semibold text-gray-700 w-1/2 text-left truncate"></div>
                <div id="score" class="text-lg font-semibold text-indigo-600 w-1/2 text-right">Score: 0</div>
            </div>

            <div class="mb-6">
                 <button id="play-audio-btn" class="btn btn-secondary w-full mb-4">
                    <svg id="speaker-icon" class="w-6 h-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                    </svg>
                    <span id="play-audio-text">Replay Audio</span>
                </button>
                <div id="questions-container" class="space-y-4">
                    <!-- Questions for the group will be dynamically inserted here -->
                </div>
            </div>
            
            <div id="submission-area" class="mt-8 text-center">
                 <button id="submit-btn" class="btn btn-primary text-lg px-10 py-3">Submit Answers</button>
                 <button id="next-group-btn" class="btn btn-primary text-lg px-10 py-3 hidden">Next</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Test Complete!</h1>
            <p id="final-score" class="text-gray-600 mb-8 text-2xl"></p>
            <button id="restart-btn" class="btn btn-primary text-xl px-12 py-4">Play Again</button>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const playerNameInput = document.getElementById('player-name-input');
        const nameErrorEl = document.getElementById('name-error');
        const playerDisplayEl = document.getElementById('player-display');
        const playAudioBtn = document.getElementById('play-audio-btn');
        const playAudioText = document.getElementById('play-audio-text');
        const scoreEl = document.getElementById('score');
        const questionsContainer = document.getElementById('questions-container');
        const submitBtn = document.getElementById('submit-btn');
        const nextGroupBtn = document.getElementById('next-group-btn');
        const finalScoreEl = document.getElementById('final-score');

        // --- Audio Synths & Voice ---
        let correctSynth, incorrectSynth;
        let availableVoices = [];
        let isAudioReady = false;

        // --- Game State ---
        let score = 0;
        let currentGroupIndex = 0;
        let questionGroups = [];
        let playerName = '';
        let speechKeepAliveInterval;
        let globalQuestionCounter = 1;

        // --- Grouped Game Data (50 Questions) ---
        const gameData = [
            {
                audioscript: "I'm a waiter at a busy Italian restaurant downtown. Last Saturday night, right at 8 PM during our peak dinner service, we had a power cut. The entire restaurant went dark. It was absolute pandemonium. The kitchen couldn't cook, and we couldn't use our payment systems. We had to use candles for light and write down orders by hand. The manager gave all the customers a discount for the inconvenience. It was a very long and stressful night.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Chef", "Waiter", "Manager"], answer: "Waiter" },

                    { question: "In the text, what does 'pandemonium' mean?", options: ["A quiet atmosphere", "A state of extreme confusion and disorder", "A moment of celebration"], answer: "A state of extreme confusion and disorder" }

            },

                audioscript: "I'm a nurse on the surgical ward of a large city hospital. Yesterday afternoon, around 3 PM, our computer system for patient records went down. A doctor was about to start his rounds and needed access to patient files for medication. It was a critical situation. We had to revert to our old paper-based backup system, which was slow and inefficient. It took an IT technician two hours to fix the server. The incident caused significant delays for the rest of the day.",
                questions: [
                    { question: "Where does the speaker work?", options: ["A clinic", "A pharmacy", "A hospital"], answer: "A hospital" },
                    { question: "What was the main problem?", options: ["A power cut", "The computer system failed", "A medical emergency"], answer: "The computer system failed" },
                    { question: "Why was this a critical situation?", options: ["A doctor needed patient files for medication", "Visitors were arriving", "It was time for lunch"], answer: "A doctor needed patient files for medication" },
                    { question: "How did they manage the problem temporarily?", options: ["They postponed the rounds", "They used a paper backup system", "They guessed the medication"], answer: "They used a paper backup system" },
                    { question: "What does 'revert' mean in this context?", options: ["To destroy something", "To go back to a previous state", "To improve something"], answer: "To go back to a previous state" }
                ]
            },
            {
                audioscript: "I'm the manager of a supermarket. This morning, on Wednesday at 7 AM, I arrived to find that one of our large freezers had malfunctioned overnight. The temperature inside was rising, and thousands of dollars' worth of frozen food was beginning to thaw. It was a potential disaster. We had to quickly move all the stock to our other freezers, but they were already quite full. The whole ordeal was incredibly stressful. We had to call an emergency repair service, which was very expensive.",
                questions: [
                    { question: "What is the speaker's job?", options: ["Cashier", "Shelf stacker", "Supermarket Manager"], answer: "Supermarket Manager" },
                    { question: "What was the problem when he arrived at work?", options: ["The lights were off", "A freezer had malfunctioned", "There was a robbery"], answer: "A freezer had malfunctioned" },
                    { question: "Why was this a serious issue?", options: ["The food could spoil", "The floor was wet", "It was a busy day"], answer: "The food could spoil" },
                    { question: "How did they initially deal with the problem?", options: ["They threw the food away", "They sold it at a discount", "They moved it to other freezers"], answer: "They moved it to other freezers" },
                    { question: "In the text, what does 'ordeal' mean?", options: ["A pleasant experience", "A normal daily task", "A very unpleasant and difficult experience"], answer: "A very unpleasant and difficult experience" }
                ]
            },
            {
                audioscript: "I'm a bank teller in a busy branch in central London. Yesterday, on Tuesday at around 1 PM, our entire online banking network crashed. Nobody could make transfers, check their balances, or use the cash machines. The queue in the bank became enormous, and customers were getting very irate. We had to do everything manually with paper forms, which was incredibly slow. The system was down for nearly three hours. It was one of the most stressful afternoons of my career.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Bank Manager", "Security Guard", "Bank Teller"], answer: "Bank Teller" },
                    { question: "What was the problem at the bank?", options: ["They ran out of money", "The online network crashed", "There was a security alert"], answer: "The online network crashed" },
                    { question: "Why were the customers getting upset?", options: ["The bank was closing", "They couldn't access their money", "The staff were rude"], answer: "They couldn't access their money" },
                    { question: "How long was the system down for?", options: ["One hour", "Two hours", "Nearly three hours"], answer: "Nearly three hours" },
                    { question: "What does 'irate' mean in this context?", options: ["Feeling or characterized by great anger", "Calm and patient", "Confused and lost"], answer: "Feeling or characterized by great anger" }
                ]
            },
            {
                audioscript: "I'm a librarian at a university library. Last Friday, just before closing time at 9 PM, a student came to me in a panic. He had accidentally spilled a full cup of coffee all over a rare, 19th-century book he was studying. It was a lamentable accident. The book is one of only a few copies in the world. We had to immediately take the book to our special conservation lab. Our book conservationist worked on it all weekend. She thinks she can save it, but it will never be the same.",
                questions: [
                    { question: "Where does the speaker work?", options: ["A bookshop", "A public library", "A university library"], answer: "A university library" },
                    { question: "What was the problem?", options: ["A book was stolen", "A book was damaged by coffee", "The power went out"], answer: "A book was damaged by coffee" },
                    { question: "Why was this a particularly serious problem?", options: ["The student was important", "The book was very rare", "The coffee stained the table"], answer: "The book was very rare" },
                    { question: "How did they try to fix the book?", options: ["They dried it with a fan", "They sent it to a conservation lab", "They bought a new copy"], answer: "They sent it to a conservation lab" },
                    { question: "In the text, what does 'lamentable' mean?", options: ["Unfortunate or regrettable", "Funny and amusing", "Expected and normal"], answer: "Unfortunate or regrettable" }
                ]
            },
             {
                audioscript: "I'm an air traffic controller at a major international airport. Last night, on Sunday at around 11 PM, a dense fog suddenly rolled in, reducing visibility to almost zero. It was an abrupt change in the weather. We had to put the airport on a full ground stop, meaning no planes could take off or land. We had to divert twenty incoming flights to other airports. The knock-on effect was chaos, with thousands of stranded passengers. We were not able to resume normal operations until 5 AM this morning.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Pilot", "Airline agent", "Air Traffic Controller"], answer: "Air Traffic Controller" },
                    { question: "What was the problem at the airport?", options: ["A security threat", "A power failure", "Dense fog"], answer: "Dense fog" },
                    { question: "Why was this a major issue?", options: ["It was a busy time", "No planes could take off or land", "The staff couldn't see"], answer: "No planes could take off or land" },
                    { question: "How were incoming flights affected?", options: ["They were cancelled", "They were diverted", "They landed safely"], answer: "They were diverted" },
                    { question: "What does 'stranded' mean here?", options: ["Happy and relaxed", "Left without the means to move from a place", "Angry and complaining"], answer: "Left without the means to move from a place" }
                ]
            },
            {
                audioscript: "I'm a stage manager for a West End theatre production in London. Last night was our opening night, a Tuesday. At 7 PM, just thirty minutes before the show was due to start, our lead actor suddenly lost his voice completely. He had a sudden case of laryngitis. It was a producer's worst nightmare. We had to make a swift decision. We called in his understudy, who had to get into costume and makeup in a frantic rush. The show started twenty minutes late, but the understudy was magnificent.",
                questions: [
                    { question: "What is the speaker's job?", options: ["Actor", "Director", "Stage Manager"], answer: "Stage Manager" },
                    { question: "What was special about last night's performance?", options: ["It was the final show", "It was opening night", "It was a charity event"], answer: "It was opening night" },
                    { question: "Why couldn't the lead actor perform?", options: ["He was injured", "He lost his voice", "He was late"], answer: "He lost his voice" },
                    { question: "How was the problem solved?", options: ["The show was cancelled", "The understudy performed", "They used a recording"], answer: "The understudy performed" },
                    { question: "In this context, what does 'magnificent' mean?", options: ["Average", "Quiet", "Extremely impressive and excellent"], answer: "Extremely impressive and excellent" }
                ]
            },
            {
                audioscript: "I'm a curator at a national history museum. This morning, on Monday at 8 AM, when I was doing my initial checks before we opened, I noticed a problem. A priceless ancient vase from the Roman collection had a new, small crack near its base. The security footage from Sunday night showed a cleaner accidentally bumping into the display case. It was a subtle impact, but it was enough to cause the damage. We had to immediately remove the vase from display for our conservation team to assess. It's a very delicate repair job.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Security guard", "Curator", "Cleaner"], answer: "Curator" },
                    { question: "What was the problem with the artifact?", options: ["It was stolen", "It was dirty", "It had a new crack"], answer: "It had a new crack" },
                    { question: "How did the damage happen?", options: ["A visitor dropped it", "A cleaner bumped the case", "It fell during the night"], answer: "A cleaner bumped the case" },
                    { question: "What was the immediate action taken?", options: ["The vase was removed from display", "They called the police", "They closed the museum"], answer: "The vase was removed from display" },
                    { question: "What does 'subtle' mean here?", options: ["Very forceful", "So delicate or precise as to be difficult to notice", "Loud and obvious"], answer: "So delicate or precise as to be difficult to notice" }
                ]
            },
            {
                audioscript: "I'm a postal worker at a major sorting office. On Wednesday, during the night shift which starts at 10 PM, our main sorting machine broke down. This machine processes thousands of letters an hour. The breakdown created an immediate and colossal backlog of mail. We had to revert to sorting everything by hand, which is incredibly slow. We called in extra staff, but we couldn't keep up. As a result, all local mail deliveries for Thursday were delayed by at least a day. It was a tough night.",
                questions: [
                    { question: "What is the speaker's job?", options: ["Delivery driver", "Postal Worker", "Mechanic"], answer: "Postal Worker" },
                    { question: "What time does the night shift start?", options: ["8 PM", "10 PM", "12 AM"], answer: "10 PM" },
                    { question: "Why was there a problem at the sorting office?", options: ["A machine broke down", "There was a staff shortage", "A delivery was late"], answer: "A machine broke down" },
                    { question: "What was the consequence for local mail?", options: ["It was all lost", "It was delivered early", "It was delayed"], answer: "It was delayed" },
                    { question: "In the text, what does 'colossal' mean?", options: ["Extremely large", "Very small", "Manageable"], answer: "Extremely large" }
                ]
            },
            {
                audioscript: "I'm an announcer at a central train station. Yesterday, on Friday afternoon at 4 PM, during the peak rush hour, the main departure board malfunctioned. It started displaying gibberish instead of train times and platform numbers. This caused widespread confusion among thousands of commuters. People didn't know where to go for their trains. We had to make constant verbal announcements for every single departure. The IT team took over an hour to reboot the system. It was utter chaos.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Train driver", "Ticket seller", "Announcer"], answer: "Announcer" },
                    { question: "When did the problem happen?", options: ["Early morning", "Midday", "Peak rush hour"], answer: "Peak rush hour" },
                    { question: "Why were the commuters confused?", options: ["The trains were cancelled", "The departure board was wrong", "The station was closed"], answer: "The departure board was wrong" },
                    { question: "How did the staff manage the situation?", options: ["They sent everyone home", "They made constant verbal announcements", "They cancelled all trains"], answer: "They made constant verbal announcements" },
                    { question: "What does 'gibberish' mean in this context?", options: ["Clear information", "Unintelligible or meaningless speech or writing", "A foreign language"], answer: "Unintelligible or meaningless speech or writing" }
                ]
            }
        ];
        
        // --- Audio & TTS Functions ---
        function initAudio() {
            if (typeof Tone === 'undefined') {
                console.warn("Tone.js not loaded. Sound effects disabled.");
                return;
            }
            correctSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
            incorrectSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 0.5 } }).toDestination();
            isAudioReady = true;
        }

        function initSpeechSynthesis() {
            if (!('speechSynthesis' in window)) {
                console.warn("Speech Synthesis not supported");
                return;
            }
            const setVoices = () => {
                const allVoices = speechSynthesis.getVoices();
                if (allVoices.length > 0) {
                    availableVoices = allVoices.filter(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('neural') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('natural')));
                    if (availableVoices.length === 0) { // Fallback to any English voices
                        availableVoices = allVoices.filter(v => v.lang.startsWith('en'));
                    }
                }
            };
            setVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = setVoices;
            }
        }

        function startSpeechKeepAlive() {
            if (window.speechSynthesis) {
                stopSpeechKeepAlive(); // Clear any existing interval
                speechKeepAliveInterval = setInterval(() => {
                    if (speechSynthesis && !speechSynthesis.speaking && !isMainUtteranceSpeaking) {
                        const keepAliveUtterance = new SpeechSynthesisUtterance('');
                        keepAliveUtterance.volume = 0;
                        speechSynthesis.speak(keepAliveUtterance);
                    }
                }, 10000);
            }
        }

        function stopSpeechKeepAlive() {
            if (speechKeepAliveInterval) {
                clearInterval(speechKeepAliveInterval);
                speechKeepAliveInterval = null;
            }
        }

        function speak(text, callback) {
            if (!('speechSynthesis' in window) || availableVoices.length === 0) {
                console.warn("Speech synthesis not ready or no voices available.");
                if (callback) setTimeout(callback, 50);
                return;
            }
            
            isMainUtteranceSpeaking = true;
            speechSynthesis.cancel();
            
            playAudioBtn.classList.add('speaking');
            playAudioText.textContent = "Playing...";
            
            const utterance = new SpeechSynthesisUtterance(text);
            // Cycle through available voices for each group
            utterance.voice = availableVoices[currentGroupIndex % availableVoices.length];
            
            const onEndOrError = (e) => {
                isMainUtteranceSpeaking = false;
                if (e.type === 'error') {
                    console.error("SpeechSynthesisUtterance.onerror:", e.error);
                }
                playAudioBtn.classList.remove('speaking');
                playAudioText.textContent = "Replay Audio";
                if (callback) callback();
            };

            utterance.onend = onEndOrError;
            utterance.onerror = onEndOrError;

            speechSynthesis.speak(utterance);
        }

        // --- Game Logic ---
        function startGame() {
            playerName = playerNameInput.value.trim();
            if (playerName === '') {
                nameErrorEl.textContent = 'Please enter your name!';
                playerNameInput.classList.add('border-red-500');
                return; 
            }
            nameErrorEl.textContent = '';
            playerNameInput.classList.remove('border-red-500');

            if (Tone.context.state !== 'running') {
                Tone.start().catch(e => console.error("Could not start Tone.js", e));
            }
            
            startSpeechKeepAlive();

            score = 0;
            currentGroupIndex = 0;
            globalQuestionCounter = 1;
            questionGroups = [...gameData];
            scoreEl.textContent = `Score: ${score}`;
            playerDisplayEl.textContent = playerName;
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            displayGroup();
        }

        function displayGroup() {
            nextGroupBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            
            const group = questionGroups[currentGroupIndex];
            questionsContainer.innerHTML = '';
            
            playAudioBtn.disabled = true;
            playAudioBtn.onclick = () => {
                 playAudioBtn.disabled = true;
                 speak(group.audioscript, () => { playAudioBtn.disabled = false; });
            };

            group.questions.forEach((q) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'p-3 border border-gray-200 rounded-lg';
                questionDiv.dataset.questionIndex = globalQuestionCounter;

                const questionTitle = document.createElement('h3');
                questionTitle.className = 'text-base font-semibold text-gray-800 mb-2'; // Smaller font
                questionTitle.textContent = `Q${globalQuestionCounter}: ${q.question}`;
                questionDiv.appendChild(questionTitle);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'flex items-center space-x-2'; // Horizontal layout
                
                q.options.forEach(optionText => {
                    const optionButton = document.createElement('button');
                    optionButton.textContent = optionText;
                    optionButton.className = 'btn option-btn';
                    optionButton.dataset.option = optionText;
                    optionButton.onclick = () => selectOption(optionButton);
                    optionsDiv.appendChild(optionButton);
                });

                questionDiv.appendChild(optionsDiv);
                questionsContainer.appendChild(questionDiv);
                globalQuestionCounter++;
            });
            
            speak(group.audioscript, () => {
                playAudioBtn.disabled = false;
            });
        }

        function selectOption(selectedButton) {
            const questionDiv = selectedButton.closest('[data-question-index]');
            questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            selectedButton.classList.add('selected');
        }

        function checkAnswers() {
            const group = questionGroups[currentGroupIndex];
            let allAnswered = true;

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');

                if (!selectedBtn) {
                    allAnswered = false;
                }
            });

            if (!allAnswered) {
                const modal = document.createElement('div');
                modal.style.position = 'fixed';
                modal.style.top = '20px';
                modal.style.left = '50%';
                modal.style.transform = 'translateX(-50%)';
                modal.style.backgroundColor = '#fefcbf';
                modal.style.color = '#92400e';
                modal.style.padding = '1rem';
                modal.style.borderRadius = '0.5rem';
                modal.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                modal.style.zIndex = '100';
                modal.textContent = 'Please answer all questions before submitting.';
                document.body.appendChild(modal);
                setTimeout(() => modal.remove(), 3000);
                return;
            }

            questionsContainer.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            submitBtn.classList.add('hidden');
            nextGroupBtn.classList.remove('hidden');

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');
                const selectedAnswer = selectedBtn.dataset.option;

                if (selectedAnswer.toLowerCase() === q.answer.toLowerCase()) {
                    score += 2;
                    selectedBtn.classList.add('correct');
                    if(isAudioReady) correctSynth.triggerAttackRelease("C5", "8n", Tone.now() + index * 0.1);
                } else {
                    selectedBtn.classList.add('incorrect');
                    if(isAudioReady) incorrectSynth.triggerAttackRelease("C3", "4n", Tone.now() + index * 0.1);
                    questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                        if (btn.dataset.option.toLowerCase() === q.answer.toLowerCase()) {
                            btn.classList.add('correct');
                        }
                    });
                }
            });
            scoreEl.textContent = `Score: ${score}`;
        }
        
        function nextGroup() {
            currentGroupIndex++;
            if (currentGroupIndex < questionGroups.length) {
                displayGroup();
            } else {
                endGame();
            }
        }

        function endGame() {
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            const totalQuestions = questionGroups.reduce((acc, group) => acc + group.questions.length, 0);
            finalScoreEl.textContent = `Well done, ${playerName}! Your final score is ${score} out of ${totalQuestions * 2}.`;
            
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', startGame);
        submitBtn.addEventListener('click', checkAnswers);
        nextGroupBtn.addEventListener('click', nextGroup);
        restartBtn.addEventListener('click', () => {
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        });
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });


        // --- Initialisation ---
        window.onload = () => {
            initAudio();
            initSpeechSynthesis();
        };

    </script>
</body>
</html>
