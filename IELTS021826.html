<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Practice Platform</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-gray: #f8fafc;
            --surface: #ffffff;
            --text: #000000;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --sidebar-width: 140px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Compact Sidebar */
        aside {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-shadow: 2px 0 5px rgba(0,0,0,0.02);
            z-index: 10;
            flex-shrink: 0;
            gap: 1rem;
        }

        .sidebar-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.05em;
        }

        input[type="text"].examiner-input {
            width: 100%;
            padding: 0.35rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            font-size: 0.85rem;
            box-sizing: border-box;
            background: #f1f5f9;
        }

        select {
            width: 100%;
            padding: 0.35rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            background: #f1f5f9;
            font-size: 0.85rem;
        }

        nav {
            flex: 1;
            overflow-y: auto;
        }

        nav button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.6rem 0.5rem;
            margin-bottom: 0.25rem;
            border: none;
            background: transparent;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: #64748b;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        nav button:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        nav button.active {
            background: #eff6ff;
            color: var(--primary);
            border-left: 3px solid var(--primary);
            font-weight: 600;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--surface);
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Icon Buttons */
        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: #f1f5f9; color: var(--text); }
        
        .play-btn { background: var(--primary); border-color: var(--primary); color: white; }
        .play-btn:hover { background: var(--primary-dark); }
        
        .stop-btn { color: var(--error); border-color: #fecaca; background: #fef2f2; }
        .stop-btn:hover { background: #fee2e2; }

        .score-pill {
            background: #f1f5f9;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            border: 1px solid var(--border);
        }
        .score-val { color: var(--primary); }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 1700px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .question-card {
            background: var(--surface);
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        h2 { margin: 0 0 1.5rem 0; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; font-size: 1.1rem; }
        h3 { color: #000; font-size: 0.95rem; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }

        .form-group {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: #000;
        }

        .question-label {
            font-weight: 700;
            color: var(--primary);
            width: 24px;
        }

        input[type="text"], select.ans-select {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            min-width: 150px;
            font-family: inherit;
            color: #000;
        }

        /* Radio Styling */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
            margin-left: 2rem;
            margin-top: 0.5rem;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            color: #000;
            font-weight: 500;
        }
        .radio-option:hover { background: #f8fafc; }

        /* Status Badge */
        .status-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e2e8f0;
            display: inline-block;
        }
        .playing { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .paused { background: #f59e0b; }

        /* Overlay */
        #pause-overlay {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            display: none;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        /* Feedback */
        .correct-answer { display: none; margin-left: 0.5rem; color: var(--success); font-weight: bold; font-size: 0.85rem; }
        .show-answers .correct-answer { display: inline; }
        .correct-input { border-color: var(--success) !important; background-color: #f0fdf4 !important; }
        .incorrect-input { border-color: var(--error) !important; background-color: #fef2f2 !important; }

    </style>
</head>
<body>

    <aside>
        <div class="sidebar-group">
            <label for="examinerName">Examiner</label>
            <input type="text" id="examinerName" class="examiner-input" placeholder="Name">
        </div>

        <div class="sidebar-group">
            <label for="testSelect">Test Suite</label>
            <select id="testSelect" onchange="loadTest(this.value)">
                <option value="test1">Test 1</option>
                <option value="test2">Test 2</option>
                <option value="test3">Test 3</option>
                <option value="test4">Test 4</option>
                <option value="test5">Test 5</option>
            </select>
        </div>

        <nav id="sectionNav"></nav>
    </aside>

    <main>
        <header>
            <div class="header-section">
                <!-- Navigation Icons -->
                <button class="icon-btn" onclick="goHome()" title="Home">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
                <button class="icon-btn" onclick="navigate(-1)" title="Previous Section">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="icon-btn" onclick="navigate(1)" title="Next Section">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>

            <div class="header-section">
                <!-- Audio Controls -->
                <span id="speakingStatus" class="status-badge"></span>
                <button class="icon-btn play-btn" onclick="toggleAudio()" id="playBtn" title="Play/Pause">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </button>
                <button class="icon-btn stop-btn" onclick="stopAudio()" title="Stop/Reset">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                </button>
            </div>

            <div class="header-section">
                <!-- Scoring -->
                <div class="score-pill">
                    <span>Score</span>
                    <span class="score-val" id="headerScore">0 / 0</span>
                </div>
                <div class="score-pill">
                    <span>Band</span>
                    <span class="score-val" id="headerBand">0.0</span>
                </div>
                <button class="icon-btn" style="color:var(--success); border-color:var(--success);" onclick="checkAnswers()" title="Check Answers">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
                <button class="icon-btn" onclick="downloadReport()" title="Download Report">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>
        </header>

        <div id="contentArea" class="content-area"></div>
    </main>

    <div id="pause-overlay">
        <div>
            <div style="font-weight:bold;">Reading Time</div>
            <div style="font-size:0.8rem; opacity:0.8;">Next questions...</div>
        </div>
        <div style="font-size:1.5rem; font-family:monospace; font-weight:bold;" id="timerDisplay">20</div>
        <button style="background:white; color:#1e293b; border:none; padding:0.3rem 0.8rem; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="skipPause()">Skip</button>
    </div>

<script>
/**
 * DATA HELPERS
 */
function generateInputQ(id, label, ans) {
    return `<div class="form-group"><span class="question-label">${id}</span> ${label} <input type="text" data-ans="${ans}"> <span class="correct-answer">${ans}</span></div>`;
}

function generateSelectQ(id, label, options, ans) {
    let optsHTML = options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="form-group"><span class="question-label">${id}</span> ${label} <select class="ans-select" data-ans="${ans}"><option value="">Select...</option>${optsHTML}</select> <span class="correct-answer">${ans}</span></div>`;
}

function generateRadioQ(id, label, options, correctIndex) {
    let opts = options.map((o, i) => `<label class="radio-option"><input type="radio" name="q${id}" value="${String.fromCharCode(65+i)}" data-correct="${i===correctIndex}"> ${o}</label>`).join('');
    return `<div class="form-group" style="align-items:flex-start"><span class="question-label">${id}</span> <div style="flex:1"><div>${label}</div><div class="radio-group">${opts}</div></div><span class="correct-answer">Correct: ${String.fromCharCode(65+correctIndex)}</span></div>`;
}

/**
 * APP STATE
 */
let currentTest = 'test1';
let currentSectionIndex = 0;
let synth = window.speechSynthesis;
let voices = [];
let isPlaying = false;
let pauseTimeout = null;
let scriptQueue = [];
let currentScore = 0;

/**
 * INITIALIZATION
 */
window.onload = function() {
    loadVoices();
    if (synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
    }
    loadTest('test1');
};

function loadVoices() {
    voices = synth.getVoices();
}

/**
 * VOICE SELECTION
 */
function getVoiceForRole(role) {
    // Basic Gender Pools
    const femalePriorities = ["Microsoft Ava", "Microsoft Emma", "Google US English", "Samantha"];
    const malePriorities = ["Microsoft Brian", "Microsoft Andrew", "Microsoft William", "Google UK English Male", "Daniel"];

    // Distinct Roles for Section 3
    if (role === 'student_m') {
        // Force a younger/different male voice if possible
        return voices.find(v => v.name.includes("Microsoft William")) || voices.find(v => v.name.includes("Male")) || voices[0];
    }
    if (role === 'student_f') {
        // Force a younger/different female voice
        return voices.find(v => v.name.includes("Microsoft Emma")) || voices.find(v => v.name.includes("Female")) || voices[0];
    }
    if (role === 'professor_m') {
        // Older/Authority male voice
        return voices.find(v => v.name.includes("Microsoft Andrew")) || voices.find(v => v.name.includes("Male")) || voices[0];
    }
    if (role === 'professor_f') {
        return voices.find(v => v.name.includes("Microsoft Ava")) || voices.find(v => v.name.includes("Female")) || voices[0];
    }

    // Default Fallback Logic
    let preferredList = role === 'woman' ? femalePriorities : malePriorities;
    
    for (let name of preferredList) {
        const found = voices.find(v => v.name.includes(name));
        if (found) return found;
    }
    
    return voices.find(v => v.name.includes(role === 'woman' ? "Female" : "Male")) || voices[0];
}

/**
 * UI LOGIC
 */
function loadTest(testId) {
    stopAudio();
    currentTest = testId;
    currentScore = 0;
    updateScoreDisplay();
    
    const test = TEST_DATA[testId];
    
    const nav = document.getElementById('sectionNav');
    nav.innerHTML = '';
    test.sections.forEach((section, index) => {
        const btn = document.createElement('button');
        btn.innerText = section.name;
        btn.onclick = () => loadSection(index);
        if (index === 0) btn.classList.add('active');
        nav.appendChild(btn);
    });

    loadSection(0);
}

function loadSection(index) {
    stopAudio();
    currentSectionIndex = index;
    const test = TEST_DATA[currentTest];
    const section = test.sections[index];

    document.getElementById('contentArea').innerHTML = section.questionsHTML;
    
    const navBtns = document.querySelectorAll('#sectionNav button');
    navBtns.forEach(b => b.classList.remove('active'));
    if(navBtns[index]) navBtns[index].classList.add('active');

    document.getElementById('speakingStatus').className = "status-badge";
    document.body.classList.remove('show-answers');
    
    currentScore = 0;
    updateScoreDisplay();
}

function navigate(direction) {
    const test = TEST_DATA[currentTest];
    let newIndex = currentSectionIndex + direction;
    
    if (newIndex >= 0 && newIndex < test.sections.length) {
        loadSection(newIndex);
    }
}

function goHome() {
    loadTest('test1');
}

function checkAnswers() {
    document.body.classList.add('show-answers');
    
    let sectionScore = 0;
    let totalQs = 0;
    
    const textInputs = document.querySelectorAll('input[type="text"], select.ans-select');
    textInputs.forEach(input => {
        if(input.classList.contains('examiner-input')) return;
        totalQs++;
        const userVal = input.value.trim().toLowerCase();
        const correctVal = input.dataset.ans.toLowerCase();
        
        // Normalize: remove all spaces for loose comparison (fixes phone number spacing issues)
        const userValClean = userVal.replace(/\s+/g, '');
        const correctValClean = correctVal.replace(/\s+/g, '');
        
        // Check 1: Match ignoring spaces (e.g. phone numbers)
        // Check 2: Original containment logic for partial matches
        if ((userValClean && userValClean === correctValClean) || 
            (userVal && correctVal.includes(userVal) && userVal.length > 2)) {
            input.classList.add('correct-input');
            input.classList.remove('incorrect-input');
            sectionScore++;
        } else {
            input.classList.add('incorrect-input');
            input.classList.remove('correct-input');
        }
    });

    const radioGroups = new Set();
    document.querySelectorAll('input[type="radio"]').forEach(r => radioGroups.add(r.name));
    
    radioGroups.forEach(groupName => {
        totalQs++;
        const selected = document.querySelector(`input[name="${groupName}"]:checked`);
        const correct = document.querySelector(`input[name="${groupName}"][data-correct="true"]`);
        
        if (selected && selected === correct) {
            sectionScore++;
        }
        
        if (correct && selected) {
             if (selected !== correct) selected.parentElement.style.color = "var(--error)";
             correct.parentElement.style.color = "var(--success)";
             correct.parentElement.style.fontWeight = "bold";
        }
    });

    currentScore = sectionScore;
    document.getElementById('headerScore').innerText = `${currentScore} / ${totalQs}`;
    
    let pct = totalQs > 0 ? (currentScore / totalQs) : 0;
    let band = 0;
    if (pct >= 0.95) band = 9.0;
    else if (pct >= 0.85) band = 8.5;
    else if (pct >= 0.80) band = 8.0;
    else if (pct >= 0.75) band = 7.5;
    else if (pct >= 0.70) band = 7.0;
    else if (pct >= 0.60) band = 6.5;
    else if (pct >= 0.50) band = 6.0;
    else if (pct >= 0.40) band = 5.5;
    else band = 4.0;

    document.getElementById('headerBand').innerText = band.toFixed(1);
}

function updateScoreDisplay() {
    document.getElementById('headerScore').innerText = "0 / 0";
    document.getElementById('headerBand').innerText = "0.0";
}

function downloadReport() {
    const examiner = document.getElementById('examinerName').value || "Unknown";
    const testName = TEST_DATA[currentTest].title;
    const scoreText = document.getElementById('headerScore').innerText;
    const bandText = document.getElementById('headerBand').innerText;

    const text = `IELTS LISTENING REPORT
-------------------------------
Examiner: ${examiner}
Date: ${new Date().toLocaleDateString()}
Test: ${testName}
Section: ${TEST_DATA[currentTest].sections[currentSectionIndex].name}
-------------------------------
Score: ${scoreText}
Est. Band: ${bandText}
-------------------------------
Generated by IELTS Lab`;

    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `IELTS_Report.txt`;
    a.click();
}

/**
 * AUDIO ENGINE
 */
function parseScript(scriptText) {
    const lines = scriptText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const queue = [];

    lines.forEach(line => {
        const pauseMatch = line.match(/\[Pause: (\d+) seconds\]/);
        if (pauseMatch) {
            queue.push({ type: 'pause', duration: parseInt(pauseMatch[1]) });
            return;
        }
        
        const separator = line.indexOf(':');
        if (separator > -1) {
            const speaker = line.substring(0, separator).trim();
            const text = line.substring(separator + 1).trim();
            let gender = 'man'; // Default Fallback
            
            // --- SECTION 1 & 2 LOGIC ---
            if (['Receptionist', 'Guide', 'Emma', 'Administrator', 'Maria', 'Sarah', 'Nina', 'Agent'].includes(speaker)) gender = 'woman';
            if (['Caller', 'Tom', 'Dr. Williams', 'Curator', 'Michael', 'Prof Chen', 'Coordinator', 'Manager', 'Liam', 'Mr. Thompson', 'Dr. Evans', 'Dr. Morgan', 'Jamie', 'Alex'].includes(speaker)) {
                 if (speaker === 'Caller') {
                     if (currentTest === 'test2' || currentTest === 'test3' || currentTest === 'test5') gender = 'woman';
                     else gender = 'man';
                 } else if (speaker === 'Agent' && currentTest === 'test5') {
                     gender = 'man'; // Kevin in Test 5
                 } else {
                     gender = 'man'; 
                 }
            }
            if (speaker === 'Lecturer') gender = 'man'; 

            // --- SECTION 3 VOICE ROTATION LOGIC ---
            // Detect Section 3 context by checking speakers typical of academic discussions
            if (['Emma', 'Tom', 'Dr. Williams'].includes(speaker)) { // Test 1
                if (speaker === 'Emma') gender = 'student_f';
                if (speaker === 'Tom') gender = 'student_m';
                if (speaker === 'Dr. Williams') gender = 'professor_m';
            }
            if (['Michael', 'Sophie', 'Professor Chen'].includes(speaker) || ['Prof Chen'].includes(speaker)) { // Test 2
                if (speaker === 'Sophie') gender = 'student_f';
                if (speaker === 'Michael') gender = 'student_m';
                if (speaker.includes('Chen')) gender = 'professor_m';
            }
            if (['Liam', 'Sarah', 'Dr. Evans'].includes(speaker)) { // Test 3
                if (speaker === 'Sarah') gender = 'student_f';
                if (speaker === 'Liam') gender = 'student_m';
                if (speaker === 'Dr. Evans') gender = 'professor_m';
            }
            if (['James', 'Nina', 'Mr. Thompson'].includes(speaker)) { // Test 4
                if (speaker === 'Nina') gender = 'student_f';
                if (speaker === 'James') gender = 'student_m';
                if (speaker === 'Mr. Thompson') gender = 'professor_m';
            }
            if (['Alex', 'Jamie', 'Dr. Morgan'].includes(speaker)) { // Test 5
                // Jamie is ambiguous but usually student. Alex student. Morgan Prof.
                // Let's assign distinct:
                if (speaker === 'Jamie') gender = 'student_f'; // Make Jamie distinct from Alex
                if (speaker === 'Alex') gender = 'student_m';
                if (speaker === 'Dr. Morgan') gender = 'professor_m';
            }

            queue.push({ type: 'speech', text: text, gender: gender });
        }
    });
    return queue;
}

function toggleAudio() {
    if (isPlaying) stopAudio();
    else startAudio();
}

function startAudio() {
    isPlaying = true;
    document.querySelector('.play-btn').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>'; // Pause icon
    document.getElementById('speakingStatus').className = "status-badge playing";

    const script = TEST_DATA[currentTest].sections[currentSectionIndex].script;
    scriptQueue = parseScript(script);
    playNextItem();
}

function stopAudio() {
    isPlaying = false;
    synth.cancel();
    clearTimeout(pauseTimeout);
    document.getElementById('pause-overlay').style.display = 'none';
    document.querySelector('.play-btn').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
    document.getElementById('speakingStatus').className = "status-badge";
}

function playNextItem() {
    if (!isPlaying || scriptQueue.length === 0) {
        stopAudio();
        return;
    }

    const item = scriptQueue.shift();

    if (item.type === 'pause') {
        startPauseTimer(item.duration);
    } else if (item.type === 'speech') {
        const u = new SpeechSynthesisUtterance(item.text);
        u.voice = getVoiceForRole(item.gender);
        u.rate = 1.0; 
        u.onend = () => { if (isPlaying) playNextItem(); };
        synth.speak(u);
    }
}

function startPauseTimer(seconds) {
    const overlay = document.getElementById('pause-overlay');
    const display = document.getElementById('timerDisplay');
    overlay.style.display = 'flex';
    document.getElementById('speakingStatus').className = "status-badge paused";
    
    let left = seconds;
    display.innerText = left;

    function tick() {
        if (!isPlaying) return;
        if (left <= 0) skipPause();
        else {
            left--;
            display.innerText = left;
            pauseTimeout = setTimeout(tick, 1000);
        }
    }
    pauseTimeout = setTimeout(tick, 1000);
}

function skipPause() {
    clearTimeout(pauseTimeout);
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('speakingStatus').className = "status-badge playing";
    playNextItem();
}

</script>
