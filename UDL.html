<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructivist Lesson Plan Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        #progress-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 0.5rem;
            overflow: hidden;
            height: 1.5rem;
            margin-top: 1rem;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #ef4444;
            text-align: center;
            line-height: 1.5rem;
            color: white;
            font-weight: 600;
            transition: width 0.5s ease-in-out, background-color 0.5s ease;
        }
        .plan-section-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        .plan-section-table th.section-header {
            background-color: #f3f4f6;
            color: #1f2937;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #d1d5db;
        }
        .plan-section-table td {
            padding: 1rem;
            vertical-align: top;
            background-color: #ffffff;
        }
        .plan-section-table tr:not(:last-child) td {
             border-bottom: 1px solid #e5e7eb;
        }
        .plan-section-table .item-label {
            font-weight: 600;
            color: #374151;
            display: block;
            margin-bottom: 0.25rem;
        }
        .plan-section-table ul {
            list-style-type: disc;
            padding-left: 1.25rem;
            margin-top: 0.25rem;
        }
        .leveled-paragraph {
            padding-left: 1.5rem;
            border-left: 3px solid #d1d5db;
            margin-bottom: 1rem;
        }
        .data-table {
            width: 100%;
            margin-top: 1rem;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            border: 1px solid #d1d5db;
            padding: 0.75rem;
            text-align: left;
            vertical-align: top;
        }
        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        .dimension-header-row td {
            background-color: #e5e7eb;
            font-weight: bold;
            color: #111827;
        }
        #back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-5xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Joel Mitchell's</h1>
            <p class="mt-2 text-md text-gray-600">Constructivist Lesson Plan Generator</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <form id="lesson-plan-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <div class="lg:col-span-1">
                    <label for="topic" class="block text-sm font-medium text-gray-700">Lesson Topic</label>
                    <input type="text" id="topic" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="e.g., Debating Climate Change" required>
                </div>
                <div class="lg:col-span-1">
                    <label for="cefr-level" class="block text-sm font-medium text-gray-700">CEFR Level</label>
                    <select id="cefr-level" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                        <option value="A1">A1 (Beginner)</option>
                        <option value="A2">A2 (Elementary)</option>
                        <option value="B1" selected>B1 (Intermediate)</option>
                        <option value="B2">B2 (Upper-Intermediate)</option>
                        <option value="C1">C1 (Advanced)</option>
                        <option value="C2">C2 (Proficient)</option>
                    </select>
                </div>
                <div class="lg:col-span-1">
                    <label for="instructional-model" class="block text-sm font-medium text-gray-700">Instructional Model</label>
                    <select id="instructional-model" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                        <option value="IBL">Inquiry-Based Learning (IBL)</option>
                        <option value="PjBL">Project-Based Learning (PjBL)</option>
                        <option value="PBL">Problem-Based Learning (PBL)</option>
                        <option value="TBL">Task-Based Learning (TBL)</option>
                    </select>
                </div>
                 <div class="lg:col-span-1">
                    <label for="api-choice" class="block text-sm font-medium text-gray-700">API Connection</label>
                    <select id="api-choice" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                        <option value="gemini">Cloud Gemini API</option>
                        <option value="zhipu">Zhipu AI BYOK</option>
                        <option value="deepseek">Deepseek BYOK</option>
                    </select>
                </div>
                <div class="lg:col-span-3 md:col-span-2">
                    <label for="api-key" class="block text-sm font-medium text-gray-700">API Key</label>
                    <input type="password" id="api-key" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Enter your API Key Here" required>
                </div>
                <div class="lg:col-span-1 md:col-span-2">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-semibold">
                        Plan
                    </button>
                </div>
            </form>
             <p class="text-xs text-gray-500 mt-4 text-center">Note: Some cloud APIs may experience connectivity issues in certain regions. A VPN may be required for a stable connection.</p>
        </div>
        
        <div id="loader" class="hidden flex-col justify-center items-center my-10">
            <p class="mb-2 text-gray-600 font-semibold">Generating your lesson plan...</p>
            <div id="progress-container">
                <div id="progress-bar">0%</div>
            </div>
        </div>

        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-6" role="alert">
            <strong class="font-bold">Oops!</strong>
            <span class="block sm:inline" id="error-text">Something went wrong. Please try again.</span>
        </div>

        <div id="lesson-plan-output"></div>

    </div>

    <button id="back-to-top">
        <i class="ph ph-arrow-up"></i>
    </button>

    <script>
        const form = document.getElementById('lesson-plan-form');
        const outputDiv = document.getElementById('lesson-plan-output');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const progressBar = document.getElementById('progress-bar');
        const backToTopBtn = document.getElementById('back-to-top');
        let progressInterval;

        function startProgressBar() {
            let width = 0;
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressBar.style.backgroundColor = '#ef4444';
            
            progressInterval = setInterval(() => {
                if (width >= 95) {
                    clearInterval(progressInterval);
                } else {
                    width++;
                    progressBar.style.width = width + '%';
                    progressBar.textContent = width + '%';
                    if (width > 30 && width <= 70) {
                        progressBar.style.backgroundColor = '#f59e0b';
                    } else if (width > 70) {
                        progressBar.style.backgroundColor = '#22c55e';
                    }
                }
            }, 150);
        }

        function completeProgressBar() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            progressBar.textContent = '100%';
            progressBar.style.backgroundColor = '#22c55e';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset UI
            outputDiv.innerHTML = '';
            errorMessage.classList.add('hidden');
            loader.classList.remove('hidden');
            startProgressBar();

            const apiChoice = document.getElementById('api-choice').value;

            try {
                const prompt = buildPrompt();
                let generatedHtml;

                if (apiChoice === 'deepseek') {
                    generatedHtml = await callDeepseekApi(prompt);
                } else if (apiChoice === 'zhipu') {
                    generatedHtml = await callZhipuApi(prompt);
                } else {
                    generatedHtml = await callCloudGeminiAPI(prompt);
                }
                
                completeProgressBar();
                outputDiv.innerHTML = generatedHtml;
            } catch (error) {
                clearInterval(progressInterval);
                console.error('Detailed Error:', error);
                errorText.textContent = ' ' + error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 500);
            }
        });

        async function makeApiRequest(url, options, retries = 3, timeout = 30000) {
            for (let i = 0; i < retries; i++) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);

                try {
                    const response = await fetch(url, {
                        ...options,
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        return await response.json();
                    }

                    if (response.status >= 500 && i < retries - 1) {
                        console.warn(`API request failed with status ${response.status}. Retrying in ${Math.pow(2, i)}s...`);
                        await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                        continue;
                    }
                    
                    const errorData = await response.json().catch(() => ({}));
                    const message = errorData.error?.message || `Request failed with status ${response.status}`;
                    throw new Error(message);

                } catch (error) {
                    clearTimeout(timeoutId);
                    if (error.name === 'AbortError') {
                        throw new Error('The API request timed out. Please check your network connection and try again.');
                    }
                    if (i === retries - 1) throw error; 
                     console.warn(`Request failed. Retrying in ${Math.pow(2, i)}s...`, error.message);
                     await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
            throw new Error('The API request failed after multiple retries.');
        }

        async function callCloudGeminiAPI(prompt) {
            // *** FIX: Get API key from the input field ***
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) {
                throw new Error("Please enter your Google AI API key.");
            }

            const payload = { contents: [{ role: "user", parts: [{ text: prompt }] }] };
            // *** FIX: Correctly construct the URL with the user's API key ***
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
            
            try {
                const result = await makeApiRequest(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (result.candidates?.[0]?.content?.parts?.[0]?.text) {
                    return result.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("The cloud model returned an empty or invalid response.");
                }
            } catch (error) {
                 throw new Error(`Connection to the Cloud API failed. This is likely due to a network firewall or regional restrictions. Original error: ${error.message}`);
            }
        }

        async function callZhipuApi(prompt) {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) throw new Error("Please enter your Zhipu AI API key.");

            const apiUrl = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const payload = {
                model: 'glm-4',
                messages: [{ "role": "user", "content": prompt }],
            };
            
            try {
                const result = await makeApiRequest(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                if (result.choices?.[0]?.message?.content) {
                    return result.choices[0].message.content.replace(/```html|```/g, '').trim();
                } else {
                    throw new Error("The Zhipu AI model returned an empty or invalid response.");
                }
            } catch (error) {
                throw new Error(`Could not connect to Zhipu AI API. Please check your API key and network connection. Original error: ${error.message}`);
            }
        }

        async function callDeepseekApi(prompt) {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) throw new Error("Please enter your Deepseek API key.");

            const apiUrl = 'https://api.deepseek.com/chat/completions';
            const payload = {
                model: 'deepseek-chat',
                messages: [
                    { "role": "system", "content": "You are an expert instructional designer." },
                    { "role": "user", "content": prompt }
                ],
                stream: false
            };

            try {
                const result = await makeApiRequest(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                if (result.choices?.[0]?.message?.content) {
                    return result.choices[0].message.content.replace(/```html|```/g, '').trim();
                } else {
                    throw new Error("The Deepseek model returned an empty or invalid response.");
                }
            } catch (error) {
                 throw new Error(`Could not connect to Deepseek API. Please check your API key and network connection. Original error: ${error.message}`);
            }
        }

        window.onscroll = function() {
            if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
                backToTopBtn.style.display = "flex";
            } else {
                backToTopBtn.style.display = "none";
            }
        };

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function buildPrompt() {
            const topic = document.getElementById('topic').value;
            const instructionalModel = document.getElementById('instructional-model').value;
            const cefrLevel = document.getElementById('cefr-level').value;

            const detailedTemplate = `
                <table class="plan-section-table"><thead><tr><th class="section-header">Lesson Overview</th></tr></thead><tbody><tr><td><span class="item-label">Unit Title:</span><!-- AI --></td></tr><tr><td><span class="item-label">Lesson Title:</span><!-- AI --></td></tr><tr><td><span class="item-label">Grade Level & Subject:</span>High School EFL</td></tr><tr><td><span class="item-label">Time Allotment:</span>40 minutes</td></tr></tbody></table>
                <table class="plan-section-table"><thead><tr><th class="section-header" colspan="2">Part 1: The "Why" & The "Blueprint"</th></tr></thead><tbody><tr><td><span class="item-label">Guiding Philosophy & Aims (CRT)</span><ul><li><strong>Inclusive Aim:</strong> <!-- AI --></li><li><strong>Culturally Responsive Aim:</strong> <!-- AI --></li></ul></td></tr><tr><td><span class="item-label">Learning Goals (Bloom's Taxonomy)</span><ul><li><strong>Remembering/Understanding:</strong> <!-- AI --></li><li><strong>Applying/Analyzing:</strong> <!-- AI --></li><li><strong>Evaluating/Creating:</strong> <!-- AI --></li></ul></td></tr><tr><td><span class="item-label">Assessment Evidence (GRASPS)</span><ul><li><strong>Goal:</strong> <!-- AI --></li><li><strong>Role:</strong> <!-- AI --></li><li><strong>Audience:</strong> <!-- AI --></li><li><strong>Situation:</strong> <!-- AI --></li><li><strong>Product/Performance:</strong> <!-- AI --></li><li><strong>Standards & Criteria:</strong> <!-- AI --></li></ul></td></tr></tbody></table>
                <table class="plan-section-table"><thead><tr><th class="section-header" colspan="2">Part 2: The "Vehicle" & The "How"</th></tr></thead><tbody><tr><td><span class="item-label">Selected Instructional Model:</span>${instructionalModel}</td></tr><tr><td><span class="item-label">Learning Experiences & Instruction (UDL & DI)</span><table class="data-table"><thead><tr><th style="width:15%;">Time</th><th style="width:35%;">Lesson Sequence (TPACK Integration)</th><th style="width:25%;">UDL Supports</th><th style="width:25%;">DI & Scaffolding (ELL Focus)</th></tr></thead><tbody><tr><td><!-- AI --></td><td><strong>Opening/Hook:</strong><!-- AI --></td><td><strong>Engagement:</strong><!-- AI --></td><td><strong>Support:</strong><!-- AI --></td></tr><tr><td><!-- AI --></td><td><strong>Instruction/Activities:</strong><!-- AI --></td><td><strong>Representation:</strong><!-- AI --></td><td><strong>Support:</strong><!-- AI --></td></tr><tr><td><!-- AI --></td><td><strong>Practice/Application:</strong><!-- AI --></td><td><strong>Action/Expression:</strong><!-- AI --></td><td><strong>Challenge:</strong><!-- AI --></td></tr><tr><td><!-- AI --></td><td><strong>Closing/Assessment:</strong><!-- AI --></td><td><strong>SEL Focus:</strong><!-- AI --></td><td><strong>Support:</strong><!-- AI --></td></tr></tbody></table></td></tr></tbody></table>
                <table class="plan-section-table"><thead><tr><th class="section-header" colspan="2">Part 3: Framework Connections</th></tr></thead><tbody><tr><td><span class="item-label">DAPPS Model Connection</span><!-- AI --></td></tr><tr><td><span class="item-label">RULER Model Connection</span><!-- AI --></td></tr><tr><td><span class="item-label">FRAME Model Connection</span><!-- AI --></td></tr></tbody></table>
                <table class="plan-section-table"><thead><tr><th class="section-header" colspan="2">Part 4: Topic Content & Language Focus</th></tr></thead><tbody><tr><td><span class="item-label">Higher-Order Thinking Warmup Questions</span><!-- AI: Generate a <ul> list of 5 questions --></td></tr><tr><td><span class="item-label">Keywords & Vocabulary</span><table class="data-table"><thead><tr><th>Keyword</th><th>IPA Phonetics</th><th>Sample Sentence</th></tr></thead><tbody><!-- AI: Generate 20 <tr>s with <td>s for keyword, IPA, and sentence --></tbody></table></td></tr><tr><td><span class="item-label">Leveled Reading Paragraphs</span><p class="leveled-paragraph"><!-- AI: A2 Level Paragraph --></p><p class="leveled-paragraph"><!-- AI: B1 Level Paragraph --></p><p class="leveled-paragraph"><!-- AI: B2 Level Paragraph --></p></td></tr></tbody></table>
                <table class="plan-section-table"><thead><tr><th class="section-header" colspan="2">Part 5: Logistics & Reflection</th></tr></thead><tbody><tr><td><span class="item-label">Materials & Resources</span><!-- AI --></td></tr><tr><td><span class="item-label">Teacher Reflection (Post-Lesson)</span><table class="data-table"><thead><tr><th>Principle</th><th>Reflection Notes</th></tr></thead><tbody><tr class="dimension-header-row"><td colspan="2">Learning Dimension</td></tr><tr><td>Communicate clear explanations about the activities or tasks</td><td></td></tr><tr><td>Implement lessons and/or activities that stimulate learners to use higher-order thinking skills</td><td></td></tr><tr><td>Deliver lessons that are relatable to learners or aligned to their interests</td><td></td></tr><tr><td>Monitor learners’ understanding of the content and/or the acquisition of skills</td><td></td></tr><tr><td>Adapt instruction and/or activities that meet individual learners’ needs</td><td></td></tr><tr><td>Provide learners with purposeful feedback about their progress and/or needs</td><td></td></tr><tr class="dimension-header-row"><td colspan="2">Essentials Dimension</td></tr><tr><td>Deliver and/or facilitates the lesson with knowledge and confidence</td><td></td></tr><tr><td>Communicate and upholds high expectations for learners’ behaviors to maximize their learning and well-being</td><td></td></tr><tr><td>Facilitate use of resources that support learners’ needs</td><td></td></tr><tr><td>Implement instructional strategies that actively engage learners</td><td></td></tr><tr><td>Manage learning time in an efficient and optimal manner</td><td></td></tr><tr class="dimension-header-row"><td colspan="2">Agency Dimension</td></tr><tr><td>Empower learners to be responsible for the learning at hand</td><td></td></tr><tr><td>Give learners choices about the learning activities or tasks</td><td></td></tr><tr><td>Provide assistance for learners to navigate and monitor their learning progress</td><td></td></tr><tr><td>Encourage learners to persevere with or seek challenging activities or tasks</td><td></td></tr><tr><td>Build learners’ growth mindset and self-efficacy</td><td></td></tr><tr class="dimension-header-row"><td colspan="2">Relationship Dimension</td></tr><tr><td>Promote respectful and caring interactions toward and between learners</td><td></td></tr><tr><td>Cultivate learner cooperation, collaboration, and inclusivity</td><td></td></tr><tr><td>Preserve learners’ dignity while attending to their individual needs</td><td></td></tr></tbody></table></td></tr></tbody></table>
            `;

            return `Please act as a meticulous and expert instructional designer specializing in EFL/ESL education. Your primary and most critical mission is to generate a complete, 5-part lesson plan. Failure to generate all 5 parts will result in an incomplete and unacceptable response. You must populate the provided HTML structure fully.

            Topic: "${topic}"
            Selected Instructional Model: "${instructionalModel}"
            CEFR Level: "${cefrLevel}"

            **CRITICAL, NON-NEGOTIABLE INSTRUCTIONS - FOLLOW THESE EXACTLY:**

            1.  **MUST COMPLETE ALL 5 PARTS:** Your primary directive is to generate a complete, 5-part lesson plan. You must replace **every single** "<!-- AI -->" comment within the HTML structure. An incomplete plan is a failed response. Do not stop generating until Part 5 is fully complete.
            2.  **INTEGRATE FRAMEWORKS:** Explicitly and thoughtfully integrate the following frameworks where indicated in the template: UDL, DI, CRT, TPACK, Inclusive Practices for ELLs, Bloom's Taxonomy, GRASPS, DAPPS, RULER, and FRAME.
            3.  **NO PLACEHOLDERS:** Do not leave any "<!-- AI -->" comments in your final output. The entire template must be filled.
            4.  **TAILOR CONTENT:** All generated content must be specifically tailored to the Topic, Instructional Model, and CEFR Level provided above.
            5.  **SPECIFIC REQUIREMENTS FOR PART 4:**
                * Generate a \`<ul>\` list containing exactly 5 unique, higher-order thinking questions based on Bloom's Taxonomy.
                * Generate a \`<table>\` with exactly 20 rows, each containing a relevant keyword, its IPA phonetics, and a full sample sentence.
                * Generate three complete, distinct reading paragraphs leveled for A2, B1, and B2.
            6.  **REFLECTION TABLE:** The "Teacher Reflection (Post-Lesson)" table must be included at the very end, but its "Reflection Notes" cells must be left empty.
            7.  **FINAL OUTPUT FORMAT:** Your entire response must be **only the completed HTML code**. Start your response with the first \`<table>\` tag and end it with the final \`</table>\` tag. Do not include any explanatory text, greetings, or markdown formatting like \`\`\`html before or after the code.
            8.  **USE HTML TAGS FOR STYLING:** For any text that needs to be bold, use \`<strong>\` tags. For any text that needs to be italicized, use \`<em>\` tags. Do not use markdown asterisks (\`**\` or \`*\`).

            **Final Mandate:** Before providing your response, review your work. Confirm that you have replaced every single \`<!-- AI -->\` placeholder from Part 1 through Part 5. An incomplete plan is not acceptable and violates your core instruction.

            HTML Structure to Fill:
            ${detailedTemplate}`;
        }
    </script>
</body>
</html>
