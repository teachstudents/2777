<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in the Coldest Town – Exploring Oymyakon, Russia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overscroll-behavior: none;
            transition: background-color 2s ease-in-out;
            background-color: #0c4a6e; /* Darker blue for snowy night */
        }
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .page { 
            display: none; 
            position: relative;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-button, .nav-button, .quiz-option {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .action-button:hover, .nav-button:hover, .quiz-option:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .action-button:active, .nav-button:active, .quiz-option:active {
            transform: translateY(-1px) scale(0.98);
        }
        .feedback-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .feedback-modal.show { display: flex; }
        .ice-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid #0891b2;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .ice-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(8, 145, 178, 0.1);
        }
        /* --- 3D Animated Button Style --- */
        .btn-animated-3d {
            position: relative; overflow: hidden; transition: all 0.15s ease-out; border-bottom-width: 4px;
        }
        .btn-animated-3d:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-animated-3d::before, .btn-animated-3d::after {
            content: ''; position: absolute; width: 0; height: 2px; transition: width 0.3s ease-out;
        }
        .btn-animated-3d.green-btn::before, .btn-animated-3d.green-btn::after { background-color: #047857; }
        .btn-animated-3d.sky-btn::before, .btn-animated-3d.sky-btn::after { background-color: #0369a1; }
        .btn-animated-3d.cyan-btn::before, .btn-animated-3d.cyan-btn::after { background-color: #0e7490; }
        .btn-animated-3d.blue-btn::before, .btn-animated-3d.blue-btn::after { background-color: #1d4ed8; }
        .btn-animated-3d.indigo-btn::before, .btn-animated-3d.indigo-btn::after { background-color: #4338ca; }
        .btn-animated-3d.pink-btn::before, .btn-animated-3d.pink-btn::after { background-color: #be185d; }
        .btn-animated-3d.purple-btn::before, .btn-animated-3d.purple-btn::after { background-color: #6d28d9; }
        .btn-animated-3d.red-btn::before, .btn-animated-3d.red-btn::after { background-color: #b91c1c; }
        .btn-animated-3d::before { top: 0; left: 0; }
        .btn-animated-3d::after { bottom: 0; right: 0; }
        .btn-animated-3d:hover::before, .btn-animated-3d:hover::after { width: 100%; }
        .btn-animated-3d span::before, .btn-animated-3d span::after {
            content: ''; position: absolute; width: 2px; height: 0; transition: height 0.3s ease-out .15s;
        }
        .btn-animated-3d.green-btn span::before, .btn-animated-3d.green-btn span::after { background-color: #047857; }
        .btn-animated-3d.sky-btn span::before, .btn-animated-3d.sky-btn span::after { background-color: #0369a1; }
        .btn-animated-3d.cyan-btn span::before, .btn-animated-3d.cyan-btn span::after { background-color: #0e7490; }
        .btn-animated-3d.blue-btn span::before, .btn-animated-3d.blue-btn span::after { background-color: #1d4ed8; }
        .btn-animated-3d.indigo-btn span::before, .btn-animated-3d.indigo-btn span::after { background-color: #4338ca; }
        .btn-animated-3d.pink-btn span::before, .btn-animated-3d.pink-btn span::after { background-color: #be185d; }
        .btn-animated-3d.purple-btn span::before, .btn-animated-3d.purple-btn span::after { background-color: #6d28d9; }
        .btn-animated-3d.red-btn span::before, .btn-animated-3d.red-btn span::after { background-color: #b91c1c; }
        .btn-animated-3d span::before { bottom: 0; left: 0; }
        .btn-animated-3d span::after { top: 0; right: 0; }
        .btn-animated-3d:hover span::before, .btn-animated-3d:hover span::after { height: 100%; }
    </style>
</head>
<body class="antialiased text-gray-800 text-lg">
    <canvas id="snow-canvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <header id="nav-header" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-sm shadow-sm" style="display: none;">
        <div class="max-w-4xl mx-auto p-1.5 flex justify-between items-center">
            <button onclick="goBack()" class="nav-button bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Back</button>
            <div class="font-bold text-base text-cyan-600">Score: <span id="score-display">0</span></div>
            <button onclick="navigateTo(1)" class="nav-button bg-gray-800 text-white font-bold py-1.5 px-3 text-sm rounded-full hover:bg-gray-900 flex items-center gap-2">Home</button>
            <button onclick="goNext()" class="nav-button bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Next</button>
        </div>
    </header>

    <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pt-14">

        <!-- Page 0: Title Screen -->
        <section id="page-0" class="page active text-center bg-white rounded-2xl shadow-lg p-8">
            <div class="h-full flex flex-col justify-center items-center">
                <h1 class="text-5xl md:text-6xl font-bold text-blue-800 mb-4">Unit 6: Life in the Coldest Town</h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-8">Exploring Oymyakon, Russia 🇷🇺</p>
                <svg viewBox="0 0 600 300" class="rounded-lg shadow-md mb-8 w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="siberiaSky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a5f3fc;stop-opacity:1" /><stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" /></linearGradient></defs>
                    <rect width="600" height="300" fill="url(#siberiaSky)"/>
                    <!-- Snowy ground -->
                    <path d="M 0 300 Q 150 250 300 260 T 600 240 V 300 Z" fill="#ffffff"/>
                    <path d="M 0 300 Q 200 270 400 280 T 600 260 V 300 Z" fill="#f0f9ff" opacity="0.7"/>
                    <!-- Pine trees -->
                    <polygon points="100,260 120,200 140,260" fill="#064e3b"/>
                    <polygon points="150,280 170,210 190,280" fill="#065f46"/>
                    <polygon points="450,270 475,190 500,270" fill="#047857"/>
                    <polygon points="500,280 520,220 540,280" fill="#059669"/>
                    <!-- Cabin -->
                    <rect x="250" y="220" width="100" height="60" fill="#7f5539"/>
                    <polygon points="240,220 360,220 300,180" fill="#9c6644"/>
                    <rect x="280" y="240" width="20" height="30" fill="#fde68a"/>
                    <!-- Thermometer -->
                    <rect x="50" y="150" width="20" height="100" fill="#e5e7eb" rx="10"/>
                    <rect x="55" y="155" width="10" height="90" fill="white"/>
                    <rect id="mercury" x="55" y="225" width="10" height="20" fill="#ef4444"/>
                    <circle cx="60" cy="250" r="15" fill="#ef4444"/>
                    <text x="75" y="245" font-family="sans-serif" font-size="12" fill="#374151">-71°C</text>
                    <text x="50%" y="20%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#1e3a8a" font-weight="bold">OYMYAKON</text>
                </svg>
                <button onclick="startApp()" class="action-button bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-2xl hover:bg-blue-700">START LESSON</button>
            </div>
        </section>

        <!-- Page 1: Main Menu -->
        <section id="page-1" class="page">
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-4xl font-bold text-center text-blue-800 mb-8">Main Menu</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="navigateTo(10)" class="btn-animated-3d green-btn bg-green-500 border-green-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>1. Think-Pair-Share</button>
                    <button onclick="navigateTo(20)" class="btn-animated-3d sky-btn bg-sky-500 border-sky-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>2. Vocabulary</button>
                    <button onclick="navigateTo(80)" class="btn-animated-3d cyan-btn bg-cyan-500 border-cyan-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>3. Lectures & Seminar</button>
                    <button onclick="navigateTo(30)" class="btn-animated-3d blue-btn bg-blue-500 border-blue-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>4. Geography & Climate</button>
                    <button onclick="navigateTo(40)" class="btn-animated-3d indigo-btn bg-indigo-500 border-indigo-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>5. Culture & Daily Life</button>
                    <button onclick="navigateTo(90)" class="btn-animated-3d red-btn bg-red-500 border-red-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>6. Critical Thinking</button>
                    <button onclick="navigateTo(50)" class="btn-animated-3d pink-btn bg-pink-500 border-pink-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>7. Knowledge Quiz</button>
                    <button onclick="navigateTo(70)" class="btn-animated-3d purple-btn bg-purple-500 border-purple-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>8. Final Tasks</button>
                </div>
            </div>
        </section>
        
        <div id="dynamic-pages-container"></div>
    </div>

    <!-- Modals -->
    <div id="details-modal" class="feedback-modal"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Snow Animation ---
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let snowflakes = [];

            function createSnowflakes() {
                snowflakes = [];
                const count = Math.floor(canvas.width / 4);
                for (let i = 0; i < count; i++) {
                    snowflakes.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 3 + 1,
                        speed: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }

            function drawSnowflakes() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                snowflakes.forEach(flake => {
                    ctx.beginPath();
                    ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                    ctx.globalAlpha = flake.opacity;
                    ctx.fill();
                });
            }

            function updateSnowflakes() {
                snowflakes.forEach(flake => {
                    flake.y += flake.speed;
                    if (flake.y > canvas.height) {
                        flake.y = -flake.radius;
                        flake.x = Math.random() * canvas.width;
                    }
                });
            }

            function animateSnow() {
                updateSnowflakes();
                drawSnowflakes();
                requestAnimationFrame(animateSnow);
            }
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                createSnowflakes();
            });

            createSnowflakes();
            animateSnow();

            // --- State & Config ---
            let score = 0;
            const scoreDisplay = document.getElementById('score-display');
            let timerInterval;
            let currentPage = 0;
            const pageHistory = [0];
            const pageSequence = [0, 1, 10, 11, 12, 13, 14, 20, 21, 22, 23, 24, 25, 80, 81, 82, 83, 84, 85, 30, 31, 40, 41, 90, 91, 92, 93, 50, 51, 70, 60, 61, 62];

            // --- Audio & TTS ---
            let audioReady = false;
            let synth;
            const synthTTS = window.speechSynthesis;
            let defaultVoice = null;
            let professorVoice = null; // We'll use this for male speakers
            let isTtsEnabled = true;

            const voicesPromise = new Promise(resolve => {
                if (synthTTS.getVoices().length > 0) { resolve(synthTTS.getVoices()); return; }
                synthTTS.onvoiceschanged = () => { resolve(synthTTS.getVoices()); };
            });

            async function setupVoices() {
                try {
                    const voices = await voicesPromise;
                    if (voices.length === 0) {
                        console.warn("No speech synthesis voices available.");
                        return;
                    }

                    const usEnglishVoices = voices.filter(v => v.lang === 'en-US');
                    
                    // --- Set up Professor/Male Voice ---
                    const maleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('male'));
                    professorVoice = maleVoices.find(v => v.name.toLowerCase().includes('brian')) 
                                  || maleVoices[0];
                    if (professorVoice) {
                         console.log("Male/Professor Voice set to:", professorVoice.name);
                    } else {
                         console.warn("Could not find a specific male voice.");
                    }

                    // --- Set up Default/Female Voice ---
                    const qualityPriorities = [
                        'neural', 'wavenet', 'siri (enhanced)', 'google', 'turbo', 'multilingual', 'microsoft', 'samantha', 'ava', 'zira', 'premium'
                    ];
                    
                    const femaleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('female') || !v.name.toLowerCase().includes('male'));

                    const findBestVoice = (voiceList) => {
                        for (const priority of qualityPriorities) {
                            const foundVoice = voiceList.find(v => v.name.toLowerCase().includes(priority));
                            if (foundVoice) return foundVoice;
                        }
                        return null;
                    };

                    defaultVoice = findBestVoice(femaleVoices) || femaleVoices[0] || usEnglishVoices[0];
                    
                    if (!professorVoice) {
                        professorVoice = defaultVoice;
                    }

                    if (defaultVoice) {
                        console.log("Default/Female Voice set to:", defaultVoice.name);
                    } else {
                        console.warn("Could not find a suitable default English voice.");
                    }

                } catch (e) {
                    console.error("Error setting up voices:", e);
                }
            }
            
            window.startApp = async function() {
                if (!audioReady) try { await Tone.start(); synth = new Tone.PolySynth(Tone.Synth).toDestination(); audioReady = true; } catch (e) { console.error(e); }
                try {
                    const u = new SpeechSynthesisUtterance(' '); u.volume=0; synthTTS.speak(u); synthTTS.cancel();
                    await setupVoices();
                } catch (e) { console.error(e); }
                navigateTo(1);
            }
            const playSound = (correct) => { if(audioReady) synth.triggerAttackRelease(correct ? ["C5", "E5", "G5"] : "A2", "8n", Tone.now()); }
            
            async function speak(text, voiceOverride = null) {
                if (!isTtsEnabled || !text) return;
                if (synthTTS.speaking) synthTTS.cancel();
                await new Promise(r=>setTimeout(r,50));
                const u = new SpeechSynthesisUtterance(text);
                const finalVoice = voiceOverride || defaultVoice;
                if (finalVoice) {
                    u.voice = finalVoice;
                }
                u.rate = 0.85;
                synthTTS.speak(u);
            }

            function speakDialogue(text) {
                 if (!isTtsEnabled || !text) return;
                 if (synthTTS.speaking) synthTTS.cancel();
                 
                 const lines = text.split('\n').filter(line => line.trim() !== '');
                 let utteranceQueue = [];

                 lines.forEach(line => {
                     const parts = line.split(':');
                     const speaker = parts[0].trim().toLowerCase();
                     const dialogue = parts.slice(1).join(':').trim();
                     
                     if (dialogue) {
                         const u = new SpeechSynthesisUtterance(dialogue);
                         if (speaker === 'alex' || speaker === 'chris') {
                             u.voice = professorVoice;
                         } else {
                             u.voice = defaultVoice;
                         }
                         u.rate = 0.85;
                         utteranceQueue.push(u);
                     }
                 });

                 function playNext() {
                     if (utteranceQueue.length > 0) {
                         const u = utteranceQueue.shift();
                         u.onend = playNext;
                         synthTTS.speak(u);
                     }
                 }
                 playNext();
            }

            window.toggleTTS = (button) => {
                isTtsEnabled = !isTtsEnabled;
                if (!isTtsEnabled) {
                    synthTTS.cancel();
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707a1 1 0 011.414 0v14a1 1 0 01-1.414 0L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l-4-4m0 4l4-4"></path></svg>`;
                } else {
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.858 5.858a3 3 0 104.243 4.243M9 12l4.243 4.243"></path></svg>`;
                    const readableContent = document.getElementById(`page-${currentPage}`).querySelector('.readable-content');
                    if (readableContent) {
                        if (currentPage === 83) {
                            speakDialogue(readableContent.innerText);
                        } else {
                            speak(readableContent.innerText);
                        }
                    }
                }
            }

            // --- Navigation & Page Flow ---
            window.navigateTo = (pageId) => {
                const targetPage = document.getElementById(`page-${pageId}`);
                if (!targetPage || pageId === currentPage) return;
                document.getElementById(`page-${currentPage}`)?.classList.remove('active');
                targetPage.classList.add('active');
                currentPage = pageId;
                if (pageHistory[pageHistory.length - 1] !== currentPage) pageHistory.push(currentPage);
                
                clearInterval(timerInterval);
                if (synthTTS.speaking) synthTTS.cancel();

                if (pageId === 11) startTimer(120, document.getElementById('timer-think'), goNext);
                if (pageId === 12) startTimer(180, document.getElementById('timer-pair'), goNext);
                if (pageId === 13) startTimer(300, document.getElementById('timer-share'), goNext);
                
                const readableContent = targetPage.querySelector('.readable-content');
                if (readableContent) {
                    if (currentPage === 83) { // Seminar page with dialogue
                        speakDialogue(readableContent.innerText);
                    } else {
                        speak(readableContent.innerText);
                    }
                }
                
                updateNavButtons();
                window.scrollTo(0, 0);
            }
            window.goNext = () => { 
                const currentIndex = pageSequence.indexOf(currentPage);
                if (currentIndex > -1 && currentIndex < pageSequence.length - 1) navigateTo(pageSequence[currentIndex + 1]);
            }
            window.goBack = () => { if (pageHistory.length > 1) { pageHistory.pop(); navigateTo(pageHistory.pop()); } }
            
            function updateNavButtons() {
                const nav = document.getElementById('nav-header');
                if(!nav) return;
                nav.style.display = (currentPage === 0) ? 'none' : 'flex';
                const backBtn = nav.querySelector('button:first-child');
                const nextBtn = nav.querySelector('button:last-child');
                backBtn.disabled = pageHistory.length <= 1;
                backBtn.classList.toggle('opacity-50', backBtn.disabled);
                const currentIndex = pageSequence.indexOf(currentPage);
                const isLast = currentIndex >= pageSequence.length - 1;
                nextBtn.disabled = isLast || currentPage === 1;
                nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            }
            function startTimer(duration, display, onComplete) {
                let timer = duration;
                const update = () => { display.textContent = `${String(Math.floor(timer/60)).padStart(2,'0')}:${String(timer%60).padStart(2,'0')}`; };
                update();
                timerInterval = setInterval(() => { timer--; update(); if (timer < 0) { clearInterval(timerInterval); if (onComplete) onComplete(); } }, 1000);
            }
            
            // --- Modals & Interactivity ---
            const detailsData = {
                'people': { title: "People and Culture", content: "The population is small, and many residents are Yakut, an indigenous people of Siberia. They speak Russian and Yakut. Traditional practices like reindeer herding and ice fishing are common and essential for their way of life." },
                'daily': { title: "Daily Life", content: "Homes are built on deep piles to be stable in the permafrost and are heavily insulated. Water pipes often freeze, so many homes use outhouses. Cars must be kept running for long periods or stored in heated garages to prevent damage from the extreme cold." },
                'education': { title: "Education and Community", content: "Despite the challenges, Oymyakon has a school. It only closes if temperatures drop below −52°C for younger students. Community life is strong, with festivals and shared traditions helping people cope with the long, dark winters." },
            };
            window.showDetails = (id) => {
                const details = detailsData[id];
                const modal = document.getElementById('details-modal');
                modal.innerHTML = `<div class="bg-white rounded-2xl max-w-lg w-full p-6 m-4"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-gray-800">${details.title}</h3><button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button></div><div class="text-gray-600">${details.content}</div></div>`;
                modal.classList.add('show');
                speak(details.title + ". " + details.content);
            }
            window.closeModal = () => document.getElementById('details-modal').classList.remove('show');
            window.checkAnswer = function(button, isCorrect) {
                const questionGroup = button.closest('.question-group');
                questionGroup.querySelectorAll('.quiz-option').forEach(opt => opt.disabled = true);
                if (isCorrect) {
                    playSound(true);
                    button.classList.add('bg-green-500', 'border-green-600', 'text-white');
                    updateScore(10);
                } else {
                    playSound(false);
                    button.classList.add('bg-red-500', 'border-red-600', 'text-white');
                    questionGroup.querySelector("[onclick*='true']").classList.add('bg-green-500', 'border-green-600', 'text-white');
                }
            }
            function updateScore(points) {
                score += points;
                scoreDisplay.textContent = score;
            }
            window.generateCertificateU6 = function() {
                const name = document.getElementById('name-input-u6').value || "Siberian Survivor";
                document.getElementById('certificate-name-u6').textContent = name;
                document.getElementById('certificate-score-u6').textContent = score;
                document.getElementById('certificate-date-u6').textContent = new Date().toLocaleDateString();
                speak(`Congratulations, ${name}! You have completed the unit.`);
            }

            // --- Dynamic Page Content ---
            function createPage(id, content) {
                const section = document.createElement('section');
                section.id = `page-${id}`;
                section.className = 'page';

                13: `<div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col justify-center items-center text-center pt-16"><div class="w-full flex justify-between items-center mb-4"><h2 class="text-2xl md:text-3xl font-bold text-indigo-700">3. Share 🗣️</h2><div id="timer-share" class="text-3xl md:text-4xl font-bold text-gray-700 ml-4">05:00</div></div><div class="readable-content"><p class="text-lg md:text-xl text-gray-600 mt-8">Let's share our ideas. How do people in Oymyakon survive and thrive?</p></div></div>`,
                14: `<div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col justify-center items-center text-center pt-16"><svg class="w-24 h-24 text-cyan-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><div class="readable-content"><h1 class="text-4xl md:text-5xl font-bold text-cyan-600 mb-4">🎉 Activity Complete! ✅</h1><p class="text-lg md:text-xl text-gray-600">Excellent work! You've finished the first activity.</p></div></div>`,
                20: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-sky-700 mb-6">Vocabulary</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Learn the key terms for this unit. Click Next to cycle through the words.</p></div><button onclick="goNext()" class="action-button bg-sky-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-sky-700">Start Learning</button></div>`,
                80: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Lecture: Human Adaptation in Oymyakon</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Good morning. Today we're traveling to one of the most extreme human settlements on Earth: the village of Oymyakon in Siberia. Known as the coldest permanently inhabited place on the planet, it offers a fascinating case study in human adaptation. Our essential question is: how does life adapt, both biologically and culturally, to such an extreme and unforgiving environment?</p><p>First, let's establish just how cold Oymyakon is. The average winter temperature hovers around minus 50 degrees Celsius, and the record low is a staggering minus 71.2 degrees Celsius. At these temperatures, boiling water thrown into the air instantly turns to snow, and a frostbitten face is a constant danger.</p><p>The primary challenge, of course, is survival. The ground is in a state of permafrost, permanently frozen, which makes traditional agriculture impossible. The local diet is therefore heavily reliant on meat—reindeer and horse meat—and fish, which provide the high-fat content necessary to generate body heat. Cars are often left running all day to prevent their engines from freezing solid. And construction is a major challenge; buildings must be built on deep piles to anchor them in the frozen ground and prevent them from collapsing as the top layer of soil thaws in the brief summer.</p><p>But what's truly remarkable is not just the physical survival, but the cultural adaptation. The people of Oymyakon, primarily the Yakut people, have developed a deep traditional knowledge of how to live in this environment. Their clothing, made from layers of fur, is far more effective than modern synthetic materials. They have a profound understanding of the local ecosystem, of animal behavior, and of the subtle signs of changing weather.</p><p>Community is also central to survival here. In such a small, isolated village, there is a powerful sense of interdependence. People rely on each other for everything, from sharing food to helping a neighbor whose car has broken down. This strong social fabric is a crucial adaptation, providing both practical and emotional support in an environment where a simple mistake can be fatal.</p><p>To review, we see that life in Oymyakon is a masterclass in adaptation. The physical challenges are immense, from the extreme cold to the frozen ground. The diet, the technology, and the architecture have all evolved to meet these demands. But equally important is the cultural adaptation—the traditional knowledge, the strong community bonds, and the psychological resilience required to not just survive, but to create a home in one of the world's harshest inhabited environments. The key takeaway is that human ingenuity and culture are incredibly powerful tools for adapting to even the most extreme conditions our planet has to offer. Thank you.</p></div></div>`,
                81: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What is the primary reason the local diet in Oymyakon is reliant on meat?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. It is a cultural preference.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. Permafrost makes traditional agriculture impossible.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. There are no vegetables available for import.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Why must buildings in Oymyakon be built on deep piles?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. To protect against earthquakes.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. For better insulation from the cold air.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">C. To anchor them in the frozen ground and prevent collapse.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. What is described as a 'crucial adaptation' for both practical and emotional support?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">A. A strong social fabric and interdependence.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. Modern synthetic clothing.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Leaving cars running all day.</button></div></div></div></div>`,
                82: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The record low temperature in Oymyakon is minus 50 degrees Celsius.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. The Yakut people's traditional fur clothing is more effective than modern synthetic materials.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. Oymyakon has a brief, warm summer where the top layer of soil thaws.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div></div></div>`,
                83: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Seminar: Discussing Oymyakon</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p><strong>Alex:</strong> Hey everyone. Okay, so that lecture on Oymyakon was just mind-boggling. I can't even imagine living in a place that cold.</p><p><strong>Sarah:</strong> Oh, absolutely, Alex. The essential question—how do people adapt to such an extreme environment?—it's just a testament to human resilience. The fact that the record low is minus 71.2 degrees Celsius is insane.</p><p><strong>Chris:</strong> G'day both. Yeah, the learning intention was to get both the physical and the cultural adaptations. The practical challenges are huge. The permafrost making farming impossible, the need for a high-fat, meat-based diet, and having to leave cars running all day... that's just a different world.</p><p><strong>Sarah:</strong> Following up on that, Chris, the cultural adaptations were what really stood out to me. The lecturer's point about traditional Yakut knowledge, like their fur clothing being better than modern gear, that shows how vital that cultural heritage is for survival.</p><p><strong>Alex:</strong> True. But I have to disagree a bit that it's all about ancient traditions. The lecture also mentioned the challenges of modern life there. The success criteria involved understanding the whole picture, and the fact that even with all that traditional knowledge, life is still incredibly difficult.</p><p><strong>Chris:</strong> I see it a bit differently, Alex. Building on Sarah's point, I think the traditional culture is the modern solution in many ways. The lecturer emphasized the importance of community interdependence. That's a cultural value that's absolutely essential for modern survival there.</p><p><strong>Sarah:</strong> I'd argue that's the most important takeaway. It's not just about individual toughness; it's about the strength of the community. In a place where a small mistake can be fatal, you have to be able to rely on your neighbors.</p><p><strong>Alex:</strong> That's a fair point. The social fabric is a key part of the adaptation. The key takeaway for me was that Oymyakon shows how humans can create a thriving home even in the most inhospitable places on Earth, by combining practical ingenuity with deep cultural resilience.</p><p><strong>Chris:</strong> Yeah, so to review, we've got the essential question about adaptation to extreme cold. We covered the physical challenges of permafrost and the unique diet. We discussed the critical role of traditional knowledge and strong community bonds as cultural adaptations, and how these factors allow people to live in the coldest inhabited place on Earth.</p><p><strong>Sarah:</strong> I think that covers it. This concludes our discussion on the Oymyakon lecture. It definitely puts a cold day here in perspective. Thanks, guys.</p></div></div>`,
                84: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Seminar: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What specific detail from the lecture did Chris mention as a practical challenge?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. The record low temperature.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. Having to leave cars running all day.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. The strength of the community.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Sarah emphasizes that what is most vital for survival in Oymyakon?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">A. Traditional Yakut knowledge and cultural heritage.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. Modern technology from outside.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Individual toughness and independence.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. What is the main point of Alex's disagreement?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. That traditional culture is not important.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. That life is still very difficult despite traditional knowledge.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. That the community is not actually interdependent.</button></div></div></div></div>`,
                85: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Seminar: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The seminar participants all agree that traditional culture is the only factor in survival.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Sarah believes the most important takeaway is the strength of the community.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. The seminar mentions that Oymyakon is a popular tourist destination.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div></div></div>`,
                30: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-cyan-700 mb-6">Geography & Climate</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Explore the unique environment of Oymyakon.</p></div><button onclick="goNext()" class="action-button bg-cyan-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-cyan-700">Start Exploring</button></div>`,
                31: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Explore: Oymyakon's Environment</h2><div class="readable-content"><p class="text-center text-gray-600 mb-6">Oymyakon is a village in northeastern Siberia, Russia. It holds the record for the lowest temperature ever recorded in a populated area: −67.7°C. Winters are long and harsh, with little daylight, while summers are brief.</p></div><div class="grid md:grid-cols-2 gap-6 text-center"><div class="bg-blue-50 p-4 rounded-lg"><div class="text-3xl mb-2">🌡️</div><h3 class="font-bold text-blue-800">Temperatures</h3><p>Winter Avg: -50°C (-58°F)</p><p>Record Low: -67.7°C (-89.9°F)</p></div><div class="bg-sky-50 p-4 rounded-lg"><div class="text-3xl mb-2">❄️</div><h3 class="font-bold text-sky-800">Key Feature</h3><p>The ground is in a state of permafrost, meaning it is permanently frozen year-round.</p></div></div></div>`,
                40: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-blue-700 mb-6">Culture & Daily Life</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Discover how people live and adapt in Oymyakon.</p></div><button onclick="goNext()" class="action-button bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-blue-700">Start Exploring</button></div>`,
                41: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-blue-700 mb-6">Explore: Life in Oymyakon</h2><div class="grid md:grid-cols-3 gap-6"><div class="ice-card rounded-2xl p-6" onclick="showDetails('people')"><div class="text-4xl mb-2">👥</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">People & Culture</h3><p class="text-sm text-gray-600">Home to the Yakut people, with traditions like reindeer herding.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('daily')"><div class="text-4xl mb-2">🏠</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Daily Life</h3><p class="text-sm text-gray-600">Specially built homes, heated garages, and a meat-rich diet are essential.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('education')"><div class="text-4xl mb-2">🏫</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">School & Community</h3><p class="text-sm text-gray-600">Schools only close below -52°C, and community bonds are vital.</p></div></div></div>`,
                90: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-red-700 mb-6">Dilemma: The Mine Proposal</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-red-600">Scenario:</h3><p>An international mining company discovers a vast deposit of rare earth minerals near Oymyakon. They propose opening a mine that would bring hundreds of jobs, a new road, and significant investment to the village.</p><h3 class="font-bold text-xl text-red-600 mt-4">Dilemma for students:</h3><p>Should the community of Oymyakon approve the mine? The economic benefits could modernize the village and provide opportunities for young people. However, the mine would also disrupt the fragile tundra ecosystem, potentially harming the reindeer herds that are central to Yakut traditional culture and food supply.</p></div></div>`,
                91: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-orange-700 mb-6">Dilemma: The Generator Grant</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-orange-600">Setup:</h3><p>The regional government offers Oymyakon a one-time grant for a single major village project. The council must choose one:</p><ul class="list-disc list-inside ml-4 space-y-2"><li><strong>Project A: New Power Generator.</strong> Upgrade the village's aging, unreliable power generator. This would provide stable electricity for every home, improving heating, safety, and quality of life for all residents, especially during the darkest, coldest months.</li><li><strong>Project B: Cultural Heritage Center.</strong> Build a new center dedicated to preserving and teaching the Yakut language, traditional crafts, and reindeer herding skills. This would ensure that vital cultural knowledge is passed to the next generation before it disappears.</li></ul><h3 class="font-bold text-xl text-orange-600 mt-4">Question:</h3><p>As a village elder, which project do you argue for, and why? This choice forces a decision between immediate, universal physical well-being and the long-term survival of cultural identity.</p></div></div>`,
                92: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Dilemma: The Hunter's Choice</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-amber-600">Setup:</h3><p><strong>Players:</strong> Two Yakut hunting families who rely on the same territory.</p><p><strong>Choice:</strong> A particularly harsh winter has made caribou herds scarce. Each family can either **share information** about any tracks they find or **keep it secret** to hunt for themselves.</p><div class="overflow-x-auto mt-4"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-200"><tr><th scope="col" class="px-6 py-3"></th><th scope="col" class="px-6 py-3">Family B Shares Info</th><th scope="col" class="px-6 py-3">Family B Stays Silent</th></tr></thead><tbody><tr class="bg-white border-b"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Family A Shares Info</th><td class="px-6 py-4 bg-green-100 text-green-800">Both families likely find enough food. Community bond is strengthened.</td><td class="px-6 py-4 bg-red-100 text-red-800">Family A struggles, while Family B gets a large hunt. Community trust is broken.</td></tr><tr class="bg-white"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Family A Stays Silent</th><td class="px-6 py-4 bg-orange-100 text-orange-800">Family A gets a large hunt, while Family B struggles. Community trust is broken.</td><td class="px-6 py-4 bg-red-200 text-red-900">Both families risk finding no food at all. The entire community is weakened.</td></tr></tbody></table></div><p class="text-base text-gray-600 mt-4">The temptation is to stay silent for a short-term advantage, but the traditional value of cooperation leads to the best collective outcome, highlighting a real-world prisoner's dilemma.</p></div></div>`,
                93: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-lime-700 mb-6">Key Takeaways</h2><div class="readable-content text-lg leading-relaxed space-y-6 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><div><h3 class="font-bold text-xl text-lime-600">Enduring Understanding:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">Survival in extreme environments depends not only on physical adaptation but on the strength of cultural knowledge and community resilience.</p></div><div><h3 class="font-bold text-xl text-lime-600">Essential Question:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">What can Oymyakon teach us about human resilience and adaptation?</p></div></div></div>`,
                50: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-indigo-700 mb-6">Knowledge Quiz</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8 text-center">Test your understanding of life in Oymyakon.</p></div><button onclick="goNext()" class="action-button bg-indigo-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-indigo-700">Start Quiz</button></div>`,
