        .screen {
            display: none;
        }
        .screen.active {
            display: flex;
        }
        .hidden-by-default {
            display: none;
        }
        /* Custom animation for shaking */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake {
            animation: shake 0.5s;
        }
        /* Animation for bonus points popup */
        @keyframes fade-up-pop {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            50% { opacity: 1; transform: translateY(-30px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }
        .bonus-popup {
            position: absolute;
            animation: fade-up-pop 1.5s ease-out forwards;
            font-size: 2rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        /* Animation for the token icon */
        @keyframes pop-icon {
            0% { transform: scale(1); }
            50% { transform: scale(1.5) rotate(-15deg); }
            100% { transform: scale(1); }
        }
        .pop {
            animation: pop-icon 0.3s ease-out;
            display: inline-block; /* Needed for transform to work properly */
        }
    </style>
</head>

                optionsEl: document.getElementById('team1-options'),
                timerBarEl: document.getElementById('team1-timer-bar'),
                finalScoreBox: document.getElementById('team1-final-score-box'),
                finalNameEl: document.getElementById('team1-final-name'),
                finalScoreEl: document.getElementById('team1-final-score-p'),
                finalTokensEl: document.getElementById('team1-final-tokens'),
                awardsEl: document.getElementById('team1-awards')
            },
            team2: {
                panel: document.getElementById('team2-panel'),
                nameDisplay: document.getElementById('team2-name-display'),
                qCountEl: document.getElementById('team2-q-count'),
                scoreEl: document.getElementById('team2-score'),
                streakEl: document.getElementById('team2-streak'),
                tokensEl: document.getElementById('team2-tokens'),
                sentenceEl: document.getElementById('team2-sentence'),
                optionsEl: document.getElementById('team2-options'),
                timerBarEl: document.getElementById('team2-timer-bar'),
                finalScoreBox: document.getElementById('team2-final-score-box'),
                finalNameEl: document.getElementById('team2-final-name'),
                finalScoreEl: document.getElementById('team2-final-score-p'),
                finalTokensEl: document.getElementById('team2-final-tokens'),
                awardsEl: document.getElementById('team2-awards')
            }
        };

        // --- SOUND CLASS using Tone.js ---
        class Sound {
            constructor() {
                 this.sounds = {
                    correct: new Tone.Synth({
                        oscillator: { type: "sine" },
                        envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 0.4 },
                        volume: -10
                    }).toDestination(),
                    
                    incorrect: new Tone.MonoSynth({
                        oscillator: { type: "sawtooth" },
                        envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.2 },
                        filter: { Q: 2, type: 'lowpass', rolloff: -12 },
                        filterEnvelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1, baseFrequency: 800, octaves: -1.2 }
                    }).toDestination(),

                    levelUp: new Tone.PolySynth(Tone.Synth, {
                        oscillator: { type: "fatsawtooth" },
                        envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 1 }
                    }).toDestination(),

                    gameOver: new Tone.PolySynth(Tone.Synth, {
                         envelope: { attack: 0.1, decay: 0.5, sustain: 0.2, release: 1.5 }
                    }).toDestination(),

                    click: new Tone.MembraneSynth({ pitchDecay: 0.01, octaves: 2, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }).toDestination(),

                    streak: new Tone.PolySynth(Tone.Synth, {
                        volume: -8,
                        oscillator: { type: "pulse", width: 0.2 },
                        envelope: { attack: 0.01, decay: 0.1, sustain: 0.2, release: 0.4 }
                    }).toDestination(),

                    token: new Tone.PluckSynth({
                        attackNoise: 1,
                        dampening: 4000,
                        resonance: 0.7
                    }).toDestination(),

                    gameStart: new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'amsine' } }).toDestination()
                };
            }
            async play(soundName) {
                if (Tone.context.state !== 'running') {
                    await Tone.start();
                }
                if (this.sounds[soundName]) {
                    const now = Tone.now();
                    switch(soundName) {
                        case 'correct': this.sounds.correct.triggerAttackRelease("C6", "16n", now); break;
                        case 'incorrect': this.sounds.incorrect.triggerAttackRelease("G#2", "8n", now); break;
                        case 'levelUp': this.sounds.levelUp.triggerAttackRelease(["G4", "C5", "E5", "G5"], "0.6s", now); break;
                        case 'gameOver': this.sounds.gameOver.triggerAttackRelease(["C4", "G3", "C3"], "1.2s", now); break;
                        case 'click': this.sounds.click.triggerAttackRelease("C2", "8n", now); break;
                        case 'token': this.sounds.token.triggerAttack("C5", now); break;
                        case 'streak': this.sounds.streak.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n", now); break;
                        case 'gameStart': this.sounds.gameStart.triggerAttackRelease(["C4", "G4", "C5"], "4n", now); break;
                    }
                }
            }
        }
        
        // --- FIRESTORE CLASS ---
        class FirestoreDB {
            constructor() {
                try {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'phrasal-verb-game';
                    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                    this.app = initializeApp(firebaseConfig);
                    this.db = getFirestore(this.app);
                    this.auth = getAuth(this.app);
                    this.collectionPath = `/artifacts/${appId}/public/data/leaderboard`;
                } catch (e) {
                    console.error("Firebase initialization failed:", e);
                    this.db = null;
                }
            }

            async ensureAuth() {
                try {
                    if (this.auth.currentUser) return;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(this.auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(this.auth);
                    }
                } catch (error) {
                    console.error("Authentication failed:", error);
                }
            }

            async saveScore(teamName, score) {
                if (!this.db || !this.auth.currentUser) {
                    console.log("Firestore not available or user not authenticated for saveScore.");
                    return;
                }
                try {
                    await addDoc(collection(this.db, this.collectionPath), {
                        name: teamName,
                        score: score,
                        createdAt: new Date()
                    });
                } catch (e) {
                    console.error("Error adding document: ", e);
                }
            }

            async getHighScores(limitCount = 10) {
                if (!this.db || !this.auth.currentUser) {
                    console.log("Firestore not available or user not authenticated for getHighScores.");
                    return [];
                }
                try {
                    const q = query(collection(this.db, this.collectionPath), limit(limitCount));
                    const querySnapshot = await getDocs(q);
                    const scores = [];
                    querySnapshot.forEach((doc) => {
                        scores.push(doc.data());
                    });
                    return scores.sort((a, b) => b.score - a.score);
                } catch (e) {
                    console.error("Error getting documents: ", e);
                    return [];
                }
            }
        }

        // --- TEAM CLASS ---
        class Team {
            constructor(id, name, domElements) {
                this.id = id;
                this.name = name;
                this.dom = domElements;
                this.reset();
            }

            reset() {
                this.score = 0;
                this.tokens = 0;
                this.streak = 0;
                this.levelIndex = 0;
                this.isFinished = false;
                this.questionQueue = [];
                this.questionInLevelCounter = 0;
                this.currentQuestion = null;
                this.questionStartTime = 0;
                this.levelMistakes = 0;
                this.awards = new Set();
                this.fastestAnswer = Infinity;
                clearTimeout(this.timer);
            }

            updateHUD() {
                this.dom.nameDisplay.textContent = this.name;
                this.dom.scoreEl.textContent = `Score: ${this.score}`;
                this.dom.streakEl.innerHTML = `🔥 ${this.streak}`;
                this.dom.tokensEl.innerHTML = `🪙 ${this.tokens}`;
                const levelName = LEVEL_ORDER[this.levelIndex];
                if (levelName) {
                    const totalForLevel = PHRASAL_VERBS[levelName].length;
                    this.dom.qCountEl.textContent = `${levelName} (${this.questionInLevelCounter}/${totalForLevel})`;
                }
            }
        }

        // --- GAME CLASS ---
        class Game {
            constructor() {
                this.sound = new Sound();
                this.firestore = new FirestoreDB();
                this.team1 = new Team('team1', 'Player 1', dom.team1);
                this.team2 = new Team('team2', 'Player 2', dom.team2);
                this.gameMode = '1p'; // Default to 1 player
                this.isGameOver = false;
            }

            async init() {
                dom.buttons.onePlayer.addEventListener('click', () => this.setGameMode('1p'));
                dom.buttons.twoPlayer.addEventListener('click', () => this.setGameMode('2p'));
                dom.buttons.start.addEventListener('click', () => this.startGame());
                dom.buttons.playAgain.addEventListener('click', () => this.resetGame());
                dom.buttons.submitScore.addEventListener('click', () => this.submitScores());
                
                this.setGameMode(this.gameMode); // Set initial UI state

                if (this.firestore.db) {
                    await this.updateLeaderboard();
                } else {
                    dom.leaderboard.innerHTML = '<p class="text-red-500">Leaderboard connection failed.</p>';
                }
            }

            setGameMode(mode) {
                this.gameMode = mode;
                if (mode === '1p') {
                    dom.buttons.onePlayer.classList.replace('bg-slate-700', 'bg-cyan-600');
                    dom.buttons.twoPlayer.classList.replace('bg-pink-600', 'bg-slate-700');
                    dom.inputs.team2Name.style.display = 'none';
                } else { // 2p
                    dom.buttons.onePlayer.classList.replace('bg-cyan-600', 'bg-slate-700');
                    dom.buttons.twoPlayer.classList.replace('bg-slate-700', 'bg-pink-600');
                    dom.inputs.team2Name.style.display = 'block';
                }
            }
            
            async updateLeaderboard() {
                if (!this.firestore.db) return;
                await this.firestore.ensureAuth();
                const scores = await this.firestore.getHighScores();
                dom.leaderboard.innerHTML = '';
                if (scores.length === 0) {
                    dom.leaderboard.innerHTML = '<p class="text-slate-400">No scores yet. Be the first!</p>';
                    return;
                }
                scores.forEach((s, index) => {
                    const entry = document.createElement('div');
                    entry.className = `flex justify-between items-center p-2 rounded-lg ${index === 0 ? 'bg-yellow-500/30' : 'bg-slate-700'}`;
                    entry.innerHTML = `
                        <span class="font-bold text-white">${index + 1}. ${s.name}</span>
                        <span class="font-bold text-cyan-400">${s.score}</span>
                    `;
                    dom.leaderboard.appendChild(entry);
                });
            }

            switchScreen(screenName) {
                this.sound.play('click');
                Object.values(dom.screens).forEach(s => s.classList.remove('active'));
                dom.screens[screenName].classList.add('active');
            }

            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            startGame() {
                this.sound.play('gameStart');
                this.isGameOver = false;
                
                this.team1.name = dom.inputs.team1Name.value || 'Player 1';
                this.team1.reset();
                this.setupLevelQueue(this.team1);
                this.team1.updateHUD();
                
                dom.team1.panel.classList.remove('md:border-r-4');

                if (this.gameMode === '2p') {
                    this.team2.name = dom.inputs.team2Name.value || 'Player 2';
                    this.team2.reset();
                    this.setupLevelQueue(this.team2);
                    this.team2.updateHUD();
                    dom.team2.panel.style.display = 'flex';
                    dom.team1.panel.classList.add('md:border-r-4');
                } else {
                    dom.team2.panel.style.display = 'none';
                }

                this.switchScreen('game');
                this.loadNextQuestion(this.team1);
                if (this.gameMode === '2p') {
                    this.loadNextQuestion(this.team2);
                }
            }
            
            resetGame() {
                this.switchScreen('mainMenu');
                this.updateLeaderboard();
                dom.buttons.submitScore.disabled = false;
                dom.submitMessage.textContent = '';
            }

            setupLevelQueue(team) {
                const level = LEVEL_ORDER[team.levelIndex];
                if (level) {
                    const levelQuestions = [...PHRASAL_VERBS[level]];
                    team.questionQueue = this.shuffleArray(levelQuestions);
                    team.questionInLevelCounter = 0;
                    team.levelMistakes = 0;
                }
            }

            loadNextQuestion(team) {
                if (team.isFinished || this.isGameOver) return;

                if (team.questionQueue.length === 0) {
                    if (team.levelMistakes === 0 && team.questionInLevelCounter > 0) {
                        team.awards.add("Perfect Level");
                    }
                    if (team.levelIndex < LEVEL_ORDER.length - 1) {
                        this.sound.play('levelUp');
                        team.levelIndex++;
                        this.setupLevelQueue(team);
                    } else {
                        team.isFinished = true;
                        team.dom.sentenceEl.textContent = "Finished!";
                        team.dom.optionsEl.innerHTML = "";
                        clearTimeout(team.timer);
                        
                        const bothFinished = this.team1.isFinished && this.team2.isFinished;
                        if (this.gameMode === '1p' && this.team1.isFinished) {
                            this.endGame();
                        } else if (this.gameMode === '2p' && bothFinished) {
                            this.endGame();
                        }
                        return;
                    }
                }

                const question = team.questionQueue.shift();
                team.currentQuestion = question;
                team.dom.sentenceEl.textContent = question.sentence;
                team.dom.optionsEl.innerHTML = '';
                const shuffledOptions = this.shuffleArray([...question.options]);

                shuffledOptions.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'w-full p-4 bg-slate-800 border-2 border-slate-700 rounded-lg text-lg text-white hover:border-cyan-500 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:border-slate-700';
                    if (team.id === 'team2') button.classList.add('hover:border-pink-500');
                    button.textContent = option;
                    button.onclick = (e) => this.handleAnswerSelection(team, button, e);
                    team.dom.optionsEl.appendChild(button);
                });

                if (LEVEL_ORDER[team.levelIndex]) {
                    team.questionInLevelCounter++;
                }
                team.updateHUD();
                this.startQuestionTimer(team);
            }

            startQuestionTimer(team) {
                clearTimeout(team.timer);
                team.questionStartTime = Date.now();
                team.dom.timerBarEl.style.transition = 'none';
                team.dom.timerBarEl.style.width = '100%';

                setTimeout(() => {
                    team.dom.timerBarEl.style.transition = `width ${TIME_PER_QUESTION}s linear`;
                    team.dom.timerBarEl.style.width = '0%';
                }, 100);

                team.timer = setTimeout(() => this.handleAnswerSelection(team, null, null), TIME_PER_QUESTION * 1000);
            }

            handleAnswerSelection(team, button, event) {
                clearTimeout(team.timer);
                const answerTime = (Date.now() - team.questionStartTime) / 1000;
                const isCorrect = button && button.textContent === team.currentQuestion.answer;

                Array.from(team.dom.optionsEl.children).forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === team.currentQuestion.answer) {
                        btn.classList.remove('bg-slate-800', 'border-slate-700');
                        btn.classList.add('bg-green-500', 'border-green-400', 'scale-105');
                    }
                });

                if (isCorrect) {
                    this.sound.play('correct');
                    this.sound.play('token');

                    const timeBonus = Math.max(0, Math.floor((1 - (answerTime / TIME_PER_QUESTION)) * TIME_BONUS_MAX));
                    const pointsGained = BASE_POINTS_CORRECT + timeBonus;
                    team.score += pointsGained;
                    team.tokens += 1;
                    team.streak++;
                    
                    if (team.dom.tokensEl) {
                        team.dom.tokensEl.classList.add('pop');
                        setTimeout(() => team.dom.tokensEl.classList.remove('pop'), 300);
                    }

                    if (answerTime < team.fastestAnswer) team.fastestAnswer = answerTime;

                    if (STREAK_MILESTONES[team.streak]) {
                        const streakBonus = STREAK_MILESTONES[team.streak];
                        team.score += streakBonus;
                        team.tokens += Math.floor(streakBonus / 10);
                        this.sound.play('streak');
                        this.showBonusPopup(team, `🔥 +${streakBonus} STREAK!`, event, true);
                        if (team.streak >= 7) team.awards.add("Streak Master");
                    }

                } else {
                    this.sound.play('incorrect');
                    team.score += POINTS_INCORRECT;
                    team.streak = 0;
                    team.levelMistakes++;
                    team.questionQueue.push(team.currentQuestion); 
                    if (button) {
                        button.classList.remove('bg-slate-800', 'border-slate-700');
                        button.classList.add('bg-red-500', 'border-red-400', 'shake');
                    }
                }
                team.updateHUD();
                setTimeout(() => this.loadNextQuestion(team), 1500);
            }

            showBonusPopup(team, text, event, isStreak) {
                const popup = document.createElement('div');
                popup.textContent = text;
                popup.className = 'bonus-popup';
                if (isStreak) {
                    popup.className += ' text-amber-400';
                } else {
                    popup.className += ' text-yellow-300';
                }
                if (event) {
                    popup.style.left = `${event.clientX - team.dom.panel.offsetLeft}px`;
                    popup.style.top = `${event.clientY - team.dom.panel.offsetTop}px`;
                } else {
                    popup.style.left = '50%';
                    popup.style.top = '50%';
                }
                team.dom.panel.appendChild(popup);
                setTimeout(() => popup.remove(), 1500);
            }

            endGame() {
                if(this.isGameOver) return;
                this.isGameOver = true;
                
                clearTimeout(this.team1.timer);
                if (this.gameMode === '2p') clearTimeout(this.team2.timer);
                this.sound.play('gameOver');

                this.updateFinalScreen(this.team1);
                if (this.gameMode === '2p') {
                    this.updateFinalScreen(this.team2);
                    dom.team2.finalScoreBox.style.display = 'block';
                    dom.team2.awardsEl.style.display = 'block';
                    dom.team1.finalScoreBox.classList.remove('w-full');
                    dom.team1.finalScoreBox.classList.add('w-5/12');

                    if (this.team1.score > this.team2.score) {
                        dom.winnerDeclaration.textContent = `${this.team1.name} Wins!`;
                        dom.winnerDeclaration.className = 'text-4xl font-bold mb-8 text-cyan-400';
                    } else if (this.team2.score > this.team1.score) {
                        dom.winnerDeclaration.textContent = `${this.team2.name} Wins!`;
                        dom.winnerDeclaration.className = 'text-4xl font-bold mb-8 text-pink-400';
                    } else {
                        dom.winnerDeclaration.textContent = "It's a Draw!";
                        dom.winnerDeclaration.className = 'text-4xl font-bold mb-8 text-yellow-400';
                    }
                } else {
                    dom.team2.finalScoreBox.style.display = 'none';
                    dom.team2.awardsEl.style.display = 'none';
                    dom.team1.finalScoreBox.classList.remove('w-5/12');
                    dom.team1.finalScoreBox.classList.add('w-full');
                    dom.winnerDeclaration.textContent = "Your Final Score";
                    dom.winnerDeclaration.className = 'text-4xl font-bold mb-8 text-white';
                }
                this.switchScreen('winner');
            }
            
            updateFinalScreen(team) {
                if (team.fastestAnswer < 1.5) team.awards.add("Speed Demon");
                team.dom.finalScoreEl.textContent = team.score;
                team.dom.finalTokensEl.textContent = `🪙 ${team.tokens}`;
                team.dom.finalNameEl.textContent = team.name;
                team.dom.awardsEl.innerHTML = ''; // Clear previous
                if (team.awards.size > 0) {
                    team.awards.forEach(award => {
                        const p = document.createElement('p');
                        p.className = 'text-yellow-400 font-semibold';
                        p.textContent = `- ${award}`;
                        team.dom.awardsEl.appendChild(p);
                    });
                } else {
                    team.dom.awardsEl.innerHTML = '<p class="text-slate-400">No awards</p>';
                }
            }
            
            async submitScores() {
                this.sound.play('click');
                dom.buttons.submitScore.disabled = true;
                dom.submitMessage.textContent = 'Submitting...';
                
                await this.firestore.ensureAuth();

                if (this.gameMode === '1p') {
                    await this.firestore.saveScore(this.team1.name, this.team1.score);
                } else {
                    const winningTeam = this.team1.score > this.team2.score ? this.team1 : (this.team2.score > this.team1.score ? this.team2 : null);
                    if (winningTeam) {
                        await this.firestore.saveScore(winningTeam.name, winningTeam.score);
                    } else { 
                        await this.firestore.saveScore(this.team1.name, this.team1.score);
                        await this.firestore.saveScore(this.team2.name, this.team2.score);
                    }
                }

                dom.submitMessage.textContent = 'Score submitted!';
                await this.updateLeaderboard();
            }
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            const game = new Game();
            await game.init();
        });

    </script>
