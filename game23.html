<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Tense Listening Challenge - CEFR Edition</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <style>
        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrollbars on the body */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff; /* sky-50 */
            background-image: radial-gradient(circle at top right, #e0f2fe, #f0f9ff);
        }
        .hidden { display: none !important; }
        .view-container { 
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .view-container.hidden { opacity: 0; transform: scale(0.98); }

        @keyframes flash-correct {
            0%, 100% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.5); }
            50% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0); }
        }
        .flash-correct { animation: flash-correct 0.7s ease-out; }

        @keyframes audio-wave {
            0% { transform: scaleY(0.4); } 25% { transform: scaleY(1); }
            50% { transform: scaleY(0.6); } 75% { transform: scaleY(0.8); }
            100% { transform: scaleY(0.4); }
        }
        .audio-wave-bar { animation: audio-wave 1.2s infinite ease-in-out; }
        .audio-wave-bar:nth-child(2) { animation-delay: -1.0s; }
        .audio-wave-bar:nth-child(3) { animation-delay: -0.8s; }
        .audio-wave-bar:nth-child(4) { animation-delay: -0.6s; }
        .audio-wave-bar:nth-child(5) { animation-delay: -0.4s; }

        @keyframes badge-alert-in {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes badge-alert-out {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-20px) scale(0.9); }
        }
        .badge-alert-enter { animation: badge-alert-in 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .badge-alert-exit { animation: badge-alert-out 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-2 sm:p-4 text-slate-800">

    <div id="app-container" class="relative w-full max-w-2xl h-full max-h-[95vh] sm:max-h-[90vh] p-4 sm:p-6 bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl flex flex-col">
        
        <!-- View: Level Selection -->
        <div id="level-selection-view" class="view-container text-center">
            <div>
                <h1 class="text-3xl sm:text-4xl font-extrabold mb-2 text-sky-700">Verb Tense Listening</h1>
                <p id="level-selection-prompt" class="mb-4 text-slate-600 text-base sm:text-lg">Loading audio resources...</p>
                <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-6">
                    <input type="text" id="username" placeholder="Enter Your Name" class="w-full sm:w-auto flex-grow px-4 py-2 sm:py-3 text-base sm:text-lg border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition">
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
                    <button data-level="A1" class="level-button text-white font-bold py-4 sm:py-6 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 bg-green-500 hover:bg-green-600 disabled:bg-slate-400 disabled:cursor-not-allowed disabled:transform-none" disabled>
                        <span class="text-2xl sm:text-3xl">A1</span><span class="block text-xs sm:text-sm opacity-90">Beginner</span>
                    </button>
                    <button data-level="A2" class="level-button text-white font-bold py-4 sm:py-6 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-400 disabled:cursor-not-allowed disabled:transform-none" disabled>
                        <span class="text-2xl sm:text-3xl">A2</span><span class="block text-xs sm:text-sm opacity-90">Elementary</span>
                    </button>
                    <button data-level="B1" class="level-button text-white font-bold py-4 sm:py-6 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-400 disabled:cursor-not-allowed disabled:transform-none" disabled>
                        <span class="text-2xl sm:text-3xl">B1</span><span class="block text-xs sm:text-sm opacity-90">Intermediate</span>
                    </button>
                    <button data-level="B2" class="level-button text-white font-bold py-4 sm:py-6 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 bg-rose-500 hover:bg-rose-600 disabled:bg-slate-400 disabled:cursor-not-allowed disabled:transform-none" disabled>
                        <span class="text-2xl sm:text-3xl">B2</span><span class="block text-xs sm:text-sm opacity-90">Upper-Intermediate</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- View: Game -->
        <div id="game-view" class="view-container hidden">
            <div class="flex-shrink-0">
                <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                    <h2 class="text-xl sm:text-2xl font-bold text-sky-800">Level: <span id="difficulty-level">A1</span></h2>
                    <div class="text-xl sm:text-2xl font-bold text-rose-600 bg-rose-100 px-3 py-1 sm:px-4 sm:py-2 rounded-lg">
                        <span id="game-countdown-display">05:00</span>
                    </div>
                </div>
                
                <div id="game-stats" class="grid grid-cols-3 gap-2 sm:gap-4 mb-3 text-center">
                    <div class="bg-sky-100 p-2 sm:p-3 rounded-lg"><div class="text-xs sm:text-sm text-sky-700">Score</div><span id="score" class="font-bold text-xl sm:text-2xl text-sky-900">0</span></div>
                    <div class="bg-amber-100 p-2 sm:p-3 rounded-lg"><div class="text-xs sm:text-sm text-amber-700">Tokens</div><span id="tokens" class="font-bold text-xl sm:text-2xl text-amber-900">0</span></div>
                    <div class="bg-sky-100 p-2 sm:p-3 rounded-lg"><div class="text-xs sm:text-sm text-sky-700">Question</div><span id="question-count" class="font-bold text-xl sm:text-2xl text-sky-900">0</span><span id="question-total" class="text-base sm:text-lg text-sky-600">/100</span></div>
                </div>
            </div>
            
            <div id="question-area" class="w-full max-w-3xl mx-auto p-3 sm:p-4 bg-white rounded-2xl shadow-lg flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-xs sm:text-sm text-slate-500">Time: <span id="question-timer" class="font-bold text-sm sm:text-base text-rose-600">--</span>s</p>
                    <button id="repeat-button" class="bg-sky-500 hover:bg-sky-600 text-white font-semibold py-1 px-2 sm:py-2 sm:px-4 rounded-lg shadow-sm hover:shadow-md transition flex items-center gap-2 disabled:bg-slate-400 text-sm" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2.1l4 4-4 4"/><path d="M3 12.6A9 9 0 0 1 12 3a9 9 0 0 1 8.4 5.4"/><path d="M7 21.9l-4-4 4-4"/><path d="M21 11.4A9 9 0 0 1 12 21a9 9 0 0 1-8.4-5.4"/></svg>
                        <span class="hidden sm:inline">Repeat</span>
                    </button>
                </div>

                <div id="stimulus-area" class="mb-2 p-2 min-h-[80px] sm:min-h-[100px] bg-slate-100 rounded-lg flex flex-col justify-center items-center">
                    <div id="audio-visualizer" class="flex items-center justify-center h-12 sm:h-16 space-x-1.5">
                        <div class="audio-wave-bar w-1.5 sm:w-2 h-full bg-sky-500 rounded-full"></div>
                        <div class="audio-wave-bar w-1.5 sm:w-2 h-full bg-sky-500 rounded-full"></div>
                        <div class="audio-wave-bar w-1.5 sm:w-2 h-full bg-sky-500 rounded-full"></div>
                        <div class="audio-wave-bar w-1.5 sm:w-2 h-full bg-sky-500 rounded-full"></div>
                        <div class="audio-wave-bar w-1.5 sm:w-2 h-full bg-sky-500 rounded-full"></div>
                    </div>
                </div>

                <p id="question-text" class="mb-3 text-base sm:text-xl font-semibold text-center text-slate-800 min-h-[48px] flex items-center justify-center"></p>
                <div id="answer-options" class="grid grid-cols-2 gap-2 sm:gap-3 flex-grow"></div>
                <div id="feedback" aria-live="polite" class="mt-2 font-semibold text-center min-h-[24px] text-base sm:text-lg"></div>
                <div id="example-sentence-feedback" class="hidden mt-2 p-2 bg-slate-50 border-t border-slate-200 rounded-b-lg text-slate-600 text-center text-sm"></div>
            </div>
        </div>

        <!-- View: Game Over -->
        <div id="game-over-view" class="view-container hidden text-center">
            <div class="flex flex-col h-full">
                <div class="flex-shrink-0">
                    <h2 class="text-3xl sm:text-4xl font-extrabold text-sky-800 mb-1">Level Complete!</h2>
                    <p id="game-over-message" class="text-slate-600 mb-3 text-sm sm:text-base"></p>
                    
                    <div class="grid grid-cols-3 gap-2 sm:gap-4 mb-3 text-white">
                        <div class="bg-sky-500 p-2 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm opacity-90">Final Score</div><span id="final-score" class="font-bold text-2xl sm:text-3xl">0</span></div>
                        <div class="bg-amber-500 p-2 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm opacity-90">Tokens Earned</div><span id="final-tokens" class="font-bold text-2xl sm:text-3xl">0</span></div>
                        <div class="bg-green-500 p-2 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm opacity-90">Accuracy</div><span id="final-accuracy" class="font-bold text-2xl sm:text-3xl">0%</span></div>
                    </div>
                     <div id="final-badges-section" class="mt-3 text-left">
                        <h4 class="text-lg sm:text-xl font-semibold text-sky-700 mb-2">Badges Earned</h4>
                        <div id="final-badges-display" class="flex flex-wrap gap-3 p-3 bg-slate-100 rounded-lg justify-center min-h-[50px]"></div>
                    </div>
                </div>

                <div id="review-section" class="mt-4 text-left flex-grow min-h-0">
                    <h4 class="text-lg sm:text-xl font-semibold text-sky-700 mb-2">Review Incorrect Answers</h4>
                    <div id="incorrect-answers-list" class="space-y-3 h-full overflow-y-auto p-3 bg-slate-50 rounded-lg"></div>
                </div>

                <div class="mt-4 flex-shrink-0">
                    <button id="play-again-button" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-300 w-full">Play Another Level</button>
                </div>
            </div>
        </div>

        <!-- Badge Unlocked Alert -->
        <div id="badge-alert" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 p-4 bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded-2xl shadow-2xl text-center z-50 pointer-events-none">
            <div id="badge-alert-icon" class="text-5xl mb-2"></div>
            <h3 class="text-xl font-bold">Badge Unlocked!</h3>
            <p id="badge-alert-name" class="text-lg font-medium"></p>
        </div>
    </div>

    <script>
        // --- DOM ELEMENT CACHE ---
        const dom = {
            levelSelectionView: document.getElementById('level-selection-view'),
            levelSelectionPrompt: document.getElementById('level-selection-prompt'),
            gameView: document.getElementById('game-view'),
            gameOverView: document.getElementById('game-over-view'),
            usernameInput: document.getElementById('username'),
            levelButtons: document.querySelectorAll('.level-button'),
            scoreDisplay: document.getElementById('score'),
            tokensDisplay: document.getElementById('tokens'),
            questionCountDisplay: document.getElementById('question-count'),
            questionTotalDisplay: document.getElementById('question-total'),
            difficultyLevelDisplay: document.getElementById('difficulty-level'),
            gameCountdownDisplay: document.getElementById('game-countdown-display'),
            questionTimer: document.getElementById('question-timer'),
            audioVisualizer: document.getElementById('audio-visualizer'),
            questionTextDisplay: document.getElementById('question-text'),
            answerOptionsContainer: document.getElementById('answer-options'),
            feedbackDisplay: document.getElementById('feedback'),
            exampleSentenceFeedback: document.getElementById('example-sentence-feedback'),
            repeatButton: document.getElementById('repeat-button'),
            finalScore: document.getElementById('final-score'),
            finalTokens: document.getElementById('final-tokens'),
            finalAccuracy: document.getElementById('final-accuracy'),
            finalBadgesDisplay: document.getElementById('final-badges-display'),
            gameOverMessage: document.getElementById('game-over-message'),
            reviewSection: document.getElementById('review-section'),
            incorrectAnswersList: document.getElementById('incorrect-answers-list'),
            playAgainButton: document.getElementById('play-again-button'),
            badgeAlert: document.getElementById('badge-alert'),
            badgeAlertIcon: document.getElementById('badge-alert-icon'),
            badgeAlertName: document.getElementById('badge-alert-name'),
        };

        // --- GAME CONFIGURATION ---
        const config = {
            QUESTIONS_PER_LEVEL: 100,
            TIME_PER_QUESTION_SECONDS: 15,
            GAME_DURATION_SECONDS: 300, // 5 minutes
            TOKENS_PER_CORRECT: 1,
            TOKENS_PER_CORRECT_BOOST: 2,
            TOKEN_BOOST_THRESHOLD: 25, // Boost tokens after 25 correct answers
            STREAK_BONUS_THRESHOLD: 5,
            STREAK_BONUS_POINTS: 10,
            SPEED_BONUS_SECONDS: 3,
            SPEED_BONUS_POINTS: 5,
        };
        
        // --- BADGES CONFIGURATION ---
        const badges = {
            quickThinker: { name: "Quick Thinker", icon: "⚡️", description: "Answer a question in under 3 seconds." },
            streakStarter: { name: "Streak Starter", icon: "🔥", description: "Get 5 correct answers in a row." },
            streakMaster: { name: "Streak Master", icon: "☄️", description: "Get 15 correct answers in a row." },
            halfwayHero: { name: "Halfway Hero", icon: "🎯", description: "Correctly answer 50 questions." },
            verbVirtuoso: { name: "Verb Virtuoso", icon: "🏆", description: "Correctly answer all 100 questions." },
            accuracyAce: { name: "Accuracy Ace", icon: "💎", description: "Finish with 90%+ accuracy." },
        };

        // --- MASSIVELY EXPANDED VERB LIBRARY ---
        const cefrVerbs = {
            A1: {
                "be": { base: "be", forms: ["am", "is", "are", "was", "were"], sentences: [ { sentence: "I am happy today.", correctForm: "am" }, { sentence: "She is a doctor.", correctForm: "is" }, { sentence: "They are from Canada.", correctForm: "are" }, { sentence: "The weather was nice yesterday.", correctForm: "was" }, { sentence: "We were at the park this morning.", correctForm: "were" } ] },
                "have": { base: "have", forms: ["have", "has", "had"], sentences: [ { sentence: "I have a blue car.", correctForm: "have" }, { sentence: "She has two cats.", correctForm: "has" }, { sentence: "He had a cold last week.", correctForm: "had" } ] },
                "do": { base: "do", forms: ["do", "does", "did"], sentences: [ { sentence: "I do my homework in the evening.", correctForm: "do" }, { sentence: "He does the laundry on Sundays.", correctForm: "does" }, { sentence: "They did a good job yesterday.", correctForm: "did" } ] },
                "say": { base: "say", forms: ["say", "says", "said"], sentences: [ { sentence: "The children say 'hello'.", correctForm: "say" }, { sentence: "She always says thank you.", correctForm: "says" }, { sentence: "He said goodbye this morning.", correctForm: "said" } ] },
                "go": { base: "go", forms: ["go", "goes", "went"], sentences: [ { sentence: "We go to the park on Saturdays.", correctForm: "go" }, { sentence: "She goes to the gym every day.", correctForm: "goes" }, { sentence: "I went to the cinema last night.", correctForm: "went" } ] },
                "get": { base: "get", forms: ["get", "gets", "got"], sentences: [ { sentence: "I get up at 7 AM.", correctForm: "get" }, { sentence: "She gets the bus to work.", correctForm: "gets" }, { sentence: "We got a new dog last month.", correctForm: "got" } ] },
                "make": { base: "make", forms: ["make", "makes", "made"], sentences: [ { sentence: "I make breakfast every day.", correctForm: "make" }, { sentence: "He makes model airplanes.", correctForm: "makes" }, { sentence: "She made a cake for my birthday.", correctForm: "made" } ] },
                "know": { base: "know", forms: ["know", "knows", "knew"], sentences: [ { sentence: "I know the answer.", correctForm: "know" }, { sentence: "She knows how to speak French.", correctForm: "knows" }, { sentence: "He knew my father a long time ago.", correctForm: "knew" } ] },
                "think": { base: "think", forms: ["think", "thinks", "thought"], sentences: [ { sentence: "I think it is a good idea.", correctForm: "think" }, { sentence: "She thinks about her family.", correctForm: "thinks" }, { sentence: "I thought about your question yesterday.", correctForm: "thought" } ] },
                "take": { base: "take", forms: ["take", "takes", "took"], sentences: [ { sentence: "I take a shower in the morning.", correctForm: "take" }, { sentence: "He takes his dog for a walk.", correctForm: "takes" }, { sentence: "She took a photo of the sunset last night.", correctForm: "took" } ] },
                "see": { base: "see", forms: ["see", "sees", "saw"], sentences: [ { sentence: "I see my friends on the weekend.", correctForm: "see" }, { sentence: "He sees the doctor every year.", correctForm: "sees" }, { sentence: "We saw a good film on Tuesday.", correctForm: "saw" } ] },
                "come": { base: "come", forms: ["come", "comes", "came"], sentences: [ { sentence: "They come to my house for dinner.", correctForm: "come" }, { sentence: "The bus comes every 10 minutes.", correctForm: "comes" }, { sentence: "She came to the party last Saturday.", correctForm: "came" } ] },
                "want": { base: "want", forms: ["want", "wants", "wanted"], sentences: [ { sentence: "I want a new bike.", correctForm: "want" }, { sentence: "She wants to be a teacher.", correctForm: "wants" }, { sentence: "He wanted a puppy for Christmas last year.", correctForm: "wanted" } ] },
                "look": { base: "look", forms: ["look", "looks", "looked"], sentences: [ { sentence: "You look nice today.", correctForm: "look" }, { sentence: "The cat looks at the bird.", correctForm: "looks" }, { sentence: "We looked at the stars last night.", correctForm: "looked" } ] },
                "use": { base: "use", forms: ["use", "uses", "used"], sentences: [ { sentence: "I use a computer for my work.", correctForm: "use" }, { sentence: "She uses a blue pen.", correctForm: "uses" }, { sentence: "He used my phone a minute ago.", correctForm: "used" } ] },
                "find": { base: "find", forms: ["find", "finds", "found"], sentences: [ { sentence: "I can't find my keys.", correctForm: "find" }, { sentence: "She always finds good books.", correctForm: "finds" }, { sentence: "I found my wallet this morning.", correctForm: "found" } ] },
                "give": { base: "give", forms: ["give", "gives", "gave"], sentences: [ { sentence: "I give my dog a treat.", correctForm: "give" }, { sentence: "He gives his mother flowers.", correctForm: "gives" }, { sentence: "She gave me a present yesterday.", correctForm: "gave" } ] },
                "tell": { base: "tell", forms: ["tell", "tells", "told"], sentences: [ { sentence: "Can you tell me the time?", correctForm: "tell" }, { sentence: "He tells good jokes.", correctForm: "tells" }, { sentence: "She told me a secret last week.", correctForm: "told" } ] },
                "work": { base: "work", forms: ["work", "works", "worked"], sentences: [ { sentence: "I work in an office.", correctForm: "work" }, { sentence: "She works very hard.", correctForm: "works" }, { sentence: "My father worked late yesterday.", correctForm: "worked" } ] },
                "call": { base: "call", forms: ["call", "calls", "called"], sentences: [ { sentence: "I call my parents every week.", correctForm: "call" }, { sentence: "She calls her friend every day.", correctForm: "calls" }, { sentence: "He called me an hour ago.", correctForm: "called" } ] },
                "try": { base: "try", forms: ["try", "tries", "tried"], sentences: [ { sentence: "I always try my best.", correctForm: "try" }, { sentence: "He tries to eat healthy food.", correctForm: "tries" }, { sentence: "I tried the new restaurant last night.", correctForm: "tried" } ] },
                "ask": { base: "ask", forms: ["ask", "asks", "asked"], sentences: [ { sentence: "Can I ask you a question?", correctForm: "ask" }, { sentence: "She often asks for help.", correctForm: "asks" }, { sentence: "He asked me for directions yesterday.", correctForm: "asked" } ] },
                "need": { base: "need", forms: ["need", "needs", "needed"], sentences: [ { sentence: "I need some water.", correctForm: "need" }, { sentence: "The car needs fuel.", correctForm: "needs" }, { sentence: "We needed more time for the test.", correctForm: "needed" } ] },
                "feel": { base: "feel", forms: ["feel", "feels", "felt"], sentences: [ { sentence: "I feel happy.", correctForm: "feel" }, { sentence: "She feels tired.", correctForm: "feels" }, { sentence: "He felt sick yesterday.", correctForm: "felt" } ] },
                "leave": { base: "leave", forms: ["leave", "leaves", "left"], sentences: [ { sentence: "I leave the house at 8 AM.", correctForm: "leave" }, { sentence: "The train leaves at 9 AM.", correctForm: "leaves" }, { sentence: "She left the party early last night.", correctForm: "left" } ] },
                "put": { base: "put", forms: ["put", "puts", "put"], sentences: [ { sentence: "I put sugar in my coffee.", correctForm: "put" }, { sentence: "She puts her books in her bag.", correctForm: "puts" }, { sentence: "He put the keys on the table a moment ago.", correctForm: "put" } ] },
                "keep": { base: "keep", forms: ["keep", "keeps", "kept"], sentences: [ { sentence: "I keep my room clean.", correctForm: "keep" }, { sentence: "She keeps her promises.", correctForm: "keeps" }, { sentence: "He kept his old letters in a box.", correctForm: "kept" } ] },
                "let": { base: "let", forms: ["let", "lets", "let"], sentences: [ { sentence: "My parents let me go to the cinema.", correctForm: "let" }, { sentence: "My boss lets me leave early.", correctForm: "lets" }, { sentence: "She let me borrow her car last week.", correctForm: "let" } ] },
                "begin": { base: "begin", forms: ["begin", "begins", "began"], sentences: [ { sentence: "The classes begin next week.", correctForm: "begin" }, { sentence: "The movie begins at 8 PM.", correctForm: "begins" }, { sentence: "The concert began an hour ago.", correctForm: "began" } ] },
                "help": { base: "help", forms: ["help", "helps", "helped"], sentences: [ { sentence: "Can you help me?", correctForm: "help" }, { sentence: "He helps his neighbors.", correctForm: "helps" }, { sentence: "She helped me with my homework yesterday.", correctForm: "helped" } ] },
                "talk": { base: "talk", forms: ["talk", "talks", "talked"], sentences: [ { sentence: "I like to talk to my friends.", correctForm: "talk" }, { sentence: "She talks a lot.", correctForm: "talks" }, { sentence: "We talked for hours last night.", correctForm: "talked" } ] },
                "turn": { base: "turn", forms: ["turn", "turns", "turned"], sentences: [ { sentence: "Turn right at the corner.", correctForm: "turn" }, { sentence: "The leaf turns brown in autumn.", correctForm: "turns" }, { sentence: "He turned the page of the book.", correctForm: "turned" } ] },

                "justify": { base: "justify", forms: ["justify", "justifies", "justified"], sentences: [ { sentence: "Can you justify your actions?", correctForm: "justify" }, { sentence: "The end does not always justify the means.", correctForm: "justify" }, { sentence: "He justified his actions by explaining the situation to us.", correctForm: "justified" } ] },
                "negotiate": { base: "negotiate", forms: ["negotiate", "negotiates", "negotiated"], sentences: [ { sentence: "We need to negotiate a better deal.", correctForm: "negotiate" }, { sentence: "A good manager negotiates effectively.", correctForm: "negotiates" }, { sentence: "The two countries negotiated a peace treaty last century.", correctForm: "negotiated" } ] },
                "perceive": { base: "perceive", forms: ["perceive", "perceives", "perceived"], sentences: [ { sentence: "How do you perceive the situation?", correctForm: "perceive" }, { sentence: "She perceives things that others miss.", correctForm: "perceives" }, { sentence: "She perceived a change in his attitude during the meeting.", correctForm: "perceived" } ] },
                "publish": { base: "publish", forms: ["publish", "publishes", "published"], sentences: [ { sentence: "They will publish the book next year.", correctForm: "publish" }, { sentence: "The company publishes several magazines.", correctForm: "publishes" }, { sentence: "The author published her new novel last month.", correctForm: "published" } ] },
            }
        };

        // --- STATE MANAGEMENT ---
        let state = {
            gameState: null,
            currentQuestionData: {},
            timers: { question: null, game: null },
            audio: { synth: null, voices: [], preferredVoices: [], isTtsEnabled: true, isReady: false },
            shuffledSentences: [],
            questionStartTime: 0,
        };

        // --- UI & DISPLAY ---
        function switchView(viewToShow) {
            [dom.levelSelectionView, dom.gameView, dom.gameOverView].forEach(view => view.classList.add('hidden'));
            if (viewToShow) viewToShow.classList.remove('hidden');
        }

        function updateGameStatsDisplay() {
            if (!state.gameState) return;
            dom.scoreDisplay.textContent = state.gameState.score;
            dom.tokensDisplay.textContent = state.gameState.tokens;
            dom.questionCountDisplay.textContent = state.gameState.questionsAnswered;
            dom.questionTotalDisplay.textContent = `/${config.QUESTIONS_PER_LEVEL}`;
            dom.difficultyLevelDisplay.textContent = state.gameState.level;
        }

        function showBadgeAlert(badgeKey) {
            const badge = badges[badgeKey];
            if (!badge) return;

            dom.badgeAlertIcon.textContent = badge.icon;
            dom.badgeAlertName.textContent = badge.name;
            
            dom.badgeAlert.classList.remove('hidden', 'badge-alert-exit');
            dom.badgeAlert.classList.add('badge-alert-enter');

            setTimeout(() => {
                dom.badgeAlert.classList.remove('badge-alert-enter');
                dom.badgeAlert.classList.add('badge-alert-exit');
            }, 2500);
        }

        // --- AUDIO ---
        function initAudio() {
            if (typeof Tone !== 'undefined') state.audio.synth = new Tone.Synth().toDestination();
        }

        function populateVoiceList() {
            if (state.audio.voices.length > 0) return;
            state.audio.voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
            if (state.audio.voices.length > 0) {
                const naturalKeywords = ["neural", "natural", "google", "zira", "david", "microsoft", "aria", "jenny"];
                state.audio.preferredVoices = state.audio.voices.filter(v => naturalKeywords.some(kw => v.name.toLowerCase().includes(kw)));
                if (state.audio.preferredVoices.length === 0) state.audio.preferredVoices = state.audio.voices;
                state.audio.isReady = true;
                dom.levelSelectionPrompt.textContent = 'Choose your CEFR level to begin.';
                dom.levelButtons.forEach(btn => {
                    if (Object.keys(cefrVerbs[btn.dataset.level]).length > 0) {
                        btn.disabled = false;
                        const levelSpan = btn.querySelector('.text-2xl');
                        const typeSpan = btn.querySelector('.text-xs');
                        if (levelSpan.dataset.originalType) {
                            typeSpan.textContent = levelSpan.dataset.originalType;
                        }
                    } else {
                         const typeSpan = btn.querySelector('.text-xs');
                         const levelSpan = btn.querySelector('.text-2xl');
                         levelSpan.dataset.originalType = typeSpan.textContent;
                         typeSpan.textContent = 'Coming Soon';
                    }
                });
            }
        }

        function initSpeechSynthesis() {
            if ('speechSynthesis' in window) {
                if (speechSynthesis.getVoices().length > 0) populateVoiceList();
                else speechSynthesis.onvoiceschanged = populateVoiceList;
            } else {
                dom.levelSelectionPrompt.textContent = 'Text-to-speech not supported. Choose a level.';
                dom.levelButtons.forEach(btn => btn.disabled = false);
                state.audio.isTtsEnabled = false;
            }
        }

        function speak(text, voice, callback) {
            if (!state.audio.isTtsEnabled || !('speechSynthesis' in window) || !text) {
                if (callback) setTimeout(callback, 0);
                return;
            }

            // Defensive measures for speech synthesis
            speechSynthesis.cancel();
            if (speechSynthesis.paused) {
                speechSynthesis.resume();
            }

            let wasCalled = false;
            let speechTimeout;

            const onceCallback = () => {
                if (!wasCalled) {
                    wasCalled = true;
                    clearTimeout(speechTimeout); // Clear the safety net timeout
                    dom.audioVisualizer.classList.add('hidden');
                    dom.repeatButton.disabled = false;
                    if (callback) callback();
                }
            };

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voice;
            utterance.onend = onceCallback;
            utterance.onerror = (event) => {
                console.error(`Speech Synthesis Error: Type - "${event.error}". The game will continue.`, event);
                onceCallback(); // Ensure game continues even if speech fails
            };
            
            dom.audioVisualizer.classList.remove('hidden');
            dom.repeatButton.disabled = true;

            // Safety net timeout in case speech synthesis gets stuck
            speechTimeout = setTimeout(onceCallback, 10000); // 10 second timeout

            setTimeout(() => {
                try {
                    speechSynthesis.speak(utterance);
                } catch (e) {
                    console.error("Error caught during speechSynthesis.speak():", e);
                    onceCallback(); // Ensure game continues
                }
            }, 100); 
        }

        // --- GAME LOGIC ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function resetGameData(level) {
            const levelVerbs = cefrVerbs[level];
            let allSentences = [];
            for (const verbKey in levelVerbs) {
                const verbData = levelVerbs[verbKey];
                verbData.sentences.forEach(sentenceObj => {
                    allSentences.push({ ...sentenceObj, baseVerb: verbData.base, allForms: verbData.forms });
                });
            }
            
            state.shuffledSentences = shuffleArray(allSentences).slice(0, config.QUESTIONS_PER_LEVEL);

            state.gameState = {
                username: dom.usernameInput.value.trim() || "Player",
                score: 0,
                tokens: 0,
                questionsAnswered: 0,
                correctAnswers: 0,
                level: level,
                correctStreak: 0,
                incorrectAnswers: [],
                badges: [],
            };
            updateGameStatsDisplay();
        }

        async function startGame(level) {
            if (!dom.usernameInput.value.trim()) {
                dom.usernameInput.classList.add('border-red-500', 'ring-red-500');
                dom.usernameInput.focus();
                return;
            }
            dom.usernameInput.classList.remove('border-red-500', 'ring-red-500');
            if(typeof Tone !== 'undefined' && Tone.context.state !== 'running') await Tone.start();
            if ('speechSynthesis' in window && speechSynthesis.paused) speechSynthesis.resume();
            resetGameData(level);
            startOverallGameTimer();
            switchView(dom.gameView);
            startNewQuestionRound();
        }

        function startOverallGameTimer() {
            clearInterval(state.timers.game);
            let timeLeft = config.GAME_DURATION_SECONDS;
            state.timers.game = setInterval(() => {
                timeLeft--;
                const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const seconds = String(timeLeft % 60).padStart(2, '0');
                dom.gameCountdownDisplay.textContent = `${minutes}:${seconds}`;
                if (timeLeft <= 0) endGame("Time's up!");
            }, 1000);
        }

        function startNewQuestionRound() {
            if (!state.gameState || state.gameState.questionsAnswered >= config.QUESTIONS_PER_LEVEL) {
                endGame("You've completed all the questions!");
                return;
            }
            state.currentQuestionData = state.shuffledSentences[state.gameState.questionsAnswered];
            const gappedSentence = state.currentQuestionData.sentence.replace(state.currentQuestionData.correctForm, "______");
            dom.questionTextDisplay.innerHTML = gappedSentence;
            const voiceIndex = state.gameState.questionsAnswered % state.audio.preferredVoices.length;
            const voiceForThisQuestion = state.audio.preferredVoices.length > 0 ? state.audio.preferredVoices[voiceIndex] : null;
            state.currentQuestionData.voice = voiceForThisQuestion;
            speak(state.currentQuestionData.sentence, voiceForThisQuestion, () => {
                displayQuestionOptions();
            });
        }

        function generateDistractorOptions(correctForm, allForms) {
            const distractors = new Set();
            const possibleDistractors = allForms.filter(form => form !== correctForm);
            while (distractors.size < 3 && distractors.size < possibleDistractors.length) {
                const randomForm = possibleDistractors[Math.floor(Math.random() * possibleDistractors.length)];
                distractors.add(randomForm);
            }
            return Array.from(distractors);
        }

        function displayQuestionOptions() {
            const { correctForm, allForms } = state.currentQuestionData;
            const options = shuffleArray([correctForm, ...generateDistractorOptions(correctForm, allForms)]);
            dom.answerOptionsContainer.innerHTML = '';
            options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-3 sm:p-4 text-base sm:text-lg font-semibold bg-white border-2 border-slate-300 rounded-lg hover:bg-sky-100 hover:border-sky-400 transition-all duration-200 transform hover:scale-105 disabled:opacity-50 disabled:transform-none';
                btn.textContent = optionText;
                btn.onclick = () => handleAnswer(optionText, correctForm, btn);
                dom.answerOptionsContainer.appendChild(btn);
            });
            dom.feedbackDisplay.textContent = '';
            dom.exampleSentenceFeedback.classList.add('hidden');
            startQuestionTimer();
        }
        
        function startQuestionTimer() {
            clearInterval(state.timers.question);
            let timeLeft = config.TIME_PER_QUESTION_SECONDS;
            dom.questionTimer.textContent = timeLeft;
            state.questionStartTime = Date.now(); // Record start time
            state.timers.question = setInterval(() => {
                timeLeft--;
                dom.questionTimer.textContent = timeLeft;
                if (timeLeft <= 0) handleAnswer(null, state.currentQuestionData.correctForm);
            }, 1000);
        }
        
        function handleAnswer(selected, correct, button = null) {
            clearInterval(state.timers.question);
            const answerTime = (Date.now() - state.questionStartTime) / 1000;
            const isCorrect = selected === correct;
            const isTimeout = selected === null;

            Array.from(dom.answerOptionsContainer.children).forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === correct) btn.classList.add('!bg-green-500', '!text-white', '!border-green-600');
            });

            let feedbackText = '';
            if (isTimeout) {
                if (state.audio.synth) state.audio.synth.triggerAttackRelease("C3", "8n");
                state.gameState.correctStreak = 0;
                feedbackText = `Time's up! The correct form was "${correct}".`;
                dom.feedbackDisplay.className = 'mt-2 font-semibold text-center min-h-[24px] text-base sm:text-lg text-amber-600';
                state.gameState.incorrectAnswers.push({ ...state.currentQuestionData, selectedAnswer: 'N/A' });
            } else if (isCorrect) {
                if (state.audio.synth) state.audio.synth.triggerAttackRelease("C5", "8n");
                let pointsEarned = 2;
                let bonusText = "";

                // Add tokens
                const tokenReward = state.gameState.correctAnswers >= config.TOKEN_BOOST_THRESHOLD ? config.TOKENS_PER_CORRECT_BOOST : config.TOKENS_PER_CORRECT;
                state.gameState.tokens += tokenReward;
                bonusText += `+${tokenReward} Token${tokenReward > 1 ? 's' : ''}! `;

                // Speed bonus
                if (answerTime < config.SPEED_BONUS_SECONDS) {
                    pointsEarned += config.SPEED_BONUS_POINTS;
                    bonusText += `Speed Bonus! +${config.SPEED_BONUS_POINTS}pts. `;
                }

                state.gameState.score += pointsEarned;
                state.gameState.correctAnswers++;
                state.gameState.correctStreak++;
                button.classList.add('flash-correct');
                
                // Streak bonus
                if (state.gameState.correctStreak > 0 && state.gameState.correctStreak % config.STREAK_BONUS_THRESHOLD === 0) {
                    state.gameState.score += config.STREAK_BONUS_POINTS;
                    bonusText += `Streak Bonus! +${config.STREAK_BONUS_POINTS}pts. `;
                    if (state.audio.synth) state.audio.synth.triggerAttackRelease("G5", "8n", Tone.now() + 0.1);
                }

                feedbackText = bonusText || ["Excellent!", "Great job!", "Awesome!"][Math.floor(Math.random() * 3)];
                dom.feedbackDisplay.className = 'mt-2 font-semibold text-center min-h-[24px] text-base sm:text-lg text-green-600';
                checkAndAwardBadges(answerTime);
            } else {
                if (state.audio.synth) state.audio.synth.triggerAttackRelease("C3", "8n");
                state.gameState.correctStreak = 0;
                button.classList.add('!bg-rose-500', '!text-white', '!border-rose-600');
                feedbackText = `Not quite. The correct form was "${correct}".`;
                dom.feedbackDisplay.className = 'mt-2 font-semibold text-center min-h-[24px] text-base sm:text-lg text-rose-600';
                state.gameState.incorrectAnswers.push({ ...state.currentQuestionData, selectedAnswer: selected });
            }
            
            dom.feedbackDisplay.textContent = feedbackText;
            state.gameState.questionsAnswered++;
            dom.exampleSentenceFeedback.innerHTML = `Sentence: "<strong>${state.currentQuestionData.sentence}</strong>"`;
            dom.exampleSentenceFeedback.classList.remove('hidden');
            updateGameStatsDisplay();
            setTimeout(startNewQuestionRound, 2500);
        }

        function checkAndAwardBadges(answerTime) {
            const { correctAnswers, correctStreak, badges: earnedBadges } = state.gameState;
            
            const award = (badgeKey) => {
                if (!earnedBadges.includes(badgeKey)) {
                    state.gameState.badges.push(badgeKey);
                    showBadgeAlert(badgeKey);
                }
            };

            if (answerTime < config.SPEED_BONUS_SECONDS) award('quickThinker');
            if (correctStreak >= 5) award('streakStarter');
            if (correctStreak >= 15) award('streakMaster');
            if (correctAnswers === 50) award('halfwayHero');
            if (correctAnswers === 100) award('verbVirtuoso');
        }

        function endGame(message) {
            clearInterval(state.timers.game);
            clearInterval(state.timers.question);
            
            const { score, tokens, correctAnswers, questionsAnswered, incorrectAnswers, badges: earnedBadges } = state.gameState;
            const accuracy = questionsAnswered > 0 ? Math.round((correctAnswers / questionsAnswered) * 100) : 0;

            // Final badge check
            if (accuracy >= 90 && questionsAnswered > 10) { // Require a minimum number of questions for accuracy badge
                if (!earnedBadges.includes('accuracyAce')) {
                    earnedBadges.push('accuracyAce');
                }
            }

            dom.gameOverMessage.textContent = message;
            dom.finalScore.textContent = score;
            dom.finalTokens.textContent = tokens;
            dom.finalAccuracy.textContent = `${accuracy}%`;
            
            if (earnedBadges.length > 0) {
                dom.finalBadgesDisplay.innerHTML = earnedBadges.map(key => {
                    const badge = badges[key];
                    return `<div class="flex flex-col items-center justify-center text-center p-2 bg-white rounded-lg shadow w-24" title="${badge.description}">
                                <span class="text-3xl">${badge.icon}</span>
                                <span class="text-xs font-semibold text-slate-700 mt-1">${badge.name}</span>
                            </div>`;
                }).join('');
            } else {
                dom.finalBadgesDisplay.innerHTML = '<p class="text-slate-500 text-center w-full">No badges earned this round. Try again!</p>';
            }
            
            if (incorrectAnswers.length > 0) {
                dom.reviewSection.classList.remove('hidden');
                dom.incorrectAnswersList.innerHTML = incorrectAnswers.map(item => `
                    <div class="p-2 sm:p-3 bg-white border border-slate-200 rounded-md">
                        <p class="text-slate-500 text-xs sm:text-sm">${item.sentence.replace(item.correctForm, '______')}</p>
                        <p class="mt-1 text-xs sm:text-sm">Your answer: <span class="font-semibold text-rose-600">${item.selectedAnswer}</span></p>
                        <p class="text-xs sm:text-sm">Correct answer: <span class="font-semibold text-green-600">${item.correctForm}</span></p>
                    </div>
                `).join('');
            } else {
                dom.reviewSection.classList.add('hidden');
                dom.incorrectAnswersList.innerHTML = '';
            }
            switchView(dom.gameOverView);
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            dom.levelButtons.forEach(button => {
                button.addEventListener('click', () => { if (!button.disabled) startGame(button.dataset.level) });
            });
            dom.playAgainButton.addEventListener('click', () => {
                switchView(dom.levelSelectionView)
                if (!state.audio.isReady) {
                    dom.levelButtons.forEach(btn => btn.disabled = true);
                    dom.levelSelectionPrompt.textContent = 'Loading audio resources...';
                    initSpeechSynthesis();
                }
            });
            dom.repeatButton.addEventListener('click', () => {
                if (state.currentQuestionData?.sentence && state.currentQuestionData?.voice) {
                    speak(state.currentQuestionData.sentence, state.currentQuestionData.voice, null);
                }
            });
        }

        // --- INITIALIZATION ---
        function main() {
            setupEventListeners();
            initAudio();
            initSpeechSynthesis();
        }

        main();
    </script>
</body>
</html>
