<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Location Listen-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
  <style>
    :root {
      --bg-main: #2d3436;
      --bg-container: #5c5c5c;
      --primary-color: #ff8c42;
      --primary-dark: #ff6b00;
      --text-light: #f5f5f5;
      --text-dark: #ffcc00;
      --border-color: #7d7d7d;
      --correct-color: #7cfc00;
      --incorrect-color: #ff4757;
      --gold-color: #ffd700;
      --accent-cyan: #4ecdc4;
    }

    @keyframes background-pan {
        0% { background-color: #2d3436; }
        20% { background-color: #0c2461; }
        40% { background-color: #4a69bd; }
        60% { background-color: #1e3799; }
        80% { background-color: #3a3a3a; }
        100% { background-color: #2d3436; }
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      color: var(--text-light);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: background-pan 90s linear infinite;
      position: relative;
      overflow-x: hidden;
    }
    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }
    .screen {
      display: none;
      width: 100%;
      max-width: 800px; /* Increased width for 2P */
      margin: 0 auto;
      padding: 2rem 1rem;
      box-sizing: border-box;
      text-align: center;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: var(--primary-color);
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      margin-bottom: 1rem;
    }
    h2 {
      color: var(--text-dark);
      margin: 1rem 0 0.5rem;
    }
    label {
      font-size: 1.1rem;
      color: var(--accent-cyan);
      margin-bottom: 0.5em;
      font-weight: bold;
    }
    input[type="text"] {
      padding: 0.7em 1em;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-container);
      color: var(--text-light);
      font-size: 1.1rem;
      outline: none;
      width: 90%;
      max-width: 400px;
      margin-bottom: 1.5em;
      text-align: center;
    }
    input[type="text"]:focus {
      border-color: var(--primary-color);
    }
    button, .option-btn {
      background: var(--primary-color);
      color: var(--bg-main);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0.8em 2em;
      margin: 0.5em 0.25em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      min-width: 120px;
    }
    button:focus, .option-btn:focus {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 2px;
    }
    button:hover, .option-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    .selection-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 1.5em;
    }
    .level-btn, .mode-btn {
        background: var(--bg-container);
        color: var(--text-light);
        border: 2px solid var(--border-color);
        padding: 0.6em 1.2em;
    }
    .level-btn.selected, .mode-btn.selected {
        background: var(--accent-cyan);
        color: var(--bg-main);
        border-color: var(--accent-cyan);
        transform: scale(1.05);
    }
    .option-btn {
      display: block;
      width: 100%;
      margin: 0.5em 0;
      min-height: 3em;
      text-align: center;
      color: var(--text-light);
      background: rgba(0,0,0,0.15);
      border: 2px solid var(--border-color);
      border-radius: 10px;
    }
    .option-btn.correct {
      background: var(--correct-color);
      color: #222;
      border-color: var(--correct-color);
      animation: pulse-correct 0.5s;
    }
    @keyframes pulse-correct {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    .option-btn.incorrect {
      background: var(--incorrect-color);
      color: #fff;
      border-color: var(--incorrect-color);
    }
    .hud {
      width: 100%;
      background: rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: space-around;
      align-items: center;
      margin: 1em 0 1.5em 0;
      padding: 0.5em 1em;
      border-radius: 8px;
      font-size: 1em;
    }
    .hud-item span {
      color: var(--text-light);
      font-weight: bold;
    }
    .player-score-hud {
        padding: 4px 8px;
        border-radius: 6px;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }
    .player-score-hud.active-player {
        background-color: var(--primary-dark);
        border-color: var(--gold-color);
        transform: scale(1.1);
    }
    .progress-bar-container {
      width: 100%;
      background: rgba(0,0,0,0.25);
      height: 14px;
      border-radius: 8px;
      margin-bottom: 1em;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff8c42, #ffcc00, #7cfc00, #4ecdc4);
      transition: width 0.4s;
      width: 100%;
    }
    .feedback-display {
      font-size: 1.5em;
      min-height: 2em;
      margin: 0.5em 0;
      font-weight: bold;
    }
    .feedback-correct { color: var(--correct-color);}
    .feedback-incorrect { color: var(--incorrect-color);}
    #challenge-script em {
        color: var(--accent-cyan);
        font-size: 0.9em;
    }
    .results-container {
      background: var(--bg-container);
      padding: 1.5em 1em;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      margin: 1em auto;
      color: var(--text-light);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1em;
    }
    .stat-item h4 { color: var(--accent-cyan); margin: 0 0 0.5em 0; font-size: 1em;}
    .stat-item p { font-size: 1.3em; font-weight: bold; margin:0;}
    .badges-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5em;
      justify-content: center;
      margin-top: 0.5em;
    }
    .badge {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.5em;
      text-align: center;
      width: 75px;
    }
    .badge-icon { font-size: 1.5em;}
    .badge-name { font-size: 0.85em;}
    #feature-warning, #error-message {
      color: #fff;
      background: #e53935;
      padding: 0.5em 1em;
      border-radius: 6px;
      margin: 1em 0;
      font-weight: bold;
      display: none;
      text-align: center;
      max-width: 700px;
    }
    #leaderboard-list {
        list-style: none;
        padding: 0;
        text-align: left;
    }
    #leaderboard-list li {
        background: rgba(0,0,0,0.2);
        padding: 0.75em;
        border-radius: 6px;
        margin-bottom: 0.5em;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }
     #leaderboard-list li span {
        display: inline-block;
     }
    .leaderboard-rank { font-size: 1.2em; color: var(--primary-color); width: 30px;}
    .leaderboard-name { flex-grow: 1; }
    .leaderboard-level { background: var(--accent-cyan); color: var(--bg-main); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 10px;}
    .leaderboard-score { color: var(--gold-color); margin-right: 10px;}
    .leaderboard-time { color: var(--text-light); font-size: 0.9em; }

    .token {
        position: fixed;
        width: 20px;
        height: 20px;
        background-color: var(--gold-color);
        border-radius: 50%;
        border: 2px solid #fff;
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        animation: fly-to-score 1s ease-out forwards;
    }

    @keyframes fly-to-score {
        0% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            opacity: 0;
            transform: scale(0.2);
            top: var(--target-y);
            left: var(--target-x);
        }
    }

    #side-by-side-container {
        display: none; /* Hidden by default */
        width: 100%;
        gap: 1rem;
        display: flex; /* Use flexbox for layout */
    }
    .player-options-container {
        flex: 1;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        padding: 1rem;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .screen { padding: 1.5rem 0.5rem;}
      .results-container { padding: 1em 0.5em;}
      .stats-grid { grid-template-columns: 1fr;}
      .hud { font-size: 0.9em;}
      .badge { width: 65px;}
      #side-by-side-container {
          flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <div id="feature-warning"></div>
    <!-- START SCREEN -->
    <form id="start-form" class="screen active" autocomplete="off">
      <h1>Location Listen-Up</h1>
      
      <label>Game Mode</label>
      <div id="game-mode-selection" class="selection-group">
          <button type="button" class="mode-btn selected" data-mode="1P">1 Player</button>
          <button type="button" class="mode-btn" data-mode="2P">2 Player</button>
      </div>

      <div id="player-inputs">
        <div id="player-1-input-container">
            <label for="player-1-name-input">Player 1 Name</label>
            <input type="text" id="player-1-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
        </div>
        <div id="player-2-input-container" style="display: none;">
            <label for="player-2-name-input">Player 2 Name</label>
            <input type="text" id="player-2-name-input" placeholder="Enter Player 2's name" maxlength="20" autocomplete="off">
        </div>
      </div>
      
      <label>Select Level (CEFR)</label>
      <div id="level-selection" class="selection-group">
          <button type="button" class="level-btn" data-level="A2">A2</button>
          <button type="button" class="level-btn" data-level="B1">B1</button>
          <button type="button" class="level-btn" data-level="B2">B2</button>
      </div>
      <input type="hidden" id="selected-level-input">
      <div id="error-message"></div>

      <button type="submit" id="start-game-btn">Start Game</button>
    </form>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen" role="main" aria-live="polite">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="hud" id="hud">
        <div class="hud-item player-score-hud" id="p1-score-hud">
            <span class="player-name">Player 1</span>: <span id="hud-p1-score">0</span>
        </div>
        <div class="hud-item player-score-hud" id="p2-score-hud" style="display: none;">
            <span class="player-name">Player 2</span>: <span id="hud-p2-score">0</span>
        </div>
        <div class="hud-item">Level: <span id="hud-level">A2</span></div>
        <div class="hud-item">Question: <span id="hud-question">1</span></div>
        <div class="hud-item">Game Time: <span id="hud-time">10:00</span></div>
        <div class="hud-item">Question Time: <span id="hud-question-time">30</span></div>
      </div>
      <div class="feedback-display" id="feedback"></div>
      <div id="challenge-script" style="font-size:1.2em; margin-bottom:1em; min-height: 3em;"></div>
      
      <!-- Container for 1P mode -->
      <div id="single-player-container"></div>

      <!-- Container for 2P side-by-side mode -->
      <div id="side-by-side-container">
        <div id="p1-options-container" class="player-options-container"></div>
        <div id="p2-options-container" class="player-options-container"></div>
      </div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen" role="main">
      <h1 id="end-title">Game Over</h1>
      <h2 id="results-summary" style="color: var(--gold-color);"></h2>
      <div id="final-results-container">
          <!-- Player result cards will be injected here -->
      </div>
      
      <div class="results-container" id="leaderboard-container">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list"></ol>
      </div>

      <button id="play-again-btn">Play Again</button>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script>
    // --- Feature Detection & User Feedback ---
    function checkFeatures() {
      let msg = '';
      if (!('speechSynthesis' in window)) msg += 'Speech Synthesis not supported. ';
      if (typeof Tone === 'undefined') msg += 'Sounds disabled (Tone.js not loaded). ';
      if (msg) {
        $('feature-warning').textContent = msg;
        $('feature-warning').style.display = 'block';
      }
    }
    checkFeatures();

    // --- Data & Utility Functions ---
    const badgeData = {
      'A2_COMPLETE': { name: 'A2 Navigator', icon: '🗺️' },
      'B1_COMPLETE': { name: 'B1 Coordinator', icon: '📅' },
      'B2_COMPLETE': { name: 'B2 Planner', icon: '📋' },
      'STREAK_5': { name: 'On a Roll', icon: '👍'},
      'STREAK_10': { name: 'In the Zone', icon: '🔥' }, 
      'PERFECT_LEVEL': { name: 'Perfect Itinerary', icon: '🎯' },
      'GAME_COMPLETE': { name: 'Logistics Guru', icon: '🧑‍⚖️' },
      'QUICK_THINKER': { name: 'On the Dot', icon: '⏰' }
    };

    const correctFeedback = ["That's right!", "You got it!", "Excellent!", "Perfect!", "Great listening!", "You're on fire!"];
    const incorrectFeedback = ["Not quite!", "Listen carefully to the new location!", "Keep trying!", "Don't give up!", "You'll get the next one!"];
    
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    
    /**
     * Generates a listening comprehension question about a location change.
     * The complexity of the location change increases with the difficulty level.
     *
     * @param {string} difficulty - The difficulty level ('A2', 'B1', 'B2').
     * @returns {{announcement: string, options: string[], correctAnswer: string}}
     * An object containing the announcement text, a list of location options,
     * and the correct location.
     */
    function generateLocationData(difficulty) {
        const PLACES = ["the library", "the park", "the community center", "town hall", "the stadium", "the museum", "the cafe", "the bookstore", "the university", "the auditorium", "the gallery", "the theater", "conference room a", "the main hall", "the gymnasium", "room 201", "the west wing", "the student union", "the recital hall", "the science lab"];
        const EVENTS = ["meeting", "workshop", "seminar", "gathering", "presentation", "briefing", "lecture", "conference", "ceremony", "rehearsal", "orientation"];
        const TIMES = ["1:00", "1:30", "2:00", "2:30", "3:00", "3:30", "4:00", "4:30", "5:00"];
        const DAYS = ["monday", "tuesday", "wednesday", "thursday", "friday"];

        // Helper to get a specified number of unique random elements from an array
        const getRandomUniqueElements = (arr, count) => {
            const shuffled = [...arr].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        };

        const difficultyConfig = {
            'A2': { // Formerly A1
                templates: [
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} at ${p1} is moved. It is now at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Change of plans for the ${evt} at ${p1}. We will meet at ${p2} instead.`,
                    (evt, p1, p2, day, timeOfDay) => `Hello, the ${evt} is not at ${p1}. Please go to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `This is an announcement for the ${evt}. The location is now ${p2}, not ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${day} ${evt} was in ${p1}, but has a new room. It is in ${p2} now.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} is at a new place. Go to ${p2} instead of ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `For the ${evt}, please go to ${p2}, not ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `The location for the ${evt} is not ${p1}. It is ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Attention: The ${evt} will be in ${p2}, moving from ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} on ${day} has moved from ${p1} to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Update: The ${evt} previously at ${p1} is now at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `We changed the room for the ${evt}. It's in ${p2}, not ${p1} anymore.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} is no longer at ${p1}. Find us at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Please go to ${p2} for the ${evt}, which was scheduled for ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `The room for the ${evt} is now ${p2}, changed from ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `Attention please, the ${evt} is now in ${p2}, not ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `We are moving the ${evt} from ${p1} to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} is not here at ${p1}. It is in ${p2}.`
                ],
                placeCount: 2,
                distractorCount: 3, // Changed from 4 to 3
            },
            'B1': { // Formerly A2
                templates: [
                    (evt, p1, p2, day, timeOfDay) => `Attention everyone, the ${evt} planned for this ${timeOfDay} at ${p1} has been relocated to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Please note a schedule change. The ${evt} at ${p1} will now take place at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Just a quick update for everyone attending the ${evt} this ${timeOfDay}. We are no longer meeting in ${p1}, we will be in ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `There has been a last-minute change for the ${day} ${evt}. We've moved from ${p1} to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `Could I have your attention please? The ${timeOfDay}'s ${evt} that was in ${p1} has been moved to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} will not be in ${p1} as planned. The new venue is ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `We are moving the ${day} ${evt}. Instead of ${p1}, it will be in ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `For this ${timeOfDay}'s ${evt}, please proceed to ${p2}. The location has been updated from ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `This is an important message about the ${evt}. It was supposed to be at ${p1}, but we will now be at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${evt} has been switched from ${p1} to ${p2} for this ${timeOfDay}.`,
                    (evt, p1, p2, day, timeOfDay) => `We've had to change the location for the ${evt} from ${p1}. Please find us at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `The ${day} ${evt} is now in ${p2}, not ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `Please be advised that the ${evt}, originally at ${p1}, is now located at ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `A quick announcement: the ${evt} scheduled for ${p1} will be held in ${p2} instead.`,
                    (evt, p1, p2, day, timeOfDay) => `Let's move the ${evt} from ${p1} to ${p2} this ${timeOfDay}.`,
                    (evt, p1, p2, day, timeOfDay) => `Just a heads-up, the ${evt} has been moved from ${p1} to ${p2}.`,
                    (evt, p1, p2, day, timeOfDay) => `We've had a room change for the ${evt}. Please go to ${p2} instead of ${p1}.`,
                    (evt, p1, p2, day, timeOfDay) => `The location for the ${evt} has been updated from ${p1}. It's now in ${p2}.`
                ],
                placeCount: 2,
                distractorCount: 3, // Changed from 4 to 3
            },
            'B2': { // Formerly B1
                templates: [
                    // --- 3-place templates (formerly B1) ---
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `Regarding the ${evt}: it was first scheduled for ${p1}, then moved to ${p2}, but the final location will be ${p3}.`, placeCount: 3 },
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `There's been a couple of changes for the ${evt}. We thought it would be in ${p2} after moving from ${p1}, but now we've settled on ${p3}.`, placeCount: 3 },
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `For the ${evt} this ${timeOfDay}, please disregard previous notices about ${p1} and ${p2}. The event will now take place in ${p3}.`, placeCount: 3 },
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `This is an update for the ${day} ${evt}. The original location was ${p1}, and while we briefly considered ${p2}, we will be meeting in ${p3}.`, placeCount: 3 },
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `We've had to make another alteration to our plans. The ${evt} is no longer at ${p2}, where it was moved from ${p1}. We will now be gathering in ${p3}.`, placeCount: 3 },
                    { t: (evt, p1, p2, p3, day, timeOfDay) => `Due to a booking mix-up, the ${evt} has been reassigned from ${p1}. We will not be in ${p2} either; the correct room is ${p3}.`, placeCount: 3 },
                    // --- 4-place templates (formerly B2/C1) ---
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `This is a final announcement for the ${evt}. It was originally in ${p1}, then moved to ${p2}, then to ${p3}. The final and confirmed location is now ${p4}.`, placeCount: 4 },
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `Your attention please. The ${evt} has been a moving target. We are no longer at ${p1}, ${p2}, or ${p3}. Please convene at ${p4}.`, placeCount: 4 },
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `We must inform all participants of the ${evt} of a critical update. Disregard all previous locations, including ${p1}, ${p2}, and ${p3}. The event's location is now ${p4}.`, placeCount: 4 },
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `To ensure the smooth execution of this ${timeOfDay}'s ${evt}, we have relocated the proceedings one last time. We are not at ${p2} or ${p3}. The final location, moved from ${p1}, is ${p4}.`, placeCount: 4 },
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `There has been one last modification to the itinerary for ${day}. The ${evt}, once at ${p1} and then ${p2}, will not be at ${p3}. It will be hosted in ${p4}.`, placeCount: 4 },
                    { t: (evt, p1, p2, p3, p4, day, timeOfDay) => `All attendees of the ${evt}, please note the final amended location. We have moved from ${p1}, through ${p2} and ${p3}, to our final destination: ${p4}.`, placeCount: 4 }
                ],
                distractorCount: 3, // Changed from 4 to 3
            }
        };

        let config = difficultyConfig[difficulty];
        if (!config) {
            console.warn(`Invalid difficulty level provided: ${difficulty}. Defaulting to A2.`);
            difficulty = 'A2';
            config = difficultyConfig[difficulty];
        }

        const event = getRandomUniqueElements(EVENTS, 1)[0];
        const day = getRandomUniqueElements(DAYS, 1)[0];
        const time = getRandomUniqueElements(TIMES, 1)[0];
        const timeOfDay = parseInt(time.split(':')[0]) < 12 ? 'morning' : 'afternoon';

        let placeCount;
        let template;

        if (difficulty === 'B2') {
            const selectedTemplateObj = getRandomUniqueElements(config.templates, 1)[0];
            template = selectedTemplateObj.t;
            placeCount = selectedTemplateObj.placeCount;
        } else {
            template = getRandomUniqueElements(config.templates, 1)[0];
            placeCount = config.placeCount;
        }

        const places = getRandomUniqueElements(PLACES, placeCount);
        const correctLocation = places[places.length - 1];
        const mentionedDistractors = places.slice(0, places.length - 1);
        const announcement = template(event, ...places, day, timeOfDay);
        const remainingPlaces = PLACES.filter(p => !places.includes(p));
        const otherDistractors = getRandomUniqueElements(
            remainingPlaces, 
            config.distractorCount - mentionedDistractors.length
        );

        const allDistractors = [...mentionedDistractors, ...otherDistractors];
        const options = [correctLocation, ...allDistractors];
        
        return {
            announcement,
            options: shuffleArray(options),
            correctAnswer: correctLocation
        };
    }

    // --- Game State ---
    let game = {};
    const QUESTIONS_PER_LEVEL = 25;
    const TOTAL_GAME_TIME = 600; // 10 min
    const QUESTION_TIME_LIMIT = 30; // 30 seconds per question

    // --- Audio Setup ---
    let synth, streakSynth;
    if (typeof Tone !== 'undefined') {
      synth = new Tone.PolySynth(Tone.Synth).toDestination();
      streakSynth = new Tone.FMSynth({
            harmonicity: 3,
            modulationIndex: 10,
            envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 },
            modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 }
        }).toDestination();
    }
    function playCorrectSound() { if (synth) synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", Tone.now()); }
    function playIncorrectSound() { if (synth) synth.triggerAttackRelease(["C3", "C#3"], "8n", Tone.now()); }
    function playStreakSound() { if (streakSynth) streakSynth.triggerAttackRelease("C6", "8n", Tone.now()); }
    function playLevelUpSound() {
      if (!synth) return;
      const now = Tone.now();
      synth.triggerAttackRelease("C4", "8n", now);
      synth.triggerAttackRelease("E4", "8n", now + 0.1);
      synth.triggerAttackRelease("G4", "8n", now + 0.2);
    }
    
    // --- Speech Synthesis ---
    let voices = [];
    function loadVoices() {
      voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
    }
    
    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices(); // Initial attempt
    }

    function getNextVoice() {
      if (voices.length === 0) {
        loadVoices(); 
        if (voices.length === 0) return null;
      }
      const preferredVoices = voices.filter(v => v.name.includes('Natural') || v.name.includes('Google'));
      const voicePool = preferredVoices.length > 0 ? preferredVoices : voices;
      
      if (voicePool.length === 0) return null; // Fix: Prevent NaN error

      voiceIndex = (voiceIndex + 1) % voicePool.length;
      return voicePool[voiceIndex];
    }
    let voiceIndex = 0;

    // --- DOM Elements ---
    const $ = s => document.getElementById(s);
    const startForm = $('start-form'), gameScreen = $('game-screen'), endScreen = $('end-screen');
    const feedback = $('feedback');
    const challengeScript = $('challenge-script');
    const progressBar = $('progress-bar'), errorMessage = $('error-message');
    const singlePlayerContainer = $('single-player-container');
    const sideBySideContainer = $('side-by-side-container');
    const p1OptionsContainer = $('p1-options-container');
    const p2OptionsContainer = $('p2-options-container');

    const hud = {
      p1Score: $('hud-p1-score'),
      p2Score: $('hud-p2-score'),
      p1ScoreHud: $('p1-score-hud'),
      p2ScoreHud: $('p2-score-hud'),
      level: $('hud-level'),
      time: $('hud-time'),
      question: $('hud-question'),
      questionTime: $('hud-question-time'),
    };

    // --- Game Functions ---
    function showScreen(screen) {
      [startForm, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function formatTime(s) {
      s = Math.max(0, s);
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }

    function updateHUD() {
        hud.level.textContent = game.currentLevel;
        hud.time.textContent = formatTime(game.remainingTime);
        hud.question.textContent = game.questionCount + 1;
        hud.questionTime.textContent = game.questionTimeLeft;
        
        hud.p1ScoreHud.querySelector('.player-name').textContent = game.players[0].name;
        hud.p1Score.textContent = game.players[0].score;

        if (game.mode === '2P') {
            hud.p2ScoreHud.querySelector('.player-name').textContent = game.players[1].name;
            hud.p2Score.textContent = game.players[1].score;
        }
        
        progressBar.style.width = `${Math.max(0, (game.remainingTime / TOTAL_GAME_TIME) * 100)}%`;
    }

    function createPlayer(name) {
        return {
            name: name,
            score: 0,
            correctAnswers: 0,
            consecutiveCorrect: 0,
            badges: new Set(),
            questionsAttempted: 0
        };
    }

    function resetGame() {
        const p1Name = $('player-1-name-input').value.trim() || 'Player 1';
        const gameMode = document.querySelector('.mode-btn.selected').dataset.mode;
        
        game = {
            mode: gameMode,
            players: [createPlayer(p1Name)],
            selectedLevel: $('selected-level-input').value,
            currentLevel: $('selected-level-input').value,
            questionCount: 0,
            levelQuestionCount: 0,
            startTime: Date.now(),
            remainingTime: TOTAL_GAME_TIME,
            timerID: null,
            questionTimeLeft: QUESTION_TIME_LIMIT,
            questionTimerID: null,
            isFinished: false,
            challenge: null,
            answerLocked: false,
        };

        if (game.mode === '2P') {
            const p2Name = $('player-2-name-input').value.trim() || 'Player 2';
            game.players.push(createPlayer(p2Name));
        }
    }

    function startGame() {
      resetGame();
      showScreen(gameScreen);
      
      if (game.mode === '1P') {
          singlePlayerContainer.style.display = 'block';
          sideBySideContainer.style.display = 'none';
          hud.p2ScoreHud.style.display = 'none';
          hud.p1ScoreHud.classList.add('active-player');
      } else { // 2P mode
          singlePlayerContainer.style.display = 'none';
          sideBySideContainer.style.display = 'flex';
          hud.p2ScoreHud.style.display = 'inline-block';
          hud.p1ScoreHud.classList.remove('active-player');
          p1OptionsContainer.innerHTML = `<h3>${game.players[0].name}</h3>`;
          p2OptionsContainer.innerHTML = `<h3>${game.players[1].name}</h3>`;
      }


      feedback.textContent = '';
      challengeScript.textContent = '';
      updateHUD();
      startTimer();
      nextChallenge();
    }

    function startTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = setInterval(() => {
        game.remainingTime--;
        updateHUD();
        if (game.remainingTime <= 0) finishGame("Time's Up!");
      }, 1000);
    }

    function stopTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = null;
    }

    function startQuestionTimer() {
        stopQuestionTimer();
        game.questionTimeLeft = QUESTION_TIME_LIMIT;
        updateHUD();
        game.questionTimerID = setInterval(() => {
            game.questionTimeLeft--;
            updateHUD();
            if (game.questionTimeLeft <= 0) {
                handleTimeout();
            }
        }, 1000);
    }

    function stopQuestionTimer() {
        if (game.questionTimerID) clearInterval(game.questionTimerID);
        game.questionTimerID = null;
    }

    function nextChallenge() {
      game.answerLocked = false;
      feedback.textContent = '';
      challengeScript.textContent = '';
      
      const levelOrder = ['A2', 'B1', 'B2'];
      const currentLevelIndex = levelOrder.indexOf(game.currentLevel);

      if (game.levelQuestionCount >= QUESTIONS_PER_LEVEL && currentLevelIndex < levelOrder.length - 1) {
          game.currentLevel = levelOrder[currentLevelIndex + 1];
          game.levelQuestionCount = 0;
          playLevelUpSound();
          feedback.textContent = `LEVEL UP! Now on ${game.currentLevel}`;
      }

      const questionData = generateLocationData(game.currentLevel);
      game.challenge = {
          script: questionData.announcement,
          favorite: questionData.correctAnswer,
          options: questionData.options
      };
      
      setTimeout(() => {
        playClueAudio(game.challenge.script, () => {
            startQuestionTimer();
        });
      }, 200);

      displayOptions();
      updateHUD();
    }

    function displayOptions() {
        const challenge = game.challenge;
        const options = shuffleArray([...challenge.options]);

        const createButton = (option, playerIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = option.replace(/^the /i, '');
            btn.dataset.option = option;
            btn.dataset.playerIndex = playerIndex;
            return btn;
        };

        if (game.mode === '1P') {
            singlePlayerContainer.innerHTML = '';
            options.forEach(option => {
                singlePlayerContainer.appendChild(createButton(option, 0));
            });
        } else { // 2P mode
            p1OptionsContainer.innerHTML = `<h3>${game.players[0].name}</h3>`;
            p2OptionsContainer.innerHTML = `<h3>${game.players[1].name}</h3>`;
            options.forEach(option => {
                p1OptionsContainer.appendChild(createButton(option, 0));
                p2OptionsContainer.appendChild(createButton(option, 1));
            });
        }
    }
    
    function createFlyingTokens(playerIndex) {
        const scoreBox = playerIndex === 0 ? hud.p1ScoreHud.getBoundingClientRect() : hud.p2ScoreHud.getBoundingClientRect();
        const targetX = scoreBox.left + scoreBox.width / 2;
        const targetY = scoreBox.top + scoreBox.height / 2;

        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                const token = document.createElement('div');
                token.className = 'token';
                document.body.appendChild(token);

                const startX = Math.random() * window.innerWidth;
                const startY = window.innerHeight - 50;

                token.style.left = `${startX}px`;
                token.style.top = `${startY}px`;
                token.style.setProperty('--target-x', `${targetX}px`);
                token.style.setProperty('--target-y', `${targetY}px`);

                setTimeout(() => {
                    token.remove();
                }, 1000);
            }, i * 50);
        }
    }

    function handleTimeout() {
        if (game.answerLocked) return;
        game.answerLocked = true;
        stopQuestionTimer();

        feedback.textContent = "⏱️ Time's up!";
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        challengeScript.innerHTML = `The correct announcement was:<br><em>"${game.challenge.script}"</em>`;
        
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        game.questionCount++;
        game.levelQuestionCount++;
        setTimeout(nextChallenge, 3000);
    }

    function handleGuess(selected, playerIndex, btn) {
      if (game.answerLocked) return;
      game.answerLocked = true;
      stopQuestionTimer();

      const answerTime = (Date.now() - game.questionStartTime) / 1000;
      const currentPlayer = game.players[playerIndex];
      currentPlayer.questionsAttempted++;
      
      const feedbackPrefix = game.mode === '2P' ? `${currentPlayer.name} was ` : '';

      if (selected === game.challenge.favorite) {
        const praise = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
        feedback.textContent = feedbackPrefix + praise.toLowerCase();
        playFeedbackAudio(praise);

        feedback.className = "feedback-display feedback-correct";
        challengeScript.textContent = '';
        
        if (currentPlayer.consecutiveCorrect >= 10) {
            playStreakSound();
        } else {
            playCorrectSound();
        }
        
        createFlyingTokens(playerIndex);
        if (btn) btn.classList.add('correct');
        currentPlayer.score += 4;
        currentPlayer.correctAnswers++;
        currentPlayer.consecutiveCorrect++;
        
        if (currentPlayer.consecutiveCorrect > 0 && currentPlayer.consecutiveCorrect % 10 === 0) {
            checkBadge('STREAK_10', currentPlayer);
        } else if (currentPlayer.consecutiveCorrect > 0 && currentPlayer.consecutiveCorrect % 5 === 0) {
            checkBadge('STREAK_5', currentPlayer);
        }

        if (answerTime < 3.0) {
            checkBadge('QUICK_THINKER', currentPlayer);
        }

      } else {
        feedback.textContent = feedbackPrefix + "incorrect. " + incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        if (btn) btn.classList.add('incorrect');
        currentPlayer.score = Math.max(0, currentPlayer.score - 2);
        currentPlayer.consecutiveCorrect = 0;
        challengeScript.innerHTML = `The correct announcement was:<br><em>"${game.challenge.script}"</em>`;
      }
      
      // Disable all buttons
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      
      game.questionCount++;
      game.levelQuestionCount++;

      setTimeout(nextChallenge, 3000);
      updateHUD();
    }

    function checkBadge(badge, player) {
      if (!player.badges.has(badge) && badgeData[badge]) {
        player.badges.add(badge);
      }
    }

    function finishGame(title) {
        stopTimer();
        stopQuestionTimer();
        game.isFinished = true;
        
        $('end-title').textContent = title;
        const finalResultsContainer = $('final-results-container');
        finalResultsContainer.innerHTML = '';
        const timeTaken = TOTAL_GAME_TIME - game.remainingTime;

        if(game.mode === '2P') {
            const p1 = game.players[0];
            const p2 = game.players[1];
            let summaryText = '';
            if (p1.score > p2.score) {
                summaryText = `${p1.name} wins!`;
            } else if (p2.score > p1.score) {
                summaryText = `${p2.name} wins!`;
            } else {
                summaryText = "It's a tie!";
            }
            $('results-summary').textContent = summaryText;
        } else {
            $('results-summary').textContent = 'Your Results';
        }

        game.players.forEach(player => {
            if (player.correctAnswers === player.questionsAttempted && player.questionsAttempted > 0) {
                checkBadge('PERFECT_LEVEL', player);
                playLevelUpSound();
            }
            checkBadge(game.currentLevel + '_COMPLETE', player);
            checkBadge('GAME_COMPLETE', player);

            finalResultsContainer.innerHTML += createPlayerResultCard(player, timeTaken);
            saveScoreToLeaderboard(player, timeTaken);
        });
        
        displayLeaderboard();
        showScreen(endScreen);
    }
    
    function createPlayerResultCard(player, timeTaken) {
        const questionsAttempted = player.questionsAttempted > 0 ? player.questionsAttempted : 1;
        const accuracy = ((player.correctAnswers / questionsAttempted) * 100).toFixed(1) + "%";
        
        let badgesHTML = '';
        if (player.badges.size === 0) {
            badgesHTML = '<p style="font-size:0.9em; color:var(--text-dark)">No badges earned this round.</p>';
        } else {
            for (const badgeId of player.badges) {
                const badge = badgeData[badgeId];
                if (badge) {
                    badgesHTML += `<div class="badge"><div class="badge-icon">${badge.icon}</div><div class="badge-name">${badge.name}</div></div>`;
                }
            }
        }

        return `
        <div class="results-container">
            <h2>${player.name}</h2>
            <div class="stats-grid">
                <div class="stat-item"><h4>Score</h4><p>${player.score}</p></div>
                <div class="stat-item"><h4>Time Taken</h4><p>${formatTime(timeTaken)}</p></div>
                <div class="stat-item"><h4>Correct</h4><p>${player.correctAnswers}/${player.questionsAttempted}</p></div>
                <div class="stat-item"><h4>Accuracy</h4><p>${accuracy}</p></div>
            </div>
            <h4>Badges Earned</h4>
            <div class="badges-grid">${badgesHTML}</div>
        </div>`;
    }

    function saveScoreToLeaderboard(player, timeTaken) {
        try {
            const newScore = {
                name: player.name,
                score: player.score,
                time: timeTaken,
                level: game.selectedLevel
            };
            let leaderboard = JSON.parse(localStorage.getItem('locationListenUpLeaderboard')) || [];
            leaderboard.push(newScore);
            leaderboard.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.time - b.time;
            });
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('locationListenUpLeaderboard', JSON.stringify(leaderboard));
        } catch (e) {
            console.error("Could not save to leaderboard:", e);
        }
    }

    function displayLeaderboard() {
        const leaderboardList = $('leaderboard-list');
        leaderboardList.innerHTML = '';
        try {
            const leaderboard = JSON.parse(localStorage.getItem('locationListenUpLeaderboard')) || [];
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<p>No scores yet. Be the first!</p>';
                return;
            }
            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="leaderboard-rank">${index + 1}.</span>
                    <span class="leaderboard-name">${entry.name}</span>
                    <span class="leaderboard-level">${entry.level}</span>
                    <span class="leaderboard-score">${entry.score} pts</span>
                    <span class="leaderboard-time">${formatTime(entry.time)}</span>
                `;
                leaderboardList.appendChild(li);
            });
        } catch (e) {
            leaderboardList.innerHTML = '<p>Could not load leaderboard.</p>';
            console.error("Could not display leaderboard:", e);
        }
    }
    
    function playFeedbackAudio(text) {
        if (!('speechSynthesis' in window) || speechSynthesis.speaking) {
            return; 
        }
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = getNextVoice();
        if (!utter.voice) return;
        utter.rate = 0.85; // Slow down speech
        speechSynthesis.speak(utter);
    }

    function playClueAudio(text, onend) {
      if (!('speechSynthesis' in window)) {
        console.warn("Speech synthesis not supported.");
        if (onend) setTimeout(onend, 0);
        return;
      }
      
      if (voices.length === 0) {
        loadVoices();
        if (voices.length === 0) {
          console.warn("Speech synthesis voices not available. Retrying in a moment.");
          setTimeout(() => playClueAudio(text, onend), 250); // Retry
          return;
        }
      }

      speechSynthesis.cancel(); 

      const utter = new SpeechSynthesisUtterance(text);
      utter.voice = getNextVoice();
      
      if (!utter.voice) {
          console.error("Speech synthesis error: No suitable voice found.");
          if (onend) setTimeout(onend, 0); // Don't stall game
          return;
      }
      
      utter.rate = 0.85; // Slow down speech

      utter.onend = () => {
        if (onend) onend();
      };
      utter.onerror = (e) => {
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
            console.error("Speech synthesis error:", e.error);
        }
        if (onend) onend(); // Ensure game continues
      };
      
      speechSynthesis.speak(utter);
    }

    // --- UI Event Handlers ---
    function setupEventListeners() {
        $('game-mode-selection').addEventListener('click', e => {
            if (e.target.classList.contains('mode-btn')) {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
                e.target.classList.add('selected');
                const is2P = e.target.dataset.mode === '2P';
                $('player-2-input-container').style.display = is2P ? 'block' : 'none';
            }
        });

        $('level-selection').addEventListener('click', e => {
            if (e.target.classList.contains('level-btn')) {
                document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
                e.target.classList.add('selected');
                $('selected-level-input').value = e.target.dataset.level;
                errorMessage.style.display = 'none';
            }
        });

        startForm.addEventListener('submit', async e => {
            e.preventDefault();
            const selectedLevel = $('selected-level-input').value;
            if (!selectedLevel) {
                errorMessage.textContent = "Please select a level to start.";
                errorMessage.style.display = 'block';
                return;
            }
            if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
                await Tone.start();
            }
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const warmUp = new SpeechSynthesisUtterance('');
                speechSynthesis.speak(warmUp);
            }
            startGame();
        });

        $('play-again-btn').addEventListener('click', () => {
            showScreen(startForm);
            $('player-1-name-input').focus();
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
            $('selected-level-input').value = '';
        });

        const handleOptionClick = (e) => {
            if (e.target && e.target.classList.contains('option-btn')) {
                const button = e.target;
                const option = button.dataset.option;
                const playerIndex = parseInt(button.dataset.playerIndex, 10);
                handleGuess(option, playerIndex, button);
            }
        };

        singlePlayerContainer.addEventListener('click', handleOptionClick);
        p1OptionsContainer.addEventListener('click', handleOptionClick);
        p2OptionsContainer.addEventListener('click', handleOptionClick);
    }
    
    window.onload = () => { 
        $('player-1-name-input').focus(); 
        setupEventListeners();
    };
  </script>
</body>
