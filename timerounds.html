<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Practice Timer</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html {
      height: 100%;
    }

    .app-wrapper {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: auto;
      animation: colorShift 30s ease-in-out infinite;
    }

    @keyframes colorShift {
      0% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      25% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
      50% { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
      75% { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
      100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    }

    .timer-container {
      background: white;
      border-radius: 30px;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    .title {
      font-size: 3rem;
      color: #667eea;
      margin-bottom: 1rem;
      font-weight: bold;
      animation: titleColorShift 30s ease-in-out infinite;
    }

    @keyframes titleColorShift {
      0% { color: #667eea; }
      25% { color: #f5576c; }
      50% { color: #00f2fe; }
      75% { color: #38f9d7; }
      100% { color: #667eea; }
    }

    .instructions {
      font-size: 1.5rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .round-display {
      font-size: 2rem;
      color: #764ba2;
      font-weight: bold;
      margin-bottom: 2rem;
    }

    .settings-section {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .setting-item label {
      font-size: 1.3rem;
      color: #333;
      font-weight: 600;
    }

    .setting-item input {
      padding: 1rem 1.5rem;
      font-size: 2rem;
      font-weight: bold;
      border: 3px solid #667eea;
      border-radius: 15px;
      text-align: center;
      width: 120px;
      outline: none;
      transition: all 0.3s ease;
    }

    .setting-item input:focus {
      border-color: #764ba2;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
    }

    .timer-display {
      font-size: 8rem;
      font-weight: bold;
      color: #667eea;
      margin: 2rem 0;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      animation: timerColorShift 30s ease-in-out infinite;
    }

    @keyframes timerColorShift {
      0% { color: #667eea; }
      25% { color: #f5576c; }
      50% { color: #00f2fe; }
      75% { color: #38f9d7; }
      100% { color: #667eea; }
    }

    .timer-display.rotation {
      color: #ff6b6b;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .status-message {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .status-message.rotation {
      color: #ff6b6b;
      animation: shake 0.5s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .progress-bar {
      width: 100%;
      height: 40px;
      background: #e9ecef;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 1s linear;
      border-radius: 20px;
      animation: progressColorShift 30s ease-in-out infinite;
    }

    @keyframes progressColorShift {
      0% { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); }
      25% { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); }
      50% { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); }
      75% { background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%); }
      100% { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); }
    }

    .progress-fill.rotation {
      background: linear-gradient(90deg, #ff6b6b 0%, #ff8e53 100%);
    }

    .start-btn {
      padding: 2rem 4rem;
      font-size: 2rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      animation: buttonColorShift 30s ease-in-out infinite;
    }

    @keyframes buttonColorShift {
      0% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      25% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
      50% { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
      75% { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
      100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    }

    .control-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .control-btn {
      padding: 1.5rem 3rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .control-btn.pause {
      background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
    }

    .control-btn.reset {
      background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
    }

    .completion-screen {
      display: none;
    }

    .completion-screen.active {
      display: block;
    }

    .completion-title {
      font-size: 4rem;
      color: #28a745;
      font-weight: bold;
      margin-bottom: 2rem;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .completion-message {
      font-size: 2rem;
      color: #667eea;
      margin-bottom: 2rem;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s ease-out forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    .rounds-overview {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .round-indicator {
      padding: 1rem;
      background: #e9ecef;
      border-radius: 10px;
      font-weight: bold;
      color: #999;
      border: 3px solid transparent;
    }

    .round-indicator.completed {
      background: #d4edda;
      color: #28a745;
      border-color: #28a745;
    }

    .round-indicator.active {
      background: #cfe2ff;
      color: #0d6efd;
      border-color: #0d6efd;
      animation: glow 1.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(13, 110, 253, 0.5); }
      50% { box-shadow: 0 0 20px rgba(13, 110, 253, 0.8); }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper">
   <div class="timer-container">
    <div id="start-screen">
     <p class="instructions" id="instruction-text">Practice speaking with your partner for 5 minutes each round</p>
     <div class="settings-section">
      <div class="setting-item"><label for="rounds-input">Number of Rounds:</label> <input type="number" id="rounds-input" min="1" max="20" value="7">
      </div>
      <div class="setting-item"><label for="duration-input">Minutes per Round:</label> <input type="number" id="duration-input" min="1" max="30" value="5">
      </div>
     </div>
     <div class="round-display" id="summary-display">
      7 Rounds × 5 Minutes = 35 Minutes
     </div><button class="start-btn" id="start-btn">🎯 Start Practice Session</button>
    </div>
    <div id="timer-screen" style="display: none;">
     <div class="rounds-overview" id="rounds-overview"></div>
     <div class="round-display" id="round-display">
      Round 1 of 7
     </div>
     <div class="status-message" id="status-message">
      Practice Time!
     </div>
     <div class="timer-display" id="timer-display">
      5:00
     </div>
     <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
     </div>
     <div class="control-buttons"><button class="control-btn pause" id="pause-btn">⏸️ Pause</button> <button class="control-btn reset" id="reset-btn">🔄 Reset</button>
     </div>
    </div>
    <div id="completion-screen" class="completion-screen">
     <div class="completion-title">
      🎉 Amazing Work!
     </div>
     <div class="completion-message">
      All 7 rounds completed!
     </div>
     <div class="completion-message">
      Total practice time: 35 minutes
     </div><button class="start-btn" id="restart-btn">🔄 Start New Session</button>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      title_text: "Partner Practice Timer",
      instruction_text: "Practice speaking with your partner for 5 minutes each round",
      background_color: "#667eea",
      accent_color: "#764ba2",
      font_family: "Segoe UI"
    };

    const ROTATION_TIME = 10; // 10 seconds
    
    let PRACTICE_TIME = 300; // 5 minutes in seconds (default)
    let TOTAL_ROUNDS = 7; // default

    let currentRound = 1;
    let timeRemaining = PRACTICE_TIME;
    let isRotation = false;
    let isPaused = false;
    let timerInterval = null;
    let audioContext = null;
    let completedRounds = 0;

    function init() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      
      document.getElementById('start-btn').addEventListener('click', startSession);
      document.getElementById('pause-btn').addEventListener('click', togglePause);
      document.getElementById('reset-btn').addEventListener('click', resetSession);
      document.getElementById('restart-btn').addEventListener('click', restartSession);
      
      document.getElementById('rounds-input').addEventListener('input', updateSummary);
      document.getElementById('duration-input').addEventListener('input', updateSummary);

      createRoundIndicators();
    }

    function updateSummary() {
      const rounds = parseInt(document.getElementById('rounds-input').value) || 7;
      const duration = parseInt(document.getElementById('duration-input').value) || 5;
      const total = rounds * duration;
      
      document.getElementById('summary-display').textContent = 
        `${rounds} Rounds × ${duration} Minutes = ${total} Minutes`;
    }

    function createRoundIndicators() {
      const container = document.getElementById('rounds-overview');
      container.innerHTML = '';
      
      for (let i = 1; i <= TOTAL_ROUNDS; i++) {
        const indicator = document.createElement('div');
        indicator.className = 'round-indicator';
        indicator.id = `round-${i}`;
        indicator.textContent = i;
        container.appendChild(indicator);
      }
    }

    function updateRoundIndicators() {
      for (let i = 1; i <= TOTAL_ROUNDS; i++) {
        const indicator = document.getElementById(`round-${i}`);
        indicator.classList.remove('active', 'completed');
        
        if (i < currentRound) {
          indicator.classList.add('completed');
        } else if (i === currentRound) {
          indicator.classList.add('active');
        }
      }
    }

    function startSession() {
      // Read user settings
      TOTAL_ROUNDS = parseInt(document.getElementById('rounds-input').value) || 7;
      const durationMinutes = parseInt(document.getElementById('duration-input').value) || 5;
      PRACTICE_TIME = durationMinutes * 60;
      
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('timer-screen').style.display = 'block';
      
      currentRound = 1;
      completedRounds = 0;
      isRotation = false;
      timeRemaining = PRACTICE_TIME;
      
      createRoundIndicators();
      updateRoundIndicators();
      updateDisplay();
      startTimer();
      playStartSound();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        if (!isPaused) {
          timeRemaining--;
          updateDisplay();

          // Play tick sound in last 10 seconds
          if (timeRemaining <= 10 && timeRemaining > 0) {
            playBeep(800, 0.05);
          }

          if (timeRemaining <= 0) {
            if (isRotation) {
              // Rotation finished, start next round
              isRotation = false;
              currentRound++;
              
              if (currentRound > TOTAL_ROUNDS) {
                endSession();
              } else {
                timeRemaining = PRACTICE_TIME;
                updateRoundIndicators();
                updateDisplay();
                playStartSound();
              }
            } else {
              // Practice round finished
              completedRounds++;
              playRotationSound();
              createMassiveEffects();
              
              if (currentRound < TOTAL_ROUNDS) {
                // Start rotation break
                isRotation = true;
                timeRemaining = ROTATION_TIME;
                updateDisplay();
              } else {
                // Last round completed
                endSession();
              }
            }
          }
        }
      }, 1000);
    }

    function updateDisplay() {
      const timerDisplay = document.getElementById('timer-display');
      const statusMessage = document.getElementById('status-message');
      const roundDisplay = document.getElementById('round-display');
      const progressFill = document.getElementById('progress-fill');

      // Update round display
      roundDisplay.textContent = `Round ${currentRound} of ${TOTAL_ROUNDS}`;

      // Update timer display
      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

      if (isRotation) {
        statusMessage.textContent = '🔄 Switch Partners Now!';
        statusMessage.classList.add('rotation');
        timerDisplay.classList.add('rotation');
        progressFill.classList.add('rotation');
        
        const progress = ((ROTATION_TIME - timeRemaining) / ROTATION_TIME) * 100;
        progressFill.style.width = progress + '%';
      } else {
        statusMessage.textContent = '';
        statusMessage.classList.remove('rotation');
        timerDisplay.classList.remove('rotation');
        progressFill.classList.remove('rotation');
        
        const progress = ((PRACTICE_TIME - timeRemaining) / PRACTICE_TIME) * 100;
        progressFill.style.width = progress + '%';
      }
    }

    function togglePause() {
      isPaused = !isPaused;
      const pauseBtn = document.getElementById('pause-btn');
      
      if (isPaused) {
        pauseBtn.textContent = '▶️ Resume';
      } else {
        pauseBtn.textContent = '⏸️ Pause';
      }
    }

    function resetSession() {
      if (timerInterval) clearInterval(timerInterval);
      
      document.getElementById('timer-screen').style.display = 'none';
      document.getElementById('start-screen').style.display = 'block';
      
      isPaused = false;
      document.getElementById('pause-btn').textContent = '⏸️ Pause';
    }

    function restartSession() {
      document.getElementById('completion-screen').classList.remove('active');
      document.getElementById('start-screen').style.display = 'block';
    }

    function endSession() {
      if (timerInterval) clearInterval(timerInterval);
      
      document.getElementById('timer-screen').style.display = 'none';
      document.getElementById('completion-screen').classList.add('active');
      
      const totalMinutes = TOTAL_ROUNDS * (PRACTICE_TIME / 60);
      document.querySelector('.completion-screen .completion-message:nth-of-type(2)').textContent = 
        `Total practice time: ${totalMinutes} minutes`;
      
      createMassiveEffects();
      createMassiveEffects();
      createMassiveEffects();
      playCompletionSound();
    }

    function playBeep(freq, duration) {
      if (!audioContext) return;
      try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.15;
        osc.start();
        osc.stop(audioContext.currentTime + duration);
      } catch (e) {
        console.log('Audio error:', e);
      }
    }

    function playStartSound() {
      if (!audioContext) return;
      [440, 554, 659].forEach((freq, i) => {
        setTimeout(() => playBeep(freq, 0.2), i * 100);
      });
    }

    function playRotationSound() {
      if (!audioContext) return;
      [659, 783, 880, 1046].forEach((freq, i) => {
        setTimeout(() => playBeep(freq, 0.15), i * 80);
      });
    }

    function playCompletionSound() {
      if (!audioContext) return;
      [523, 659, 784, 1046, 1319].forEach((freq, i) => {
        setTimeout(() => playBeep(freq, 0.3), i * 150);
      });
    }

    function createMassiveEffects() {
      // Create confetti
      for (let i = 0; i < 100; i++) {
        setTimeout(() => createConfetti(), i * 30);
      }
      
      // Create fireworks
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const x = Math.random() * window.innerWidth;
          const y = Math.random() * window.innerHeight * 0.5;
          createFirework(x, y);
        }, i * 200);
      }
    }

    function createConfetti() {
      const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff69b4'];
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      piece.style.left = Math.random() * window.innerWidth + 'px';
      piece.style.top = '-10px';
      piece.style.width = (Math.random() * 10 + 5) + 'px';
      piece.style.height = (Math.random() * 10 + 5) + 'px';
      piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      
      confetti.appendChild(piece);
      document.body.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 4000);
    }

    function createFirework(x, y) {
      const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500'];
      const particles = 40;
      
      for (let i = 0; i < particles; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.width = '8px';
        particle.style.height = '8px';
        particle.style.borderRadius = '50%';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '9999';
        
        const angle = (Math.PI * 2 * i) / particles;
        const velocity = 50 + Math.random() * 150;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        
        particle.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
        ], {
          duration: 1000 + Math.random() * 500,
          easing: 'ease-out'
        });
        
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 1500);
      }
    }

    async function onConfigChange(config) {
      const instructionElement = document.getElementById('instruction-text');
      
      if (instructionElement) {
        instructionElement.textContent = config.instruction_text || defaultConfig.instruction_text;
      }

      const customFont = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
      document.body.style.fontFamily = `${customFont}, ${baseFontStack}`;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => {
                config.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => {
                config.accent_color = value;
                window.elementSdk.setConfig({ accent_color: value });
              }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (value) => {
              config.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            }
          },
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["title_text", config.title_text || defaultConfig.title_text],
          ["instruction_text", config.instruction_text || defaultConfig.instruction_text]
        ])
      });
    }

    init();
  </script>
