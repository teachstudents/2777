<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CEFR Synonym Match Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts for modern look -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:wght@400;700&display=swap">
  <!-- Howler.js for cross-browser audio -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
  <style>
    :root {
      --bg-main: #181a21;
      --bg-accent1: #2d3142;
      --bg-accent2: #363e54;
      --primary: #ffd700;
      --secondary: #6ee7b7;
      --correct: #98ec65;
      --incorrect: #f87171;
      --badge: #38bdf8;
      --text-light: #f4f1ee;
      --token-move: cubic-bezier(.68,-0.55,.27,1.55);
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.8s;
      overflow: hidden; /* Prevent scrollbars from flashy awards */
    }
    .container {
      width: 98vw; max-width: 520px; min-height: 80vh;
      margin: 2vh auto;
      background: var(--bg-accent1);
      border-radius: 18px;
      box-shadow: 0 2px 24px 0 #000a;
      padding: 2rem 1rem;
      display: flex; flex-direction: column; align-items: center;
      transition: background 0.8s;
      position: relative;
      z-index: 1;
    }
    h1, h2 {
      margin: 0.2em 0 0.7em 0;
      letter-spacing: 1px;
      color: var(--primary);
      text-align: center;
    }
    .screen { display: none; }
    .screen.active { display: block; width: 100%; text-align: center; }
    .level-btn {
      background: var(--secondary);
      border: none;
      border-radius: 12px;
      color: #1d1d28;
      font-size: 1.1rem;
      font-weight: bold;
      margin: 0.5em 0.5em;
      padding: 0.8em 2.3em;
      box-shadow: 0 1px 4px #0003;
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .level-btn.selected, .level-btn:hover {
      background: var(--primary);
      color: #181a21;
      transform: scale(1.06);
    }
    .start-btn, .play-again-btn {
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: #1d1d28;
      font-size: 1.1rem;
      font-weight: bold;
      margin: 1em 0.5em 0 0;
      padding: 0.8em 2em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.18s;
      box-shadow: 0 2px 10px #0002;
    }
    .start-btn:disabled {
        background-color: #555;
        color: #999;
        cursor: not-allowed;
        transform: none;
    }
    .option-btn {
      display: block;
      width: 100%;
      margin: 0.45em 0;
      padding: 1em 0;
      font-size: 1.07em;
      background: var(--bg-accent2);
      color: var(--text-light);
      border: 2px solid transparent;
      border-radius: 11px;
      position: relative;
      transition: background 0.24s, color 0.24s, border 0.24s;
      overflow: hidden;
      cursor: pointer;
    }
    .option-btn.correct {
      background: var(--correct);
      color: #212121;
      border-color: #9fff7a;
      font-weight: bold;
    }
    .option-btn.incorrect {
      background: var(--incorrect);
      color: #fff;
      border-color: var(--incorrect);
      font-weight: bold;
    }
    @keyframes flash-correct { 50% { background: #d6fdbe;}}
    @keyframes flash-incorrect { 50% { background: #f87171; color: #fff;}}
    .flash-correct { animation: flash-correct 0.5s; }
    .flash-incorrect { animation: flash-incorrect 0.5s; }

    .hud {
      width: 100%; display: flex; flex-wrap: wrap;
      justify-content: space-between; align-items: center;
      background: #232439;
      padding: 0.4em 1em;
      border-radius: 8px;
      margin-bottom: 1.1em;
      font-size: 1.05em;
      box-sizing: border-box;
    }
    .hud-item { margin: 0.2em 0.7em; }
    #hud-timer, #hud-total-timer {
        font-weight: bold;
        transition: color 0.5s, transform 0.3s;
    }
    #hud-timer.low-time, #hud-total-timer.low-time {
        color: var(--incorrect);
        transform: scale(1.1);
    }
    .token-anim {
      position: absolute; left: 50%; top: 50%;
      font-size: 2em;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: coin-move 0.9s var(--token-move) forwards;
      z-index: 2;
    }
    @keyframes coin-move {
      0% { opacity: 1; transform: translate(-50%,-50%) scale(1);}
      30% { opacity: 1;}
      100% { opacity: 0; transform: translate(220%,-260%) scale(0.5);}
    }
    .feedback-display {
      font-size: 1.5em;
      min-height: 2em;
      margin-bottom: 0.5em;
      font-weight: bold;
      text-align: center;
      transition: color 0.25s;
    }
    .feedback-correct { color: #aefa4b;}
    .feedback-incorrect { color: var(--incorrect);}
    .badge {
      background: var(--badge);
      color: #fff;
      font-weight: bold;
      border-radius: 20px;
      padding: 0.3em 1.2em;
      margin: 0.2em 0.4em;
      font-size: 1em;
      display: inline-block;
      box-shadow: 0 0 8px #1e90ff77;
      animation: pop-badge 0.6s;
    }
    @keyframes pop-badge {
      0% { transform: scale(0); }
      70% { transform: scale(1.15);}
      100% { transform: scale(1);}
    }
    .results-container {
      background: var(--bg-accent2);
      padding: 2em 1em;
      border-radius: 13px;
      border: 2px solid #2c3a5b;
      width: 100%; max-width: 480px;
      margin: 1em auto;
      color: var(--text-light);
      text-align: center;
    }
    .reward-token {
      color: var(--primary);
      font-size: 2em;
      animation: spin 1.1s infinite linear;
      margin-left: 0.2em;
      display: inline-block; /* Fix for animation */
    }
    @keyframes spin {
      100% { transform: rotate(360deg);}
    }
    
    /* Big Flashing Award Styles */
    #award-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none; /* Changed to none */
        justify-content: center;
        align-items: center;
        z-index: 1000;
        text-align: center;
        color: white;
    }
    #award-overlay.show {
        display: flex; /* Show the overlay */
        animation: fadeIn 0.3s forwards;
    }
    .award-content {
        animation: big-flash 2.5s forwards;
    }
    .award-content h2 {
        font-size: 4rem;
        text-shadow: 0 0 10px #fff, 0 0 20px var(--primary), 0 0 30px var(--primary);
    }
    .award-content .emoji {
        font-size: 6rem;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes big-flash {
        0% { transform: scale(0.5); opacity: 0; }
        20% { transform: scale(1.2); opacity: 1; }
        40% { transform: scale(1.1); }
        80% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(0.8); opacity: 0; }
    }

    @media (max-width: 600px) {
      .container { padding: 1em 0.4em;}
      .results-container { padding: 1em 0.5em;}
      .hud { font-size: 0.85em;}
      .option-btn { font-size: 1em;}
      .award-content h2 { font-size: 2.5rem; }
      .award-content .emoji { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
      <h1>CEFR Synonym Match</h1>
      <p style="color:#fff3; font-size:1.08em; max-width: 400px; margin: 0 auto 1em;">Match synonyms for your chosen CEFR level. Earn points, tokens, badges, & praise!</p>
      <label for="player-name-input" style="color:var(--badge);font-size:1em;">Player Name</label>
      <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off" style="padding:0.7em 1em; border-radius:10px; border:1px solid #444; width:90%;font-size:1.1em; margin-bottom:1em; box-sizing: border-box;">
      <h2>Choose Level</h2>
      <div>
        <button class="level-btn" id="level-a12" data-level="A1A2">A1–A2 (Beginner)</button>
        <button class="level-btn" id="level-b12" data-level="B1B2">B1–B2 (Intermediate)</button>
        <button class="level-btn" id="level-c12" data-level="C1C2">C1–C2 (Advanced)</button>
      </div>
      <button class="start-btn" id="start-btn" disabled>Start Game</button>
    </div>
    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div class="hud" id="hud">
        <div class="hud-item"><b>Player:</b> <span id="hud-player">?</span></div>
        <div class="hud-item"><b>Level:</b> <span id="hud-level">?</span></div>
        <div class="hud-item"><b>Score:</b> <span id="hud-score">0</span></div>
        <div class="hud-item"><b>Tokens:</b> <span id="hud-tokens">0</span></div>
        <div class="hud-item"><b>Time:</b> <span id="hud-timer">10</span></div>
        <div class="hud-item"><b>Total Time:</b> <span id="hud-total-timer">10:00</span></div>
        <div class="hud-item"><b>Q:</b> <span id="hud-question">1/0</span></div>
      </div>
      <div class="feedback-display" id="feedback"></div>
      <h2 id="main-word"></h2>
      <div id="options-container" style="width: 95%; max-width: 450px; margin: 0 auto;"></div>
      <div id="badge-container" style="margin-top: 1em;"></div>
    </div>
    <!-- END SCREEN -->
    <div id="end-screen" class="screen">
      <h1 id="end-title">Game Over</h1>
      <div class="results-container">
        <h2 id="final-name">Player</h2>
        <div style="display:flex; flex-wrap:wrap; gap:1em; justify-content:center; align-items: center; margin:1em 0;">
          <div><strong>Score:</strong> <span id="final-score">0</span></div>
          <div><strong>Tokens:</strong> <span id="final-tokens">0</span> <span class="reward-token">🪙</span></div>
          <div><strong>Correct:</strong> <span id="final-correct">0</span></div>
        </div>
        <div id="final-badges" style="margin-top:1em; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5em;"></div>
      </div>
      <button class="play-again-btn" id="play-again-btn">Play Again</button>
    </div>
  </div>
  <!-- Big Flashing Award Overlay -->
  <div id="award-overlay">
      <div class="award-content">
          <div id="award-emoji" class="emoji"></div>
          <h2 id="award-text"></h2>
      </div>
  </div>

      shuffleArray([...q.options]).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => handleGuess(opt, btn, q);
        btn.tabIndex = 0;
        optionsContainer.appendChild(btn);
      });
      updateHUD();
      nextScreenColor();
      startQuestionTimer();
    }

    function handleGuess(selected, btn, q) {
      clearInterval(game.questionTimerId); // Stop the question timer
      Array.from(optionsContainer.children).forEach(b => b.disabled = true);
      let isCorrect = selected === q.synonym;

      if (isCorrect) {
        btn.classList.add('flash-correct');
        sounds.correct.play();
        showToken(btn);
        feedback.textContent = "✔️ Correct!";
        feedback.className = "feedback-display feedback-correct";
        speak(praiseRandom());
        
        game.tokens += 10 + Math.floor(Math.random() * 6);
        game.score++;
        game.correct++;
        
        if (game.correct === 25) awardBadge("Quarter Mark", "🎯", true);
        if (game.correct === 50) awardBadge("Halfway Hero", "🏆", true);
        if (game.correct === 75) awardBadge("Virtuoso", "🤩", true);

      } else {
        if (btn) btn.classList.add('flash-incorrect');
        const correctBtn = Array.from(optionsContainer.children).find(b => b.textContent === q.synonym);
        if(correctBtn) correctBtn.classList.add('correct');

        sounds.incorrect.play();
        const reason = selected === null ? "Time's up!" : "Incorrect!";
        feedback.textContent = `❌ ${reason} The answer was "${q.synonym}".`;
        feedback.className = "feedback-display feedback-incorrect";
        speak("Oops! Let's try that one again later.");
        game.score = Math.max(0, game.score - 1);
        
        if (selected !== null) {
            game.questionList.push(q);
        }
      }
      game.questionIndex++;
      updateHUD();
      setTimeout(nextQuestion, 2200);
    }

    function showToken(btn) {
      const coin = document.createElement('div');
      coin.className = 'token-anim';
      coin.textContent = '🪙';
      btn.appendChild(coin);
      sounds.coin.play();
      setTimeout(() => { coin.remove(); }, 900);
    }

    function updateHUD() {
      hud.player.textContent = game.playerName;
      hud.level.textContent = levelName(game.selectedLevel);
      hud.score.textContent = game.score;
      hud.tokens.textContent = game.tokens;
      const totalQuestions = game.questionList.length;
      const currentQuestion = Math.min(game.questionIndex + 1, totalQuestions);
      hud.question.textContent = `${currentQuestion}/${totalQuestions}`;
    }

    function finishGame(title) {
      clearInterval(game.questionTimerId);
      clearInterval(game.totalTimerId);
      resetScreenColor();
      showScreen(endScreen);
      $('end-title').textContent = title;
      finalName.textContent = game.playerName;
      finalScore.textContent = game.score;
      finalTokens.textContent = game.tokens;
      finalCorrect.textContent = `${game.correct}/${game.questionIndex}`;
      finalBadges.innerHTML = '';
      
      const accuracy = game.questionIndex > 0 ? (game.correct / game.questionIndex) * 100 : 0;

      if (accuracy === 100 && game.correct >= 100) {
        awardBadge("Perfectionist", "💯", true);
        sounds.applause.play();
        speak("Incredible! One hundred percent correct!");
      } else if (accuracy >= 80) {
        speak("Fantastic effort! You are a real synonym superstar!");
      }

      if (game.badges.length > 0) {
        game.badges.forEach(b => {
          const badgeEl = document.createElement('span');
          badgeEl.className = "badge";
          badgeEl.textContent = `${b.emoji} ${b.name}`;
          finalBadges.appendChild(badgeEl);
        });
      }
    }

    function praiseRandom() {
      const phrases = [
          "Excellent!", "Well done!", "Brilliant!", "Great job!", "That's correct!", "Nice!", "Keep it up!", "Awesome!",
          "You've got it!", "Superb!", "Fantastic!", "Perfect!", "You're a star!", "Amazing!", "Outstanding!", "That's the way!",
          "Unstoppable!", "Magnificent!", "You're on fire!", "Nailed it!"
      ];
      return phrases[Math.floor(Math.random() * phrases.length)];
    }

    function levelName(lvl) {
      if (lvl==='A1A2') return "A1-A2";
      if (lvl==='B1B2') return "B1-B2";
      if (lvl==='C1C2') return "C1-C2";
      return "?";
    }

    // --- Event Handlers ---
    let selectedLevel = null;
    levelBtns.forEach(btn => {
      btn.onclick = e => {
        levelBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLevel = btn.dataset.level;
        startBtn.disabled = !$('player-name-input').value.trim();
      }
    });

    $('player-name-input').addEventListener('input', () => {
        startBtn.disabled = !$('player-name-input').value.trim() || !selectedLevel;
    });

    startBtn.onclick = e => {
      const name = $('player-name-input').value.trim();
      if (!selectedLevel || !name) return;
      game.playerName = name;
      game.selectedLevel = selectedLevel;
      startGame();
    };

    playAgainBtn.onclick = () => {
      resetScreenColor();
      showScreen(startScreen);
      levelBtns.forEach(b => b.classList.remove('selected'));
      startBtn.disabled = true;
      selectedLevel = null;
    };

    // --- Initial Setup ---
    window.onload = () => { 
        $('player-name-input').focus(); 
        // Load voices for speech synthesis
        if ('speechSynthesis' in window) {
            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }
    };
</script>
</body>
</html>
