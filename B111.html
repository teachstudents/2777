<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Mitchell's B1 Listening Test - Test 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }
        .card {
            background-color: white;
            border-radius: 1.5rem;
            padding: 1.5rem; /* Reduced padding */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem; /* Reduced padding */
            font-size: 0.875rem; /* Smaller base font size */
            border-radius: 0.75rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-primary {
            background-color: #4f46e5;
            color: white;
            font-size: 1rem; /* Keep primary buttons larger */
            padding: 0.75rem 1.5rem;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #374151;
            border-color: #d1d5db;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #d1d5db;
        }
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .option-btn {
            flex: 1; /* Allow buttons to grow and fill space */
            background-color: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }
        .option-btn.selected {
            background-color: #6366f1;
            color: white;
            border-color: #4f46e5;
        }
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #059669;
        }
        .option-btn.incorrect {
            background-color: #ef4444;
            color: white;
            border-color: #dc2626;
        }
        #speaker-icon path {
            transition: fill 0.3s ease;
        }
        .speaking #speaker-icon {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="w-full max-w-3xl mx-auto">
        <!-- Start Screen -->
        <div id="start-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Joel Mitchell's B1 Listening - Test 11</h1>
            <div class="mb-6 w-full max-w-sm mx-auto">
                <label for="player-name-input" class="block text-gray-700 text-lg mb-2 font-medium">Enter your name to begin</label>
                <input type="text" id="player-name-input" class="w-full p-3 border border-gray-300 rounded-lg text-center text-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Player Name">
                <p id="name-error" class="text-red-500 text-sm mt-2 h-4"></p>
            </div>
            <p class="text-gray-600 mb-8 text-base">This is a 50-question test. Each correct answer is worth 2 points. The audio will play automatically for each group.</p>
            <button id="start-btn" class="btn btn-primary text-xl px-12 py-4">Start Test</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="card hidden">
            <div class="flex justify-between items-center mb-4">
                <div id="player-display" class="text-lg font-semibold text-gray-700 w-1/2 text-left truncate"></div>
                <div id="score" class="text-lg font-semibold text-indigo-600 w-1/2 text-right">Score: 0</div>
            </div>

            <div class="mb-6">
                 <button id="play-audio-btn" class="btn btn-secondary w-full mb-4">
                    <svg id="speaker-icon" class="w-6 h-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                    </svg>
                    <span id="play-audio-text">Replay Audio</span>
                </button>
                <div id="questions-container" class="space-y-4">
                    <!-- Questions for the group will be dynamically inserted here -->
                </div>
            </div>
            
            <div id="submission-area" class="mt-8 text-center">
                 <button id="submit-btn" class="btn btn-primary text-lg px-10 py-3">Submit Answers</button>
                 <button id="next-group-btn" class="btn btn-primary text-lg px-10 py-3 hidden">Next</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Test Complete!</h1>
            <p id="final-score" class="text-gray-600 mb-8 text-2xl"></p>
            <button id="restart-btn" class="btn btn-primary text-xl px-12 py-4">Play Again</button>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        const nameErrorEl = document.getElementById('name-error');
        const playerDisplayEl = document.getElementById('player-display');
        const playAudioBtn = document.getElementById('play-audio-btn');
        const playAudioText = document.getElementById('play-audio-text');
        const scoreEl = document.getElementById('score');
        const questionsContainer = document.getElementById('questions-container');
        const submitBtn = document.getElementById('submit-btn');
        const nextGroupBtn = document.getElementById('next-group-btn');
        const finalScoreEl = document.getElementById('final-score');

        // --- Audio Synths & Voice ---
        let correctSynth, incorrectSynth;
        let availableVoices = [];
        let isAudioReady = false;

        // --- Game State ---
        let score = 0;
        let currentGroupIndex = 0;
        let questionGroups = [];
        let playerName = '';
        let speechKeepAliveInterval;
        let globalQuestionCounter = 1;

        // --- Grouped Game Data (50 Questions) ---
        const gameData = [
            {
                audioscript: "My name is Sam, and I'm a baker from England. I own a small bakery in Bristol. This morning was frantic. I arrived at 4 AM as usual, but my main oven wouldn't turn on. I had a huge order of croissants due at 8 AM for a local hotel. I had to use my smaller, backup oven, which could only bake a few at a time. It was a race against the clock, but I managed to get the order ready by 8:15 AM, just a little late. The hotel manager was very understanding.",
                questions: [

                questions: [

                    { question: "What nationality was the group of tourists?", options: ["Spanish", "British", "American"], answer: "American" },
                    { question: "What time did the tour actually start?", options: ["10:00 AM", "10:15 AM", "10:45 AM"], answer: "10:45 AM" },
                    { question: "What part of the tour had to be skipped?", options: ["The Alfama district", "Lunch", "The castle visit"], answer: "The castle visit" },
                    { question: "What does 'abridge' mean in this context?", options: ["To make it longer", "To cancel it", "To shorten it"], answer: "To shorten it" }
                ]
            },
            {
                audioscript: "My name is Ben, and I'm a university student from the USA. I was supposed to fly to France last Tuesday for a study abroad program in Lyon. Unfortunately, I misread my flight time and arrived at the airport at 6 PM instead of 6 AM. I missed my flight. It was a calamitous mistake. I had to buy a new, very expensive ticket for a flight the next day, on Wednesday. I was so embarrassed to tell my parents. I finally arrived in Lyon a day late, but I'm here now.",
                questions: [

                    { question: "On which day did the speaker miss his flight?", options: ["Monday", "Tuesday", "Wednesday"], answer: "Tuesday" },
                    { question: "What was the reason for missing the flight?", options: ["His flight was cancelled", "He was stuck in traffic", "He misread the time"], answer: "He misread the time" },
                    { question: "What was the consequence of this mistake?", options: ["He cancelled his trip", "He had to buy a new ticket", "The airline gave him a free flight"], answer: "He had to buy a new ticket" },

                    { question: "What is the speaker's career?", options: ["Electrician", "Architect", "Project Manager"], answer: "Project Manager" },
                    { question: "In which city is the construction project?", options: ["London", "Belfast", "Dublin"], answer: "Dublin" },
                    { question: "What happened last Monday?", options: ["They ran out of materials", "The lead electrician took leave", "There was an accident"], answer: "The lead electrician took leave" },
                    { question: "What specific work is now delayed?", options: ["The painting", "The security system wiring", "The plumbing"], answer: "The security system wiring" },
                    { question: "What does 'bottleneck' mean in this context?", options: ["A point of congestion or blockage", "A period of fast progress", "A type of container"], answer: "A point of congestion or blockage" }
                ]
            },
            {
                audioscript: "My name is Yuki, and I'm a classical violinist from Japan. Last Saturday, I was performing a solo at a concert hall in Vienna, Austria. In the middle of a very fast and difficult piece, one of the strings on my violin suddenly snapped. It made a loud noise. It was a mortifying experience in front of a full audience. I had to stop, walk off stage, and replace the string, which took about five minutes. The audience was very patient and applauded when I returned. I managed to finish the performance, but my concentration was broken.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Pianist", "Violinist", "Singer"], answer: "Violinist" },
                    { question: "In which country was the concert?", options: ["Japan", "Germany", "Austria"], answer: "Austria" },
                    { question: "What was the problem during the performance?", options: ["The lights went out", "A string broke", "She forgot the music"], answer: "A string broke" },
                    { question: "What did the speaker have to do?", options: ["End the concert", "Borrow a violin", "Replace the string"], answer: "Replace the string" },
                    { question: "In the text, what does 'mortifying' mean?", options: ["Exciting", "Causing great embarrassment or shame", "Normal"], answer: "Causing great embarrassment or shame" }

            },
             {

                questions: [
                    { question: "What is the speaker's career?", options: ["Fisherman", "Chef", "Waiter"], answer: "Chef" },
                    { question: "What city is the restaurant in?", options: ["New York", "Miami", "New Orleans"], answer: "New Orleans" },
                    { question: "What was the problem with the delivery?", options: ["It was late", "It was the wrong ingredient", "It was not fresh"], answer: "It was the wrong ingredient" },
                    { question: "What did the speaker have to do?", options: ["Cancel the event", "Close the restaurant", "Change the menu"], answer: "Change the menu" },
                    { question: "What does 'hastily' mean in this context?", options: ["Carefully and slowly", "With excessive speed or urgency", "With help from others"], answer: "With excessive speed or urgency" }
                ]
            },
            {
                audioscript: "My name is Ingrid, and I'm a Swedish event planner. I was organizing an outdoor wedding for 150 guests last Saturday at a beautiful garden venue. The forecast had been clear all week, but on Saturday morning, the weather took an abrupt turn. It started pouring with rain. We had a backup plan, but it involved moving everything into a much smaller indoor hall. It was a logistical nightmare. We managed it, but the cozy atmosphere we had planned was lost. The couple was disappointed, but they understood.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Florist", "Caterer", "Event Planner"], answer: "Event Planner" },
                    { question: "What was the problem on the day of the event?", options: ["The food was late", "The guests were late", "The weather changed suddenly"], answer: "The weather changed suddenly" },

                    { question: "What was the main negative consequence of the change?", options: ["The food got cold", "The cozy atmosphere was lost", "There wasn't enough space"], answer: "The cozy atmosphere was lost" },
                    { question: "In the text, what does 'abrupt' mean?", options: ["Expected", "Gradual", "Sudden and unexpected"], answer: "Sudden and unexpected" }
                ]
            },
            {
                audioscript: "I'm a scientist from India named Priya, working at a research institute in Switzerland. My field is genetics. For the past year, I've been conducting an experiment on cell growth. The results were supposed to follow a predictable pattern. However, last Thursday, the data from one sample was a complete anomaly; it was totally different from all the others. At first, I thought it was a mistake, but I've re-run the tests and the result is the same. This could potentially change our whole understanding of the process. It's perplexing, but also very exciting.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Doctor", "Scientist", "Professor"], answer: "Scientist" },
                    { question: "In which country does the speaker work?", options: ["India", "Germany", "Switzerland"], answer: "Switzerland" },
                    { question: "What happened last Thursday?", options: ["The equipment broke", "She got an unexpected result", "She finished the experiment"], answer: "She got an unexpected result" },
                    { question: "What did the speaker initially think about the result?", options: ["It was a breakthrough", "It was a mistake", "It was normal"], answer: "It was a mistake" },
                    { question: "What does 'anomaly' mean in this context?", options: ["Something that is standard or expected", "A mistake in the procedure", "Something that deviates from what is normal or expected"], answer: "Something that deviates from what is normal or expected" }
                ]
            },
            {
                audioscript: "My name is Ken, and I'm a primary school teacher in Scotland. The school year was due to start this Monday. I spent all of last week preparing my classroom. However, on Sunday evening, a water pipe burst in the classroom above mine. My room was completely flooded. Books, posters, and student work were all ruined. It was a devastating sight. The start of school has been postponed for a week, and my class has been temporarily relocated to the library. It's not an ideal start to the year.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Librarian", "Plumber", "Teacher"], answer: "Teacher" },
                    { question: "What happened on Sunday evening?", options: ["There was a fire", "A pipe burst", "The power went out"], answer: "A pipe burst" },
                    { question: "What was the consequence of this incident?", options: ["The school year was cancelled", "The start of school was postponed", "The classroom was redecorated"], answer: "The start of school was postponed" },
                    { question: "Where has the speaker's class been moved to?", options: ["The gym", "Another classroom", "The library"], answer: "The library" },
                    { question: "In the text, what does 'devastating' mean?", options: ["Amusing", "Slightly annoying", "Causing great shock or distress"], answer: "Causing great shock or distress" }
                ]
            },
            {
                audioscript: "I'm an Irish author named Siobhan. I'm writing a historical novel set in 19th-century Dublin. I have a very strict writing schedule; I write from 9 AM to 1 PM every day. Yesterday, my laptop, which contains my entire manuscript, stopped working. It just showed a black screen. I felt a wave of sheer panic. I took it to a repair shop this morning. The technician thinks he can recover the data, but it will take a few days. It's a stark reminder to always back up my work.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Historian", "Librarian", "Author"], answer: "Author" },
                    { question: "What is the setting of her novel?", options: ["Modern Dublin", "19th-century Dublin", "Future Dublin"], answer: "19th-century Dublin" },
                    { question: "What happened yesterday?", options: ["She finished her book", "Her laptop broke", "She got a publishing deal"], answer: "Her laptop broke" },
                    { question: "What did the technician say?", options: ["The data is lost", "He can likely recover the data", "It will be very expensive"], answer: "He can likely recover the data" },
                    { question: "What does 'stark' mean in this context?", options: ["A gentle reminder", "A happy reminder", "A severe or obvious reminder"], answer: "A severe or obvious reminder" }
                ]
            }
        ];
        
        // --- Audio & TTS Functions ---
        function initAudio() {
            if (typeof Tone === 'undefined') {
                console.warn("Tone.js not loaded. Sound effects disabled.");
                return;
            }
            correctSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
            incorrectSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 0.5 } }).toDestination();
            isAudioReady = true;
        }

        function initSpeechSynthesis() {
            if (!('speechSynthesis' in window)) {
                console.warn("Speech Synthesis not supported");
                return;
            }
            const setVoices = () => {
                const allVoices = speechSynthesis.getVoices();
                if (allVoices.length > 0) {
                    availableVoices = allVoices.filter(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('neural') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('natural')));
                    if (availableVoices.length === 0) { // Fallback to any English voices
                        availableVoices = allVoices.filter(v => v.lang.startsWith('en'));
                    }
                }
            };
            setVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = setVoices;
            }
        }

        function startSpeechKeepAlive() {
            if (window.speechSynthesis) {
                stopSpeechKeepAlive(); // Clear any existing interval
                speechKeepAliveInterval = setInterval(() => {
                    if (speechSynthesis && !speechSynthesis.speaking) {
                        const keepAliveUtterance = new SpeechSynthesisUtterance('');
                        keepAliveUtterance.volume = 0;
                        speechSynthesis.speak(keepAliveUtterance);
                    }
                }, 10000);
            }
        }

        function stopSpeechKeepAlive() {
            if (speechKeepAliveInterval) {
                clearInterval(speechKeepAliveInterval);
                speechKeepAliveInterval = null;
            }
        }

        function speak(text, callback) {
            if (!('speechSynthesis' in window) || availableVoices.length === 0) {
                console.warn("Speech synthesis not ready or no voices available.");
                if (callback) setTimeout(callback, 50);
                return;
            }
            
            speechSynthesis.cancel();
            
            playAudioBtn.classList.add('speaking');
            playAudioText.textContent = "Playing...";
            
            const utterance = new SpeechSynthesisUtterance(text);
            // Cycle through available voices for each group
            utterance.voice = availableVoices[currentGroupIndex % availableVoices.length];
            
            utterance.onend = () => {
                playAudioBtn.classList.remove('speaking');
                playAudioText.textContent = "Replay Audio";
                if(callback) callback();
            };
            
            utterance.onerror = (e) => {
                console.error("SpeechSynthesisUtterance.onerror:", e.error);
                playAudioBtn.classList.remove('speaking');
                playAudioText.textContent = "Replay Audio";
                if (callback) callback();
            };

            speechSynthesis.speak(utterance);
        }

        // --- Game Logic ---
        function startGame() {
            playerName = playerNameInput.value.trim();
            if (playerName === '') {
                nameErrorEl.textContent = 'Please enter your name!';
                playerNameInput.classList.add('border-red-500');
                return; 
            }
            nameErrorEl.textContent = '';
            playerNameInput.classList.remove('border-red-500');

            if (Tone.context.state !== 'running') {
                Tone.start().catch(e => console.error("Could not start Tone.js", e));
            }
            
            startSpeechKeepAlive();

            score = 0;
            currentGroupIndex = 0;
            globalQuestionCounter = 1;
            questionGroups = [...gameData];
            scoreEl.textContent = `Score: ${score}`;
            playerDisplayEl.textContent = playerName;
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            displayGroup();
        }

        function displayGroup() {
            nextGroupBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            
            const group = questionGroups[currentGroupIndex];
            questionsContainer.innerHTML = '';
            
            playAudioBtn.disabled = true;
            playAudioBtn.onclick = () => {
                 playAudioBtn.disabled = true;
                 speak(group.audioscript, () => { playAudioBtn.disabled = false; });
            };

            group.questions.forEach((q) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'p-3 border border-gray-200 rounded-lg';
                questionDiv.dataset.questionIndex = globalQuestionCounter;

                const questionTitle = document.createElement('h3');
                questionTitle.className = 'text-base font-semibold text-gray-800 mb-2'; // Smaller font
                questionTitle.textContent = `Q${globalQuestionCounter}: ${q.question}`;
                questionDiv.appendChild(questionTitle);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'flex items-center space-x-2'; // Horizontal layout
                
                q.options.forEach(optionText => {
                    const optionButton = document.createElement('button');
                    optionButton.textContent = optionText;
                    optionButton.className = 'btn option-btn';
                    optionButton.dataset.option = optionText;
                    optionButton.onclick = () => selectOption(optionButton);
                    optionsDiv.appendChild(optionButton);
                });

                questionDiv.appendChild(optionsDiv);
                questionsContainer.appendChild(questionDiv);
                globalQuestionCounter++;
            });
            
            speak(group.audioscript, () => {
                playAudioBtn.disabled = false;
            });
        }

        function selectOption(selectedButton) {
            const questionDiv = selectedButton.closest('[data-question-index]');
            questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            selectedButton.classList.add('selected');
        }

        function checkAnswers() {
            const group = questionGroups[currentGroupIndex];
            let allAnswered = true;

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');

                if (!selectedBtn) {
                    allAnswered = false;
                }
            });

            if (!allAnswered) {
                const modal = document.createElement('div');
                modal.style.position = 'fixed';
                modal.style.top = '20px';
                modal.style.left = '50%';
                modal.style.transform = 'translateX(-50%)';
                modal.style.backgroundColor = '#fefcbf';
                modal.style.color = '#92400e';
                modal.style.padding = '1rem';
                modal.style.borderRadius = '0.5rem';
                modal.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                modal.style.zIndex = '100';
                modal.textContent = 'Please answer all questions before submitting.';
                document.body.appendChild(modal);
                setTimeout(() => modal.remove(), 3000);
                return;
            }

            questionsContainer.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            submitBtn.classList.add('hidden');
            nextGroupBtn.classList.remove('hidden');

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');
                const selectedAnswer = selectedBtn.dataset.option;

                if (selectedAnswer.toLowerCase() === q.answer.toLowerCase()) {
                    score += 2;
                    selectedBtn.classList.add('correct');
                    if(isAudioReady) correctSynth.triggerAttackRelease("C5", "8n", Tone.now() + index * 0.1);
                } else {
                    selectedBtn.classList.add('incorrect');
                    if(isAudioReady) incorrectSynth.triggerAttackRelease("C3", "4n", Tone.now() + index * 0.1);
                    questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                        if (btn.dataset.option.toLowerCase() === q.answer.toLowerCase()) {
                            btn.classList.add('correct');
                        }
                    });
                }
            });
            scoreEl.textContent = `Score: ${score}`;
        }
        
        function nextGroup() {
            currentGroupIndex++;
            if (currentGroupIndex < questionGroups.length) {
                displayGroup();
            } else {
                endGame();
            }
        }

        function endGame() {
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            const totalQuestions = questionGroups.reduce((acc, group) => acc + group.questions.length, 0);
            finalScoreEl.textContent = `Well done, ${playerName}! Your final score is ${score} out of ${totalQuestions * 2}.`;
            
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', startGame);
        submitBtn.addEventListener('click', checkAnswers);
        nextGroupBtn.addEventListener('click', nextGroup);
        restartBtn.addEventListener('click', () => {
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        });
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });


        // --- Initialisation ---
        window.onload = () => {
            initAudio();
            initSpeechSynthesis();
        };

    </script>
</body>
</html>
