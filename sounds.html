<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Soundboard</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
  h2 { margin-top: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: white;
    transition: transform 0.1s ease;
  }
  .correct button { background: #28a745; }
  .incorrect button { background: #dc3545; }
  button:hover { opacity: 0.85; }
  button:active {
    transform: scale(0.95);
  }
  .phrase-display {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 1.2em;
    font-weight: bold;
    color: white;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease, bottom 0.3s ease;
    text-align: center;
  }

  .phrase-display.show {
    bottom: 50px;
    opacity: 1;
    visibility: visible;
  }

  .phrase-display.correct-phrase {
    background: #28a745;
    box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5);
  }

  .phrase-display.incorrect-phrase {
    background: #dc3545;
    box-shadow: 0 4px 15px rgba(220, 53, 69, 0.5);
  }
</style>
</head>
<body>

<h1>Quiz Soundboard</h1>

<h2>✅ Correct Sounds (40)</h2>
<div class="grid correct" id="correct-buttons"></div>

<h2>❌ Incorrect Sounds (40)</h2>
<div class="grid incorrect" id="incorrect-buttons"></div>

<div id="phrase-display" class="phrase-display"></div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playToneSequence(steps) {
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
  let now = ctx.currentTime;
  steps.forEach(step => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = step.type || 'sine';
    osc.frequency.setValueAtTime(step.freq, now);
    gain.gain.setValueAtTime(step.vol || 0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + (step.dur || 0.3));
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + (step.dur || 0.3));
    now += (step.gap || step.dur || 0.3);
  });
}

// Motivational Phrases
const correctPhrases = [
  "Stellar work!", "You've got it!", "Absolutely brilliant!", "That's the one!", "Incredible!",
  "You're a genius!", "Keep it up!", "Outstanding!", "Perfectly done!", "You're on fire!"
];

const incorrectPhrases = [
  "That was a great attempt! Let's try another.",
  "Not this time, but you're getting warmer!",
  "Every try is a step forward. Keep going!",
  "Mistakes are proof that you are trying. Don't stop!",
  "That's not the answer, but I believe in you!",
  "So close! What's your next idea?",
  "Don't worry, the best discoveries come after a few tries.",
  "That's a learning opportunity! Try again.",
  "Your persistence is inspiring. Let's go again.",
  "Even experts get it wrong sometimes. You've got this!"
];

let phraseTimeout;

function showPhrase(type) {
  const phraseDisplay = document.getElementById('phrase-display');
  clearTimeout(phraseTimeout); // Clear previous timeout if it exists

  const phrases = type === 'correct' ? correctPhrases : incorrectPhrases;
  const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];

  // Display the phrase visually
  phraseDisplay.textContent = randomPhrase;
  phraseDisplay.className = 'phrase-display'; // Reset classes
  
  if (type === 'correct') {
    phraseDisplay.classList.add('correct-phrase');
  } else {
    phraseDisplay.classList.add('incorrect-phrase');
  }
  
  phraseDisplay.classList.add('show');

  // Use the Web Speech API to speak the phrase
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(randomPhrase);
    window.speechSynthesis.speak(utterance);
  }

  // Set a timeout to hide the visual phrase after a couple of seconds
  phraseTimeout = setTimeout(() => {
    phraseDisplay.classList.remove('show');
  }, 2500);
}

// Render buttons
function renderButtons(containerId, sounds) {
  const container = document.getElementById(containerId);
  const type = containerId.includes('correct') ? 'correct' : 'incorrect';
  sounds.forEach(sound => {
    const btn = document.createElement('button');
    btn.textContent = sound.name;
    btn.onclick = () => {
      playToneSequence(sound.seq);
      showPhrase(type);
    };
    container.appendChild(btn);
  });
}

renderButtons('correct-buttons', correctSounds);
