        const audioPlayer = document.getElementById('audio-player');
        const transcriptContainer = document.getElementById('transcript-container');
        const playOverlay = document.getElementById('play-overlay');
        const playButton = document.getElementById('play-button');
        
        // Set the audio source
        audioPlayer.src = audioFileName;

        // --- PLAY BUTTON LOGIC ---
        playButton.addEventListener('click', () => {
            audioPlayer.play();
            playOverlay.style.display = 'none';
        });

        // Create the text content on the page
        transcriptData.forEach((item, index) => {
            // Create a container span for the phrase (English and translation)
            const phraseSpan = document.createElement('span');
            phraseSpan.classList.add('phrase');
            phraseSpan.id = 'phrase-' + index;
            phraseSpan.dataset.startTime = item.startTime;

            // Create span for English word
            const wordSpan = document.createElement('span');
            wordSpan.classList.add('english-word');
            wordSpan.textContent = item.word;
            
            // Create span for Chinese translation
            const translationSpan = document.createElement('span');
            translationSpan.classList.add('translation-word');
            translationSpan.textContent = item.translation;

            // Add a line break between them
            phraseSpan.appendChild(wordSpan);
            phraseSpan.appendChild(document.createElement('br'));
            phraseSpan.appendChild(translationSpan);

            transcriptContainer.appendChild(phraseSpan);
            
            // Add a space after the phrase
            transcriptContainer.appendChild(document.createTextNode(' '));

            // Add click event to seek audio
            phraseSpan.addEventListener('click', () => {
                audioPlayer.currentTime = item.startTime;
                audioPlayer.play();
            });
        });

        let currentlyHighlightedWordIndex = -1;

        // Listen for time updates on the audio player
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            let foundWordIndex = -1;

            // Find which word should be highlighted at the current time
            for (let i = 0; i < transcriptData.length; i++) {
                if (currentTime >= transcriptData[i].startTime && currentTime < transcriptData[i].endTime) {
                    foundWordIndex = i;
                    break;
                }
            }
            
            // If the time is past the last word, keep the last word highlighted
            if (foundWordIndex === -1 && currentTime > 0) {
                 if (currentTime >= transcriptData[transcriptData.length - 1].startTime) {
                    foundWordIndex = transcriptData.length - 1;
                 }
            }


            // If the highlighted word has changed, update the styling and speak the translation
            if (foundWordIndex !== -1 && foundWordIndex !== currentlyHighlightedWordIndex) {
                // Remove highlight from the previously highlighted word
                if (currentlyHighlightedWordIndex !== -1) {
                    const prevPhrase = document.getElementById('phrase-' + currentlyHighlightedWordIndex);
                    if(prevPhrase) prevPhrase.classList.remove('highlight');
                }

                // Add highlight to the new current word
                const currentPhrase = document.getElementById('phrase-' + foundWordIndex);
                if(currentPhrase) {
                    currentPhrase.classList.add('highlight');
                    currentPhrase.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // --- AUTOMATIC TTS LOGIC ---
                    // Cancel any ongoing speech to prevent overlap
                    window.speechSynthesis.cancel();
                    
                    // Speak the new translation if it's not empty
                    const translationText = transcriptData[foundWordIndex].translation.trim();
                    if (translationText) {
                        const utterance = new SpeechSynthesisUtterance(translationText);
                        utterance.lang = 'zh-CN';
                        utterance.rate = 0.85; // Slow down the speech for clarity
                        window.speechSynthesis.speak(utterance);
                    }
                }
                
                currentlyHighlightedWordIndex = foundWordIndex;
            }
        });
