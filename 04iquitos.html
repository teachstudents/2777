<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in the Amazon – Discovering Iquitos, Peru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overscroll-behavior: none;
            transition: background-color 2s ease-in-out;
            background-color: #064e3b; /* Deep rainforest green */
        }
        #rainforest-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .page { 
            display: none; 
            position: relative;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-button, .nav-button, .quiz-option {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .action-button:hover, .nav-button:hover, .quiz-option:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .action-button:active, .nav-button:active, .quiz-option:active {
            transform: translateY(-1px) scale(0.98);
        }
        .feedback-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .feedback-modal.show { display: flex; }
        .jungle-card {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid #16a34a;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .jungle-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.1);
        }
        /* --- 3D Animated Button Style --- */
        .btn-animated-3d {
            position: relative; overflow: hidden; transition: all 0.15s ease-out; border-bottom-width: 4px;
        }
        .btn-animated-3d:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-animated-3d::before, .btn-animated-3d::after {
            content: ''; position: absolute; width: 0; height: 2px; transition: width 0.3s ease-out;
        }
        .btn-animated-3d.green-btn::before, .btn-animated-3d.green-btn::after { background-color: #047857; }
        .btn-animated-3d.lime-btn::before, .btn-animated-3d.lime-btn::after { background-color: #4d7c0f; }
        .btn-animated-3d.emerald-btn::before, .btn-animated-3d.emerald-btn::after { background-color: #047857; }
        .btn-animated-3d.teal-btn::before, .btn-animated-3d.teal-btn::after { background-color: #0d9488; }
        .btn-animated-3d.amber-btn::before, .btn-animated-3d.amber-btn::after { background-color: #b45309; }
        .btn-animated-3d.orange-btn::before, .btn-animated-3d.orange-btn::after { background-color: #c2410c; }
        .btn-animated-3d.rose-btn::before, .btn-animated-3d.rose-btn::after { background-color: #be123c; }
        .btn-animated-3d.fuchsia-btn::before, .btn-animated-3d.fuchsia-btn::after { background-color: #a21caf; }
        .btn-animated-3d::before { top: 0; left: 0; }
        .btn-animated-3d::after { bottom: 0; right: 0; }
        .btn-animated-3d:hover::before, .btn-animated-3d:hover::after { width: 100%; }
        .btn-animated-3d span::before, .btn-animated-3d span::after {
            content: ''; position: absolute; width: 2px; height: 0; transition: height 0.3s ease-out .15s;
        }
        .btn-animated-3d.green-btn span::before, .btn-animated-3d.green-btn span::after { background-color: #047857; }
        .btn-animated-3d.lime-btn span::before, .btn-animated-3d.lime-btn span::after { background-color: #4d7c0f; }
        .btn-animated-3d.emerald-btn span::before, .btn-animated-3d.emerald-btn span::after { background-color: #047857; }
        .btn-animated-3d.teal-btn span::before, .btn-animated-3d.teal-btn span::after { background-color: #0d9488; }
        .btn-animated-3d.amber-btn span::before, .btn-animated-3d.amber-btn span::after { background-color: #b45309; }
        .btn-animated-3d.orange-btn span::before, .btn-animated-3d.orange-btn span::after { background-color: #c2410c; }
        .btn-animated-3d.rose-btn span::before, .btn-animated-3d.rose-btn span::after { background-color: #be123c; }
        .btn-animated-3d.fuchsia-btn span::before, .btn-animated-3d.fuchsia-btn span::after { background-color: #a21caf; }
        .btn-animated-3d span::before { bottom: 0; left: 0; }
        .btn-animated-3d span::after { top: 0; right: 0; }
        .btn-animated-3d:hover span::before, .btn-animated-3d:hover span::after { height: 100%; }
    </style>
</head>
<body class="antialiased text-gray-800 text-lg">
    <!-- Decorative canvas hidden from screen readers for accessibility -->
    <canvas id="rainforest-canvas" aria-hidden="true"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <!-- Navigation Header -->
    <header id="nav-header" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-sm shadow-sm" style="display: none;">
        <div class="max-w-4xl mx-auto p-1.5 flex justify-between items-center">
            <button onclick="goBack()" class="nav-button bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Back</button>
            <div class="font-bold text-base text-green-600">Score: <span id="score-display">0</span></div>
            <button onclick="navigateTo(1)" class="nav-button bg-gray-800 text-white font-bold py-1.5 px-3 text-sm rounded-full hover:bg-gray-900 flex items-center gap-2">Home</button>
            <button onclick="goNext()" class="nav-button bg-green-600 hover:bg-green-700 text-white font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Next</button>
        </div>
    </header>

    <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pt-14" role="main">

        <!-- Page 0: Title Screen -->
        <section id="page-0" class="page active text-center bg-white rounded-2xl shadow-lg p-8">
            <div class="h-full flex flex-col justify-center items-center">
                <h1 class="text-5xl md:text-6xl font-bold text-green-800 mb-4">Unit 7: Life in the Amazon</h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-8">Discovering Iquitos, Peru 🇵🇪</p>
                <svg viewBox="0 0 600 300" class="rounded-lg shadow-md mb-8 w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="amazonSky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a7f3d0;stop-opacity:1" /><stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" /></linearGradient></defs>
                    <rect width="600" height="300" fill="url(#amazonSky)"/>
                    <!-- River -->
                    <path d="M 0 220 C 150 200, 250 280, 400 250 S 550 200, 600 220 V 300 H 0 Z" fill="#06b6d4" opacity="0.8"/>
                    <path d="M 0 230 C 100 210, 300 290, 450 260 S 580 210, 600 230 V 300 H 0 Z" fill="#22d3ee" opacity="0.6"/>
                    <!-- Trees -->
                    <circle cx="80" cy="200" r="40" fill="#15803d"/><circle cx="120" cy="210" r="50" fill="#16a34a"/>
                    <circle cx="500" cy="210" r="45" fill="#166534"/><circle cx="550" cy="200" r="55" fill="#14532d"/>
                    <!-- Boat -->
                    <path d="M 250 240 L 350 240 L 330 260 L 270 260 Z" fill="#a16207"/>
                    <rect x="295" y="220" width="10" height="20" fill="#ca8a04"/>
                    <!-- Sun -->
                    <circle cx="500" cy="80" r="30" fill="#facc15" opacity="0.8"/>
                    <text x="50%" y="20%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#065f46" font-weight="bold">IQUITOS</text>
                </svg>
                <button onclick="startApp()" class="action-button bg-green-600 text-white font-bold py-3 px-8 rounded-full text-2xl hover:bg-green-700">START LESSON</button>
            </div>
        </section>

        <!-- Page 1: Main Menu -->
        <section id="page-1" class="page">
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-4xl font-bold text-center text-green-800 mb-8">Main Menu</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="navigateTo(10)" class="btn-animated-3d green-btn bg-green-500 border-green-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>1. Think-Pair-Share</button>
                    <button onclick="navigateTo(20)" class="btn-animated-3d lime-btn bg-lime-500 border-lime-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>2. Vocabulary</button>
                    <button onclick="navigateTo(80)" class="btn-animated-3d emerald-btn bg-emerald-500 border-emerald-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>3. Lecture & Seminar</button>
                    <button onclick="navigateTo(30)" class="btn-animated-3d teal-btn bg-teal-500 border-teal-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>4. Geography & Environment</button>
                    <button onclick="navigateTo(40)" class="btn-animated-3d amber-btn bg-amber-500 border-amber-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>5. Culture & Daily Life</button>
                    <button onclick="navigateTo(90)" class="btn-animated-3d orange-btn bg-orange-500 border-orange-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>6. Critical Thinking</button>
                    <button onclick="navigateTo(50)" class="btn-animated-3d rose-btn bg-rose-500 border-rose-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>7. Knowledge Quiz</button>
                    <button onclick="navigateTo(60)" class="btn-animated-3d fuchsia-btn bg-fuchsia-500 border-fuchsia-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>8. Final Tasks</button>
                </div>
            </div>
        </section>
        
        <!-- Container for dynamically generated pages -->
        <div id="dynamic-pages-container"></div>
    </div>

    <!-- Modal for showing details -->
    <div id="details-modal" class="feedback-modal"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Rainforest Background Animation ---
            const canvas = document.getElementById('rainforest-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];

            function createParticles() {
                particles = [];
                const count = Math.min(200, Math.floor(canvas.width / 20));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 2 + 1,
                        speed: Math.random() * 1 + 0.5,
                        opacity: Math.random() * 0.3 + 0.1
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(250, 250, 210, 0.5)'; // Light yellow for fireflies/pollen
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.globalAlpha = p.opacity;
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            function updateParticles() {
                particles.forEach(p => {
                    p.y += p.speed;
                    p.x += Math.sin(p.y / 50) * 0.5; // Gentle sway
                    if (p.y > canvas.height) {
                        p.y = -p.radius;
                        p.x = Math.random() * canvas.width;
                    }
                });
            }

            function animateRainforest() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animateRainforest);
            }
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                createParticles();
            });

            createParticles();
            animateRainforest();

            // --- State & Configuration ---
            let score = 0;
            const scoreDisplay = document.getElementById('score-display');
            let timerInterval;
            let currentPage = 0;
            const pageHistory = [0];
            const pageSequence = [0, 1, 10, 11, 12, 13, 14, 20, 21, 22, 23, 24, 25, 80, 801, 802, 81, 811, 812, 30, 31, 40, 41, 90, 91, 92, 93, 50, 51, 70, 60, 61, 62];

            // --- Audio & Text-to-Speech ---
            let audioReady = false;
            let synth;
            const synthTTS = window.speechSynthesis;
            let defaultVoice = null;
            let professorVoice = null; // For male speakers
            let isTtsEnabled = true;

            const voicesPromise = new Promise(resolve => {
                if (synthTTS.getVoices().length > 0) { resolve(synthTTS.getVoices()); return; }
                synthTTS.onvoiceschanged = () => { resolve(synthTTS.getVoices()); };
            });

            async function setupVoices() {
                try {
                    const voices = await voicesPromise;
                    if (voices.length === 0) {
                        console.warn("No speech synthesis voices available.");
                        return;
                    }

                    const usEnglishVoices = voices.filter(v => v.lang === 'en-US');
                    
                    // --- Set up Professor/Male Voice ---
                    const maleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('male'));
                    professorVoice = maleVoices.find(v => v.name.toLowerCase().includes('brian')) 
                                  || maleVoices[0];
                    if (professorVoice) {
                         console.log("Male/Professor Voice set to:", professorVoice.name);
                    } else {
                         console.warn("Could not find a specific male voice.");
                    }

                    // --- Set up Default/Female Voice ---
                    const qualityPriorities = [
                        'neural', 'wavenet', 'siri (enhanced)', 'google', 'turbo', 'multilingual', 'microsoft', 'samantha', 'ava', 'zira', 'premium'
                    ];
                    
                    const femaleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('female') || !v.name.toLowerCase().includes('male'));

                    const findBestVoice = (voiceList) => {
                        for (const priority of qualityPriorities) {
                            const foundVoice = voiceList.find(v => v.name.toLowerCase().includes(priority));
                            if (foundVoice) return foundVoice;
                        }
                        return null;
                    };

                    defaultVoice = findBestVoice(femaleVoices) || femaleVoices[0] || usEnglishVoices[0];
                    
                    if (!professorVoice) {
                        professorVoice = defaultVoice;
                    }

                    if (defaultVoice) {
                        console.log("Default/Female Voice set to:", defaultVoice.name);
                    } else {
                        console.warn("Could not find a suitable default English voice.");
                    }

                } catch (e) {
                    console.error("Error setting up voices:", e);
                }
            }
            
            window.startApp = async function() {
                if (!audioReady) try { await Tone.start(); synth = new Tone.PolySynth(Tone.Synth).toDestination(); audioReady = true; } catch (e) { console.error("Tone.js start failed:", e); }
                try {
                    const u = new SpeechSynthesisUtterance(' '); u.volume=0; synthTTS.speak(u); synthTTS.cancel();
                    await setupVoices();
                } catch (e) { console.error("TTS setup failed:", e); }
                navigateTo(1);
            }

            const playSound = (correct) => { if(audioReady) synth.triggerAttackRelease(correct ? ["C5", "E5", "G5"] : "A2", "8n", Tone.now()); }
            
            async function speak(text, voiceOverride = null) {
                if (!isTtsEnabled || !text) return;
                if (synthTTS.speaking) synthTTS.cancel();
                await new Promise(r=>setTimeout(r,50));
                const u = new SpeechSynthesisUtterance(text);
                const finalVoice = voiceOverride || defaultVoice;
                if (finalVoice) {
                    u.voice = finalVoice;
                }
                u.rate = 0.85;
                synthTTS.speak(u);
            }

            function speakDialogue(text) {
                 if (!isTtsEnabled || !text) return;
                 if (synthTTS.speaking) synthTTS.cancel();
                 
                 const lines = text.split('\n').filter(line => line.trim() !== '');
                 let utteranceQueue = [];

                 lines.forEach(line => {
                     const parts = line.split(':');
                     const speaker = parts[0].trim().toLowerCase();
                     const dialogue = parts.slice(1).join(':').trim();
                     
                     if (dialogue) {
                         const u = new SpeechSynthesisUtterance(dialogue);
                         if (speaker === 'alex' || speaker === 'chris') {
                             u.voice = professorVoice; // Male voice
                         } else {
                             u.voice = defaultVoice; // Female voice
                         }
                         u.rate = 0.85;
                         utteranceQueue.push(u);
                     }
                 });

                 function playNext() {
                     if (utteranceQueue.length > 0) {
                         const u = utteranceQueue.shift();
                         u.onend = playNext;
                         synthTTS.speak(u);
                     }
                 }
                 playNext();
            }

            window.toggleTTS = (button) => {
                isTtsEnabled = !isTtsEnabled;
                button.setAttribute('aria-pressed', isTtsEnabled);
                if (!isTtsEnabled) {
                    synthTTS.cancel();
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707a1 1 0 011.414 0v14a1 1 0 01-1.414 0L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l-4-4m0 4l4-4"></path></svg>`;
                } else {
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.858 5.858a3 3 0 104.243 4.243M9 12l4.243 4.243"></path></svg>`;
                    const readableContent = document.getElementById(`page-${currentPage}`).querySelector('.readable-content');
                    if (readableContent) {
                         if (currentPage === 81) {
                            speakDialogue(readableContent.innerText);
                        } else {
                            speak(readableContent.innerText);
                        }
                    }
                }
            }

            // --- Navigation & Page Flow ---
            window.navigateTo = (pageId) => {
                const targetPage = document.getElementById(`page-${pageId}`);
                if (!targetPage || pageId === currentPage) return;

                document.getElementById(`page-${currentPage}`)?.classList.remove('active');
                targetPage.classList.add('active');
                
                currentPage = pageId;
                if (pageHistory[pageHistory.length - 1] !== currentPage) {
                    pageHistory.push(currentPage);
                }
                
                clearInterval(timerInterval);
                if (synthTTS.speaking) synthTTS.cancel();

                if (pageId === 11) startTimer(120, document.getElementById('timer-think'), goNext);
                if (pageId === 12) startTimer(180, document.getElementById('timer-pair'), goNext);
                if (pageId === 13) startTimer(300, document.getElementById('timer-share'), goNext);
                
                const readableContent = targetPage.querySelector('.readable-content');
                if (readableContent) {
                    if (currentPage === 81) { // Seminar page with dialogue
                        speakDialogue(readableContent.innerText);
                    } else {
                        speak(readableContent.innerText);
                    }
                }
                
                updateNavButtons();
                window.scrollTo(0, 0);

                const heading = targetPage.querySelector('h1, h2, h3');
                if (heading) {
                    heading.setAttribute('tabindex', '-1');
                    heading.focus();
                }
            }
            
            window.goBack = () => {
                if (pageHistory.length <= 1) return;
                pageHistory.pop(); 
                const previousPageId = pageHistory[pageHistory.length - 1];
                if (previousPageId !== undefined) {
                    const temp = pageHistory.pop();
                    navigateTo(previousPageId);
                    pageHistory.push(temp);
                }
            }

            window.goNext = () => { 
                const currentIndex = pageSequence.indexOf(currentPage);
                if (currentIndex > -1 && currentIndex < pageSequence.length - 1) {
                    navigateTo(pageSequence[currentIndex + 1]);
                }
            }
            
            function updateNavButtons() {
                const nav = document.getElementById('nav-header');
                if(!nav) return;
                nav.style.display = (currentPage === 0) ? 'none' : 'flex';
                const backBtn = nav.querySelector('button:first-child');
                const nextBtn = nav.querySelector('button:last-child');
                
                backBtn.disabled = pageHistory.length <= 1;
                backBtn.classList.toggle('opacity-50', backBtn.disabled);

                const currentIndex = pageSequence.indexOf(currentPage);
                const isLast = currentIndex >= pageSequence.length - 1;
                nextBtn.disabled = isLast || currentPage === 1;
                nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            }
            
            function startTimer(duration, display, onComplete) {
                if (!display) { console.warn('Timer display element not found'); return; }
                let timer = duration;
                const update = () => { display.textContent = `${String(Math.floor(timer/60)).padStart(2,'0')}:${String(Math.max(0, timer%60)).padStart(2,'0')}`; };
                update();
                timerInterval = setInterval(() => {
                    timer--;
                    update();
                    if (timer < 0) { 
                        clearInterval(timerInterval);
                        if (typeof onComplete === 'function') onComplete();
                    }
                }, 1000);
            }
            
            // --- Modals & Interactivity ---
            const detailsData = {
                'biodiversity': { title: "Biodiversity", content: "The Amazon rainforest around Iquitos is one of the most biodiverse places on Earth, home to thousands of species of plants, animals, and insects. This rich ecosystem is vital for global climate stability and is a source of traditional medicine and food for local communities." },
                'culture': { title: "Culture and People", content: "Iquitos has a vibrant culture that blends Indigenous Amazonian traditions with Spanish colonial influences. People speak Spanish and various Indigenous languages. Traditional medicine, crafts, and music are integral parts of daily life." },
                'transportation': { title: "Transportation and Isolation", content: "As the largest city in the world inaccessible by road, life in Iquitos revolves around its rivers. Boats are the primary mode of transport for everything from daily commutes to trade and healthcare. Air travel connects the city to the rest of the world." },
            };

            window.showDetails = (id) => {
                const details = detailsData[id];
                if (!details) { console.warn('Details not found for id:', id); return; }
                const modal = document.getElementById('details-modal');
                modal.innerHTML = `<div class="bg-white rounded-2xl max-w-lg w-full p-6 m-4" role="dialog" aria-modal="true" aria-labelledby="modal-title"><div class="flex justify-between items-center mb-4"><h3 id="modal-title" class="text-xl font-bold text-gray-800">${details.title}</h3><button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl" aria-label="Close">&times;</button></div><div class="text-gray-600">${details.content}</div></div>`;
                modal.classList.add('show');
                modal.querySelector('button[aria-label="Close"]').focus();
                speak(details.title + ". " + details.content);
            }
            window.closeModal = () => document.getElementById('details-modal').classList.remove('show');

            window.checkAnswer = function(button, isCorrect) {
                const questionGroup = button.closest('.question-group');
                questionGroup.querySelectorAll('.quiz-option').forEach(opt => opt.disabled = true);
                if (isCorrect) {
                    playSound(true);
                    button.classList.add('bg-green-500', 'border-green-600', 'text-white');
                    updateScore(10);
                } else {
                    playSound(false);
                    button.classList.add('bg-red-500', 'border-red-600', 'text-white');

                14: `<div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col justify-center items-center text-center pt-16"><svg class="w-24 h-24 text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><div class="readable-content"><h1 class="text-4xl md:text-5xl font-bold text-green-600 mb-4">🎉 Activity Complete! ✅</h1><p class="text-lg md:text-xl text-gray-600">Excellent work! You've finished the first activity.</p></div></div>`,
                20: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-lime-700 mb-6">Vocabulary</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Learn the key terms for this unit. Click Next to cycle through the words.</p></div><button onclick="goNext()" class="action-button bg-lime-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-lime-700">Start Learning</button></div>`,
                80: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-emerald-700 mb-6">Lecture: The Roadless City</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Good morning. Today, we journey deep into the Amazon basin to explore Iquitos, Peru—the largest city in the world that cannot be reached by road. This unique characteristic is not just a trivia fact; it is the defining force that has shaped its history, economy, and identity. Our essential question is: how does extreme geographic isolation influence the development of a major urban center?</p><p>First, let's look at its history, which is a story of economic booms and busts, entirely dependent on the resources of the rainforest. The most significant of these was the Amazon rubber boom from the late 19th to the early 20th century. During this period, Iquitos became a fabulously wealthy city. European tycoons built opulent mansions decorated with imported Italian tiles and ironwork, including the famous Iron House, designed by Gustave Eiffel. But when the rubber market collapsed due to the rise of plantations in Asia, the boom ended, and Iquitos's connection to the global economy withered, leaving it in a state of prolonged isolation.</p><p>In the modern era, the economy of Iquitos is a complex mix. It relies on logging, oil exploration, and agriculture—industries that continue the pattern of resource extraction. However, a new economy has emerged, one that capitalizes on the city's very isolation and its surrounding environment. Ecotourism and so-called 'shamanic tourism' have become major industries, drawing visitors from around the world who want to experience the Amazon's incredible biodiversity and the traditional knowledge of its Indigenous peoples.</p><p>This creates a central tension. On one hand, the city's economy is still tied to the extraction of resources that can damage the rainforest. On the other, its future increasingly depends on the preservation of that same rainforest to attract tourists. To review, Iquitos is a city defined by its lack of roads. Its history is marked by a dramatic rubber boom and bust. Its modern economy is a battleground between resource extraction and sustainable tourism. The key takeaway is that Iquitos serves as a powerful example of how a city's identity and future are inextricably linked to its unique geography and the global demand for its natural and cultural resources.</p></div></div>`,
                801: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-emerald-600 mb-4 text-center">Lecture Quiz: True/False/Not Given</h3><div class="space-y-4"><div class="question-group"><p class="font-semibold">1. The lecture states that Iquitos is the only city in Peru that cannot be reached by road.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">2. The Iron House in Iquitos was built using materials imported from Europe.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">3. The Amazon rubber boom ended because the rainforest ran out of rubber trees.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">True</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">4. Agriculture is the single largest part of Iquitos's modern economy.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">5. The lecture suggests that ecotourism and resource extraction are in conflict with each other.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">Not Given</button></div></div></div></div>`,
                802: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-emerald-600 mb-4 text-center">Lecture Quiz: Multiple Choice</h3><div class="space-y-4"><div class="question-group"><p class="font-semibold">1. What is the essential question of the lecture?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">A. How does geographic isolation influence a city's development?</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">B. Why was the rubber boom so important for Peru?</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">C. What is the future of ecotourism in the Amazon?</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">2. The period of great wealth in Iquitos was primarily driven by the trade of what resource?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">A. Oil</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">B. Lumber</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">C. Rubber</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">3. Who is mentioned as the designer of the famous Iron House?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">A. A Peruvian architect</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">B. Gustave Eiffel</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">C. An Italian tycoon</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">4. Which of the following is NOT mentioned as part of Iquitos's modern economy?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">A. Shamanic tourism</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">B. Technology manufacturing</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">C. Logging</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">5. What is the "central tension" described in the lecture?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">A. The conflict between Indigenous communities and the city government.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">B. The difficulty of transportation between Iquitos and other cities.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">C. The conflict between resource extraction and environmental preservation.</button></div></div></div></div>`,
                81: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-emerald-700 mb-6">Seminar: Discussing Iquitos</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p><strong>Alex:</strong> Hey everyone. Okay, so the Iquitos lecture was something else. A city you can't drive to... that's just a wild concept.</p><p><strong>Sarah:</strong> Oh, absolutely, Alex. The essential question—how does that extreme isolation shape a city?—it makes you realize how much we take roads for granted. The lecturer said its history is all about booms and busts, completely tied to the Amazon's resources.</p><p><strong>Chris:</strong> G'day both. Yeah, the learning intention was to see how its history was shaped by that isolation. The rubber boom at the end of the 19th century, that was a huge part of it. For clarification, that's when the city got all that incredible, opulent architecture, like the Iron House, right?</p><p><strong>Sarah:</strong> Exactly. But the bust was just as dramatic. Building on that, the lecturer pointed out that when the rubber market collapsed, the city was just kind of left on its own again. It shows how dependent it was on a single commodity.</p><p><strong>Alex:</strong> True. But I have to disagree a bit that it's all about the past. The modern economy, based on logging and oil, it feels like the same boom and bust pattern, just with different resources. The success criteria involved looking at the modern city, and it's still facing those challenges.</p><p><strong>Chris:</strong> I see it a bit differently, Alex. While the resource extraction is still a big part of the economy, the lecture also really emphasized the rise of eco-tourism and shamanic tourism. Building on Sarah's point about its unique culture, that's something that only Iquitos can offer.</p><p><strong>Sarah:</strong> I'd argue that's its most sustainable path forward. The lecturer made a strong case for that. It's a way to capitalize on its uniqueness without just extracting resources. It's a more responsible way to engage with the world.</p><p><strong>Alex:</strong> That's a fair point. It's about finding value in its culture and environment, not just its raw materials. The key takeaway for me was that Iquitos is this incredible example of a city that's both deeply connected to the global economy through its resources, but also profoundly isolated by its geography.</p><p><strong>Chris:</strong> Yeah, so to review, we've got the essential question about how isolation shapes a city. We covered its unique "roadless" geography, the history of the rubber boom and bust, its modern economy of resource extraction and unique tourism, and how all of this creates a city with a very distinct identity.</p><p><strong>Sarah:</strong> I think that covers it. This concludes our discussion on the Iquitos lecture. Another place I really want to visit now. Thanks, guys.</p></div></div>`,
                811: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-emerald-600 mb-4 text-center">Seminar Quiz: True/False/Not Given</h3><div class="space-y-4"><div class="question-group"><p class="font-semibold">1. Alex believes that the "boom and bust" pattern is only a part of Iquitos's past.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">True</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">2. Chris is from Australia.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">3. Sarah argues that ecotourism is the most sustainable economic path for Iquitos.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">True</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">False</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">Not Given</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">4. All three speakers agree that resource extraction is no longer a major part of the n></div></div><div class="question-group border-t pt-4"><p class="font-semibold">4. Chris builds on Sarah's point by highlighting what unique aspect of Iquitos?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">A. Its modern architecture.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">B. Its dependence on a single commodity.</button><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">C. Its unique culture and the rise of ecotourism.</button></div></div><div class="question-group border-t pt-4"><p class="font-semibold">5. What is the final key takeaway that Alex mentions?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" class="quiz-option p-3 rounded-lg text-left" data-correct="true">A. That Iquitos is both connected to and isolated from the global economy.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">B. That all the speakers now want to visit Iquitos.</button><button onclick="checkAnswer(this, false)" class="quiz-option p-3 rounded-lg text-left" data-correct="false">C. That the city's history is defined by the rubber boom.</button></div></div></div></div>`,
                30: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-teal-700 mb-6">Geography & Environment</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Explore the unique environment of Iquitos.</p></div><button onclick="goNext()" class="action-button bg-teal-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-teal-700">Start Exploring</button></div>`,
                31: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-teal-700 mb-6">Explore: Iquitos's Environment</h2><div class="readable-content"><p class="text-center text-gray-600 mb-6">Iquitos is located in northeastern Peru, surrounded by the Amazon River and dense rainforest. It is the largest city in the world that is inaccessible by road. Its tropical climate means high heat, humidity, and rainfall year-round.</p></div><div class="grid md:grid-cols-2 gap-6 text-center"><div class="bg-green-50 p-4 rounded-lg"><div class="text-3xl mb-2">🌿</div><h3 class="font-bold text-green-800">Biodiversity</h3><p>The surrounding rainforest is one of the most biodiverse places on Earth, with millions of species.</p></div><div class="bg-cyan-50 p-4 rounded-lg"><div class="text-3xl mb-2">🚤</div><h3 class="font-bold text-cyan-800">River System</h3><p>The Amazon River and its tributaries are the highways of the region, essential for all transport and trade.</p></div></div></div>`,
                40: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-amber-700 mb-6">Culture & Daily Life</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Discover how people live and adapt in Iquitos.</p></div><button onclick="goNext()" class="action-button bg-amber-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-amber-700">Start Exploring</button></div>`,
                41: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Explore: Life in Iquitos</h2><div class="grid md:grid-cols-3 gap-6"><div class="jungle-card rounded-2xl p-6" onclick="showDetails('biodiversity')"><div class="text-4xl mb-2">🦜</div><h3 class="text-xl font-semibold mb-2 text-green-800">Biodiversity</h3><p class="text-sm text-gray-600">Home to thousands of species, crucial for research and ecotourism.</p></div><div class="jungle-card rounded-2xl p-6" onclick="showDetails('culture')"><div class="text-4xl mb-2">🎭</div><h3 class="text-xl font-semibold mb-2 text-green-800">Culture & People</h3><p class="text-sm text-gray-600">A blend of Indigenous traditions and Spanish colonial influences.</p></div><div class="jungle-card rounded-2xl p-6" onclick="showDetails('transportation')"><div class="text-4xl mb-2">🛶</div><h3 class="text-xl font-semibold mb-2 text-green-800">Transportation</h3><p class="text-sm text-gray-600">Life revolves around river travel, with boats as the primary vehicles.</p></div></div></div>`,
                90: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-orange-700 mb-6">Dilemma: The Oil Contract</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-orange-600">Scenario:</h3><p>A multinational corporation offers to invest billions of dollars to drill for oil in a remote part of the rainforest near Iquitos. The project promises to bring thousands of jobs, new schools, and modern healthcare facilities to the city and surrounding Indigenous communities.</p><h3 class="font-bold text-xl text-orange-600 mt-4">Dilemma for students:</h3><p>Should the regional government approve the oil contract? The economic development could lift many people out of poverty. However, oil spills are a major risk, which could devastate the local biodiversity, pollute the rivers that provide food and water, and disrupt the traditional lifestyles of Indigenous communities who have lived there for centuries.</p></div></div>`,
                91: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-red-700 mb-6">Dilemma: The Ecotourism Vote</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-red-600">Setup:</h3><p>An Indigenous community near Iquitos has been offered a partnership with a luxury ecotourism company. The community council must vote on the proposal.</p><ul class="list-disc list-inside ml-4 space-y-2"><li><strong>Vote YES:</strong> The partnership will bring a steady income, allowing the community to fund a modern school and a health clinic. It will also provide jobs for young people as guides and staff, potentially stopping them from leaving for the city.</li><li><strong>Vote NO:</strong> The presence of a luxury lodge and foreign tourists will disrupt traditional ceremonies, strain local resources, and potentially introduce outside influences that erode their cultural identity and connection to the land.</li></ul><h3 class="font-bold text-xl text-red-600 mt-4">Question:</h3><p>As a member of the community council, how do you vote? This choice forces a decision between economic opportunity with cultural risks and preserving tradition at the cost of modern amenities.</p></div></div>`,
                92: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-amber-700 mb-6">Dilemma: The Fishing Agreement</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-amber-600">Setup:</h3><p><strong>Players:</strong> Two fishing villages on the Amazon River that share the same fishing grounds.</p><p><strong>Choice:</strong> A new, highly effective but expensive type of net has become available. Each village can either **invest in the new nets** (catching more fish now, but potentially depleting the fish stocks for the future) or **stick to traditional, less effective methods** (catching fewer fish, but preserving the fish population).</p><div class="overflow-x-auto mt-4"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-200"><tr><th scope="col" class="px-6 py-3"></th><th scope="col" class="px-6 py-3">Village B Uses New Nets</th><th scope="col" class="px-6 py-3">Village B Uses Old Nets</th></tr></thead><tbody><tr class="bg-white border-b"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Village A Uses New Nets</th><td class="px-6 py-4 bg-red-200 text-red-900">Both get huge short-term profits, but the fish population collapses, harming both in the long run.</td><td class="px-6 py-4 bg-orange-100 text-orange-800">Village A profits massively, while Village B struggles. The resource is depleted faster.</td></tr><tr class="bg-white"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Village A Uses Old Nets</th><td class="px-6 py-4 bg-red-100 text-red-800">Village A struggles, while Village B profits massively. The resource is depleted faster.</td><td class="px-6 py-4 bg-green-100 text-green-800">Both villages have a smaller but stable and sustainable catch for years to come.</td></tr></tbody></table></div><p class="text-base text-gray-600 mt-4">The temptation is to use the new nets for a short-term gain, but cooperation and restraint lead to the best long-term outcome for the entire community.</p></div></div>`,
                93: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-lime-700 mb-6">Key Takeaways</h2><div class="readable-content text-lg leading-relaxed space-y-6 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><div><h3 class="font-bold text-xl text-lime-600">Enduring Understanding:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">Living sustainably in remote, biodiverse environments requires a delicate balance between economic needs, cultural preservation, and environmental responsibility.</p></div><div><h3 class="font-bold text-xl text-lime-600">Essential Question:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">How do people in Iquitos adapt to life in the rainforest, and what can we learn from them?</p></div></div></div>`,
                50: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-rose-700 mb-6">Knowledge Quiz</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Test your understanding of life in Iquitos.</p></div><button onclick="goNext()" class="action-button bg-rose-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-rose-700">Start Quiz</button></div>`,
                51: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-rose-600 mb-4 text-center">Comprehension Questions</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What makes Iquitos unique among large cities?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. It is in the desert</button><button onclick="checkAnswer(this, true)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. It is not connected by road</button><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. It has no schools</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. What is biodiversity?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. A type of food</button><button onclick="checkAnswer(this, true)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. A variety of life forms</button><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. A weather pattern</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. What is ecotourism?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this, true)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. Tourism that conserves nature</button><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. Tourism that harms nature</button><button onclick="checkAnswer(this, false)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Tourism in big cities</button></div></div></div></div>`,
                70: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-fuchsia-700 mb-6">Writing Activity ✍️</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><h3 class="font-bold text-xl text-fuchsia-600">Prompt:</h3><p>In 200-250 words, compare life in Iquitos with life in your hometown, focusing on transportation, culture, and environment.</p><h3 class="font-bold text-xl text-fuchsia-600 mt-4">Scaffolding Sentence Stems:</h3><ul class="list-disc list-inside ml-4"><li>Iquitos is located in…</li><li>People in Iquitos travel by…</li><li>In my hometown, we usually…</li><li>I think both places are…</li></ul><h3 class="font-bold text-xl text-fuchsia-600 mt-4">Vocabulary Word Bank:</h3><p class="text-sm text-gray-600 bg-gray-100 p-3 rounded-md">Amazon, biodiversity, boat, culture, ecotourism, education, environment, forest, Iquitos, Indigenous, isolation, rainforest, remote, river, school, Spanish, sustainability, tradition, transportation, wildlife</p></div></div>`,
                60: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-purple-700 mb-6">Final Mission</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Apply what you've learned to complete the final task.</p></div><button onclick="goNext()" class="action-button bg-purple-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-purple-700">View Mission</button></div>`,
                61: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-center text-purple-700 mb-6">Your Final Mission 🚀</h2><div class="readable-content text-xl leading-relaxed max-w-2xl mx-auto bg-gray-50 p-6 rounded-lg"><p class="mb-4">Your task is to design an ecotourism brochure for Iquitos.</p><p class="mb-4">Your brochure should be visual and persuasive, and include:</p><ul class="list-disc list-inside text-left space-y-2"><li>Highlights of the local nature and biodiversity.</li><li>Information about Indigenous culture.</li><li>A section on responsible and sustainable travel tips for visitors.</li></ul></div></div>`,
                62: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-amber-600 mb-4">Congratulations!</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-6">You have completed the "Life in the Amazon" unit.</p></div><div class="bg-green-50 border-4 border-dashed border-green-300 rounded-lg p-8 max-w-2xl mx-auto"><div class="flex justify-center mb-4"><span class="text-6xl">📜</span></div><h3 class="text-3xl font-bold text-green-800">Certificate of Completion</h3><p class="mt-4 text-lg">This certificate is awarded to</p><p id="certificate-name-u7" class="text-2xl font-bold text-green-600 my-2 border-b-2 border-gray-400 pb-2">[Enter Your Name Here]</p><p class="mt-4 text-lg">for successfully completing all challenges and demonstrating excellent knowledge of life and sustainability in the Amazon.</p><p class="mt-6 text-md"><strong>Final Score:</strong> <span id="certificate-score-u7" class="font-bold"></span> points</p><p class="text-sm mt-1"><strong>Date of Completion:</strong> <span id="certificate-date-u7"></span></p></div><div class="mt-6"><input type="text" id="name-input-u7" placeholder="Enter your name for the certificate" class="text-center p-2 border rounded-lg w-full max-w-md"><button onclick="generateCertificateU7()" class="action-button mt-4 bg-green-600 text-white font-bold py-2 px-6 rounded-full hover:bg-green-700">Generate Certificate</button></div></div>`
