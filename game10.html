<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kohlberg's Moral Dilemma Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .btn {
            transition: all 0.2s ease-in-out;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="w-full max-w-2xl mx-auto">
        
        <!-- Start Screen -->
        <div id="start-screen" class="text-center p-8 card">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Kohlberg's Moral Dilemmas</h1>
            <p class="text-lg text-gray-600 mb-8">Test your moral reasoning. You will be presented with several dilemmas. Choose the response that best reflects your thinking.</p>
            <button id="start-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-blue-700 btn">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="p-8 card">
                <p id="progress-text" class="text-sm text-gray-500 mb-2"></p>
                <div id="dilemma-container" class="mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800" id="dilemma-text"></h2>
                </div>
                <div id="responses-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Response buttons will be injected here -->
                </div>
                <div id="feedback-container" class="mt-6 text-center">
                     <p id="feedback-text" class="text-md font-medium"></p>
                </div>
            </div>
            <div class="mt-6 text-center">
                <button id="next-btn" class="hidden bg-green-600 text-white font-bold py-2 px-6 rounded-lg shadow-md hover:bg-green-700 btn">Next Dilemma</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden text-center p-8 card">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Your Results</h1>
            <p class="text-lg text-gray-600 mb-2">Your reasoning most frequently aligned with:</p>
            <h2 id="result-stage-title" class="text-3xl font-bold text-blue-600 mb-4"></h2>
            <p id="result-stage-description" class="text-md text-gray-600 max-w-md mx-auto mb-8"></p>
            <button id="play-again-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-blue-700 btn">Play Again</button>
        </div>

    </div>

    <script>
        const dilemmas = [
            // Dilemma 1
            {
                dilemma: "You forgot to pay for a snack at a supermarket. No one noticed. Do you go back and pay?",
                responses: [
                    { text: "I should go back or I might get caught and punished.", stage: 1 },
                    { text: "If I go back, maybe they’ll appreciate my honesty and give me a reward.", stage: 2 },
                    { text: "I want the cashier to think I’m a good person.", stage: 3 },
                    { text: "It’s the law to pay for things. I must follow it.", stage: 4 },
                    { text: "Honesty builds trust in society. I should do my part.", stage: 5 },
                    { text: "Integrity matters even when no one is watching.", stage: 6 }
                ]
            },
            // Dilemma 2
            {
                dilemma: "You’re offered money to write someone’s homework. Do you accept?",
                responses: [
                    { text: "If I get caught, I’ll be punished.", stage: 1 },
                    { text: "I could use the money—it’s a good deal.", stage: 2 },
                    { text: "My teacher would be disappointed in me.", stage: 3 },
                    { text: "Cheating breaks school rules.", stage: 4 },
                    { text: "It’s unfair to others who work hard.", stage: 5 },
                    { text: "Helping someone cheat violates my values.", stage: 6 }
                ]
            },
            // Dilemma 3
            {
                dilemma: "You’re caught using a translation app during a test. Do you admit it?",
                responses: [
                    { text: "If I lie, I might get into more trouble.", stage: 1 },
                    { text: "Admitting it might reduce the punishment.", stage: 2 },
                    { text: "I want my teacher to trust me again.", stage: 3 },
                    { text: "Honesty is expected in school.", stage: 4 },
                    { text: "Fairness in education matters to everyone.", stage: 5 },
                    { text: "Truthfulness is essential to personal growth.", stage: 6 }
                ]
            },
            // Dilemma 4
            {
                dilemma: "A friend asks you to lie to a teacher about why they missed class. Do you help?",
                responses: [
                    { text: "I could get punished if the teacher finds out.", stage: 1 },
                    { text: "If I lie, my friend might help me later.", stage: 2 },
                    { text: "I want to be a loyal friend.", stage: 3 },
                    { text: "Lying breaks school rules.", stage: 4 },
                    { text: "Lying undermines trust in relationships.", stage: 5 },
                    { text: "I must be honest, even if it’s hard.", stage: 6 }
                ]
            },
            // Dilemma 5
            {
                dilemma: "You find a wallet in the school library. Do you keep the money?",
                responses: [
                    { text: "Keeping it is stealing, and I could be punished.", stage: 1 },
                    { text: "Returning it might get me a reward.", stage: 2 },
                    { text: "People will think I’m kind if I return it.", stage: 3 },
                    { text: "It’s against the rules to take what isn’t mine.", stage: 4 },
                    { text: "Everyone deserves to have their property respected.", stage: 5 },
                    { text: "Doing the right thing means respecting others’ rights.", stage: 6 }
                ]
            },
            // Dilemma 6
            {
                dilemma: "Your host family expects you to follow their house rules, but they conflict with your habits. Do you comply?",
                responses: [
                    { text: "If I break the rules, they might punish me.", stage: 1 },
                    { text: "Following the rules might help me get privileges.", stage: 2 },
                    { text: "I want them to like me and think I’m respectful.", stage: 3 },
                    { text: "I should follow the rules because they’re the authority.", stage: 4 },
                    { text: "Respecting others’ boundaries helps build mutual trust.", stage: 5 },
                    { text: "I should act with empathy and communicate respectfully.", stage: 6 }
                ]
            },
            // Dilemma 7
            {
                dilemma: "Your classmates tease a new student with poor German. Do you join in or speak up?",
                responses: [
                    { text: "If I join, I might get in trouble.", stage: 1 },
                    { text: "If I help, maybe the student will be grateful.", stage: 2 },
                    { text: "I want to be seen as kind and inclusive.", stage: 3 },
                    { text: "Bullying breaks school rules and harms others.", stage: 4 },
                    { text: "Everyone deserves respect, no matter their language.", stage: 5 },
                    { text: "I must stand up for dignity and fairness.", stage: 6 }
                ]
            },
            // Dilemma 8
            {
                dilemma: "You’re invited to a party, but your best friend wasn’t. Do you go?",
                responses: [
                    { text: "If I go, my friend might get mad and punish me socially.", stage: 1 },
                    { text: "I want to enjoy myself—it’s my chance.", stage: 2 },
                    { text: "I don’t want to hurt my friend’s feelings.", stage: 3 },
                    { text: "Friendship means loyalty and fairness.", stage: 4 },
                    { text: "Excluding others damages relationships and community.", stage: 5 },
                    { text: "I should act with compassion and integrity.", stage: 6 }
                ]
            },
            // Dilemma 9
            {
                dilemma: "A friend cheats on a test and asks you not to tell. Do you stay loyal?",
                responses: [
                    { text: "If I tell, my friend might get angry.", stage: 1 },
                    { text: "If I stay quiet, maybe they’ll help me later.", stage: 2 },
                    { text: "I want to be a good friend.", stage: 3 },
                    { text: "Cheating is against school rules.", stage: 4 },
                    { text: "Academic honesty is important for everyone.", stage: 5 },
                    { text: "Truth matters more than loyalty in this case.", stage: 6 }
                ]
            },
            // Dilemma 10
            {
                dilemma: "You’re asked to join a group project but dislike the members. Do you accept?",
                responses: [
                    { text: "If I refuse, the teacher might punish me.", stage: 1 },
                    { text: "Joining might help my grade.", stage: 2 },
                    { text: "I want to be seen as cooperative.", stage: 3 },
                    { text: "It’s my responsibility to work with others.", stage: 4 },
                    { text: "Collaboration teaches respect and teamwork.", stage: 5 },
                    { text: "I should treat everyone with fairness and openness.", stage: 6 }
                ]
            },
            // Dilemma 11
            {
                dilemma: "You see someone vandalizing school property. Do you report it?",
                responses: [
                    { text: "If I don’t report it, I might get blamed.", stage: 1 },
                    { text: "Reporting might earn me praise.", stage: 2 },
                    { text: "I want to protect my school’s reputation.", stage: 3 },
                    { text: "Vandalism breaks school rules.", stage: 4 },
                    { text: "Everyone deserves a safe and clean environment.", stage: 5 },
                    { text: "I must act to protect shared spaces and values.", stage: 6 }
                ]
            },
            // Dilemma 12
            {
                dilemma: "Your teacher makes a mistake in grading. Do you correct them?",
                responses: [
                    { text: "If I say something, I might get in trouble.", stage: 1 },
                    { text: "Correcting it might improve my grade.", stage: 2 },
                    { text: "I want to be honest and respectful.", stage: 3 },
                    { text: "Fairness is part of the school system.", stage: 4 },
                    { text: "Everyone deserves accurate evaluation.", stage: 5 },
                    { text: "Justice and truth are worth standing up for.", stage: 6 }
                ]
            },
            // Dilemma 13
            {
                dilemma: "You’re late for class due to public transport delays. Do you still accept the penalty?",
                responses: [
                    { text: "If I argue, I might get punished more.", stage: 1 },
                    { text: "Accepting it might make the teacher lenient next time.", stage: 2 },
                    { text: "I want to show I respect the teacher.", stage: 3 },
                    { text: "Rules are rules, even if it’s not my fault.", stage: 4 },
                    { text: "Rules should be flexible for fairness.", stage: 5 },
                    { text: "I should explain honestly and seek understanding.", stage: 6 }
                ]
            },
            // Dilemma 14
            {
                dilemma: "You’re asked to follow a school rule that seems unfair. Do you obey?",
                responses: [
                    { text: "If I disobey, I’ll get punished.", stage: 1 },
                    { text: "Obeying might help me avoid trouble.", stage: 2 },
                    { text: "I want to be seen as respectful.", stage: 3 },
                    { text: "Rules must be followed to maintain order.", stage: 4 },
                    { text: "Rules should be questioned if they’re unjust.", stage: 5 },
                    { text: "I must act according to fairness and conscience.", stage: 6 }
                ]
            },
            // Dilemma 15
            {
                dilemma: "You’re offered a shortcut to get a visa faster, but it’s not legal. Do you take it?",
                responses: [
                    { text: "I could get caught and punished.", stage: 1 },
                    { text: "It’s tempting because it saves time.", stage: 2 },
                    { text: "I don’t want others to think I cheated.", stage: 3 },
                    { text: "Breaking immigration laws is wrong.", stage: 4 },
                    { text: "Legal systems protect fairness for all.", stage: 5 },
                    { text: "I must respect justice, even if it’s inconvenient.", stage: 6 }
                ]
            },
            // Dilemma 16
            {
                dilemma: "Your school bans speaking Chinese during class. Do you challenge the rule?",
                responses: [
                    { text: "If I speak Chinese, I’ll get punished.", stage: 1 },
                    { text: "Following the rule might help my German improve.", stage: 2 },
                    { text: "I want to be seen as cooperative.", stage: 3 },
                    { text: "Rules are made to support learning.", stage: 4 },
                    { text: "Language rights should be respected.", stage: 5 },
                    { text: "I must stand up for cultural identity and inclusion.", stage: 6 }
                ]
            },
            // Dilemma 17
            {
                dilemma: "You learn your host family is discriminating against another student. Do you speak out?",
                responses: [
                    { text: "If I speak out, they might punish me.", stage: 1 },
                    { text: "Speaking out might help the student and earn respect.", stage: 2 },
                    { text: "I want to be seen as caring and fair.", stage: 3 },
                    { text: "Discrimination violates social rules.", stage: 4 },
                    { text: "Everyone deserves equal treatment.", stage: 5 },
                    { text: "I must defend human dignity and justice.", stage: 6 }
                ]
            },
            // Dilemma 18
            {
                dilemma: "A friend is being bullied online. Do you intervene even if it risks your reputation?",
                responses: [
                    { text: "If I get involved, I might be targeted too.", stage: 1 },
                    { text: "Helping might make my friend grateful.", stage: 2 },
                    { text: "I want to be a supportive friend.", stage: 3 },
                    { text: "Bullying is against school policy.", stage: 4 },
                    { text: "Everyone has the right to feel safe.", stage: 5 },
                    { text: "I must protect others, even at personal cost.", stage: 6 }
                ]
            },
            // Dilemma 19
            {
                dilemma: "You’re asked to participate in a protest for international student rights. Do you join?",
                responses: [
                    { text: "I might get in trouble if I join.", stage: 1 },
                    { text: "Joining might benefit me and others.", stage: 2 },
                    { text: "I want to show solidarity.", stage: 3 },
                    { text: "Protesting must follow legal guidelines.", stage: 4 },
                    { text: "Rights are worth defending through peaceful action.", stage: 5 },
                    { text: "Justice requires standing up for the oppressed.", stage: 6 }
                ]
            },
            // Dilemma 20
            {
                dilemma: "You’re offered a scholarship that others say is unfair. Do you accept it?",
                responses: [
                    { text: "If I refuse, I might lose the opportunity.", stage: 1 },
                    { text: "Accepting helps me financially.", stage: 2 },
                    { text: "I don’t want others to think I’m selfish.", stage: 3 },
                    { text: "If it’s legal, I can accept it.", stage: 4 },
                    { text: "I should consider fairness to others.", stage: 5 },
                    { text: "I must act with integrity, even if it costs me.", stage: 6 }
                ]
            },
            // Dilemma 21
            {
                dilemma: "You witness a hate crime against a minority student. Do you testify?",
                responses: [
                    { text: "I might get hurt if I speak up.", stage: 1 },
                    { text: "Testifying might help the victim and earn respect.", stage: 2 },
                    { text: "I want to be seen as brave and fair.", stage: 3 },
                    { text: "It’s my duty to report crimes.", stage: 4 },
                    { text: "Everyone deserves protection under the law.", stage: 5 },
                    { text: "I must defend human rights, no matter the risk.", stage: 6 }
                ]
            },
            // Dilemma 22
            {
                dilemma: "You’re asked to lie to protect your school’s reputation. Do you refuse?",
                responses: [
                    { text: "If I lie, I might get caught.", stage: 1 },
                    { text: "Refusing might hurt my standing.", stage: 2 },
                    { text: "I want to be honest and respected.", stage: 3 },
                    { text: "Lying violates ethical standards.", stage: 4 },
                    { text: "Truth is essential for institutional trust.", stage: 5 },
                    { text: "I must uphold truth, even under pressure.", stage: 6 }
                ]
            },
            // Dilemma 24
            {
                dilemma: "You’re told to ignore a homeless person asking for help. Do you assist anyway?",
                responses: [
                    { text: "If I help, I might get in trouble with the people who told me not to.", stage: 1 },
                    { text: "Helping might make me feel good or earn praise.", stage: 2 },
                    { text: "I want others to see me as compassionate.", stage: 3 },
                    { text: "If helping is against the rules, I shouldn’t do it.", stage: 4 },
                    { text: "Everyone deserves dignity and support, regardless of their situation.", stage: 5 },
                    { text: "I must act out of empathy and justice, even if others disagree.", stage: 6 }
                ]
            },
            // Dilemma 25
            {
                dilemma: "You’re asked to choose between loyalty to your country and defending human rights. What do you do?",
                responses: [
                    { text: "If I choose human rights, I might be punished by authorities.", stage: 1 },
                    { text: "Choosing human rights might benefit me or others in the long run.", stage: 2 },
                    { text: "I want to be seen as someone who cares about people.", stage: 3 },
                    { text: "Loyalty to my country is a duty I shouldn’t break.", stage: 4 },
                    { text: "Human rights are part of a global agreement that transcends borders.", stage: 5 },
                    { text: "I must follow my conscience and defend justice, even against national pressure.", stage: 6 }
                ]
            }
        ];

        const stageInfo = {
            1: { title: "Stage 1: Obedience and Punishment", description: "Moral reasoning is based on avoiding punishment from a figure of authority." },
            2: { title: "Stage 2: Self-Interest", description: "Moral reasoning is guided by self-benefit, rewards, and what's 'in it for me'." },
            3: { title: "Stage 3: Interpersonal Accord", description: "Moral reasoning is based on social approval, maintaining relationships, and being seen as a 'good' person." },
            4: { title: "Stage 4: Authority and Social Order", description: "Moral reasoning is based on maintaining law and order, following rules, and respecting authority." },
            5: { title: "Stage 5: Social Contract", description: "Moral reasoning is based on social values, individual rights, and principles that benefit the wider community." },
            6: { title: "Stage 6: Universal Ethical Principles", description: "Moral reasoning is guided by deeply held, internal principles of justice and ethics, even if they conflict with laws or rules." }
        };
        
        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultsScreen = document.getElementById('results-screen');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const playAgainBtn = document.getElementById('play-again-btn');
        const dilemmaText = document.getElementById('dilemma-text');
        const responsesContainer = document.getElementById('responses-container');
        const progressText = document.getElementById('progress-text');
        const feedbackText = document.getElementById('feedback-text');
        const resultStageTitle = document.getElementById('result-stage-title');
        const resultStageDescription = document.getElementById('result-stage-description');

        // Game State
        let currentDilemmaIndex = 0;
        let userResponses = [];
        let shuffledDilemmas = [];
        const dilemmasPerGame = 5; // Let's show 5 random dilemmas per game session

        // Event Listeners
        startBtn.addEventListener('click', startGame);
        nextBtn.addEventListener('click', nextDilemma);
        playAgainBtn.addEventListener('click', startGame);

        function shuffleArray(array) {
            // Fisher-Yates shuffle for a better shuffle
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            currentDilemmaIndex = 0;
            userResponses = [];
            // Shuffle the main list and take a slice for the current game
            shuffledDilemmas = shuffleArray([...dilemmas]).slice(0, dilemmasPerGame);
            
            startScreen.classList.add('hidden');
            resultsScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            nextBtn.classList.add('hidden');

            displayDilemma();
        }

        function displayDilemma() {
            feedbackText.textContent = '';
            feedbackText.classList.remove('text-blue-700');
            const dilemma = shuffledDilemmas[currentDilemmaIndex];
            dilemmaText.textContent = dilemma.dilemma;
            progressText.textContent = `Dilemma ${currentDilemmaIndex + 1} of ${shuffledDilemmas.length}`;
            
            responsesContainer.innerHTML = '';
            const shuffledResponses = shuffleArray([...dilemma.responses]);

            shuffledResponses.forEach(response => {
                const button = document.createElement('button');
                button.textContent = response.text;
                button.classList.add('w-full', 'p-4', 'border-2', 'border-gray-300', 'rounded-lg', 'text-left', 'hover:bg-gray-200', 'hover:border-blue-500', 'btn');
                button.onclick = () => selectAnswer(response.stage, button);
                responsesContainer.appendChild(button);
            });
        }

        function selectAnswer(stage, selectedButton) {
            userResponses.push(stage);
            
            feedbackText.textContent = `${stageInfo[stage].title}`;
            feedbackText.classList.add('text-blue-700');

            Array.from(responsesContainer.children).forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50');
            });

            selectedButton.classList.remove('opacity-50');
            selectedButton.classList.add('border-blue-600', 'bg-blue-50', 'border-4');
            
            nextBtn.classList.remove('hidden');
        }

        function nextDilemma() {
            currentDilemmaIndex++;
            if (currentDilemmaIndex < shuffledDilemmas.length) {
                nextBtn.classList.add('hidden');
                displayDilemma();
            } else {
                showResults();
            }
        }

        function showResults() {
            gameScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');

            const stageCounts = userResponses.reduce((acc, stage) => {
                acc[stage] = (acc[stage] || 0) + 1;
                return acc;
            }, {});
            
            let mostFrequentStage = '1'; // Default
            if (Object.keys(stageCounts).length > 0) {
                 mostFrequentStage = Object.keys(stageCounts).reduce((a, b) => stageCounts[a] > stageCounts[b] ? a : b);
            }

            resultStageTitle.textContent = stageInfo[mostFrequentStage].title;
            resultStageDescription.textContent = stageInfo[mostFrequentStage].description;
        }

    </script>
</body>
</html>
