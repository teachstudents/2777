<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Mitchell's B1 Listening Test - Test 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }
        .card {
            background-color: white;
            border-radius: 1.5rem;
            padding: 1.5rem; /* Reduced padding */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem; /* Reduced padding */
            font-size: 0.875rem; /* Smaller base font size */
            border-radius: 0.75rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn-primary {
            background-color: #4f46e5;
            color: white;
            font-size: 1rem; /* Keep primary buttons larger */
            padding: 0.75rem 1.5rem;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #374151;
            border-color: #d1d5db;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #d1d5db;
        }
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .option-btn {
            flex: 1; /* Allow buttons to grow and fill space */
            background-color: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }
        .option-btn.selected {
            background-color: #6366f1;
            color: white;
            border-color: #4f46e5;
        }
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #059669;
        }
        .option-btn.incorrect {
            background-color: #ef4444;
            color: white;
            border-color: #dc2626;
        }
        #speaker-icon path {
            transition: fill 0.3s ease;
        }
        .speaking #speaker-icon {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="w-full max-w-3xl mx-auto">
        <!-- Start Screen -->
        <div id="start-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Joel Mitchell's B1 Listening - Test 12</h1>
            <div class="mb-6 w-full max-w-sm mx-auto">
                <label for="player-name-input" class="block text-gray-700 text-lg mb-2 font-medium">Enter your name to begin</label>
                <input type="text" id="player-name-input" class="w-full p-3 border border-gray-300 rounded-lg text-center text-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Player Name">
                <p id="name-error" class="text-red-500 text-sm mt-2 h-4"></p>
            </div>
            <p class="text-gray-600 mb-8 text-base">This is a 50-question test. Each correct answer is worth 2 points. The audio will play automatically for each group.</p>
            <button id="start-btn" class="btn btn-primary text-xl px-12 py-4">Start Test</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="card hidden">
            <div class="flex justify-between items-center mb-4">
                <div id="player-display" class="text-lg font-semibold text-gray-700 w-1/2 text-left truncate"></div>
                <div id="score" class="text-lg font-semibold text-indigo-600 w-1/2 text-right">Score: 0</div>
            </div>

            <div class="mb-6">
                 <button id="play-audio-btn" class="btn btn-secondary w-full mb-4">
                    <svg id="speaker-icon" class="w-6 h-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                    </svg>
                    <span id="play-audio-text">Replay Audio</span>
                </button>
                <div id="questions-container" class="space-y-4">
                    <!-- Questions for the group will be dynamically inserted here -->
                </div>
            </div>
            
            <div id="submission-area" class="mt-8 text-center">
                 <button id="submit-btn" class="btn btn-primary text-lg px-10 py-3">Submit Answers</button>
                 <button id="next-group-btn" class="btn btn-primary text-lg px-10 py-3 hidden">Next</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="card text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">Test Complete!</h1>
            <p id="final-score" class="text-gray-600 mb-8 text-2xl"></p>
            <button id="restart-btn" class="btn btn-primary text-xl px-12 py-4">Play Again</button>
        </div>
    </div>

    <script>

        // --- Grouped Game Data (50 Questions) ---
        const gameData = [

                    { question: "In which country did the event take place?", options: ["USA", "Canada", "UK"], answer: "Canada" },
                    { question: "What was the main problem?", options: ["They forgot the food", "The refrigerator truck broke down", "They were late"], answer: "The refrigerator truck broke down" },
                    { question: "What was the consequence of this problem?", options: ["The food was served late", "The event was cancelled", "The food spoiled"], answer: "The food was served late" },
                    { question: "What does 'precarious' mean in this context?", options: ["Perfectly safe", "Not securely held; dangerously likely to fall or collapse", "Well-planned"], answer: "Not securely held; dangerously likely to fall or collapse" }

                audioscript: "My name is Paolo, a Brazilian architect. I was scheduled to give a keynote presentation at a conference in Lisbon, Portugal, this Friday at 11 AM. Unfortunately, I came down with a terrible flu on Wednesday. I completely lost my voice. There was no way I could travel or speak. I had to contact the organizers and withdraw from the event. They were very understanding. A colleague of mine has agreed to step in and present my work instead. It's a huge disappointment.",

                    { question: "How did she solve the problem?", options: ["She used her phone", "She used her backup camera", "She rented a camera"], answer: "She used her backup camera" },
                    { question: "What does 'pristine' mean here?", options: ["Blurry", "In its original, perfect condition", "Dark"], answer: "In its original, perfect condition" }
                ]
            },
            {
                audioscript: "My name is Ahmed, and I'm a journalist from Egypt. I was on assignment in Turkey, covering a story. I was supposed to fly back home to Cairo last night, on a flight at 9 PM. However, when I got to the airport, I realized my passport was missing. I must have left it in my hotel room. The hotel was an hour away. It was an exasperating situation. I missed my flight, of course. I had to book a room at an airport hotel and arrange for a courier to bring my passport this morning.",
                questions: [
                    { question: "What is the speaker's nationality?", options: ["Turkish", "Egyptian", "Greek"], answer: "Egyptian" },
                    { question: "What was the speaker's problem?", options: ["His flight was cancelled", "He lost his ticket", "His passport was missing"], answer: "His passport was missing" },

             {

                    { question: "What does 'catastrophe' mean here?", options: ["A minor problem", "A sudden, great disaster", "A happy event"], answer: "A sudden, great disaster" }

                questions: [

                    { question: "In this context, what does 'forfeit' mean?", options: ["To win easily", "To play a very long game", "To lose or give up something as a penalty"], answer: "To lose or give up something as a penalty" }

            },
            {
                audioscript: "I'm a Canadian film director named Sophie. We were shooting a crucial scene for my new movie in the Scottish Highlands. The scene involved a dramatic sunrise, so we had to be on location by 4 AM this morning. However, when we arrived, we found that a key piece of camera equipment—the special lens for wide shots—had been left behind at the hotel in Glasgow, which was two hours away. It was an infuriating oversight. We had to send a driver back for it and ended up shooting a different, less important scene instead.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Actor", "Producer", "Film Director"], answer: "Film Director" },
                    { question: "In which country were they filming?", options: ["Canada", "England", "Scotland"], answer: "Scotland" },

                    { question: "What was the problem?", options: ["The actors were late", "The weather was bad", "A piece of equipment was missing"], answer: "A piece of equipment was missing" },
                    { question: "What does 'oversight' mean here?", options: ["A careful plan", "An unintentional failure to notice or do something", "A type of camera lens"], answer: "An unintentional failure to notice or do something" }
                ]
            },
            {
                audioscript: "My name is Adama, and I'm a tailor from Senegal. I have a shop in Dakar. Last week, a client from France brought me a very expensive, delicate silk fabric to make a dress for a wedding. The wedding is this Saturday. I was scheduled to finish the dress by Wednesday. As I was making the final stitch on Tuesday, my sewing machine malfunctioned and tore a small hole in the fabric. It was a disastrous moment. I had to meticulously repair the hole by hand. It took me all night, but you can't even see it now.",
                questions: [
                    { question: "What is the speaker's career?", options: ["Fashion Designer", "Tailor", "Shop Assistant"], answer: "Tailor" },
                    { question: "Where is the client from?", options: ["Senegal", "France", "USA"], answer: "France" },
                    { question: "What was the problem with the sewing machine?", options: ["It broke down completely", "It was too slow", "It tore the fabric"], answer: "It tore the fabric" },
                    { question: "How did the speaker solve the problem?", options: ["He bought new fabric", "He repaired it by hand", "He used a different machine"], answer: "He repaired it by hand" },
                    { question: "In the text, what does 'meticulously' mean?", options: ["Quickly and carelessly", "With great attention to detail; very carefully", "With help from a friend"], answer: "With great attention to detail; very carefully" }
                ]
            },
            {
                audioscript: "I'm a Dutch landscape architect named Eva. I designed a public garden for the city of Amsterdam in the Netherlands. The grand opening was planned for last Saturday at noon. A key feature of the garden is a complex water fountain. On Friday afternoon, during the final tests, we discovered a major leak in the fountain's plumbing system. It was a huge setback. We had to postpone the opening by a week to allow for the necessary repairs. It was very disappointing for everyone involved.",
                questions: [
                    { question: "What is the speaker's nationality?", options: ["German", "Belgian", "Dutch"], answer: "Dutch" },
                    { question: "What did the speaker design?", options: ["A building", "A public garden", "A playground"], answer: "A public garden" },
                    { question: "When was the grand opening originally planned for?", options: ["Friday afternoon", "Saturday noon", "Sunday morning"], answer: "Saturday noon" },
                    { question: "What was the problem that occurred?", options: ["The flowers died", "There was a leak in the fountain", "The mayor couldn't attend"], answer: "There was a leak in the fountain" },

                ]
            }
        ];
        
        // --- Audio & TTS Functions ---
        function initAudio() {
            if (typeof Tone === 'undefined') {
                console.warn("Tone.js not loaded. Sound effects disabled.");
                return;
            }
            correctSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
            incorrectSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 0.5 } }).toDestination();
            isAudioReady = true;
        }

        function initSpeechSynthesis() {
            if (!('speechSynthesis' in window)) {
                console.warn("Speech Synthesis not supported");
                return;
            }
            const setVoices = () => {
                const allVoices = speechSynthesis.getVoices();
                if (allVoices.length > 0) {
                    availableVoices = allVoices.filter(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('neural') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('natural')));
                    if (availableVoices.length === 0) { // Fallback to any English voices
                        availableVoices = allVoices.filter(v => v.lang.startsWith('en'));
                    }
                }
            };
            setVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = setVoices;
            }
        }

        function startSpeechKeepAlive() {
            if (window.speechSynthesis) {
                stopSpeechKeepAlive(); // Clear any existing interval
                speechKeepAliveInterval = setInterval(() => {
                    if (speechSynthesis && !speechSynthesis.speaking) {
                        const keepAliveUtterance = new SpeechSynthesisUtterance('');
                        keepAliveUtterance.volume = 0;
                        speechSynthesis.speak(keepAliveUtterance);
                    }
                }, 10000);
            }
        }

        function stopSpeechKeepAlive() {
            if (speechKeepAliveInterval) {
                clearInterval(speechKeepAliveInterval);
                speechKeepAliveInterval = null;
            }
        }

        function speak(text, callback) {
            if (!('speechSynthesis' in window) || availableVoices.length === 0) {
                console.warn("Speech synthesis not ready or no voices available.");
                if (callback) setTimeout(callback, 50);
                return;
            }
            
            stopSpeechKeepAlive(); // Stop the keep-alive timer before speaking
            speechSynthesis.cancel();
            
            playAudioBtn.classList.add('speaking');
            playAudioText.textContent = "Playing...";
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = availableVoices[currentGroupIndex % availableVoices.length];
            
            const onEndOrError = (e) => {
                if (e.type === 'error') {
                    console.error("SpeechSynthesisUtterance.onerror:", e.error);
                }
                playAudioBtn.classList.remove('speaking');
                playAudioText.textContent = "Replay Audio";
                startSpeechKeepAlive(); // Restart the timer after speaking
                if (callback) callback();
            };

            utterance.onend = onEndOrError;
            utterance.onerror = onEndOrError;

            speechSynthesis.speak(utterance);
        }

        // --- Game Logic ---
        function startGame() {
            playerName = playerNameInput.value.trim();
            if (playerName === '') {
                nameErrorEl.textContent = 'Please enter your name!';
                playerNameInput.classList.add('border-red-500');
                return; 
            }
            nameErrorEl.textContent = '';
            playerNameInput.classList.remove('border-red-500');

            if (Tone.context.state !== 'running') {
                Tone.start().catch(e => console.error("Could not start Tone.js", e));
            }
            
            startSpeechKeepAlive();

            score = 0;
            currentGroupIndex = 0;
            globalQuestionCounter = 1;
            questionGroups = [...gameData];
            scoreEl.textContent = `Score: ${score}`;
            playerDisplayEl.textContent = playerName;
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            displayGroup();
        }

        function displayGroup() {
            nextGroupBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            
            const group = questionGroups[currentGroupIndex];
            questionsContainer.innerHTML = '';
            
            playAudioBtn.disabled = true;
            playAudioBtn.onclick = () => {
                 playAudioBtn.disabled = true;
                 speak(group.audioscript, () => { playAudioBtn.disabled = false; });
            };

            group.questions.forEach((q) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'p-3 border border-gray-200 rounded-lg';
                questionDiv.dataset.questionIndex = globalQuestionCounter;

                const questionTitle = document.createElement('h3');
                questionTitle.className = 'text-base font-semibold text-gray-800 mb-2'; // Smaller font
                questionTitle.textContent = `Q${globalQuestionCounter}: ${q.question}`;
                questionDiv.appendChild(questionTitle);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'flex items-center space-x-2'; // Horizontal layout
                
                q.options.forEach(optionText => {
                    const optionButton = document.createElement('button');
                    optionButton.textContent = optionText;
                    optionButton.className = 'btn option-btn';
                    optionButton.dataset.option = optionText;
                    optionButton.onclick = () => selectOption(optionButton);
                    optionsDiv.appendChild(optionButton);
                });

                questionDiv.appendChild(optionsDiv);
                questionsContainer.appendChild(questionDiv);
                globalQuestionCounter++;
            });
            
            speak(group.audioscript, () => {
                playAudioBtn.disabled = false;
            });
        }

        function selectOption(selectedButton) {
            const questionDiv = selectedButton.closest('[data-question-index]');
            questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            selectedButton.classList.add('selected');
        }

        function checkAnswers() {
            const group = questionGroups[currentGroupIndex];
            let allAnswered = true;

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');

                if (!selectedBtn) {
                    allAnswered = false;
                }
            });

            if (!allAnswered) {
                const modal = document.createElement('div');
                modal.style.position = 'fixed';
                modal.style.top = '20px';
                modal.style.left = '50%';
                modal.style.transform = 'translateX(-50%)';
                modal.style.backgroundColor = '#fefcbf';
                modal.style.color = '#92400e';
                modal.style.padding = '1rem';
                modal.style.borderRadius = '0.5rem';
                modal.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                modal.style.zIndex = '100';
                modal.textContent = 'Please answer all questions before submitting.';
                document.body.appendChild(modal);
                setTimeout(() => modal.remove(), 3000);
                return;
            }

            questionsContainer.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            submitBtn.classList.add('hidden');
            nextGroupBtn.classList.remove('hidden');

            group.questions.forEach((q, index) => {
                const questionDiv = questionsContainer.children[index];
                const selectedBtn = questionDiv.querySelector('.option-btn.selected');
                const selectedAnswer = selectedBtn.dataset.option;

                if (selectedAnswer.toLowerCase() === q.answer.toLowerCase()) {
                    score += 2;
                    selectedBtn.classList.add('correct');
                    if(isAudioReady) correctSynth.triggerAttackRelease("C5", "8n", Tone.now() + index * 0.1);
                } else {
                    selectedBtn.classList.add('incorrect');
                    if(isAudioReady) incorrectSynth.triggerAttackRelease("C3", "4n", Tone.now() + index * 0.1);
                    questionDiv.querySelectorAll('.option-btn').forEach(btn => {
                        if (btn.dataset.option.toLowerCase() === q.answer.toLowerCase()) {
                            btn.classList.add('correct');
                        }
                    });
                }
            });
            scoreEl.textContent = `Score: ${score}`;
        }
        
        function nextGroup() {
            currentGroupIndex++;
            if (currentGroupIndex < questionGroups.length) {
                displayGroup();
            } else {
                endGame();
            }
        }

        function endGame() {
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            const totalQuestions = questionGroups.reduce((acc, group) => acc + group.questions.length, 0);
            finalScoreEl.textContent = `Well done, ${playerName}! Your final score is ${score} out of ${totalQuestions * 2}.`;
            
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', startGame);
        submitBtn.addEventListener('click', checkAnswers);
        nextGroupBtn.addEventListener('click', nextGroup);
        restartBtn.addEventListener('click', () => {
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            stopSpeechKeepAlive();
            if (window.speechSynthesis) {
                speechSynthesis.cancel();
            }
        });
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });


        // --- Initialisation ---
        window.onload = () => {
            initAudio();
            initSpeechSynthesis();
        };

    </script>
</body>
</html>
