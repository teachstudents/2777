<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Parts of Speech Sort</title>
  <style>
    :root {
      --bg-main: #1a103c;
      --bg-container: #2e1e5b;
      --primary-color: #ff6ac1;
      --primary-dark: #e058a8;
      --text-light: #f0f2f5;
      --text-dark: #a0aec0;
      --border-color: #4a3f7a;
      --correct-color: #00f5d4;
      --incorrect-color: #ff5555;
      --gold-color: #f7b801;
      --accent-cyan: #00f5d4;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    
    @keyframes background-pan {
      0% { background-color: #1a103c; }
      50% { background-color: #2c1a4a; }
      100% { background-color: #1a103c; }
    }

    html {
      box-sizing: border-box;
      font-size: 100%;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-light);
      margin: 0;
      min-height: 100vh;
      font-size: 16px;
      overflow: hidden; /* Prevent scrollbars from the main layout */
      touch-action: manipulation;
      animation: background-pan 20s linear infinite;
    }
    .app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .screen {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1em;
      box-sizing: border-box;
      overflow-y: auto;
      width: 100%;
      height: 100%;
    }
    .screen.active {
      display: flex;
    }
    #game-board {
      display: flex;
      flex-grow: 1;
      gap: 12px;
      padding: 10px;
      width: 100%;
      height: 100%;
      max-width: 1400px; /* Increased max-width for better side-by-side */
      max-height: 90vh; /* Give it a max height for large screens */
      box-sizing: border-box;
      display: none; /* Hidden by default, shown by JS */
    }
    #game-board.visible {
        display: flex;
    }
    /* 1 Player Mode Specific Styles */
    #game-board.one-player {
        justify-content: center;
    }
    #game-board.one-player #game-instance-2 {
        display: none;
    }
    #game-board.one-player #game-instance-1 {
        width: 100%;
        max-width: 800px;
    }
    #end-screen-container.one-player #p2-result {
        display: none;
    }
    #end-screen-container.one-player #winner-announcement {
        display: none;
    }

    .game-instance {
      width: 50%;
      height: 100%;
      border: 1px solid var(--border-color);
      border-radius: 15px;
      background-color: var(--bg-container);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: center;
      padding: 0.5em 1em;
      font-size: 1em;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--border-color);
      gap: 12px;
    }
    .hud-item { color: var(--accent-cyan); }
    .hud-item span { color: var(--text-light); }
    .word-bank {
      background-color: rgba(0,0,0,0.2);
      padding: 1em;
      border-radius: 10px;
      margin-bottom: 1.5em;
      width: 95%;
      max-width: 420px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border-color);
      margin-left: auto;
      margin-right: auto;
    }
    .word {
      background-color: var(--primary-color);
      color: var(--bg-main);
      padding: 0.6em 1.2em;
      border-radius: 8px;
      cursor: grab;
      font-size: 1.7em;
      font-weight: bold;
      user-select: none;
      min-width: 70px;
      min-height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.2em;
      touch-action: none; /* Let our pointer events handle it */
    }
    .word.dragging { opacity: 0.4; cursor: grabbing; transform: scale(1.05); }
    .feedback-display {
      font-size: 1.5em;
      font-weight: bold;
      transition: opacity 0.3s;
    }
    .feedback-correct { color: var(--correct-color); }
    .feedback-incorrect { color: var(--incorrect-color); }
    .drop-zones {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .zone {
      min-height: 60px;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.1em;
      font-weight: bold;
      transition: all 0.2s;
      padding: 0.9em;
      background-color: var(--bg-main);
    }
    .zone.drag-over { border-color: var(--primary-color); transform: translateY(-3px);}
    .zone.flash-correct { animation: flash-correct 0.5s;}
    .zone.flash-incorrect { animation: flash-incorrect 0.5s;}
    @keyframes flash-correct { 50% { background-color: var(--correct-color); color: var(--bg-main); } }
    @keyframes flash-incorrect { 50% { background-color: var(--incorrect-color); } }
    
    button, input[type="text"] {
      background-color: var(--primary-color);
      color: var(--bg-main);
      border: none;
      padding: 1em 2em;
      font-size: 1.1em;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin: 10px;
      min-width: 48px;
      min-height: 48px;
      box-sizing: border-box;
    }
    button:active, button:focus, button:hover {
      background-color: var(--primary-dark);
      outline: none;
      transform: translateY(-3px);
    }
    input[type="text"] {
      margin: 0 5px;
      max-width: 150px;
      color: var(--text-light);
      border: 1px solid var(--border-color);
      background-color: var(--bg-main);
      font-size: 1.1em;
      font-family: inherit;
      padding: 0.7em 1em;
      text-align: center;
    }
    h1 { font-size: 2.5em;}
    h2 { font-size: 1.8em;}
    
    #name-input-area { display: none; }
    #name-input-area.visible { display: flex; flex-direction: column; align-items: center; }
    #name-fields { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }

    #end-screen-container .results-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      width: 100%;
      max-width: 800px;
      margin: 2em 0;
    }
    #end-screen-container .player-result {
      background-color: var(--bg-main);
      padding: 2em;
      border-radius: 10px;
      border: 2px solid var(--border-color);
      min-width: 180px;
      margin: 0.5em;
    }
    #end-screen-container .player-result.winner {
      border-color: var(--gold-color);
      box-shadow: 0 0 20px var(--gold-color);
    }
    #particle-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999;}
    .particle {
      position: absolute;
      border-radius: 50%;
    }
    
    /* Responsive Layout: Stack players only on narrow screens */
    @media (max-width: 700px) {
      #game-board.visible { 
        flex-direction: column; 
        max-height: none; /* Allow full height on mobile */
      }
      .game-instance { width: 100%; min-height: 250px; height: 50%; }
    }

    @media (max-width: 600px) {
      html { font-size: 15px;}
      h1 { font-size: 2em;}
      .hud { font-size: 0.9em;}
      .drop-zones { grid-template-columns: 1fr; }
      .game-instance { min-height: 220px;}
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="start-screen-container" class="screen active" role="main">
      <h1>Parts of Speech Sort</h1>
      <p style="color: var(--text-dark); max-width: 500px;">Drag each word to its category. Play solo or race a friend!</p>
      
      <div id="mode-selection">
          <button id="one-player-btn">1 Player</button>
          <button id="two-player-btn">2 Players</button>
      </div>

      <div id="name-input-area">
          <div id="name-fields">
              <!-- JS will populate this -->
          </div>
          <button id="start-game-btn" aria-label="Start Game">Start Game</button>
      </div>
    </div>

    <div id="game-board" role="region" aria-label="Game Board">
      <div id="game-instance-1" class="game-instance"></div>
      <div id="game-instance-2" class="game-instance"></div>
    </div>

    <div id="end-screen-container" class="screen" role="main">
      <h1 id="end-screen-title">Game Over!</h1>
      <h2 id="winner-announcement"></h2>
      <div class="results-container">
        <div id="p1-result" class="player-result">
          <h3 id="p1-final-name">Player 1</h3>
          <p>Score: <span id="p1-final-score">0</span></p>
          <p>Tokens: <span id="p1-final-tokens">0</span></p>
        </div>
        <div id="p2-result" class="player-result">
          <h3 id="p2-final-name">Player 2</h3>
          <p>Score: <span id="p2-final-score">0</span></p>
          <p>Tokens: <span id="p2-final-tokens">0</span></p>
        </div>
      </div>
      <button id="play-again-btn" aria-label="Play Again">Play Again</button>
    </div>
  </div>

  <div id="particle-container"></div>

  <template id="game-instance-template">
    <div class="hud">
      <div class="hud-item">Player: <span class="player-name-display"></span></div>
      <div class="hud-item">Level: <span class="level-display">A1</span></div>
      <div class="hud-item">Score: <span class="score">0</span></div>
      <div class="hud-item">Tokens: <span class="tokens">0</span></div>
      <div class="hud-item">Time: <span class="timer">0:00</span></div>
    </div>
    <div class="screen sorting-screen active">
      <div class="level-interstitial" style="display:none; flex-direction:column;">
        <h2 class="level-interstitial-title"></h2>
        <div class="countdown-display" style="font-size:3em; font-weight:bold;"></div>
      </div>
      <div class="word-bank"></div>
      <div class="drop-zones"></div>
    </div>
  </template>

  <script>
    // --- Cross-browser, dependency-free synth sound ---
    const AudioHelper = (() => {
      let audioCtx = null;
      function getCtx() {
        if (!audioCtx) {
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          } catch(e) {
            console.error("Web Audio API is not supported in this browser");
            return null;
          }
        }
        return audioCtx;
      }
      function play(notes, baseVolume = 0.1) {
          const ctx = getCtx();
          if (!ctx) return;
          if (ctx.state === 'suspended') { ctx.resume(); }
          let now = ctx.currentTime;
          notes.forEach(note => {
              const [freq, duration, type, delay] = note;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, now + delay);
              gain.gain.setValueAtTime(baseVolume, now + delay);
              gain.gain.exponentialRampToValueAtTime(0.00001, now + delay + duration/1000);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(now + delay);
              osc.stop(now + delay + duration/1000);
          });
      }
      async function unlockCtx() {
        const ctx = getCtx();
        if (ctx && ctx.state === 'suspended') {
          try { await ctx.resume(); } catch(e) { console.error("Could not unlock audio context:", e); }
        }
      }
      return {
        correct: () => play([[659, 100, 'sine', 0], [880, 100, 'sine', 0.08]], 0.15),
        incorrect: () => play([[220, 180, 'square', 0]], 0.13),
        levelup: () => play([[523,100,'triangle',0],[659,100,'triangle',0.1],[784,100,'triangle',0.2],[1046,200,'triangle',0.3]], 0.18),
        token: () => play([[1200, 80, 'triangle', 0]], 0.1),
        unlock: unlockCtx
      };
    })();

    // --- Word Data ---
    const wordData = {
      'A1': [{word:"apple",pos:"noun"},{word:"run",pos:"verb"},{word:"big",pos:"adjective"},{word:"happy",pos:"adjective"},{word:"house",pos:"noun"},{word:"eat",pos:"verb"},{word:"small",pos:"adjective"},{word:"go",pos:"verb"},{word:"book",pos:"noun"},{word:"quickly",pos:"adverb"},{word:"sad",pos:"adjective"},{word:"friend",pos:"noun"},{word:"see",pos:"verb"},{word:"red",pos:"adjective"},{word:"dog",pos:"noun"},{word:"play",pos:"verb"},{word:"slowly",pos:"adverb"},{word:"water",pos:"noun"},{word:"good",pos:"adjective"},{word:"write",pos:"verb"},{word:"always",pos:"adverb"},{word:"car",pos:"noun"},{word:"bad",pos:"adjective"},{word:"read",pos:"verb"},{word:"school",pos:"noun"}],
      'A2': [{word:"journey",pos:"noun"},{word:"decide",pos:"verb"},{word:"beautiful",pos:"adjective"},{word:"carefully",pos:"adverb"},{word:"opinion",pos:"noun"},{word:"arrive",pos:"verb"},{word:"interesting",pos:"adjective"},{word:"never",pos:"adverb"},{word:"language",pos:"noun"},{word:"explain",pos:"verb"},{word:"comfortable",pos:"adjective"},{word:"often",pos:"adverb"},{word:"equipment",pos:"noun"},{word:"suggest",pos:"verb"},{word:"delicious",pos:"adjective"},{word:"usually",pos:"adverb"},{word:"adventure",pos:"noun"},{word:"believe",pos:"verb"},{word:"expensive",pos:"adjective"},{word:"sometimes",pos:"adverb"},{word:"knowledge",pos:"noun"},{word:"promise",pos:"verb"},{word:"famous",pos:"adjective"},{word:"probably",pos:"adverb"},{word:"village",pos:"noun"}],
      'B1': [{word:"advantage",pos:"noun"},{word:"organize",pos:"verb"},{word:"effective",pos:"adjective"},{word:"suddenly",pos:"adverb"},{word:"community",pos:"noun"},{word:"recognize",pos:"verb"},{word:"appropriate",pos:"adjective"},{word:"gradually",pos:"adverb"},{word:"environment",pos:"noun"},{word:"persuade",pos:"verb"},{word:"convenient",pos:"adjective"},{word:"unfortunately",pos:"adverb"},{word:"opportunity",pos:"noun"},{word:"apologize",pos:"verb"},{word:"anxious",pos:"adjective"},{word:"immediately",pos:"adverb"},{word:"responsibility",pos:"noun"},{word:"recommend",pos:"verb"},{word:"reliable",pos:"adjective"},{word:"obviously",pos:"adverb"},{word:"society",pos:"noun"},{word:"communicate",pos:"verb"},{word:"suitable",pos:"adjective"},{word:"eventually",pos:"adverb"},{word:"variety",pos:"noun"}],
      'B2': [{word:"phenomenon",pos:"noun"},{word:"articulate",pos:"verb"},{word:"comprehensive",pos:"adjective"},{word:"subsequently",pos:"adverb"},{word:"consequence",pos:"noun"},{word:"differentiate",pos:"verb"},{word:"sophisticated",pos:"adjective"},{word:"simultaneously",pos:"adverb"},{word:"perspective",pos:"noun"},{word:"interpret",pos:"verb"},{word:"beneficial",pos:"adjective"},{word:"inevitably",pos:"adverb"},{word:"initiative",pos:"noun"},{word:"justify",pos:"verb"},{word:"sustainable",pos:"adjective"},{word:"fundamentally",pos:"adverb"},{word:"infrastructure",pos:"noun"},{word:"manipulate",pos:"verb"},{word:"controversial",pos:"adjective"},{word:"paradoxically",pos:"adverb"},{word:"legislation",pos:"noun"},{word:"synthesize",pos:"verb"},{word:"ambiguous",pos:"adjective"},{word:"consequently",pos:"adverb"},{word:"prejudice",pos:"noun"}]
    };

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    class GameInstance {
      constructor(id, playerName, wordList, particleContainer, onFinishCallback) {
        this.id = id;
        this.container = document.getElementById(`game-instance-${id}`);
        this.playerName = playerName;
        this.masterWordList = wordList;
        this.particleContainer = particleContainer;
        this.onFinish = onFinishCallback;
        this.state = {};
        this.dom = {};
        this.dragState = {};
        this.praiseWords = ["Awesome!", "Excellent!", "Super!", "Great Job!", "Wow!", "Nailed it!", "Fantastic!", "Stellar!", "You're a Star!", "Brilliant!"];
        this.handlePointerMove = this.handlePointerMove.bind(this);
        this.handlePointerEnd = this.handlePointerEnd.bind(this);
        this.init();
      }
      init() {
        this.setupDOM();
        this.resetState();
      }
      setupDOM() {
        const template = document.getElementById('game-instance-template');
        this.container.innerHTML = '';
        this.container.appendChild(template.content.cloneNode(true));
        this.dom = {
          hud: { name: this.container.querySelector('.player-name-display'), level: this.container.querySelector('.level-display'), score: this.container.querySelector('.score'), tokens: this.container.querySelector('.tokens'), timer: this.container.querySelector('.timer'), },
          interstitial: { el: this.container.querySelector('.level-interstitial'), title: this.container.querySelector('.level-interstitial-title'), countdown: this.container.querySelector('.countdown-display') },
          sortingScreen: this.container.querySelector('.sorting-screen'),
          wordBank: this.container.querySelector('.word-bank'),
          dropZonesContainer: this.container.querySelector('.drop-zones')
        };
      }
      resetState() {
        this.state = { score: 0, tokens: 0, currentWordIndex: 0, consecutiveCorrect: 0, gameTimer: null, timeLeft: 0, levelErrors: 0, isFinished: false };
      }
      start(isFirstPlayer) {
        this.createDropZones();
        this.startNextLevel(isFirstPlayer);
      }
      startNextLevel(playSound = true) {
        if (this.state.isFinished) return;
        const currentWord = this.masterWordList[this.state.currentWordIndex];
        if (!currentWord) { this.finishGame(true); return; }
        const currentLevel = currentWord.level;
        if (playSound) { 
            AudioHelper.levelup(); 
            MainController.createFireworks();
        }
        this.dom.interstitial.title.textContent = `Level ${currentLevel}`;
        this.dom.interstitial.el.style.display = 'flex';
        this.dom.wordBank.style.display = 'none';
        this.dom.dropZonesContainer.style.display = 'none';
        let countdown = 3;
        this.dom.interstitial.countdown.textContent = countdown;
        const countdownInterval = setInterval(() => {
          countdown--;
          this.dom.interstitial.countdown.textContent = countdown > 0 ? countdown : 'Go!';
          if (countdown < 0) {
            clearInterval(countdownInterval);
            this.dom.interstitial.el.style.display = 'none';
            this.dom.wordBank.style.display = 'flex';
            this.dom.dropZonesContainer.style.display = 'grid';
            this.state.timeLeft = MainController.gameConfig.timePerLevel;
            this.updateHUD();
            this.startTimer();
            this.presentNextWord();
          }
        }, 1000);
      }
      processNextAction() {
        if(this.state.isFinished) return;
        if (this.state.currentWordIndex >= this.masterWordList.length) {
          this.finishGame(true);
        } else {
          const lastWord = this.masterWordList[this.state.currentWordIndex - 1];
          const nextWord = this.masterWordList[this.state.currentWordIndex];
          if (nextWord && lastWord && nextWord.level !== lastWord.level) {
            this.startNextLevel();
          } else {
            this.presentNextWord();
          }
        }
      }
      finishGame(completed) {
        if(this.state.isFinished) return;
        this.state.isFinished = true;
        clearInterval(this.state.gameTimer);
        this.onFinish({ id: this.id, name: this.playerName, score: this.state.score, tokens: this.state.tokens, completed: completed });
      }
      presentNextWord() {
        if (this.state.currentWordIndex >= this.masterWordList.length) {
            this.finishGame(true);
            return;
        }
        const wordObj = this.masterWordList[this.state.currentWordIndex];
        const wordDiv = document.createElement('div');
        wordDiv.textContent = wordObj.word;
        wordDiv.id = `${this.id}-${wordObj.id}`;
        wordDiv.className = 'word';
        wordDiv.addEventListener('pointerdown', this.handlePointerStart.bind(this));
        this.dom.wordBank.innerHTML = '';
        this.dom.wordBank.appendChild(wordDiv);
      }
      createDropZones() {
        this.dom.dropZonesContainer.innerHTML = '';
        MainController.partsOfSpeech.forEach(pos => {
          const zone = document.createElement('div');
          zone.id = `${this.id}-zone-${pos}`;
          zone.className = 'zone';
          zone.textContent = pos.charAt(0).toUpperCase() + pos.slice(1);
          this.dom.dropZonesContainer.appendChild(zone);
        });
      }
      updateHUD() {
        this.dom.hud.name.textContent = this.playerName;
        this.dom.hud.score.textContent = this.state.score;
        this.dom.hud.tokens.textContent = this.state.tokens;
        if (this.state.currentWordIndex < this.masterWordList.length) {
          this.dom.hud.level.textContent = this.masterWordList[this.state.currentWordIndex].level;
        } else {
          this.dom.hud.level.textContent = 'End';
        }
        const minutes = Math.floor(this.state.timeLeft / 60) || 0;
        const seconds = this.state.timeLeft % 60 || 0;
        this.dom.hud.timer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }
      handleGuess(isCorrect, wordInfo, targetZone) {
        this.dom.wordBank.innerHTML = '';
        const feedback = document.createElement('div');
        feedback.className = 'feedback-display';
        if (isCorrect) {
          this.state.score += 2;
          this.state.consecutiveCorrect++;
          let earnedTokens = 10 + (Math.floor(this.state.consecutiveCorrect / 5) * 5);
          this.state.tokens += earnedTokens;
          const praise = this.praiseWords[Math.floor(Math.random() * this.praiseWords.length)];
          feedback.textContent = `${praise} +${earnedTokens} Tokens`;
          feedback.className += " feedback-correct";
          AudioHelper.correct();
          if (targetZone) this.flashZone(targetZone, true);
          this.createTokenParticles(targetZone);
        } else {
          this.state.score--;
          this.state.consecutiveCorrect = 0;
          this.state.levelErrors++;
          feedback.textContent = "Incorrect!";
          feedback.className += " feedback-incorrect";
          AudioHelper.incorrect();
          if(targetZone) this.flashZone(targetZone, false);
        }
        this.dom.wordBank.appendChild(feedback);
        this.updateHUD();
        this.state.currentWordIndex++;
        setTimeout(() => this.processNextAction(), 900);
      }
      flashZone(zone, isCorrect) {
        if (!zone) return;
        const className = isCorrect ? 'flash-correct' : 'flash-incorrect';
        zone.classList.add(className);
        setTimeout(() => zone.classList.remove(className), 500);
      }
      // --- Pointer Events for unified Mouse and Touch input ---
      // This is the modern approach for handling dragging on all devices.
      handlePointerStart(e) {
        if (this.dragState.dragging) return;
        const wordEl = e.currentTarget;
        // Capture the pointer to ensure events are routed to this element.
        wordEl.setPointerCapture(e.pointerId);
        this.dragState = { dragging: true, wordEl, pointerId: e.pointerId };
        wordEl.classList.add('dragging');
        document.body.addEventListener('pointermove', this.handlePointerMove);
        document.body.addEventListener('pointerup', this.handlePointerEnd);
      }
      handlePointerMove(e) {
        if (!this.dragState.dragging || e.pointerId !== this.dragState.pointerId) return;
        // Make the element follow the cursor/finger
        this.dragState.wordEl.style.position = 'fixed';
        this.dragState.wordEl.style.left = `${e.clientX - this.dragState.wordEl.offsetWidth / 2}px`;
        this.dragState.wordEl.style.top = `${e.clientY - this.dragState.wordEl.offsetHeight / 2}px`;
        this.dragState.wordEl.style.zIndex = '1000';
        
        // Visual feedback for dragging over a drop zone
        document.querySelectorAll(`#game-instance-${this.id} .zone`).forEach(z => z.classList.remove('drag-over'));
        const dropTarget = document.elementFromPoint(e.clientX, e.clientY)?.closest('.zone');
        if (dropTarget && dropTarget.id.startsWith(this.id)) {
            dropTarget.classList.add('drag-over');
        }
      }
      handlePointerEnd(e) {
        if (!this.dragState.dragging || e.pointerId !== this.dragState.pointerId) return;
        
        const { wordEl } = this.dragState;
        wordEl.releasePointerCapture(e.pointerId);
        wordEl.classList.remove('dragging');
        // Reset styles
        wordEl.style.position = '';
        wordEl.style.left = '';
        wordEl.style.top = '';
        wordEl.style.zIndex = '';

        document.querySelectorAll(`#game-instance-${this.id} .zone`).forEach(z => z.classList.remove('drag-over'));
        let dropZone = document.elementFromPoint(e.clientX, e.clientY)?.closest('.zone');
        
        // Check if dropped on a valid zone for this player
        if (dropZone && dropZone.id.startsWith(this.id + '-zone-')) {
          const wordId = wordEl.id.replace(this.id + '-', '');
          const wordInfo = this.masterWordList.find(w => w.id === wordId);
          const droppedPos = dropZone.id.replace(`${this.id}-zone-`, '');
          const isCorrect = wordInfo.pos === droppedPos;
          this.handleGuess(isCorrect, wordInfo, dropZone);
        } else {
            // If not dropped on a valid zone, return it to the bank
            this.dom.wordBank.appendChild(wordEl);
        }
        
        // Clean up state and event listeners
        this.dragState = {};
        document.body.removeEventListener('pointermove', this.handlePointerMove);
        document.body.removeEventListener('pointerup', this.handlePointerEnd);
      }
      startTimer() {
        clearInterval(this.state.gameTimer);
        this.state.gameTimer = setInterval(() => {
          this.state.timeLeft--;
          this.updateHUD();
          if (this.state.timeLeft <= 0) {
            this.finishGame(false);
          }
        }, 1000);
      }
      createTokenParticles(originElement) {
        if (!originElement) return;
        AudioHelper.token();
        const rect = originElement.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;
        const tokenHud = this.dom.hud.tokens.getBoundingClientRect();
        const endX = tokenHud.left + tokenHud.width / 2;
        const endY = tokenHud.top + tokenHud.height / 2;
        for (let i = 0; i < 8; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.backgroundColor = 'var(--gold-color)';
          particle.style.width = `${Math.random() * 8 + 5}px`;
          particle.style.height = particle.style.width;
          this.particleContainer.appendChild(particle);
          const offsetX = (Math.random() - 0.5) * 60;
          const offsetY = (Math.random() - 0.5) * 60;
          particle.animate([
            { transform: `translate(${startX + offsetX}px, ${startY + offsetY}px) scale(0.5)`, opacity: 1 },
            { opacity: 1, offset: 0.8, transform: `translate(${startX + offsetX / 2}px, ${startY + offsetY / 2}px) scale(1.2)`},
            { transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }
          ], { duration: 600 + Math.random() * 400, easing: 'ease-in-out', delay: i * 30 });
          setTimeout(() => particle.remove(), 1000);
        }
      }
    }

    // --- Main Controller ---
    const MainController = {
      player1: null,
      player2: null,
      finishedPlayers: 0,
      results: [],
      gameMode: 1,
      partsOfSpeech: ["noun", "verb", "adjective", "adverb"],
      gameConfig: { timePerLevel: 180 },
      dom: {},
      init() {
        this.dom = {
          appContainer: document.querySelector('.app-container'),
          startScreen: document.getElementById('start-screen-container'),
          gameBoard: document.getElementById('game-board'),
          endScreen: document.getElementById('end-screen-container'),
          modeSelection: document.getElementById('mode-selection'),
          nameInputArea: document.getElementById('name-input-area'),
          nameFields: document.getElementById('name-fields'),
          onePlayerBtn: document.getElementById('one-player-btn'),
          twoPlayerBtn: document.getElementById('two-player-btn'),
          startButton: document.getElementById('start-game-btn'),
          playAgainButton: document.getElementById('play-again-btn'),
          winnerAnnouncement: document.getElementById('winner-announcement'),
          p1Result: { name: document.getElementById('p1-final-name'), score: document.getElementById('p1-final-score'), tokens: document.getElementById('p1-final-tokens'), container: document.getElementById('p1-result') },
          p2Result: { name: document.getElementById('p2-final-name'), score: document.getElementById('p2-final-score'), tokens: document.getElementById('p2-final-tokens'), container: document.getElementById('p2-result') },
          particleContainer: document.getElementById('particle-container'),
          endScreenTitle: document.getElementById('end-screen-title')
        };
        this.bindEvents();
      },
      bindEvents() {
        this.dom.onePlayerBtn.addEventListener('click', () => this.selectMode(1));
        this.dom.twoPlayerBtn.addEventListener('click', () => this.selectMode(2));
        this.dom.startButton.addEventListener('click', async () => {
          await AudioHelper.unlock();
          this.startGame();
        });
        this.dom.playAgainButton.addEventListener('click', () => this.resetGame());
      },
      selectMode(players) {
        this.gameMode = players;
        this.dom.modeSelection.style.display = 'none';
        
        let nameHTML = '<input type="text" id="player1-name-input" placeholder="Player 1 Name" autocomplete="off" aria-label="Player 1 Name">';
        if (players === 2) {
            nameHTML += '<input type="text" id="player2-name-input" placeholder="Player 2 Name" autocomplete="off" aria-label="Player 2 Name">';
        }
        this.dom.nameFields.innerHTML = nameHTML;
        this.dom.nameInputArea.classList.add('visible');
      },
      startGame() {
        this.showScreen('game-board');
        this.finishedPlayers = 0;
        this.results = [];
        
        this.dom.gameBoard.classList.toggle('one-player', this.gameMode === 1);
        this.dom.endScreen.classList.toggle('one-player', this.gameMode === 1);

        const levelOrder = ['A1', 'A2', 'B1', 'B2'];
        let masterWordList = [];
        levelOrder.forEach(level => {
          const wordsForLevel = wordData[level].map((word, index) => ({ ...word, id: `${level}-word-${index}`, level: level }));
          masterWordList.push(...shuffleArray(wordsForLevel));
        });
        
        const p1NameInput = document.getElementById('player1-name-input');
        const p1Name = p1NameInput ? p1NameInput.value.trim() || 'Player 1' : 'Player 1';

        this.player1 = new GameInstance(1, p1Name, [...masterWordList], this.dom.particleContainer, this.handlePlayerFinish.bind(this));
        this.player1.start(true);

        if (this.gameMode === 2) {
            const p2NameInput = document.getElementById('player2-name-input');
            const p2Name = p2NameInput ? p2NameInput.value.trim() || 'Player 2' : 'Player 2';
            this.player2 = new GameInstance(2, p2Name, [...masterWordList], this.dom.particleContainer, this.handlePlayerFinish.bind(this));
            this.player2.start(false);
        }
      },
      handlePlayerFinish(result) {
        this.finishedPlayers++;
        this.results.push(result);
        if (this.finishedPlayers === this.gameMode) {
          this.showEndScreen();
        }
      },
      showEndScreen() {
        const p1Res = this.results.find(r => r.id === 1);
        this.dom.p1Result.name.textContent = p1Res.name;
        this.dom.p1Result.score.textContent = p1Res.score;
        this.dom.p1Result.tokens.textContent = p1Res.tokens;
        this.dom.p1Result.container.classList.remove('winner');
        this.dom.p2Result.container.classList.remove('winner');
        
        if (this.gameMode === 1) {
            this.dom.endScreenTitle.textContent = "Round Complete!";
        } else {
            this.dom.endScreenTitle.textContent = "Game Over!";
            const p2Res = this.results.find(r => r.id === 2);
            this.dom.p2Result.name.textContent = p2Res.name;
            this.dom.p2Result.score.textContent = p2Res.score;
            this.dom.p2Result.tokens.textContent = p2Res.tokens;

            if (p1Res.score > p2Res.score) {
              this.dom.winnerAnnouncement.textContent = `${p1Res.name} Wins!`;
              this.dom.p1Result.container.classList.add('winner');
            } else if (p2Res.score > p1Res.score) {
              this.dom.winnerAnnouncement.textContent = `${p2Res.name} Wins!`;
              this.dom.p2Result.container.classList.add('winner');
            } else {
              this.dom.winnerAnnouncement.textContent = "It's a Tie!";
            }
        }
        this.showScreen('end-screen');
      },
      createFireworks() {
        const container = this.dom.particleContainer;
        const numParticles = 50;
        const colors = ['#ff6ac1', '#00f5d4', '#f7b801', '#f0f2f5'];
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = `${Math.random() * 5 + 2}px`;
            particle.style.height = particle.style.width;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            container.appendChild(particle);
            const angle = Math.random() * 360;
            const radius = Math.random() * 150 + 50;
            const endX = centerX + radius * Math.cos(angle * Math.PI / 180);
            const endY = centerY + radius * Math.sin(angle * Math.PI / 180);
            particle.animate([
                { transform: `translate(${centerX}px, ${centerY}px) scale(1)`, opacity: 1 },
                { transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }
            ], {
                duration: 800 + Math.random() * 400,
                easing: 'cubic-bezier(0.17, 0.67, 0.83, 0.67)',
            });
            setTimeout(() => particle.remove(), 1200);
        }
      },
      resetGame() {
        this.dom.modeSelection.style.display = 'flex';
        this.dom.nameInputArea.classList.remove('visible');
        this.dom.nameFields.innerHTML = '';
        this.showScreen('start-screen');
      },
      showScreen(screenName) {
        // Hide all screens first
        this.dom.startScreen.classList.remove('active');
        this.dom.gameBoard.classList.remove('visible');
        this.dom.endScreen.classList.remove('active');
        
        // Show the correct one
        if (screenName === 'start-screen' || screenName === 'end-screen') {
            document.getElementById(`${screenName}-container`).classList.add('active');
        } else if (screenName === 'game-board') {
            this.dom.gameBoard.classList.add('visible');
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      MainController.init();
    });
  </script>
</body>
</html>
