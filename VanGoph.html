<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Van Gogh Enigma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;900&display=swap');

        /* --- CORE LAYOUT --- */
        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: #fffbeb; /* Amber-50 (Canvas color) */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        #app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            position: relative;
            padding: 1.5rem;
        }

        /* --- UI COMPONENTS --- */
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0px 4px 0px 0px rgba(0,0,0,0.25);
            transform: translateY(0);
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,0);
        }
        
        .fade-in { animation: fadeUp 0.3s ease-out forwards; width: 100%; height: 100%; display: flex; flex-direction: column; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Shimmer Effect (Starry Night Gold) */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-effect {
            background: linear-gradient(90deg, #fcd34d 25%, #fbbf24 50%, #fcd34d 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
            border-color: #d97706 !important;
            color: #451a03 !important;
        }

        /* --- SPECIFIC ELEMENTS --- */
        .vocab-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.15);
            border: 2px solid #fcd34d; /* Amber-300 */
            transition: all 0.2s ease;
        }
        .vocab-card:hover {
            border-color: #d97706;
            background-color: #fff7ed;
            transform: translateY(-2px);
        }
        .vocab-card:active {
            transform: scale(0.98);
        }

        /* Fixed Width Gap */
        .gap-slot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 11rem; 
            border-bottom: 3px solid #d97706; /* Amber-600 */
            padding: 0 2px;
            margin: 0 4px;
            color: #92400e;
            font-weight: 700;
            background: #fffbeb;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            height: 1.4em;
            vertical-align: bottom;
            text-align: center;
            transition: all 0.2s;
            font-size: 1.25rem; 
        }
        .gap-slot.filled { background: #fff; border-bottom: 3px solid #d97706; }
        .gap-slot.wrong { animation: shake 0.4s; background: #fecaca !important; border-color: #dc2626 !important; }

        /* Highlight Word */
        .highlight-word {
            transition: background-color 0.1s, color 0.1s;
            border-radius: 4px;
            padding: 0 2px;
        }
        .highlight-word.active {
            background-color: #fcd34d; 
            color: #451a03;
            font-weight: 700;
        }

        /* MCQ Large Format */
        .mcq-option-large {
            font-size: 1.15rem; 
            padding: 1rem;
            border: 3px solid #e0e7ff; /* Indigo-100 */
            border-radius: 1rem;
            transition: all 0.2s;
            text-align: left;
            background: white;
            height: 100%;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .mcq-option-large:hover { border-color: #6366f1; background: #eef2ff; }
        .mcq-option-large.correct { background-color: #bbf7d0; border-color: #16a34a; }
        .mcq-option-large.wrong { background-color: #fecaca; border-color: #dc2626; }

        /* TF Buttons */
        .tf-btn {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 4px solid #e2e8f0;
            background: white;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .tf-btn:hover { border-color: #94a3b8; background: #f8fafc; }
        .tf-btn.correct { background: #dcfce7; border-color: #22c55e; color: #14532d; }
        .tf-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }

        .word-bank-item {
            font-size: 1.1rem; 
            padding: 0.5rem 1rem; 
        }
        .word-bank-item.selected {
            background-color: #d97706;
            color: white;
            border-color: #92400e;
            transform: scale(1.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .word-bank-item.used {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
            transform: scale(0.95);
        }

        #praise-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            display: none;
        }
        #praise-text {
            font-size: 6rem;
            font-weight: 900;
            color: #1e3a8a; /* Indigo-900 */
            text-shadow: 0 4px 0 white, 0 8px 10px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.95);
            padding: 2rem 4rem;
            border-radius: 2rem;
            border: 6px solid #1e3a8a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        
        /* Speaking Module Styles */
        .speaking-question-card {
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 1.5rem; /* Large padding for touch targets */
        }
        .speaking-question-card:active {
            transform: scale(0.98);
            background-color: #fff7ed; /* Orange-50 */
        }
        
        /* Lesson Card Styles */
        .lesson-card {
            background: white;
            border: 2px solid #e0e7ff;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .lesson-card:hover {
            border-color: #6366f1;
            background-color: #eef2ff;
        }
        .lesson-card:active {
            transform: scale(0.98);
        }
        .lesson-header {
            font-weight: 800;
            color: #3730a3;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Main Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }
        .menu-item {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid #cbd5e1;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }
        .menu-item:hover {
            border-color: #f59e0b;
            background: #fffbeb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .menu-item i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #1e3a8a;
        }
        .menu-item span {
            font-weight: 700;
            color: #334155;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-[#1e1b4b] text-white p-2 shadow-lg z-20 flex-none h-16 border-b-4 border-amber-400">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-full w-full px-2">
            
            <div class="flex gap-4 items-center">
                <!-- MENU BUTTON -->
                <button onclick="showMenu()" class="text-white hover:text-amber-400 transition" title="Main Menu">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
                <div class="h-6 w-px bg-indigo-800"></div>
                <button onclick="resetProgress()" class="text-indigo-300 hover:text-white transition" title="New Session">
                    <i class="fas fa-redo text-xl"></i>
                </button>
                <button onclick="toggleAudio()" id="audio-btn" class="text-amber-400 hover:text-amber-300 transition" title="Toggle Auto-Play">
                    <i class="fas fa-volume-up text-xl"></i>
                </button>
            </div>

            <div class="flex flex-col items-center flex-1 mx-4">
                <div class="w-full max-w-sm h-3 bg-indigo-900 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-amber-400 w-0 transition-all duration-500 shadow-[0_0_10px_rgba(251,191,36,0.5)]"></div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="header-actions"></div>
                <div class="bg-indigo-950 px-3 py-1 rounded-lg text-xl font-mono border border-indigo-700 min-w-[60px] text-center">
                    <span id="score-val" class="text-amber-400 font-bold">0</span>
                </div>
                
                <button id="prev-btn" class="bg-indigo-800 hover:bg-indigo-700 text-white w-10 h-10 rounded-lg flex items-center justify-center disabled:opacity-30 transition btn-3d">
                    <i class="fas fa-chevron-left text-lg"></i>
                </button>
                <button id="next-btn" class="bg-amber-500 hover:bg-amber-400 text-indigo-950 px-4 h-10 rounded-lg font-bold flex items-center gap-2 btn-3d text-sm transition shadow-amber-900/50">
                    NEXT <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="praise-overlay" class="pop-in">
        <div id="praise-text">Correct!</div>
    </div>

    <main id="app-content" class="bg-slate-50 relative w-full h-full">
        <!-- Injected here -->
    </main>

    <script>
        /* --- STATE --- */
        const defaultState = { page: 0, score: 0, audioEnabled: true };
        let state = JSON.parse(localStorage.getItem('ielts_vangogh_v8')) || defaultState;

        function saveState() { localStorage.setItem('ielts_vangogh_v8', JSON.stringify(state)); }
        function resetProgress() { if(confirm("Start a New Session?")) { state = { ...defaultState }; saveState(); location.reload(); } }
        
        function startUnit() { 
            state.page = 1; 
            saveState(); 
            render(); 
        }

        function toggleAudio() { 
            state.audioEnabled = !state.audioEnabled; 
            saveState(); 
            updateAudioIcon(); 
            stopAudio(); 
        }
        
        function updateAudioIcon() {
            const btn = document.getElementById('audio-btn');
            if(btn) btn.innerHTML = state.audioEnabled ? '<i class="fas fa-volume-up text-xl"></i>' : '<i class="fas fa-volume-mute text-xl text-gray-500"></i>';
        }

        function showMenu() {
            state.page = -1; // Menu State
            saveState();
            render();
        }

        function goToPage(p) {
            state.page = p;
            saveState();
            render();
        }

        const specialLessons = {

        function speak(text, highlightCallback, preferredName) {
            if(!state.audioEnabled) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.85; // Slowed down for students
            
            // STRICT VOICE LIST
            const allowedNames = ["Andrew", "Emma", "Ava", "Brian"];
            let selectedVoice = null;

            // 1. Try preferred name
            if (preferredName) {
                // Try finding with "Multilingual"
                selectedVoice = voices.find(v => v.name.includes(preferredName) && v.name.includes("Multilingual"));
                // Fallback to name only if Multilingual variant absent
                if (!selectedVoice) selectedVoice = voices.find(v => v.name.includes(preferredName));
            }

            // 2. Strict Fallback: Rotate through allowed list if preferred not found
            if (!selectedVoice) {
                 for (const name of allowedNames) {
                     selectedVoice = voices.find(v => v.name.includes(name));
                     if (selectedVoice) break;
                 }
            }

            if (selectedVoice) {
                u.voice = selectedVoice;
            }

            if (highlightCallback) {
                u.onboundary = (event) => { if (event.name === 'word') highlightCallback(event.charIndex); };
            }
            synth.speak(u);
        }

                </div>
            `;
        }

        function selectBankWord(btn, word) {
            const isSelected = btn.classList.contains('selected');
            document.querySelectorAll('.word-bank-item').forEach(b => b.classList.remove('selected'));
            if (!isSelected) {
                btn.classList.add('selected');
                selectedGapWord = { word: word, el: btn };
                playSound('click');
            } else { selectedGapWord = null; }
        }

        function handleGapClick(gapEl, lecId, ansIndex) {
            if (!selectedGapWord || gapEl.classList.contains('filled')) return;
            const correctWord = lectures[lecId].gaps.ans[ansIndex];
            if (selectedGapWord.word === correctWord) {
                gapEl.textContent = selectedGapWord.word;
                gapEl.classList.add('filled', 'shimmer-effect');
                selectedGapWord.el.classList.add('used');
                selectedGapWord.el.classList.remove('selected');
                selectedGapWord = null;
                playSound('correct');
                const totalGaps = lectures[lecId].gaps.ans.length;
                const filledGaps = document.querySelectorAll('.gap-slot.filled').length;
                if(filledGaps === totalGaps) {
                    state.score += 20; saveState();
                    scoreDisplay.textContent = state.score;
                    showPraise("Perfect! 🎉");
                    triggerConfetti();
                }
            } else {
                gapEl.classList.add('wrong'); playSound('wrong');
                setTimeout(() => gapEl.classList.remove('wrong'), 500);
            }
        }

        function renderMCQSingle(q, qIdx) {
            container.innerHTML = `
                <div class="fade-in items-center justify-center h-full p-4">
                    <div class="bg-white rounded-[2rem] shadow-xl p-8 w-full max-w-6xl h-full flex flex-col border border-indigo-100">
                        <div class="mb-6 text-left w-full">
                            <span class="text-indigo-500 font-bold tracking-widest text-sm block mb-2">QUESTION ${qIdx+1} (MCQ)</span>
                            <p class="font-bold text-gray-800 text-2xl leading-tight text-left">${q.q}</p>
                        </div>
                        <div class="flex-1 flex flex-col justify-center gap-4">
                            ${q.opts.map((o, oi) => `
                                <button id="opt-${oi}" onclick="checkMCQSingle(${oi}, ${q.ans})" class="mcq-option-large">
                                    <div class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 font-bold flex items-center justify-center mr-4 text-lg border border-slate-300 shrink-0">
                                        ${String.fromCharCode(65+oi)}
                                    </div>
                                    <span class="font-medium text-slate-700 text-left">${o}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function checkMCQSingle(optIdx, correctIdx) {
            const btn = document.getElementById(`opt-${optIdx}`);
            const allOpts = document.querySelectorAll('.mcq-option-large');
            if(btn.disabled) return; 

            if(optIdx === correctIdx) {
                btn.classList.add('correct');
                state.score += 10;
                showPraise("Correct! 🌟");
                triggerConfetti();
            } else {
                btn.classList.add('wrong');
                btn.classList.add('shake');
                document.getElementById(`opt-${correctIdx}`).classList.add('correct');
            }
            allOpts.forEach(b => b.disabled = true);
            scoreDisplay.textContent = state.score; saveState();
        }

        function renderTrueFalse(q, qIdx) {
            container.innerHTML = `
                <div class="fade-in items-center justify-center h-full p-4">
                    <div class="bg-white rounded-[2rem] shadow-xl p-8 w-full max-w-6xl h-full flex flex-col border border-indigo-100">
                        <div class="mb-6 text-left w-full">
                            <span class="text-indigo-500 font-bold tracking-widest text-sm block mb-2">QUESTION ${qIdx+1} (TRUE/FALSE)</span>
                            <p class="font-bold text-gray-800 text-3xl leading-tight text-left mb-8">${q.q}</p>
                        </div>
                        <div class="flex gap-6 justify-center mb-8">
                            <button id="tf-true" onclick="checkTF(true, ${q.ans}, '${q.exp.replace(/'/g, "\\'")}')" class="tf-btn w-1/3">
                                <i class="fas fa-check-circle text-4xl text-green-500"></i> TRUE
                            </button>
                            <button id="tf-false" onclick="checkTF(false, ${q.ans}, '${q.exp.replace(/'/g, "\\'")}')" class="tf-btn w-1/3">
                                <i class="fas fa-times-circle text-4xl text-red-500"></i> FALSE
                            </button>
                        </div>
                        <div id="tf-feedback" class="hidden p-6 bg-slate-50 rounded-xl border border-slate-200 text-center">
                            <p class="text-xl text-slate-700 font-bold" id="tf-exp-text"></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function checkTF(choice, answer, explanation) {
            const btnTrue = document.getElementById('tf-true');
            const btnFalse = document.getElementById('tf-false');
            if(btnTrue.disabled) return;

            btnTrue.disabled = true;
            btnFalse.disabled = true;

            if(choice === answer) {
                state.score += 10;
                showPraise("Correct! 🌟");
                triggerConfetti();
                if(choice) btnTrue.classList.add('correct'); else btnFalse.classList.add('correct');
            } else {
                if(choice) btnTrue.classList.add('wrong'); else btnFalse.classList.add('wrong');
                if(answer) btnTrue.classList.add('correct'); else btnFalse.classList.add('correct');
            }

            const feed = document.getElementById('tf-feedback');
            document.getElementById('tf-exp-text').textContent = "Note: " + explanation;
            feed.classList.remove('hidden');
            feed.classList.add('pop-in');

            scoreDisplay.textContent = state.score; saveState();
        }

        function showPraise(text) {
            const overlay = document.getElementById('praise-overlay');
            const txt = document.getElementById('praise-text');
            txt.textContent = text;
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.display = 'none'; }, 2000);
        }

        function renderFinish() {
             container.innerHTML = `
                <div class="fade-in items-center justify-center flex-1 text-center p-4">
                    <div class="bg-white p-16 rounded-[3rem] shadow-2xl max-w-2xl w-full border-4 border-amber-400">
                        <div class="text-8xl mb-6">🏆</div>
                        <h2 class="text-5xl font-black text-indigo-900 mb-4">Masterpiece!</h2>
                        <div class="my-8 py-6 bg-indigo-50 rounded-3xl border-2 border-indigo-100">
                            <span class="text-7xl font-black text-amber-500">${state.score}</span>
                        </div>
                        <button onclick="resetProgress()" class="bg-indigo-800 text-white px-8 py-4 rounded-xl font-bold text-xl hover:bg-indigo-700 transition w-full shadow-lg">
                            New Session 🔄
                        </button>
                    </div>
                </div>
            `;
        }
        
        function triggerConfetti() {
            const colors = ['#f59e0b', '#3b82f6', '#fbbf24', '#1e40af'];
            for(let i=0; i<15; i++) {
                const c = document.createElement('div');
                c.style.cssText = `position:fixed;width:15px;height:15px;background:${colors[Math.floor(Math.random()*colors.length)]};top:-10px;left:${Math.random()*100}vw;pointer-events:none;z-index:99;border-radius:4px;`;
                document.body.appendChild(c);
                c.animate([{transform:`translate(0,0) rotate(0)`}, {transform:`translate(${Math.random()*200-100}px, 100vh) rotate(720deg)`}], {duration: 1500+Math.random()*1500});
                setTimeout(()=>c.remove(), 3000);
            }
        }

        function playSound(type) {
            if(!state.audioEnabled) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            if(type==='click') { o.type='triangle'; o.frequency.value=600; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.05); } 
            else if(type==='correct') { o.type='sine'; o.frequency.setValueAtTime(500, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime+0.1); g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.3); o.start(); o.stop(ctx.currentTime+0.3); } 
            else { o.type='sawtooth'; o.frequency.value=150; g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.3); o.start(); o.stop(ctx.currentTime+0.3); }
        }

        if(state.page === 0) renderHome(); else render();
        scoreDisplay.textContent = state.score;
        updateAudioIcon();
    </script>
</body>
</html>
