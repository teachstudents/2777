<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel Plans Listen-Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
    <style>
        :root {
            --bg-main: #2d3436;
            --bg-container: #5c5c5c;
            --primary-color: #ff8c42;
            --primary-dark: #ff6b00;
            --text-light: #f5f5f5;
            --text-dark: #ffcc00;
            --border-color: #7d7d7d;
            --correct-color: #7cfc00;
            --incorrect-color: #ff4757;
            --gold-color: #ffd700;
            --accent-cyan: #4ecdc4;
            --p1-color: #3498db;
            --p2-color: #e74c3c;
        }

        @keyframes background-pan {
            0% { background-color: #2d3436; }
            20% { background-color: #0c2461; }
            40% { background-color: #4a69bd; }
            60% { background-color: #1e3799; }
            80% { background-color: #3a3a3a; }
            100% { background-color: #2d3436; }
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            color: var(--text-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: background-pan 90s linear infinite;
            position: relative;
            overflow-x: hidden;
        }
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            box-sizing: border-box;
            text-align: center;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--primary-color);
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 1rem;
        }
        h2 {
            color: var(--text-dark);
            margin: 1rem 0 0.5rem;
        }
        label {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        input[type="text"] {
            padding: 0.7em 1em;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-container);
            color: var(--text-light);
            font-size: 1.1rem;
            outline: none;
            width: 90%;
            max-width: 300px;
            margin-bottom: 1em;
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        button, .option-btn {
            background: var(--primary-color);
            color: var(--bg-main);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.8em 2em;
            margin: 0.5em 0.25em;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            min-width: 120px;
        }
        button:focus, .option-btn:focus {
            outline: 2px solid var(--accent-cyan);
            outline-offset: 2px;
        }
        button:hover, .option-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .level-selection {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5em;
        }
        .level-btn {
            background: var(--bg-container);
            color: var(--text-light);
            border: 2px solid var(--border-color);
            padding: 0.6em 1.2em;
        }
        .level-btn.selected {
            background: var(--accent-cyan);
            color: var(--bg-main);
            border-color: var(--accent-cyan);
            transform: scale(1.05);
        }
        .option-btn {
            display: block;
            width: 100%;
            margin: 0.5em 0;
            min-height: 3em;
            text-align: center;
            color: var(--text-light);
            background: rgba(0,0,0,0.15);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            text-transform: capitalize;
        }
        .option-btn.correct {
            background: var(--correct-color);
            color: #222;
            border-color: var(--correct-color);
            animation: pulse-correct 0.5s;
        }
        @keyframes pulse-correct {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .option-btn.incorrect {
            background: var(--incorrect-color);
            color: #fff;
            border-color: var(--incorrect-color);
        }
        .hud {
            width: 100%;
            background: rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 1em;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 1em;
            padding: 0.5em 1em;
            border-radius: 8px;
            font-size: 1em;
        }
        .hud-item span {
            color: var(--text-light);
            font-weight: bold;
        }
        .progress-bar-container {
            width: 100%;
            background: rgba(0,0,0,0.25);
            height: 14px;
            border-radius: 8px;
            margin-bottom: 1em;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff8c42, #ffcc00, #7cfc00, #4ecdc4);
            transition: width 0.4s;
            width: 100%;
        }
        .feedback-display {
            font-size: 1.5em;
            min-height: 2em;
            margin: 0.5em 0;
            font-weight: bold;
        }
        .feedback-correct { color: var(--correct-color);}
        .feedback-incorrect { color: var(--incorrect-color);}
        #challenge-script em {
            color: var(--accent-cyan);
            font-size: 0.9em;
        }
        .results-container {
            background: var(--bg-container);
            padding: 1.5em 1em;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            margin: 1em auto;
            color: var(--text-light);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1em;
        }
        .stat-item h4 { color: var(--accent-cyan); margin: 0 0 0.5em 0; font-size: 1em;}
        .stat-item p { font-size: 1.3em; font-weight: bold; margin:0;}
        #error-message {
            color: #fff;
            background: #e53935;
            padding: 0.5em 1em;
            border-radius: 6px;
            margin: 1em 0;
            font-weight: bold;
            display: none;
        }
        .mode-selection-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
        }
        .mode-card {
            flex: 1;
            padding: 1rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-container);
        }
        .two-player-game-area {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
            align-items: flex-start; /* Align items to the top */
        }
        .player-zone {
            padding: 1rem;
            border-radius: 12px;
            flex: 1;
        }
        .player-1-zone { border: 3px solid var(--p1-color); }
        .player-2-zone { border: 3px solid var(--p2-color); }
        .player-1-zone .option-btn { background-color: rgba(52, 152, 219, 0.3); border-color: var(--p1-color); }
        .player-2-zone .option-btn { background-color: rgba(231, 76, 60, 0.3); border-color: var(--p2-color); }
        .player-1-zone .option-btn:hover { background-color: rgba(52, 152, 219, 0.5); }
        .player-2-zone .option-btn:hover { background-color: rgba(231, 76, 60, 0.5); }
        .player-score { font-size: 1.5rem; font-weight: bold; }
        .player-1-score { color: var(--p1-color); }
        .player-2-score { color: var(--p2-color); }
        #winner-display { font-size: 2rem; color: var(--gold-color); }
        
        @keyframes flash-correct-bg {
            0% { background-color: rgba(124, 252, 0, 0); }
            50% { background-color: rgba(124, 252, 0, 0.3); }
            100% { background-color: rgba(124, 252, 0, 0); }
        }
        .flash-correct {
            animation: flash-correct-bg 0.6s ease-out;
        }
    </style>
</head>
<body>
    <main>
        <!-- MODE SELECTION SCREEN -->
        <div id="mode-screen" class="screen active">
            <h1>Travel Plans Listen-Up</h1>
            <div class="mode-selection-container">
                <div class="mode-card">
                    <label for="player-name-1p">Player Name</label>
                    <input type="text" id="player-name-1p" placeholder="Enter your name" maxlength="20">
                    <button id="start-1p-btn">1-Player Practice</button>
                </div>
                <div class="mode-card">
                    <label for="player-name-p1">Player 1 Name</label>
                    <input type="text" id="player-name-p1" placeholder="Player 1" maxlength="20">
                    <label for="player-name-p2">Player 2 Name</label>
                    <input type="text" id="player-name-p2" placeholder="Player 2" maxlength="20">
                    <button id="start-2p-btn">2-Player Race</button>
                </div>
            </div>
            <div id="mode-error-message" style="display:none; color: var(--incorrect-color); margin-top: 1rem;"></div>
        </div>

        <!-- LEVEL SELECTION SCREEN (1P) -->
        <div id="level-select-screen" class="screen">
            <h1>Select Your Level</h1>
            <label>Select Level (CEFR)</label>
            <div id="level-selection" class="level-selection">
                <button type="button" class="level-btn" data-level="A1">A1</button>
                <button type="button" class="level-btn" data-level="A2">A2</button>
                <button type="button" class="level-btn" data-level="B1">B1</button>
                <button type="button" class="level-btn" data-level="B2">B2</button>
            </div>
            <input type="hidden" id="selected-level-input">
            <div id="level-error-message" style="display:none; color: var(--incorrect-color); margin-top: 1rem;"></div>
            <button id="start-game-btn">Start Game</button>
            <button id="back-to-mode-btn" style="background: var(--bg-container); color: var(--text-light);">Back to Modes</button>
        </div>

        <!-- 1P GAME SCREEN -->
        <div id="game-screen-1p" class="screen" role="main" aria-live="polite">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="hud" id="hud">
                <div class="hud-item">Player: <span id="hud-player">?</span></div>
                <div class="hud-item" id="score-hud-item">Score: <span id="hud-score">0</span></div>
                <div class="hud-item">Level: <span id="hud-level">A1</span></div>
                <div class="hud-item">Correct: <span id="hud-correct">0/25</span></div>
                <div class="hud-item">Time: <span id="hud-time">10:00</span></div>
                <div class="hud-item">Question: <span id="hud-question">1/25</span></div>
            </div>
            <div class="feedback-display" id="feedback"></div>
            <div id="challenge-script" style="font-size:1.2em; margin-bottom:1em; min-height: 3em;"></div>
            <div id="options-container"></div>
        </div>
        
        <!-- 2P GAME SCREEN -->
        <div id="game-screen-2p" class="screen">
             <div class="hud">
                <div class="hud-item player-1-score"><span id="p1-name-hud">P1</span>: <span id="p1-score-hud">0</span></div>
                <div class="hud-item">Question: <span id="hud-question-2p">1/25</span></div>
                <div class="hud-item player-2-score"><span id="p2-name-hud">P2</span>: <span id="p2-score-hud">0</span></div>
            </div>
            <div id="challenge-script-2p" style="font-size:1.2em; margin-bottom:1em; min-height: 3em;"></div>
            <div class="two-player-game-area">
                <div id="player-1-zone" class="player-zone player-1-zone">
                    <h3 id="p1-name-display" class="player-1-score">Player 1</h3>
                    <div id="options-container-p1"></div>
                </div>
                <div id="player-2-zone" class="player-zone player-2-zone">
                    <h3 id="p2-name-display" class="player-2-score">Player 2</h3>
                    <div id="options-container-p2"></div>
                </div>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="screen" role="main">
            <h1 id="end-title">Game Over</h1>
            <div id="winner-display"></div>
            <div class="results-container" id="results-container">
                <!-- Results will be dynamically inserted here -->
            </div>
            <button id="play-again-btn">Play Again</button>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script>
        const $ = s => document.getElementById(s);
    
        // --- Data & Utility Functions ---
        const correctFeedback = ["That's right!", "You got it!", "Excellent!", "Perfect!", "Great listening!"];
        const incorrectFeedback = ["Not quite!", "Listen carefully!", "Keep trying!", "Don't give up!"];
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }
        
        function generateTravelData() {
            const COUNTRIES = ["spain", "france", "italy", "germany", "japan", "china", "australia", "brazil", "canada", "mexico", "india", "egypt", "greece", "thailand", "argentina", "peru", "kenya", "morocco", "vietnam", "new zealand"];
            const MONTHS = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
            const DAYS = ["1st", "2nd", "3rd", "4th", "5th", "10th", "15th", "20th", "21st", "22nd", "23rd", "25th"];

            const difficultyConfig = {
                'A1': { templates: [ (c1, c2, c3, m1, d1) => `I want to go to ${c1}, but my friend wants to go to ${c2}. We will go to ${c3}.`, (c1, c2, c3, m1, d1) => `My first plan was ${c1}. My second plan was ${c2}. My final plan is ${c3}.`, (c1, c2, c3, m1, d1) => `We are not going to ${c1}. We are not going to ${c2}. We are going to ${c3}.`, (c1, c2, c3, m1, d1) => `I will travel in ${m1}. I will not go to ${c1}. I will go to ${c3}.`, (c1, c2, c3, m1, d1) => `My trip on ${m1} the ${d1} is not to ${c1}. It is to ${c3}.`, (c1, c2, c3, m1, d1) => `I thought about ${c1}, but I will go to ${c3}.`, (c1, c2, c3, m1, d1) => `My friend likes ${c1}, but I like ${c3}. So we are going to ${c3}.`, (c1, c2, c3, m1, d1) => `The trip to ${c1} is off. We are going to ${c3} instead.`, (c1, c2, c3, m1, d1) => `Let's forget ${c1}. The new plan is ${c3}.`, (c1, c2, c3, m1, d1) => `I changed my mind. I am not going to ${c1}. I am going to ${c3}.`, (c1, c2, c3, m1, d1) => `First, I wanted to see ${c1}. Then, I thought about ${c2}. Now, I will see ${c3}.`, (c1, c2, c3, m1, d1) => `The ticket for ${c1} was too expensive. I bought a ticket for ${c3}.`, (c1, c2, c3, m1, d1) => `I will go to ${c3} this ${m1}, not ${c1}.`, (c1, c2, c3, m1, d1) => `My family wants to visit ${c1}, but we decided on ${c3}.`, (c1, c2, c3, m1, d1) => `The vacation to ${c2} is not happening. We are going to ${c3}.`, (c1, c2, c3, m1, d1) => `I will see my friend in ${c3}, not in ${c1}.`, (c1, c2, c3, m1, d1) => `The final choice for our trip is ${c3}.`, (c1, c2, c3, m1, d1) => `We are excited for our trip to ${c3}. We are not going to ${c1}.`, (c1, c2, c3, m1, d1) => `I will pack my bags for ${c3}. I will not pack for ${c1}.`, (c1, c2, c3, m1, d1) => `The plan for ${m1} the ${d1} is to go to ${c3}.` ], distractorCount: 3, },
                'A2': { templates: [ (c1, c2, c3, m1, d1, m2, d2) => `My friend and I were planning a trip to ${c1} in ${m1}, but we decided to go to ${c3} instead.`, (c1, c2, c3, m1, d1, m2, d2) => `I thought about visiting ${c1} on ${m1} ${d1}, but then I changed my mind. I'm going to ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `We are no longer going to ${c1} or ${c2}. Our tickets are booked for ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `The trip to ${c1} is cancelled. Instead, we're planning a trip to ${c3} in ${m2}.`, (c1, c2, c3, m1, d1, m2, d2) => `I was going to travel with my friend to ${c1}, but he wants to go to ${c2}. So, we agreed on ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `I was looking at flights to ${c1}, but the ones to ${c3} were cheaper.`, (c1, c2, c3, m1, d1, m2, d2) => `My family voted on where to go. ${c1} was an option, but ${c3} won.`, (c1, c2, c3, m1, d1, m2, d2) => `The weather in ${c1} doesn't look good for ${m1}. We're going to ${c3} instead.`, (c1, c2, c3, m1, d1, m2, d2) => `I've already been to ${c1}, so this time I want to visit ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `My friend from ${c3} invited me to visit, so I cancelled my trip to ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `We had a plan to see ${c1} and ${c2}, but we ran out of time, so we are only going to ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `The tour to ${c1} was full. We booked a tour to ${c3} on ${m2} the ${d2}.`, (c1, c2, c3, m1, d1, m2, d2) => `I'm more interested in the culture of ${c3} than ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `My friend recommended ${c3} over ${c1} for a first-time traveler.`, (c1, c2, c3, m1, d1, m2, d2) => `I'm learning Spanish, so I decided to go to ${c3} instead of ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `The flight to ${c1} had a long layover. The flight to ${c3} is direct.`, (c1, c2, c3, m1, d1, m2, d2) => `I found a great hotel deal in ${c3}, so I'm not going to ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `I've heard the food in ${c3} is amazing, so I'm going there instead of ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `My travel partner and I couldn't agree on ${c1}, so we compromised on ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `The visa for ${c1} was too complicated. I'm going to ${c3} because it's easier.` ], distractorCount: 4, },
                'B1': { templates: [ (c1, c2, c3, m1, d1, m2, d2) => `The original plan was to visit ${c1} on ${m1} ${d1}. However, due to a change in our schedule, we've decided to go to ${c3} in ${m2} instead.`, (c1, c2, c3, m1, d1, m2, d2) => `We were considering either ${c1} or ${c2} for our vacation in ${m1}, but after some discussion, we've settled on ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `Initially, I had my heart set on ${c1}, but my friend convinced me that ${c3} would be a better destination for us this ${m2}.`, (c1, c2, c3, m1, d1, m2, d2) => `Please disregard the previous itinerary for ${c1}. The updated travel plan is a trip to ${c3} starting on ${m2} the ${d2}.`, (c1, c2, c3, m1, d1, m2, d2) => `Although ${c1} is beautiful in ${m1}, we found a better deal for a trip to ${c3} with my friend.`, (c1, c2, c3, m1, d1, m2, d2) => `After comparing the travel blogs for ${c1} and ${c2}, we felt that ${c3} offered more of what we're looking for.`, (c1, c2, c3, m1, d1, m2, d2) => `The political situation in ${c1} seems a bit unstable, so for safety, we've re-routed our trip to ${c3}.`, (c1, c2, c3, m1, d1, m2, d2) => `My language course is focused on the dialect spoken in ${c3}, so I've chosen it over ${c1}.`, (c1, c2, c3, m1, d1, m2, d2) => `We had a long debate about ${c1} versus ${c2}, but ultimately, the unique attractions of ${c3} won us over.`, (c1, c2, c3, m1, d1, m2, d2) => `I was all set to go to ${c1}, but a last-minute work commitment means I have to postpone. I'll go to ${c3} later in ${m2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Let it be known that our travel arrangements have been amended. The prospective journeys to ${c1}, ${c2}, and ${c3} have been set aside in favor of a definitive expedition to ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Despite the initial appeal of a trip to ${c1} during ${m1}, and a passing interest in ${c2}, a more compelling opportunity has arisen, leading us to finalize our plans for a journey to ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The travel committee has concluded its deliberations. The proposals for ${c1}, ${c2}, and ${c3} were carefully considered, but the approved destination is ultimately ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `In light of recent developments, our travel trajectory has shifted. The intended visits to ${c1} and ${c2} will not proceed; our confirmed destination is now ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `A thorough cost-benefit analysis revealed that a trip to ${c4} would be more economically prudent than our original choices of ${c1} and ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Geopolitical factors have rendered trips to ${c1} and ${c2} inadvisable at this time. We have therefore redirected our travel plans towards the more stable region of ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `My sabbatical research is better served by the sites in ${c4}, hence the change from my initial proposals to study in ${c1} or ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The consensus among seasoned travelers is that ${c4} offers a more authentic cultural immersion than the more tourist-centric ${c1} and ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `An unexpected change in flight availability has made our original plan to visit ${c1} untenable. We have successfully rebooked for ${c4}, canceling our backup plans for ${c2}.` ], distractorCount: 4, },
                'B2': { templates: [ (c1, c2, c3, c4, m1, d1, m2, d2) => `Our travel agent initially recommended ${c1} for our trip on ${m1} ${d1}. We also considered ${c2}, but after reviewing the options, we've opted for ${c4} in ${m2} instead.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `There has been a revision to our travel plans. The proposed trip to ${c1} and a side trip to ${c2} have been superseded by a new itinerary for ${c4}, departing on ${m2} the ${d2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `While the allure of ${c1} was strong, and we even briefly considered ${c2} and ${c3}, the consensus between my friend and I is to embark on an adventure to ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Logistical considerations have forced us to pivot from our original plan to visit ${c1}. Our final destination is now confirmed to be ${c4}, not ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `After much deliberation, we've decided against ${c1}, ${c2}, and ${c3}. The trip we've officially booked is to ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The initial itinerary included stops in ${c1} and ${c2}, but we've reallocated that time to extend our stay in ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `A comparative analysis of the cultural heritage sites in ${c1}, ${c2}, and ${c3} led us to the conclusion that ${c4} offers a more enriching experience.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Given the current exchange rate, a trip to ${c1} or ${c2} is less feasible than we anticipated. Consequently, we've redirected our focus to ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `My research into the local cuisine has finalized my decision. While ${c1} and ${c2} have their merits, the culinary scene in ${c4} is unparalleled.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The feedback from fellow travelers was overwhelmingly in favor of ${c4} over ${c1} and ${c2}, which has informed our final decision.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Subsequent to a comprehensive review of our travel options, the preliminary plan to visit ${c1} and ${c2} has been officially supplanted by a finalized itinerary for ${c4}, commencing on ${m2} the ${d2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The ecological diversity of ${c4} presents a more compelling case for our research trip than the more homogenous environments of ${c1}, ${c2}, or ${c3}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `While ${c1} was the frontrunner, and ${c2} a strong contender, a persuasive argument from my travel companion about the historical significance of ${c4} has swayed my decision.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The infrastructure for sustainable tourism in ${c4} aligns better with our travel ethics compared to the options available in ${c1} or ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `My genealogical research has traced my ancestry to the region of ${c4}, making it a more meaningful destination for me than the previously considered ${c1} and ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The opportunity to volunteer with a conservation project in ${c4} has taken precedence over our initial plans for leisure trips to ${c1} or ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The complexities of obtaining permits for our documentary in ${c1} and ${c2} have led us to select ${c4} as an alternative filming location.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `A re-evaluation of our priorities has shifted our focus from the bustling cities of ${c1} and ${c2} to the serene landscapes of ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The academic conference I am attending has been moved to a city near ${c4}, making it a more logical choice for my travels than ${c1} or ${c2}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `The culinary tour of ${c1} has been postponed. In its place, and instead of our backup plan for ${c2}, we will be exploring the gastronomic delights of ${c4}.`, (c1, c2, c3, c4, m1, d1, m2, d2) => `Our application for a travel grant was approved, but with the stipulation that we conduct our research in ${c4}, not ${c1} or ${c2}.` ], distractorCount: 4, }
            };

            function makeLevel(level) {
                const config = difficultyConfig[level];
                let levelData = [];
                let usedCombos = new Set();

                while (levelData.length < 25) {
                    const [m1, m2] = shuffleArray([...MONTHS]);
                    const [d1, d2] = shuffleArray([...DAYS]);
                    const countries = shuffleArray([...COUNTRIES]).slice(0, 4);
                    
                    const [c1, c2, c3, c4] = countries;
                    const favorite = (level === 'B2') ? c4 : c3;

                    const comboKey = countries.sort().join(',');
                    if (usedCombos.has(comboKey)) continue;
                    usedCombos.add(comboKey);

                    let options;
                    if (level === 'B2') {
                        options = [...countries];
                    } else {
                        options = [c1, c2, c3];
                         while(options.length < config.distractorCount) {
                            const randomOption = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
                            if (!options.includes(randomOption)) {
                                options.push(randomOption);
                            }
                        }
                    }
                    shuffleArray(options);

                    const template = config.templates[Math.floor(Math.random() * config.templates.length)];
                    const script = template(c1, c2, c3, c4, m1, d1, m2, d2);
                    
                    levelData.push({ script, favorite, options });
                }
                return levelData;
            }

            return {
                'A1': makeLevel('A1'), 'A2': makeLevel('A2'),
                'B1': makeLevel('B1'), 'B2': makeLevel('B2')
            };
        }
        const travelData = generateTravelData();

        // --- Game State ---
        let game = {};
        const TOTAL_QUESTIONS = 25;
        const TOTAL_GAME_TIME = 600; // 10 min

        // --- Audio Setup ---
        let synth, streakSynth;
        if (typeof Tone !== 'undefined') {
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            streakSynth = new Tone.FMSynth({ harmonicity: 3, modulationIndex: 10, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 }, modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 } }).toDestination();
        }
        function playCorrectSound() { if (synth) synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", Tone.now()); }
        function playIncorrectSound() { if (synth) synth.triggerAttackRelease(["C3", "C#3"], "8n", Tone.now()); }
        
        // --- Speech Synthesis ---
        let voices = [];
        let voiceIndex = 0;
        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
        }
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        function getNextVoice() {
            if (voices.length === 0) {
                loadVoices();
                if (voices.length === 0) return null;
            }
            const preferredVoices = voices.filter(v => v.name.includes('Natural') || v.name.includes('Google'));
            const voicePool = preferredVoices.length > 0 ? preferredVoices : voices;
            if (voicePool.length === 0) return null;
            voiceIndex = (voiceIndex + 1) % voicePool.length;
            return voicePool[voiceIndex];
        }

        function speak(text, rate = 0.85) {
            if (!('speechSynthesis' in window) || speechSynthesis.speaking) {
                return;
            }
            const utter = new SpeechSynthesisUtterance(text);
            const voice = getNextVoice();
            if (voice) {
                utter.voice = voice;
            }
            utter.rate = rate;
            speechSynthesis.speak(utter);
        }

        function playClueAudio(text, onend) {
            if (!('speechSynthesis' in window)) {
                if (onend) setTimeout(onend, 0);
                return;
            }
            if (voices.length === 0) {
                setTimeout(() => playClueAudio(text, onend), 100);
                return;
            }
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const voice = getNextVoice();
            if (voice) utter.voice = voice;
            utter.rate = 0.85;
            utter.onend = () => { if (onend) onend(); };
            utter.onerror = (e) => {
                if (e.error !== 'canceled') console.error("Speech error:", e.error);
                if (onend) onend();
            };
            speechSynthesis.speak(utter);
        }

        // --- Game Screens ---
        const screens = {
            mode: $('mode-screen'),
            levelSelect: $('level-select-screen'),
            game1P: $('game-screen-1p'),
            game2P: $('game-screen-2p'),
            end: $('end-screen')
        };
        
        function showScreen(screen) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screen.classList.add('active');
        }

        // --- Game Functions ---
        function formatTime(s) {
            s = Math.max(0, s);
            return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
        }

        function start1PGame(level) {
            game = {
                mode: 1,
                playerName: $('player-name-1p').value.trim() || 'Player',
                selectedLevel: level,
                score: 0,
                correctAnswers: 0,
                questionIndex: 0,
                remainingTime: TOTAL_GAME_TIME,
                timerID: null,
                isFinished: false
            };
            showScreen(screens.game1P);
            update1PHUD();
            start1PTimer();
            next1PChallenge();
        }

        function start2PGame() {
            game = {
                mode: 2,
                p1Name: $('player-name-p1').value.trim() || 'Player 1',
                p2Name: $('player-name-p2').value.trim() || 'Player 2',
                p1Score: 0,
                p2Score: 0,
                questionIndex: 0,
                isFinished: false
            };
            $('p1-name-hud').textContent = game.p1Name;
            $('p2-name-hud').textContent = game.p2Name;
            $('p1-name-display').textContent = game.p1Name;
            $('p2-name-display').textContent = game.p2Name;
            showScreen(screens.game2P);
            update2PHUD();
            next2PChallenge();
        }

        // --- 1-Player Logic ---
        function update1PHUD() {
            $('hud-player').textContent = game.playerName;
            $('hud-score').textContent = game.score;
            $('hud-level').textContent = game.selectedLevel;
            $('hud-correct').textContent = `${game.correctAnswers}/${TOTAL_QUESTIONS}`;
            $('hud-time').textContent = formatTime(game.remainingTime);
            $('hud-question').textContent = `${game.questionIndex + 1}/${TOTAL_QUESTIONS}`;
            $('progress-bar').style.width = `${Math.max(0, (game.remainingTime / TOTAL_GAME_TIME) * 100)}%`;
        }

        function start1PTimer() {
            if (game.timerID) clearInterval(game.timerID);
            game.timerID = setInterval(() => {
                game.remainingTime--;
                update1PHUD();
                if (game.remainingTime <= 0) finishGame("Time's Up!");
            }, 1000);
        }

        function next1PChallenge() {
            if (game.questionIndex >= TOTAL_QUESTIONS) {
                finishGame("Congratulations!");
                return;
            }
            $('feedback').textContent = '';
            $('challenge-script').textContent = '';
            $('options-container').innerHTML = '';
            
            const challenge = travelData[game.selectedLevel][game.questionIndex];
            game.challenge = challenge;
            
            setTimeout(() => playClueAudio(challenge.script, () => {
                $('options-container').innerHTML = '';
                shuffleArray([...challenge.options]).forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option;
                    btn.onclick = () => handle1PGuess(option, btn);
                    $('options-container').appendChild(btn);
                });
            }), 200);
            update1PHUD();
        }

        function handle1PGuess(selected, btn) {
            Array.from($('options-container').children).forEach(b => b.disabled = true);
            if (selected === game.challenge.favorite) {
                const praise = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
                $('feedback').textContent = praise;
                speak(praise);
                $('feedback').className = "feedback-display feedback-correct";
                playCorrectSound();
                btn.classList.add('correct');
                document.body.classList.add('flash-correct');
                setTimeout(() => document.body.classList.remove('flash-correct'), 600);
                game.score += 4;
                game.correctAnswers++;
            } else {
                const encouragement = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
                $('feedback').textContent = encouragement;
                speak(encouragement);
                $('feedback').className = "feedback-display feedback-incorrect";
                playIncorrectSound();
                btn.classList.add('incorrect');
                game.score = Math.max(0, game.score - 2);
                $('challenge-script').innerHTML = `The correct answer was: <em>"${capitalizeFirstLetter(game.challenge.favorite)}"</em>`;
            }
            game.questionIndex++;
            setTimeout(next1PChallenge, 2000);
            update1PHUD();
        }

        // --- 2-Player Logic ---
        function update2PHUD() {
            $('p1-score-hud').textContent = game.p1Score;
            $('p2-score-hud').textContent = game.p2Score;
            $('hud-question-2p').textContent = `${game.questionIndex + 1}/${TOTAL_QUESTIONS}`;
        }

        function next2PChallenge() {
            if (game.questionIndex >= TOTAL_QUESTIONS) {
                finishGame();
                return;
            }
            const randomLevel = ['A1', 'A2', 'B1', 'B2'][Math.floor(Math.random() * 4)];
            const challenge = travelData[randomLevel][game.questionIndex];
            game.challenge = challenge;

            $('challenge-script-2p').textContent = '';
            $('options-container-p1').innerHTML = '';
            $('options-container-p2').innerHTML = '';
            
            setTimeout(() => playClueAudio(challenge.script, () => {
                const optionsHtml = shuffleArray([...challenge.options]).map(option => 
                    `<button class="option-btn" data-answer="${option}">${option}</button>`
                ).join('');
                $('options-container-p1').innerHTML = optionsHtml;
                $('options-container-p2').innerHTML = optionsHtml;

                $('options-container-p1').querySelectorAll('.option-btn').forEach(btn => btn.onclick = () => handle2PGuess(btn.dataset.answer, 1, btn));
                $('options-container-p2').querySelectorAll('.option-btn').forEach(btn => btn.onclick = () => handle2PGuess(btn.dataset.answer, 2, btn));
            }), 200);
            update2PHUD();
        }

        function handle2PGuess(selected, player, btn) {
            $('options-container-p1').querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            $('options-container-p2').querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            const praise = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
            const encouragement = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];

            if (selected === game.challenge.favorite) {
                playCorrectSound();
                btn.classList.add('correct');
                const playerZone = $(`player-${player}-zone`);
                playerZone.classList.add('flash-correct');
                setTimeout(() => playerZone.classList.remove('flash-correct'), 600);
                
                if (player === 1) game.p1Score++;
                else game.p2Score++;
                $('challenge-script-2p').textContent = praise;
                speak(praise);
                $('challenge-script-2p').className = 'feedback-display feedback-correct';

            } else {
                playIncorrectSound();
                btn.classList.add('incorrect');
                if (player === 1) game.p2Score++;
                else game.p1Score++;
                $('challenge-script-2p').textContent = `${encouragement} Correct: ${capitalizeFirstLetter(game.challenge.favorite)}`;
                speak(encouragement);
                $('challenge-script-2p').className = 'feedback-display feedback-incorrect';
            }
            game.questionIndex++;
            update2PHUD();
            setTimeout(next2PChallenge, 2000);
        }

        // --- Finish Game Logic ---
        function finishGame(title = "Game Over") {
            if (game.timerID) clearInterval(game.timerID);
            game.isFinished = true;
            showScreen(screens.end);
            $('end-title').textContent = title;

            if (game.mode === 1) {
                $('winner-display').style.display = 'none';
                const timeTaken = TOTAL_GAME_TIME - game.remainingTime;
                const questionsAttempted = game.questionIndex > 0 ? game.questionIndex : 1;
                const accuracy = ((game.correctAnswers / questionsAttempted) * 100).toFixed(1) + "%";
                $('results-container').innerHTML = `
                    <h2>${game.playerName}</h2>
                    <div class="stats-grid">
                        <div class="stat-item"><h4>Score</h4><p>${game.score}</p></div>
                        <div class="stat-item"><h4>Time Taken</h4><p>${formatTime(timeTaken)}</p></div>
                        <div class="stat-item"><h4>Correct</h4><p>${game.correctAnswers}/${questionsAttempted}</p></div>
                        <div class="stat-item"><h4>Accuracy</h4><p>${accuracy}</p></div>
                    </div>`;
            } else { // 2-Player
                $('winner-display').style.display = 'block';
                let winnerMessage = "";
                if (game.p1Score > game.p2Score) {
                    winnerMessage = `${game.p1Name} wins!`;
                } else if (game.p2Score > game.p1Score) {
                    winnerMessage = `${game.p2Name} wins!`;
                } else {
                    winnerMessage = "It's a tie!";
                }
                $('winner-display').textContent = winnerMessage;
                $('results-container').innerHTML = `
                    <h2>Final Scores</h2>
                    <div class="stats-grid">
                        <div class="stat-item"><h4 class="player-1-score">${game.p1Name}</h4><p class="player-1-score">${game.p1Score}</p></div>
                        <div class="stat-item"><h4 class="player-2-score">${game.p2Name}</h4><p class="player-2-score">${game.p2Score}</p></div>
                    </div>`;
            }
        }

        // --- Event Handlers ---
        $('start-1p-btn').onclick = () => {
            const name = $('player-name-1p').value.trim();
            if (!name) {
                $('mode-error-message').textContent = "Please enter a name for Player 1.";
                $('mode-error-message').style.display = 'block';
                return;
            }
            $('mode-error-message').style.display = 'none';
            showScreen(screens.levelSelect);
        };

        $('start-2p-btn').onclick = () => {
            const name1 = $('player-name-p1').value.trim();
            const name2 = $('player-name-p2').value.trim();
            if (!name1 || !name2) {
                $('mode-error-message').textContent = "Please enter names for both players.";
                $('mode-error-message').style.display = 'block';
                return;
            }
            $('mode-error-message').style.display = 'none';
            start2PGame();
        };
        
        $('level-selection').addEventListener('click', e => {
            if (e.target.classList.contains('level-btn')) {
                document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
                e.target.classList.add('selected');
                $('selected-level-input').value = e.target.dataset.level;
                $('level-error-message').style.display = 'none';
            }
        });

        $('start-game-btn').onclick = async () => {
            const selectedLevel = $('selected-level-input').value;
            if (!selectedLevel) {
                $('level-error-message').textContent = "Please select a level to start.";
                $('level-error-message').style.display = 'block';
                return;
            }
            if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
                await Tone.start();
            }
            start1PGame(selectedLevel);
        };
        
        $('back-to-mode-btn').onclick = () => showScreen(screens.mode);
        $('play-again-btn').onclick = () => showScreen(screens.mode);

        window.onload = () => {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const warmUp = new SpeechSynthesisUtterance('');
                speechSynthesis.speak(warmUp);
            }
        };
    </script>
</body>
</html>
