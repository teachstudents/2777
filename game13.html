<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography & Demographics Listening Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .btn {
            transition: all 0.2s ease-in-out;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .feedback-light {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        .light-off { background-color: #e5e7eb; }
        .light-correct { background-color: #4ade80; box-shadow: 0 0 15px #4ade80; }
        .light-incorrect { background-color: #f87171; box-shadow: 0 0 15px #f87171; }
        .timer-bar-inner {
            height: 100%;
            background-color: #3b82f6;
            border-radius: 4px;
            transition: width 1s linear;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div id="app-container" class="w-full max-w-2xl mx-auto">

        <!-- Start Screen -->
        <div id="start-screen" class="text-center bg-white p-8 rounded-xl shadow-lg">
            <h1 class="text-4xl font-bold mb-4 text-gray-900">Geography Listening Test</h1>
            <p class="text-gray-600 mb-8">Listen to the complete fact, then fill in the blank in the sentence on screen. The audio will play automatically.</p>
            <button id="start-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg text-xl btn">Start Test</button>
        </div>

        <!-- Test Screen -->
        <div id="test-screen" class="hidden bg-white p-6 md:p-8 rounded-xl shadow-lg">
            <!-- Header -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <span id="level-display" class="font-semibold text-blue-100 bg-blue-600 py-1 px-3 rounded-full">Level 1</span>
                    <span id="question-counter" class="font-semibold text-gray-500 ml-2">1 / 100</span>
                </div>
                <div class="flex items-center space-x-3">
                    <div id="feedback-light" class="feedback-light light-off"></div>
                    <div class="text-right">
                        <div id="score-display" class="font-bold text-2xl text-green-600">Score: 0</div>
                    </div>
                </div>
            </div>

            <!-- Timer -->
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                <div id="timer-bar" class="timer-bar-inner" style="width: 100%"></div>
            </div>

            <!-- Question Area -->
            <div class="text-center mb-8 min-h-[120px] flex flex-col items-center justify-center">
                 <p id="question-text" class="text-xl md:text-2xl font-semibold text-gray-700 mb-4">Loading question...</p>
                 <button id="play-audio-btn" class="p-4 bg-blue-500 text-white rounded-full btn focus:outline-none focus:ring-4 focus:ring-blue-300" title="Play Audio Again">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" />
                    </svg>
                 </button>
            </div>

            <!-- Answer Buttons -->
            <div id="answer-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Buttons will be generated by JS -->
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden text-center bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-3xl font-bold mb-2 text-gray-900">Test Complete!</h2>
            <p class="text-gray-600 mb-4">Your final score is:</p>
            <p id="final-score" class="text-6xl font-bold text-green-600 mb-8">0</p>
            <button id="restart-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg text-xl btn">Play Again</button>
        </div>

    </div>

    <script>
        // --- DOM ELEMENTS ---
        const startScreen = document.getElementById('start-screen');
        const testScreen = document.getElementById('test-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const playAudioBtn = document.getElementById('play-audio-btn');
        const questionText = document.getElementById('question-text');
        const answerButtonsContainer = document.getElementById('answer-buttons');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreDisplay = document.getElementById('final-score');
        const questionCounter = document.getElementById('question-counter');
        const levelDisplay = document.getElementById('level-display');
        const timerBar = document.getElementById('timer-bar');
        const feedbackLight = document.getElementById('feedback-light');

        // --- GAME STATE ---
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timer;
        const TOTAL_TIME = 15;

        // --- SOUND SYNTHESIS ---
        let synth, incorrectSynth;
        const speech = new SpeechSynthesisUtterance();
        speech.lang = "en-US";
        speech.rate = 0.85; // Slow down speech as requested

        // --- DATA (Updated for gap-fill format) ---
        const allQuestions = [
            // Level 1
            { level: 1, question: 'The country of Egypt is situated in _____.', audio: 'The country of Egypt is situated in Africa.', answer: 'Africa', distractors: ['Asia', 'Europe', 'South America'] },
            { level: 1, question: 'Paris serves as the capital city of _____.', audio: 'Here is a geographical fact: Paris serves as the capital city of France.', answer: 'France', distractors: ['Italy', 'Spain', 'Germany'] },
            { level: 1, question: 'The primary language spoken throughout Mexico is _____.', audio: 'The primary language spoken throughout Mexico is Spanish.', answer: 'Spanish', distractors: ['Portuguese', 'French', 'English'] },
            { level: 1, question: 'In North America, Canada is located to the _____ of the United States.', audio: 'In North America, the country of Canada is located to the north of the United States.', answer: 'North', distractors: ['South', 'East', 'West'] },
            { level: 1, question: 'Recent data shows that _____ now has a larger population than China.', audio: 'Recent demographic data shows that India now has a larger population than China.', answer: 'India', distractors: ['China', 'They are equal', 'United States'] },
            { level: 1, question: 'An interesting fact is that Australia is both a country and a _____.', audio: 'An interesting fact is that Australia is both a country and a continent.', answer: 'Continent', distractors: ['City', 'Island', 'Peninsula'] },
            { level: 1, question: 'The capital city of Tokyo is located in the country of _____.', audio: 'The bustling capital city of Tokyo is located in the country of Japan.', answer: 'Japan', distractors: ['China', 'South Korea', 'Thailand'] },
            { level: 1, question: 'The official language of Brazil is _____.', audio: 'Unlike most of its neighbors, the official language of Brazil is Portuguese.', answer: 'Portuguese', distractors: ['Spanish', 'English', 'French'] },
            { level: 1, question: 'The Atlantic Ocean is situated on the _____ coast of North America.', audio: 'The Atlantic Ocean is situated on the east coast of North America.', answer: 'East', distractors: ['West', 'North', 'South'] },
            { level: 1, question: 'The majority of people in Germany belong to the _____ ethnic group.', audio: 'The majority of people in Germany belong to the Germanic ethnic group.', answer: 'Germanic', distractors: ['Slavic', 'Latin', 'Celtic'] },
            { level: 1, question: 'The Amazon Rainforest is found on the continent of _____.', audio: 'The vast and biodiverse Amazon Rainforest is found on the continent of South America.', answer: 'South America', distractors: ['Africa', 'Asia', 'North America'] },
            { level: 1, question: 'The historic city of Rome is a major landmark in _____.', audio: 'The historic city of Rome is a major landmark in Italy.', answer: 'Italy', distractors: ['Greece', 'France', 'Spain'] },
            { level: 1, question: 'The United Kingdom has _____ as its primary language.', audio: 'Among these options, the United Kingdom has English as its primary language.', answer: 'English', distractors: ['French', 'German', 'Russian'] },
            { level: 1, question: 'The state of Florida is located in the _____ region of the USA.', audio: 'The state of Florida is located in the southeast region of the USA.', answer: 'Southeast', distractors: ['Northwest', 'Southwest', 'Northeast'] },
            { level: 1, question: 'Due to its harsh climate, _____ has the smallest permanent human population.', audio: 'Due to its harsh climate, Antarctica has the smallest permanent human population.', answer: 'Antarctica', distractors: ['Australia', 'South America', 'Europe'] },
            { level: 1, question: 'The country of India is a large nation on the continent of _____.', audio: 'The country of India is a large nation on the continent of Asia.', answer: 'Asia', distractors: ['Africa', 'Europe', 'Australia'] },
            { level: 1, question: 'Moscow serves as the capital of the vast country of _____.', audio: 'The city of Moscow serves as the capital of the vast country of Russia.', answer: 'Russia', distractors: ['Ukraine', 'Poland', 'Belarus'] },
            { level: 1, question: 'The main and most widely spoken language in China is _____.', audio: 'The main and most widely spoken language in China is Mandarin Chinese.', answer: 'Mandarin Chinese', distractors: ['Cantonese', 'Japanese', 'Korean'] },
            { level: 1, question: 'Geographically, the island nation of Japan lies to the _____ of mainland China.', audio: 'Geographically, the island nation of Japan lies to the east of mainland China.', answer: 'East', distractors: ['West', 'North', 'South'] },
            { level: 1, question: 'The largest single ethnic group within the Russian Federation is _____.', audio: 'The largest single ethnic group within the Russian Federation is Russian.', answer: 'Russian', distractors: ['Ukrainian', 'Tatar', 'Chechen'] },
            { level: 1, question: 'Historically, the continent of _____ is often referred to as the "Old World".', audio: 'Historically, the continent of Europe is often referred to as the "Old World".', answer: 'Europe', distractors: ['North America', 'Asia', 'Africa'] },
            { level: 1, question: 'The sprawling metropolis of Cairo is the capital city of _____.', audio: 'The sprawling metropolis of Cairo is the capital city of the nation of Egypt.', answer: 'Egypt', distractors: ['Nigeria', 'South Africa', 'Kenya'] },
            { level: 1, question: 'The Arabic language is the primary language spoken in _____.', audio: 'The Arabic language is the primary language spoken in Saudi Arabia.', answer: 'Saudi Arabia', distractors: ['Iran', 'Turkey', 'Israel'] },
            { level: 1, question: 'The long mountain range known as the Andes is located in _____.', audio: 'The long mountain range known as the Andes is located in South America.', answer: 'South America', distractors: ['North America', 'Asia', 'Africa'] },
            { level: 1, question: 'The population of the United States is well _____.', audio: 'The population of the United States is well over 300 million people.', answer: 'Over 300 million', distractors: ['Under 300 million', 'Exactly 300 million', 'Under 200 million'] },

            // Level 2
            { level: 2, question: 'The vibrant city of Buenos Aires is the capital of _____.', audio: 'The vibrant city of Buenos Aires is the capital of the South American country of Argentina.', answer: 'Argentina', distractors: ['Chile', 'Peru', 'Colombia'] },
            { level: 2, question: 'Nigeria has a population of _____.', audio: 'Nigeria, a populous African nation, has a population of around 220 million people.', answer: 'Around 220 million', distractors: ['Around 100 million', 'Around 50 million', 'Around 350 million'] },
            { level: 2, question: 'At the federal level, Canada has _____ other official languages besides English and French.', audio: 'At the federal level, Canada has two official languages, English and French, and none other.', answer: 'None at the federal level', distractors: ['Spanish', 'German', 'Inuktitut'] },
            { level: 2, question: 'The country of Chile is situated on the _____ coast of South America.', audio: 'The long, narrow country of Chile is situated on the Pacific coast of South America.', answer: 'Pacific', distractors: ['Atlantic', 'Both', 'Neither'] },
            { level: 2, question: 'The Han people are the majority ethnic group in _____.', audio: 'The Han people constitute the world\'s largest ethnic group and are the majority in China.', answer: 'China', distractors: ['Japan', 'India', 'Vietnam'] },
            { level: 2, question: 'The Iberian Peninsula is a part of _____.', audio: 'The Iberian Peninsula, which includes Spain and Portugal, is a part of Europe.', answer: 'Europe', distractors: ['Africa', 'Asia', 'South America'] },
            { level: 2, question: 'The city of Istanbul is located in the country of _____.', audio: 'The city of Istanbul, which straddles two continents, is located in the country of Turkey.', answer: 'Turkey', distractors: ['Greece', 'Syria', 'Iran'] },
            { level: 2, question: 'The most widely spoken language in India is _____.', audio: 'While many languages are spoken in India, the most widely spoken is Hindi.', answer: 'Hindi', distractors: ['Bengali', 'English', 'Tamil'] },
            { level: 2, question: 'The Mekong River flows through multiple countries in _____.', audio: 'The important Mekong River flows through multiple countries in Southeast Asia.', answer: 'Southeast Asia', distractors: ['Eastern Europe', 'Central Africa', 'South America'] },
            { level: 2, question: 'Current estimates show that _____ has a larger population than Indonesia.', audio: 'Comparing the two nations, current estimates show that Pakistan has a larger population than Indonesia.', answer: 'Pakistan', distractors: ['Indonesia', 'They are equal', 'Brazil'] },
            { level: 2, question: 'The Yoruba are one of the largest ethnic groups in _____.', audio: 'The Yoruba people are one of the largest ethnic groups in the West African nation of Nigeria.', answer: 'Nigeria', distractors: ['Ghana', 'Senegal', 'Mali'] },
            { level: 2, question: 'Lagos, one of the largest cities in Africa, is in _____.', audio: 'Lagos, one of the largest cities in Africa, is a major economic hub in Nigeria.', answer: 'Nigeria', distractors: ['South Africa', 'Kenya', 'Ghana'] },
            { level: 2, question: 'The language known as Farsi is the official language of _____.', audio: 'The language known as Farsi, or Persian, is the official language of Iran.', answer: 'Iran', distractors: ['Iraq', 'Saudi Arabia', 'Turkey'] },
            { level: 2, question: 'The major port city of Hamburg is situated in the _____ part of Germany.', audio: 'The major port city of Hamburg is situated in the northern part of Germany.', answer: 'Northern', distractors: ['Southern', 'Central', 'Western'] },
            { level: 2, question: 'The population of the United Kingdom is estimated to be _____.', audio: 'The population of the United Kingdom is currently estimated to be around 67 million.', answer: 'Around 67 million', distractors: ['Around 45 million', 'Around 82 million', 'Around 100 million'] },
            { level: 2, question: 'The Scandinavian Peninsula is located in _____.', audio: 'The Scandinavian Peninsula, home to Norway and Sweden, is located in Northern Europe.', answer: 'Northern Europe', distractors: ['Southern Europe', 'Eastern Europe', 'Western Europe'] },
            { level: 2, question: 'The holy city of Mecca is located in _____.', audio: 'The holy city of Mecca is located in the Middle Eastern country of Saudi Arabia.', answer: 'Saudi Arabia', distractors: ['Jordan', 'Yemen', 'Oman'] },
            { level: 2, question: 'Alongside English, the other official language of the Philippines is _____.', audio: 'Alongside English, the other official language of the Philippines is Filipino.', answer: 'Filipino', distractors: ['Spanish', 'Tagalog', 'Malay'] },
            { level: 2, question: 'On the Indochinese Peninsula, Vietnam is located to the _____ of Cambodia.', audio: 'On the Indochinese Peninsula, Vietnam is located to the east of Cambodia.', answer: 'East', distractors: ['West', 'North', 'South'] },
            { level: 2, question: 'The Pashtun ethnic group is a significant population in both _____.', audio: 'The Pashtun ethnic group is a significant population in both Afghanistan and Pakistan.', answer: 'Afghanistan and Pakistan', distractors: ['India and Nepal', 'Iran and Iraq', 'Turkey and Syria'] },
            { level: 2, question: 'The city of Vancouver is a major metropolitan area in _____.', audio: 'The city of Vancouver is a major metropolitan area in the country of Canada.', answer: 'Canada', distractors: ['United States', 'Australia', 'United Kingdom'] },
            { level: 2, question: 'Of the choices provided, _____ is the one with a population of over 100 million people.', audio: 'Of the choices provided, Mexico is the one with a population of over 100 million people.', answer: 'Mexico', distractors: ['Canada', 'Australia', 'Spain'] },
            { level: 2, question: 'The official language of the country of the Netherlands is _____.', audio: 'The official language of the country of the Netherlands is Dutch.', answer: 'Netherlands', distractors: ['Denmark', 'Belgium', 'Switzerland'] },
            { level: 2, question: 'The Sahara Desert stretches across a large portion of _____.', audio: 'The vast Sahara Desert stretches across a large portion of the continent of Africa.', answer: 'Africa', distractors: ['Asia', 'Australia', 'South America'] },
            { level: 2, question: 'The Zulu people are a major ethnic group within _____.', audio: 'The Zulu people are a well-known and major ethnic group within South Africa.', answer: 'South Africa', distractors: ['Zimbabwe', 'Zambia', 'Botswana'] },

            // Level 3
            { level: 3, question: 'The indigenous language of Quechua is spoken by millions, primarily in _____.', audio: 'The indigenous language of Quechua is spoken by millions, primarily in the country of Peru.', answer: 'Peru', distractors: ['Brazil', 'Mexico', 'Argentina'] },
            { level: 3, question: 'Ethiopia has a population of _____.', audio: 'The nation of Ethiopia, located in the Horn of Africa, has a population of around 126 million.', answer: 'Around 126 million', distractors: ['Around 80 million', 'Around 150 million', 'Around 200 million'] },
            { level: 3, question: 'The Strait of Gibraltar separates Spain from the African country of _____.', audio: 'The strategically important Strait of Gibraltar separates Spain from the African country of Morocco.', answer: 'Morocco', distractors: ['Algeria', 'Tunisia', 'Libya'] },
            { level: 3, question: 'The Kurdish people live primarily across _____.', audio: 'The Kurdish people are a large ethnic group living primarily across Turkey, Iran, Iraq, and Syria.', answer: 'Turkey, Iran, Iraq, Syria', distractors: ['Pakistan, India, Nepal, Bhutan', 'Egypt, Libya, Sudan, Chad', 'Russia, Ukraine, Belarus, Poland'] },
            { level: 3, question: 'The major seaport city of Chittagong is located in _____.', audio: 'The major seaport city of Chittagong is located in the country of Bangladesh.', answer: 'Bangladesh', distractors: ['Pakistan', 'India', 'Sri Lanka'] },
            { level: 3, question: 'The most spoken language in the world by total speakers is _____.', audio: 'When including both native and second-language speakers, English is the most spoken language in the world.', answer: 'English', distractors: ['Mandarin Chinese', 'Spanish', 'Hindi'] },
            { level: 3, question: 'The island nation of Madagascar is located in the _____.', audio: 'The large island nation of Madagascar is located off the coast of Africa in the Indian Ocean.', answer: 'Indian Ocean', distractors: ['Atlantic Ocean', 'Pacific Ocean', 'Southern Ocean'] },
            { level: 3, question: 'Among the nations of Southeast Asia, the one with the highest population is _____.', audio: 'Among the nations of Southeast Asia, the one with the highest population is Indonesia.', answer: 'Indonesia', distractors: ['Philippines', 'Vietnam', 'Thailand'] },
            { level: 3, question: 'Within the nation of Ethiopia, the single largest ethnic group is the _____.', audio: 'Within the nation of Ethiopia, the single largest ethnic group is the Oromo people.', answer: 'Oromo people', distractors: ['Amhara people', 'Somali people', 'Tigrayan people'] },
            { level: 3, question: 'The ancient city of Petra is located in the modern-day country of _____.', audio: 'The famous ancient city of Petra, carved from rock, is located in the modern-day country of Jordan.', answer: 'Jordan', distractors: ['Egypt', 'Israel', 'Lebanon'] },
            { level: 3, question: 'The language of Afrikaans is an official language in _____.', audio: 'The language of Afrikaans, which evolved from Dutch, is an official language in South Africa.', answer: 'South Africa', distractors: ['Namibia', 'Botswana', 'Angola'] },
            { level: 3, question: 'The Gobi Desert spans across parts of _____.', audio: 'The vast, arid region known as the Gobi Desert spans across parts of China and Mongolia.', answer: 'China and Mongolia', distractors: ['Russia and Kazakhstan', 'India and Pakistan', 'Iran and Afghanistan'] },
            { level: 3, question: 'The total population of the continent of Africa is approximately _____.', audio: 'The total population of the continent of Africa is approximately 1.4 billion people.', answer: '1.4 billion', distractors: ['800 million', '2 billion', '1 billion'] },
            { level: 3, question: 'The indigenous Berber people originate from _____.', audio: 'The indigenous Berber people, also known as Amazigh, originate from North Africa.', answer: 'North Africa', distractors: ['East Africa', 'The Middle East', 'The Balkans'] },
            { level: 3, question: 'The city of Karachi served as the first capital of _____.', audio: 'Here is a historical fact: the city of Karachi served as the first capital of Pakistan.', answer: 'Pakistan', distractors: ['India', 'Bangladesh', 'Afghanistan'] },
            { level: 3, question: 'The Swahili language serves as a lingua franca throughout _____.', audio: 'The Swahili language serves as a lingua franca, or common language, throughout East Africa.', answer: 'East Africa', distractors: ['West Africa', 'North Africa', 'Southern Africa'] },
            { level: 3, question: 'Lake Baikal is located in the _____ region of Russia.', audio: 'Lake Baikal, the world\'s deepest and oldest freshwater lake, is located in the Siberia region of Russia.', answer: 'Siberia', distractors: ['The Urals', 'The Caucasus', 'European Russia'] },
            { level: 3, question: 'The most populous city on the continent of South America is _____.', audio: 'The most populous city on the continent of South America is São Paulo, Brazil.', answer: 'São Paulo', distractors: ['Buenos Aires', 'Rio de Janeiro', 'Lima'] },
            { level: 3, question: 'The Punjabi people form a major ethnic group in both _____.', audio: 'The Punjabi people form a major ethnic group in both the countries of India and Pakistan.', answer: 'India and Pakistan', distractors: ['Bangladesh and Nepal', 'Afghanistan and Iran', 'Sri Lanka and India'] },
            { level: 3, question: 'The city of Auckland is the largest city in _____.', audio: 'While not the capital, the city of Auckland is the largest city in the island nation of New Zealand.', answer: 'New Zealand', distractors: ['Australia', 'Fiji', 'Papua New Guinea'] },
            { level: 3, question: 'The _____ is a language family, which contains hundreds of individual languages.', audio: 'A key concept in linguistics is the Indo-European language family, which contains hundreds of individual languages.', answer: 'Indo-European', distractors: ['German', 'Russian', 'Italian'] },
            { level: 3, question: 'The Strait of Malacca is located between peninsular Malaysia and the Indonesian island of _____.', audio: 'The critical shipping lane known as the Strait of Malacca is located between peninsular Malaysia and the Indonesian island of Sumatra.', answer: 'Sumatra', distractors: ['Borneo', 'Java', 'Sulawesi'] },
            { level: 3, question: 'Within the European Union, the country with the largest population is _____.', audio: 'Within the European Union, the country with the largest population is Germany.', answer: 'Germany', distractors: ['France', 'Italy', 'Spain'] },
            { level: 3, question: 'The Hausa people are one of the largest ethnic groups in _____.', audio: 'The Hausa people are one of the largest and most influential ethnic groups in West Africa.', answer: 'West Africa', distractors: ['East Africa', 'Central Africa', 'Southern Africa'] },
            { level: 3, question: 'The port city of Casablanca is a major economic center in _____.', audio: 'The famous port city of Casablanca is a major economic center in the country of Morocco.', answer: 'Morocco', distractors: ['Algeria', 'Tunisia', 'Spain'] },

            // Level 4
            { level: 4, question: 'The Basque language is spoken in a region of _____.', audio: 'The Basque language, which is unrelated to any other language, is spoken in a region of Spain and France.', answer: 'Spain and France', distractors: ['Portugal and Spain', 'Italy and Switzerland', 'Germany and Austria'] },
            { level: 4, question: 'The Tokyo metro area has a population of _____.', audio: 'The Tokyo metro area, the world\'s largest megacity, has a population of around 37 million people.', answer: 'Around 37 million', distractors: ['Around 25 million', 'Around 45 million', 'Around 30 million'] },
            { level: 4, question: 'The Russian exclave of Kaliningrad is located on the _____.', audio: 'The Russian exclave of Kaliningrad is geographically separated from the rest of the country and is located on the Baltic Sea.', answer: 'Baltic Sea', distractors: ['Black Sea', 'Caspian Sea', 'Barents Sea'] },
            { level: 4, question: 'The Ainu people are an indigenous group from _____, the northernmost main island of Japan.', audio: 'The Ainu people are an indigenous group originating from the northernmost main island of Japan, Hokkaido.', answer: 'Hokkaido', distractors: ['Honshu', 'Kyushu', 'Shikoku'] },
            { level: 4, question: 'The city of Ushuaia, the world\'s southernmost city, is located in _____.', audio: 'The city of Ushuaia, often considered the southernmost city in the world, is located in Argentina.', answer: 'Argentina', distractors: ['Chile', 'New Zealand', 'South Africa'] },
            { level: 4, question: 'The language of _____, the official language of Ethiopia, is written using the Ge\'ez script.', audio: 'The language of Amharic, the official language of Ethiopia, is written using the ancient Ge\'ez script.', answer: 'Amharic', distractors: ['Swahili', 'Hausa', 'Yoruba'] },
            { level: 4, question: 'The Palk Strait separates India from the island nation of _____.', audio: 'The body of water known as the Palk Strait separates the nation of India from the island nation of Sri Lanka.', answer: 'Sri Lanka', distractors: ['Maldives', 'Indonesia', 'Mauritius'] },
            { level: 4, question: 'Excluding microstates, the most densely populated country in the world is _____.', audio: 'Excluding small city-states and territories, the most densely populated country in the world is Bangladesh.', answer: 'Bangladesh', distractors: ['South Korea', 'Netherlands', 'India'] },
            { level: 4, question: 'The Baloch people live in a region that spans across _____.', audio: 'The Baloch people primarily live in a region of Asia that spans across Pakistan, Iran, and Afghanistan.', answer: 'Pakistan, Iran, and Afghanistan', distractors: ['India, Nepal, and Bhutan', 'Iraq, Syria, and Jordan', 'Turkmenistan, Uzbekistan, and Tajikistan'] },
            { level: 4, question: 'The ancient city of Timbuktu is located in the modern-day country of _____.', audio: 'The ancient city of Timbuktu, a historic center of learning and trade, is located in the modern-day country of Mali.', answer: 'Mali', distractors: ['Niger', 'Chad', 'Sudan'] },
            { level: 4, question: 'The Catalan language has co-official status in _____.', audio: 'The Catalan language has co-official status in the autonomous community of Catalonia in northeastern Spain.', answer: 'Catalonia', distractors: ['Andalusia', 'Galicia', 'Basque Country'] },
            { level: 4, question: 'The Fergana Valley is a region shared by _____.', audio: 'The fertile and densely populated Fergana Valley is a region shared by Uzbekistan, Kyrgyzstan, and Tajikistan.', answer: 'Uzbekistan, Kyrgyzstan, and Tajikistan', distractors: ['Kazakhstan, Turkmenistan, Afghanistan', 'Russia, China, Mongolia', 'Iran, Pakistan, Afghanistan'] },
            { level: 4, question: 'The continent of Africa has a median age of only _____.', audio: 'Reflecting its young population, the continent of Africa has a median age of only around 20 years.', answer: 'Around 20 years', distractors: ['Around 25 years', 'Around 30 years', 'Around 35 years'] },
            { level: 4, question: 'The Miao people originate from _____.', audio: 'The Miao people, who are also known as the Hmong, are an ethnic group originating from Southwest China and parts of Southeast Asia.', answer: 'Southwest China and Southeast Asia', distractors: ['Siberia and Central Asia', 'The Indian subcontinent', 'The Arabian Peninsula'] },
            { level: 4, question: 'The city of Medellín is located in the country of _____.', audio: 'The city of Medellín, known for its innovation and transformation, is located in the country of Colombia.', answer: 'Colombia', distractors: ['Venezuela', 'Ecuador', 'Peru'] },
            { level: 4, question: 'In terms of native speakers, the most spoken language in Europe is _____.', audio: 'In terms of native speakers, the most spoken language in Europe is Russian.', answer: 'Russian', distractors: ['German', 'French', 'English'] },
            { level: 4, question: 'The island of Socotra, famous for its unique plants, is part of _____.', audio: 'The island of Socotra, famous for its alien-like plants, is part of the country of Yemen.', answer: 'Yemen', distractors: ['Oman', 'Somalia', 'Saudi Arabia'] },
            { level: 4, question: 'Of the options given, the city with the largest metropolitan population is _____.', audio: 'Of the options given, the city with the largest metropolitan population is Delhi.', answer: 'Delhi', distractors: ['Shanghai', 'Mexico City', 'Cairo'] },
            { level: 4, question: 'The Uyghur people primarily reside in the _____ autonomous region of China.', audio: 'The Uyghur people are a Turkic ethnic group who primarily reside in the Xinjiang autonomous region of China.', answer: 'Xinjiang', distractors: ['Tibet', 'Inner Mongolia', 'Guangxi'] },
            { level: 4, question: 'The city of Lviv is a major cultural center located in the western part of _____.', audio: 'The historic city of Lviv is a major cultural center located in the western part of Ukraine.', answer: 'Ukraine', distractors: ['Poland', 'Romania', 'Belarus'] },
            { level: 4, question: 'The _____ language is written using its own unique alphabet known as Hangul.', audio: 'The Korean language is written using its own unique and scientific alphabet known as Hangul.', answer: 'Korean', distractors: ['Japanese', 'Vietnamese', 'Thai'] },
            { level: 4, question: 'The Cape of Good Hope is located near the southern tip of _____.', audio: 'The famous landmark known as the Cape of Good Hope is located near the southern tip of Africa.', answer: 'Africa', distractors: ['South America', 'Australia', 'Antarctica'] },
            { level: 4, question: 'Projections show _____ is expected to become the third most populous country by 2050.', audio: 'According to demographic projections, Nigeria is expected to become the third most populous country in the world by the year 2050.', answer: 'Nigeria', distractors: ['United States', 'Indonesia', 'Pakistan'] },
            { level: 4, question: 'The Rohingya have faced severe persecution in _____.', audio: 'The Rohingya, a stateless ethnic group, have faced severe persecution and displacement from their homes in Myanmar.', answer: 'Myanmar', distractors: ['Bangladesh', 'Thailand', 'India'] },
            { level: 4, question: 'The city of Isfahan, renowned for its stunning architecture, is a major city in _____.', audio: 'The city of Isfahan, renowned for its stunning Islamic architecture, is a major city in Iran.', answer: 'Iran', distractors: ['Iraq', 'Turkey', 'Uzbekistan'] }
        ];

        // --- HELPER FUNCTIONS ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function initializeSounds() {
            if (!synth) {
                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sine" },
                    envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
                }).toDestination();
            }
            if (!incorrectSynth) {
                incorrectSynth = new Tone.Synth({
                    oscillator: { type: "square" },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 }
                }).toDestination();
            }
        }
        
        function playCorrectSound() {
            if (synth) synth.triggerAttackRelease(["C4", "E4", "G4"], "8n", Tone.now());
        }

        function playIncorrectSound() {
            if (incorrectSynth) incorrectSynth.triggerAttackRelease("C3", "8n", Tone.now());
        }

        function playQuestionAudio() {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
            speechSynthesis.speak(speech);
        }

        // --- GAME LOGIC ---
        function startGame() {
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            testScreen.classList.remove('hidden');
            
            questions = [...allQuestions];
            shuffleArray(questions);
            currentQuestionIndex = 0;
            score = 0;
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            resetState();
            if (currentQuestionIndex >= questions.length) {
                endGame();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            
            // Update UI text with the gap-fill question
            questionText.textContent = currentQuestion.question;
            questionCounter.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
            levelDisplay.textContent = `Level ${currentQuestion.level}`;
            levelDisplay.className = `font-semibold py-1 px-3 rounded-full bg-blue-100 text-blue-600`;

            // Prepare and auto-play audio
            speech.text = currentQuestion.audio;
            playQuestionAudio();

            // Create answer buttons
            const answers = [...currentQuestion.distractors, currentQuestion.answer];
            shuffleArray(answers);
            answers.forEach(answer => {
                const button = document.createElement('button');
                button.innerText = answer;
                button.classList.add('w-full', 'bg-gray-200', 'text-gray-700', 'font-semibold', 'py-4', 'px-4', 'rounded-lg', 'btn', 'text-left', 'md:text-center');
                button.addEventListener('click', () => selectAnswer(button));
                answerButtonsContainer.appendChild(button);
            });

            startTimer();
        }

        function startTimer() {
            let timeLeft = TOTAL_TIME;
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            
            void timerBar.offsetWidth; 

            timerBar.style.transition = `width ${TOTAL_TIME}s linear`;
            timerBar.style.width = '0%';

            timer = setTimeout(() => {
                handleTimeout();
            }, TOTAL_TIME * 1000);
        }

        function handleTimeout() {
            feedbackLight.classList.remove('light-off', 'light-correct');
            feedbackLight.classList.add('light-incorrect');
            playIncorrectSound();
            
            Array.from(answerButtonsContainer.children).forEach(button => {
                button.disabled = true;
                if (button.innerText === questions[currentQuestionIndex].answer) {
                    button.classList.remove('bg-gray-200');
                    button.classList.add('bg-green-500', 'text-white');
                }
            });

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 2000);
        }

        function selectAnswer(selectedButton) {
            clearTimeout(timer);
            const isCorrect = selectedButton.innerText === questions[currentQuestionIndex].answer;

            Array.from(answerButtonsContainer.children).forEach(button => {
                button.disabled = true;
                if (button.innerText === questions[currentQuestionIndex].answer) {
                    button.classList.remove('bg-gray-200');
                    button.classList.add('bg-green-500', 'text-white');
                }
            });

            if (isCorrect) {
                score += 10;
                selectedButton.classList.remove('bg-gray-200');
                selectedButton.classList.add('bg-green-500', 'text-white');
                feedbackLight.classList.remove('light-off', 'light-incorrect');
                feedbackLight.classList.add('light-correct');
                playCorrectSound();
            } else {
                selectedButton.classList.remove('bg-gray-200');
                selectedButton.classList.add('bg-red-500', 'text-white');
                feedbackLight.classList.remove('light-off', 'light-correct');
                feedbackLight.classList.add('light-incorrect');
                playIncorrectSound();
            }
            
            updateScore();

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 2000);
        }

        function updateScore() {
            scoreDisplay.textContent = `Score: ${score}`;
        }

        function resetState() {
            clearTimeout(timer);
            feedbackLight.className = 'feedback-light light-off';
            answerButtonsContainer.innerHTML = '';
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
        }

        function endGame() {
            testScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;
        }

        // --- EVENT LISTENERS ---
        startBtn.addEventListener('click', () => {
            initializeSounds();
            // Tone.js requires a user interaction to start the audio context.
            Tone.start(); 
            startGame();
        });
        
        restartBtn.addEventListener('click', startGame);

        playAudioBtn.addEventListener('click', playQuestionAudio);

    </script>
</body>
</html>
