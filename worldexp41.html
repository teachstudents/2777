<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Mitchell's Earth Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
            transition: background-color 1s ease-in-out;
        }
        #main-container {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            transition: background 1s ease-in-out;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .option-btn, .unit-btn, .themed-btn { transition: all 0.3s ease-in-out; }
        .option-btn.correct {
            background-color: var(--theme-correct, #22c55e) !important;
            color: white !important;
            transform: scale(1.05);
            border-color: var(--theme-correct-dark, #16a34a) !important;
        }
        .option-btn.incorrect {
            background-color: var(--theme-incorrect, #ef4444) !important;
            color: white !important;
            border-color: var(--theme-incorrect-dark, #dc2626) !important;
        }
        .option-btn:disabled { cursor: not-allowed; }
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 9999px;
            color: white;
            font-weight: 600;
            transition: all 0.5s ease-in-out;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #toast.show { bottom: 30px; }
        
        /* Animations */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-in-out; }
        
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        #timer-bar.active { animation: shrink 15s linear forwards; }
    </style>
</head>

        class TTSEngine {
            constructor() {
                this.synth = window.speechSynthesis;
                this.voices = [];
                this.selectedVoice = null;
                this.isMuted = false;
                this.keepAliveInterval = null;
                this.praisePhrases = [
                    "Nice one!", "Great job!", "Excellent!", "Awesome!", "You've got this!", 
                    "Keep it up!", "Fantastic!", "Brilliant!", "Well done!", "Superb!", "That's it!"
                ];
                this.streakPhrases = [
                    "Streak!", "On a roll!", "Fire!", "Combo!", "Amazing streak!"
                ];
                this.loadVoices();
                if (this.synth.onvoiceschanged !== undefined) {
                    this.synth.onvoiceschanged = () => this.loadVoices();
                }
            }

            loadVoices() {
                this.voices = this.synth.getVoices();
                const neuralVoice = this.voices.find(v => v.name.toLowerCase().includes('neural') && v.lang.startsWith('en'));
                const premiumVoice = this.voices.find(v => v.name.toLowerCase().includes('premium') && v.lang.startsWith('en'));
                const aDefaultVoice = this.voices.find(v => v.lang.startsWith('en') && v.default);
                this.selectedVoice = neuralVoice || premiumVoice || aDefaultVoice || this.voices.find(v => v.lang.startsWith('en'));
            }

            speak(text, priority = false) {
                if (this.isMuted || !this.selectedVoice) return;
                if (this.synth.speaking && !priority) return;
                
                if(this.synth.speaking && priority) {
                    this.synth.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = this.selectedVoice;
                utterance.pitch = 1;
                utterance.rate = 0.85;
                utterance.volume = 0.8;
                this.synth.speak(utterance);
            }

            speakPraise() {
                const phrase = this.praisePhrases[Math.floor(Math.random() * this.praisePhrases.length)];
                this.speak(phrase);
            }

            speakStreak(streakCount) {
                 const phrase = this.streakPhrases[Math.floor(Math.random() * this.streakPhrases.length)];
                 this.speak(`${phrase} ${streakCount} in a row!`, true);
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.isMuted) {
                    this.synth.cancel();
                }
                return this.isMuted;
            }

            startKeepAlive() {
                if (this.keepAliveInterval) return;
                this.keepAliveInterval = setInterval(() => {
                    if (this.synth.speaking) return;
                    const utterance = new SpeechSynthesisUtterance('');
                    this.synth.speak(utterance);
                }, 10000);
            }
        }

                this.sounds = {
                    correct: new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.2 } }).toDestination(),
                    incorrect: new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.2 } }).toDestination(),
                    timeup: new Tone.Synth({ oscillator: { type: 'sawtooth' }, envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.1 } }).toDestination(),
                    newHighscore: new Tone.Player("https://tonejs.github.io/audio/berklee/gong_1.mp3").toDestination(),
                };
                
                this.init();
            }

            init() {
                this.loadPlayerData();
                this.populateUnitSelection();
                this.bindEvents();
                this.elements.playerNameInput.value = this.playerData.name;
                this.updateMuteButton();
            }

            loadPlayerData() {
                const data = localStorage.getItem('vocabChallengeData');
                this.playerData = data ? JSON.parse(data) : { name: '', scores: {}, mistakes: {}, muted: false };
                this.tts.isMuted = this.playerData.muted;
            }

            savePlayerData() {
                this.playerData.muted = this.tts.isMuted;
                localStorage.setItem('vocabChallengeData', JSON.stringify(this.playerData));
            }

            populateUnitSelection() {
                this.elements.unitCategoriesContainer.innerHTML = '';
                for (const categoryName in UNITS_DATA) {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.classList.add('mb-6');

                    const categoryTitle = document.createElement('h2');
                    categoryTitle.textContent = categoryName;
                    categoryTitle.classList.add('text-xl', 'lg:text-2xl', 'font-bold', 'text-slate-700', 'mb-3', 'border-b-2', 'pb-2', 'border-slate-200');
                    categoryDiv.appendChild(categoryTitle);

                    const unitList = document.createElement('div');
                    unitList.classList.add('space-y-2');
                    
                    const units = UNITS_DATA[categoryName];
                    for (const unitId in units) {
                        const unit = units[unitId];
                        const button = document.createElement('button');
                        button.dataset.unitId = unitId;
                        button.dataset.category = categoryName;
                        button.classList.add('unit-btn', 'w-full', 'p-4', 'border', 'border-slate-300', 'rounded-lg', 'text-left', 'hover:bg-slate-100', 'hover:border-slate-400', 'bg-white', 'flex', 'justify-between', 'items-center');
                        button.innerHTML = `
                            <div>
                                <span class="font-bold block text-slate-800 text-base md:text-lg">${unit.title}</span>
                            </div>
                            <span class="text-sm font-semibold text-slate-500 bg-slate-100 px-2 py-1 rounded-full">Score: ${this.playerData.scores[unitId] || 0}</span>`;
                        button.addEventListener('click', () => this.selectUnit(categoryName, unitId));
                        unitList.appendChild(button);
                    }
                    categoryDiv.appendChild(unitList);
                    this.elements.unitCategoriesContainer.appendChild(categoryDiv);
                }
            }
            
            applyTheme(theme) {
                this.elements.mainContainer.style.background = `linear-gradient(135deg, ${theme.bg1}, ${theme.bg2})`;
                const style = document.documentElement.style;
                style.setProperty('--theme-main', theme.main);
                style.setProperty('--theme-accent', theme.accent);
                this.elements.startBtn.style.backgroundColor = theme.main;
                this.elements.restartBtn.style.backgroundColor = theme.main;
                this.elements.scoreDisplay.style.color = theme.main;
                this.elements.timerBar.style.backgroundColor = theme.main;
            }

            updateMuteButton() {
                const icon = this.tts.isMuted ? 
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>` :
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                this.elements.muteBtn.innerHTML = icon;
            }

            bindEvents() {
                this.elements.startBtn.addEventListener('click', () => this.startGame());
                this.elements.restartBtn.addEventListener('click', () => this.startGame());
                this.elements.reviewMistakesBtn.addEventListener('click', () => this.reviewMistakes());
                this.elements.mainMenuBtn.addEventListener('click', () => this.resetToMainMenu());
                this.elements.backToUnitsBtn.addEventListener('click', () => this.resetToMainMenu());
                this.elements.playerNameInput.addEventListener('input', (e) => {
                    this.playerData.name = e.target.value;
                    this.savePlayerData();
                });
                this.elements.muteBtn.addEventListener('click', () => {
                    this.tts.toggleMute();
                    this.updateMuteButton();
                    this.savePlayerData();
                });
            }

            selectUnit(categoryName, unitId) {
                Tone.start();
                this.tts.startKeepAlive();

                this.state.unitId = unitId;
                this.state.selectedUnitData = UNITS_DATA[categoryName][unitId];
                this.elements.unitTitleDisplay.textContent = this.state.selectedUnitData.title;
                this.elements.unitHighscoreDisplay.textContent = `High Score: ${this.playerData.scores[unitId] || 0}`;
                this.elements.startScreenName.textContent = this.playerData.name || 'Champion';
                this.applyTheme(this.state.selectedUnitData.theme);
                this.showScreen('start-screen');
            }

            resetToMainMenu() {
                this.populateUnitSelection();
                this.showScreen('unit-selection-screen');
                this.elements.mainContainer.style.background = `linear-gradient(135deg, #f1f5f9, #e2e8f0)`;
            }
            
            startGame() {
                if (!this.state.selectedUnitData) return;
                this.state.playerName = this.playerData.name || 'Champion';
                this.elements.playerInfo.textContent = `Player: ${this.state.playerName}`;
                this.state.currentQuestionIndex = 0;
                this.state.score = 0;
                this.state.streak = 0;
                this.state.mistakes = [];
                this.state.isReviewing = false;
                this.getQuestions();
                this.updateScoreDisplay();
                this.updateStreakDisplay();
                this.showScreen('game-screen');
                this.displayQuestion();
                this.tts.speak(`Starting ${this.state.selectedUnitData.title}. Good luck!`);
            }

            getQuestions() {
                const { defs } = this.state.selectedUnitData;
                const unitId = this.state.unitId;
                const pastMistakes = this.playerData.mistakes[unitId] || [];
                let questions = [];

                if (pastMistakes.length > 0) {
                    const mistakesToRecycleCount = Math.min(pastMistakes.length, Math.floor(defs.length * 0.4));
                    const shuffledMistakes = [...pastMistakes].sort(() => 0.5 - Math.random());
                    const mistakeIdsToRecycle = shuffledMistakes.slice(0, mistakesToRecycleCount);
                    
                    mistakeIdsToRecycle.forEach(mistakeId => {
                        const question = defs.find(d => d.id === mistakeId);
                        if(question) questions.push(question);
                    });
                }
                
                const remainingQuestionsCount = defs.length - questions.length;
                const nonMistakeQuestions = defs.filter(d => !questions.some(q => q.id === d.id));
                const shuffledNew = [...nonMistakeQuestions].sort(() => 0.5 - Math.random());
                
                questions.push(...shuffledNew.slice(0, remainingQuestionsCount));

                this.state.questions = questions.sort(() => 0.5 - Math.random()).map(def => {
                    const correctAnswer = def.word;
                    let options = [correctAnswer];
                    while (options.length < 4) {
                        const randomWord = this.state.selectedUnitData.vocab[Math.floor(Math.random() * this.state.selectedUnitData.vocab.length)];
                        if (!options.includes(randomWord)) options.push(randomWord);
                    }
                    return { ...def, options: options.sort(() => 0.5 - Math.random()), answer: correctAnswer };
                });
            }

            displayQuestion() {
                this.state.isAnswered = false;
                const questionSet = this.state.isReviewing ? this.state.mistakes : this.state.questions;
                const questionData = questionSet[this.state.currentQuestionIndex];
                
                if (!questionData) {
                    this.endGame();
                    return;
                }

                this.updateProgress();
                this.elements.questionText.textContent = questionData.q;
                this.elements.optionsContainer.innerHTML = '';

                questionData.options.forEach(option => {
                    const button = document.createElement('button');
                    button.textContent = option;
                    button.classList.add('option-btn', 'w-full', 'p-4', 'text-base', 'md:text-lg', 'font-medium', 'border-2', 'border-slate-300', 'rounded-lg', 'text-left', 'hover:bg-slate-200', 'hover:border-slate-400', 'focus:outline-none', 'focus:ring-2', 'bg-white');
                    button.addEventListener('click', () => this.checkAnswer(option, button));
                    this.elements.optionsContainer.appendChild(button);
                });
                
                if (!this.state.isReviewing) this.startTimer();
            }

            checkAnswer(selectedOption, button) {
                if (this.state.isAnswered) return;
                this.state.isAnswered = true;
                clearTimeout(this.state.timerInterval);
                this.elements.timerBar.style.animation = 'none';

                const questionSet = this.state.isReviewing ? this.state.mistakes : this.state.questions;
                const currentQuestion = questionSet[this.state.currentQuestionIndex];
                const correctOption = currentQuestion.answer;
                
                const allButtons = this.elements.optionsContainer.querySelectorAll('button');
                allButtons.forEach(btn => btn.disabled = true);

                if (selectedOption === correctOption) {
                    this.state.streak++;
                    const points = 10 * this.state.streak;
                    this.state.score += points;
                    button.classList.add('correct');
                    this.sounds.correct.triggerAttackRelease('C5', '0.2');
                    if (this.state.streak > 2) {
                        this.tts.speakStreak(this.state.streak);
                    } else {
                        this.tts.speakPraise();
                    }
                    this.showToast(`Correct! +${points} points`, 'bg-green-500');
                } else {
                    this.state.streak = 0;
                    button.classList.add('incorrect');
                    if (!this.state.isReviewing) {
                       this.state.mistakes.push(currentQuestion);
                       const unitMistakes = this.playerData.mistakes[this.state.unitId] || [];
                       if (!unitMistakes.includes(currentQuestion.id)) {
                           unitMistakes.push(currentQuestion.id);
                           this.playerData.mistakes[this.state.unitId] = unitMistakes;
                       }
                    }
                    this.sounds.incorrect.triggerAttackRelease('C3', '0.4');
                    this.showToast(`Incorrect. The answer is ${correctOption}.`, 'bg-red-500');
                    allButtons.forEach(btn => { if (btn.textContent === correctOption) btn.classList.add('correct'); });
                }
                
                if (this.state.isReviewing) {
                   this.state.mistakes.splice(this.state.currentQuestionIndex, 1);
                   this.state.currentQuestionIndex--; 
                }

                this.updateScoreDisplay(true);
                this.updateStreakDisplay();

                setTimeout(() => {
                    this.state.currentQuestionIndex++;
                    this.displayQuestion();
                }, 2000);
            }

            timeUp() {
                if (this.state.isAnswered) return;
                this.state.isAnswered = true;
                this.elements.timerBar.style.animation = 'none';
                
                this.sounds.timeup.triggerAttackRelease('A2', '0.3');
                const questionSet = this.state.isReviewing ? this.state.mistakes : this.state.questions;
                const currentQuestion = questionSet[this.state.currentQuestionIndex];
                const correctOption = currentQuestion.answer;
                
                this.state.streak = 0;
                this.updateStreakDisplay();
                if (!this.state.isReviewing) {
                    this.state.mistakes.push(currentQuestion);
                    const unitMistakes = this.playerData.mistakes[this.state.unitId] || [];
                    if (!unitMistakes.includes(currentQuestion.id)) {
                        unitMistakes.push(currentQuestion.id);
                        this.playerData.mistakes[this.state.unitId] = unitMistakes;
                    }
                }

                const allButtons = this.elements.optionsContainer.querySelectorAll('button');
                allButtons.forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === correctOption) btn.classList.add('correct');
                    else btn.classList.add('incorrect');
                });
                
                this.showToast(`Time's up! The answer was ${correctOption}.`, 'bg-red-500');
                
                setTimeout(() => {
                    this.state.currentQuestionIndex++;
                    this.displayQuestion();
                }, 2000);
            }

            endGame() {
                this.showScreen('game-over-screen');
                this.elements.finalScore.textContent = this.state.score;
                this.elements.finalGreeting.textContent = `Great job, ${this.state.playerName}!`;
                this.elements.finalHighscoreMsg.textContent = '';

                const currentHighscore = this.playerData.scores[this.state.unitId] || 0;
                if (this.state.score > currentHighscore) {
                    this.elements.finalHighscoreMsg.textContent = `New High Score!`;
                    this.elements.gameOverTitle.textContent = "High Score!";
                    this.playerData.scores[this.state.unitId] = this.state.score;
                    this.sounds.newHighscore.start();
                    this.tts.speak(`Wow! New high score! ${this.state.score} points!`, true);
                } else {
                     this.elements.gameOverTitle.textContent = "Quiz Complete!";
                     this.tts.speak(`Quiz complete! You scored ${this.state.score} points.`, true);
                }
                
                this.savePlayerData();

                if (this.state.mistakes.length > 0) {
                    this.elements.mistakesContainer.innerHTML = `<p class="font-semibold mb-2">You had ${this.state.mistakes.length} incorrect answers.</p>`;
                    this.elements.reviewMistakesBtn.style.display = 'block';
                } else {
                    this.elements.mistakesContainer.innerHTML = `<p class="font-bold">Perfect Score! You're a true master!</p>`;
                    this.elements.reviewMistakesBtn.style.display = 'none';
                }
            }

            reviewMistakes() {
                if (this.state.mistakes.length === 0) return;
                this.state.isReviewing = true;
                this.state.currentQuestionIndex = 0;
                this.showScreen('game-screen');
                this.displayQuestion();
            }
            
            startTimer() {
                const timerBar = this.elements.timerBar;
                timerBar.style.animation = 'none';
                void timerBar.offsetWidth; 
                timerBar.style.animation = `shrink ${this.timePerQuestion}s linear forwards`;
                this.state.timerInterval = setTimeout(() => this.timeUp(), this.timePerQuestion * 1000);
            }

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            }

            updateScoreDisplay(animate = false) {
                this.elements.scoreDisplay.textContent = `Score: ${this.state.score}`;
                if (animate) {
                    this.elements.scoreDisplay.classList.add('pop');
                    this.elements.scoreDisplay.addEventListener('animationend', () => {
                        this.elements.scoreDisplay.classList.remove('pop');
                    }, { once: true });
                }
            }
            
            updateStreakDisplay() {
                if (this.state.streak > 1) {
                    this.elements.streakDisplay.textContent = `${this.state.streak}x Streak!`;
                } else {
                    this.elements.streakDisplay.textContent = '';
                }
            }

            updateProgress() {
                const questionSet = this.state.isReviewing ? this.state.mistakes : this.state.questions;
                const totalQuestions = this.state.isReviewing ? questionSet.length : this.state.questions.length;
                this.elements.questionCounter.textContent = `Question ${this.state.currentQuestionIndex + 1} / ${totalQuestions}`;
            }

            showToast(message, bgColor) {
                const toast = this.elements.toast;
                toast.textContent = message;
                toast.style.backgroundColor = bgColor;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2200);
            }
        }

        window.addEventListener('DOMContentLoaded', () => new VocabularyQuiz());
    </script>
