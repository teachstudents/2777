<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Tense Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        body {
            font-family: 'Patrick Hand', cursive;
            background: #f3f4f6; /* gray-100 */
            user-select: none;
        }
        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
        }
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 1rem;
        }
        .active-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .topic-card, .mode-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .topic-card:hover, .mode-card-container:hover .mode-card {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .topic-card.completed {
            background-color: #fbbf24 !important; /* amber-400 */
            border-color: #f59e0b; /* amber-500 */
        }
        .choice-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .choice-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .correct {
            animation: correct-pulse 0.6s ease-in-out;
            background-color: #4ade80 !important; /* green-400 */
            border: 4px solid #facc15; /* yellow-400 */
        }
        .incorrect {
            animation: shake 0.5s;
            background-color: #f87171 !important; /* red-400 */
        }
        @keyframes correct-pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px #fbbf24; }
            50% { transform: scale(1.15); box-shadow: 0 0 30px #fbbf24, 0 0 40px #a7f3d0; }
            100% { transform: scale(1); box-shadow: 0 0 5px #fbbf24;}
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        #celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 100;
        }
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 101;
            pointer-events: none;
        }
        .token-container {
            position: relative;
        }
        .token-plus {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 2rem;
            color: #facc15;
            animation: token-float 1s ease-out forwards;
        }
        @keyframes token-float {
            0% { transform: translateY(0) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.8); opacity: 0; }
        }
        .background-flash {
            animation: bg-flash 0.5s ease-out;
        }
        @keyframes bg-flash {
            0% { background-color: #d1fae5; } /* emerald-100 */
            100% { background-color: #f3f4f6; } /* gray-100 */
        }
        .player-area {
            transition: background-color 0.3s;
            position: relative;
        }
        .player-area.locked {
            background-color: #e5e7eb; /* gray-200 */
        }
        .name-input.invalid {
             border-color: #ef4444; /* red-500 */
             animation: shake 0.5s;
        }
        .badge-popup {
            font-size: 4rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: badge-animation 2.5s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes badge-animation {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-360deg); opacity: 0; }
            25% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }
    </style>
</head>

// --- AUDIO & SPEECH ---
const synth = window.speechSynthesis;
let correctSound, incorrectSound, celebrationSound;

try {
    correctSound = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
    incorrectSound = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 0.2 } }).toDestination();
    celebrationSound = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'triangle8' }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
} catch (e) { console.error("Could not initialize Tone.js synths:", e); }

const praiseWords = ["Awesome!", "Great job!", "Superstar!", "You got it!", "Well done!", "Fantastic!", "Excellent!"];
const encouragementWords = ["Almost!", "So close!", "Give it another shot!", "Don't give up!", "Nice try!"];

let voices = [];
let voiceIndex = 0;

function loadVoices() {
    if (!('speechSynthesis' in window)) return;
    voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
}

if ('speechSynthesis' in window) {
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices(); // Initial attempt
}

function getNextVoice() {
    if (voices.length === 0) {
        loadVoices(); 
        if (voices.length === 0) return null;
    }
    const preferredVoices = voices.filter(v => v.name.includes('Natural') || v.name.includes('Google'));
    const voicePool = preferredVoices.length > 0 ? preferredVoices : voices;
    if (voicePool.length === 0) return null;
    voiceIndex = (voiceIndex + 1) % voicePool.length;
    return voicePool[voiceIndex];
}

function speak(text, rate = 0.85, callback) {
    if (Tone.context.state !== 'running') {
        Tone.start().catch(e => console.error("Could not start Tone.js AudioContext:", e));
    }
    if (!('speechSynthesis' in window)) {
        if (callback) callback();
        return;
    }
    if (synth.speaking) {
        synth.cancel();
    }
    const utter = new SpeechSynthesisUtterance(text);
    const voice = getNextVoice();
    if (voice) {
        utter.voice = voice;
    }
    utter.lang = 'en-US';
    utter.rate = rate;
    if (callback) {
        utter.onend = callback;
    }
    synth.speak(utter);
}

// --- UTILITY & HELPER FUNCTIONS ---
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function showInvalidInput(inputElement) {
    inputElement.classList.add('invalid');
    inputElement.placeholder = "Name is required!";
    setTimeout(() => {
        inputElement.classList.remove('invalid');
        inputElement.placeholder = inputElement.id.includes('p1') ? "Player 1 Name" : inputElement.id.includes('p2') ? "Player 2 Name" : "Enter your name";
    }, 2000);
}

// --- SCREEN MANAGEMENT ---
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active-screen'));
    document.getElementById(screenId).classList.add('active-screen');
    gameState.currentScreen = screenId;
}

// --- UI INITIALIZATION ---
function initTopicScreen() {
    const topicGrid = document.getElementById('topic-grid');
    topicGrid.innerHTML = '';
    for (const topic in gameData.topics) {
        const card = document.createElement('div');
        card.className = 'topic-card cursor-pointer p-4 rounded-lg bg-sky-400 text-white border-b-4 border-sky-600 relative flex flex-col items-center justify-center';
        if (gameState.completedTopics.includes(topic)) {
            card.classList.add('completed');
        }
        card.innerHTML = `<div class="text-6xl mb-2">${gameData.topics[topic].badge}</div><div class="text-2xl font-bold text-center">${topic}</div>`;
        card.onclick = () => start1PlayerGame(topic);
        topicGrid.appendChild(card);
    }
    document.getElementById('welcome-message').textContent = `Welcome, ${gameState.playerName}! Choose a topic!`;
}

// --- 1-PLAYER GAME ---
function start1PlayerGame(topic) {
    gameState.currentTopic = topic;
    gameState.score = 0;
    gameState.tokens = 0;
    gameState.currentQuestionIndex = 0;
    gameState.currentQuestionSet = shuffleArray([...gameData.topics[topic].questions]);
    
    updateScore();
    document.getElementById('topic-title').textContent = topic;
    showScreen('game-screen');
    generate1PQuestion();
}

function stopQuestionTimer() {
    if (gameState.questionTimerInterval) {
        clearInterval(gameState.questionTimerInterval);
        gameState.questionTimerInterval = null;
    }
}

function startQuestionTimer() {
    stopQuestionTimer(); 
    gameState.timeLeft = 20;
    const timerDisplay = document.getElementById('timer');
    timerDisplay.textContent = `Time: ${gameState.timeLeft}`;
    timerDisplay.classList.remove('animate-pulse');

    gameState.questionTimerInterval = setInterval(() => {
        gameState.timeLeft--;
        timerDisplay.textContent = `Time: ${gameState.timeLeft}`;
        if (gameState.timeLeft <= 5) {
             timerDisplay.classList.add('animate-pulse');
        }

        if (gameState.timeLeft <= 0) {
            stopQuestionTimer();
            speak("Time's up!");
            const gameArea = document.getElementById('game-area');
            handle1PAnswer(false, gameArea.querySelector('.choice-card') || gameArea);
        }
    }, 1000);
}

function generate1PQuestion() {
    if (gameState.currentQuestionIndex >= gameState.currentQuestionSet.length) {
        end1PGame();
        return;
    }
    
    startQuestionTimer();
    updateProgressBar();

    const questionCounter = document.getElementById('question-counter');
    questionCounter.textContent = `Q: ${gameState.currentQuestionIndex + 1}/${gameState.currentQuestionSet.length}`;

    const gameArea = document.getElementById('game-area');
    gameArea.className = 'p-6 min-h-[60vh] flex flex-col justify-center items-center bg-blue-100 rounded-lg';
    
    const question = gameState.currentQuestionSet[gameState.currentQuestionIndex];
    const sentenceParts = question.sentence.split('___');
    const shuffledOptions = shuffleArray([...question.options]);

    const questionText = question.sentence.replace('___', `(blank)`);
    speak(questionText, 0.85);

    gameArea.innerHTML = `
        <div class="text-center w-full">
            <div class="text-8xl mb-4">${question.img}</div>
            <p class="text-2xl md:text-3xl mb-2 text-gray-700">${sentenceParts[0]}<span class="inline-block bg-gray-300 rounded-md w-32 h-8 mx-2 align-middle"></span>${sentenceParts[1]}</p>
            <p class="text-lg text-gray-500 mb-6">(Fill in the blank)</p>
             <button id="play-sentence-btn" class="btn bg-sky-500 hover:bg-sky-600 text-white p-3 rounded-full mb-6"><i class="fas fa-volume-up text-2xl"></i></button>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-2xl mx-auto">
                ${shuffledOptions.map(option => `
                    <button class="choice-card bg-white hover:bg-sky-100 text-xl sm:text-2xl p-4 rounded-lg shadow-md" data-answer="${option}">
                        ${option}
                    </button>
                `).join('')}
            </div>
        </div>
    `;

    document.getElementById('play-sentence-btn').onclick = () => speak(questionText, 0.85);
    gameArea.querySelectorAll('.choice-card').forEach(button => {
        button.onclick = (e) => handle1PAnswer(e.target.dataset.answer === question.base, e.target);
    });
}

function handle1PAnswer(isCorrect, element) {
    stopQuestionTimer();
    document.querySelectorAll('.choice-card').forEach(el => el.disabled = true);

    if (isCorrect) {
        gameState.score += 10;
        gameState.tokens += 1;
        element.classList.add('correct');
        if (correctSound) correctSound.triggerAttackRelease("G5", "16n", Tone.now());
        
        document.body.classList.add('background-flash');
        setTimeout(() => document.body.classList.remove('background-flash'), 500);
        
        const tokenContainer = document.querySelector('.token-container');
        const plusOne = document.createElement('div');
        plusOne.textContent = `+1💰`;
        plusOne.className = 'token-plus';
        tokenContainer.appendChild(plusOne);
        setTimeout(() => plusOne.remove(), 1000);
        
        speak(praiseWords[Math.floor(Math.random() * praiseWords.length)], 0.85);
    } else {
        element.classList.add('incorrect');
        if (incorrectSound) incorrectSound.triggerAttackRelease("A2", "8n", Tone.now());
        speak(encouragementWords[Math.floor(Math.random() * encouragementWords.length)], 0.85);
    }

    updateScore();
    
    setTimeout(() => {
        if (isCorrect) {
            gameState.currentQuestionIndex++;
            generate1PQuestion();
        } else {
            const question = gameState.currentQuestionSet[gameState.currentQuestionIndex];
            const questionText = question.sentence.replace('___', `(blank)`);
            speak(`Let's try that one again. ${questionText}`, 0.85);
            element.classList.remove('incorrect');
            document.querySelectorAll('.choice-card').forEach(el => el.disabled = false);
            startQuestionTimer();
        }
    }, 2000);
}

function updateScore() {
    document.getElementById('score').textContent = gameState.score;
    document.getElementById('tokens').textContent = gameState.tokens;
}

function updateProgressBar() {
    const progress = (gameState.currentQuestionIndex / gameState.currentQuestionSet.length) * 100;
    document.getElementById('progress-bar').style.width = `${progress}%`;
}

function end1PGame() {
    stopQuestionTimer();
    if (!gameState.completedTopics.includes(gameState.currentTopic)) {
        gameState.completedTopics.push(gameState.currentTopic);
    }
    
    const celebrationOverlay = document.getElementById('celebration-overlay');
    document.getElementById('celebration-title').textContent = `Topic Complete!`;
    document.getElementById('celebration-badge').textContent = gameData.topics[gameState.currentTopic].badge;
    document.getElementById('celebration-message').textContent = `Great work on ${gameState.currentTopic}, ${gameState.playerName}!`;
    document.getElementById('celebration-continue-btn').textContent = 'Choose New Topic';
    
    celebrationOverlay.style.display = 'flex';
    startFireworks();
    if (celebrationSound) {
        const now = Tone.now();
        celebrationSound.triggerAttackRelease(["C4", "E4", "G4", "C5"], "4n", now);
    }
    speak(`Wow! You completed the ${gameState.currentTopic} topic!`, 0.85);
}

function generate2PQuestion() {
    if (gameState.current2PQuestionIndex >= gameState.twoPlayerQuestionSet.length) {
        end2PGame();
        return;
    }
    
    gameState.p1Locked = false;
    gameState.p2Locked = false;
    document.getElementById('player1-area').classList.remove('locked');
    document.getElementById('player2-area').classList.remove('locked');

    const questionCounter = document.getElementById('question-counter-2p');
    questionCounter.textContent = `Q: ${gameState.current2PQuestionIndex + 1}/${gameState.twoPlayerQuestionSet.length}`;

    const question = gameState.twoPlayerQuestionSet[gameState.current2PQuestionIndex];
    const sentenceParts = question.sentence.split('___');
    const shuffledOptions = shuffleArray([...question.options]);
    
    const centralArea = document.getElementById('central-question-area');
    centralArea.innerHTML = `
        <div class="text-8xl md:text-9xl mb-4">${question.img}</div>
        <p class="text-xl md:text-3xl mb-2 text-gray-700">${sentenceParts[0]}<span class="inline-block bg-gray-300 rounded-md w-24 md:w-32 h-8 mx-2 align-middle"></span>${sentenceParts[1]}</p>
    `;
    
    const choicesP1 = document.getElementById('choices-p1');
    const choicesP2 = document.getElementById('choices-p2');
    choicesP1.innerHTML = '';
    choicesP2.innerHTML = '';

    shuffledOptions.forEach((option) => {
        choicesP1.innerHTML += `<button class="choice-card bg-blue-200 hover:bg-blue-300 p-3 rounded-lg text-sm md:text-lg" data-answer="${option}" data-player="1">${option}</button>`;
        choicesP2.innerHTML += `<button class="choice-card bg-red-200 hover:bg-red-300 p-3 rounded-lg text-sm md:text-lg" data-answer="${option}" data-player="2">${option}</button>`;
    });

    document.querySelectorAll('#choices-p1 .choice-card').forEach(b => b.onclick = (e) => handle2PAnswer(e.target.closest('.choice-card')));
    document.querySelectorAll('#choices-p2 .choice-card').forEach(b => b.onclick = (e) => handle2PAnswer(e.target.closest('.choice-card')));

    const questionText = question.sentence.replace('___', `(blank)`);
    speak(questionText, 0.85);
}

function handle2PAnswer(buttonElement) {
    const player = parseInt(buttonElement.dataset.player);
    
    if ((player === 1 && gameState.p1Locked) || (player === 2 && gameState.p2Locked)) {
        return; // Player is locked, do nothing
    }

    const answer = buttonElement.dataset.answer;
    const question = gameState.twoPlayerQuestionSet[gameState.current2PQuestionIndex];
    const isCorrect = answer === question.base;
    
    // Lock both players to prevent multiple answers
    gameState.p1Locked = true;
    gameState.p2Locked = true;

    if (isCorrect) {
        if (player === 1) gameState.scoreP1++;
        if (player === 2) gameState.scoreP2++;
        
        document.getElementById(`p${player}-info-2p`).textContent = `${gameState[`playerNameP${player}`]}: ${gameState.scoreP1}`;
        document.getElementById(`p2-info-2p`).textContent = `${gameState.playerNameP2}: ${gameState.scoreP2}`;

        buttonElement.classList.add('correct');
        if (correctSound) correctSound.triggerAttackRelease("G5", "16n", Tone.now());
        
        const randomPraise = praiseWords[Math.floor(Math.random() * praiseWords.length)];
        speak(randomPraise, 0.85);
        check2PScoreMilestones(player);

        setTimeout(() => {
            gameState.current2PQuestionIndex++;
            generate2PQuestion();
        }, 1500);

    } else {
        if (player === 1) {
            gameState.scoreP1 = Math.max(0, gameState.scoreP1 - 1);
            gameState.scoreP2++;
            check2PScoreMilestones(2);
        }
        if (player === 2) {
            gameState.scoreP2 = Math.max(0, gameState.scoreP2 - 1);
            gameState.scoreP1++;
            check2PScoreMilestones(1);
        }

        document.getElementById('p1-info-2p').textContent = `${gameState.playerNameP1}: ${gameState.scoreP1}`;
        document.getElementById('p2-info-2p').textContent = `${gameState.playerNameP2}: ${gameState.scoreP2}`;
        
        buttonElement.classList.add('incorrect');
        if (incorrectSound) incorrectSound.triggerAttackRelease("A2", "8n", Tone.now());
        speak(`Incorrect.`, 0.85);
        
        const correctButton = document.querySelector(`.choice-card[data-answer="${question.base}"]`);
        if(correctButton) {
            correctButton.classList.add('correct');
        }

        setTimeout(() => {
            gameState.current2PQuestionIndex++;
            generate2PQuestion();
        }, 2500);
    }
}

function check2PScoreMilestones(player) {
    const playerScore = player === 1 ? gameState.scoreP1 : gameState.scoreP2;
    const milestones = [
        { score: 100, badge: '🏆', name: 'Master' },
        { score: 75, badge: '🥇', name: 'Gold' },
        { score: 50, badge: '🥈', name: 'Silver' },
        { score: 25, badge: '🥉', name: 'Bronze' }
    ];

    for (const milestone of milestones) {
        const milestoneId = `${player}-${milestone.score}`;
        if (playerScore >= milestone.score && !gameState.claimedMilestones.includes(milestoneId)) {
            gameState.claimedMilestones.push(milestoneId);
            showBadgeNotification(player, milestone.badge);
            const playerName = player === 1 ? gameState.playerNameP1 : gameState.playerNameP2;
            speak(`${playerName} has earned the ${milestone.name} badge!`, 0.85);
            break; // Only award one badge per turn
        }
    }
}

function showBadgeNotification(player, badge) {
    const playerArea = document.getElementById(`player${player}-area`);
    const badgeEl = document.createElement('div');
    badgeEl.className = 'badge-popup';
    badgeEl.innerHTML = badge;
    playerArea.appendChild(badgeEl);
    setTimeout(() => {
        badgeEl.remove();
    }, 2500);
}

function end2PGame() {
    let winnerMessage;
    if (gameState.scoreP1 > gameState.scoreP2) {
        winnerMessage = `${gameState.playerNameP1} wins with ${gameState.scoreP1} points!`;
    } else if (gameState.scoreP2 > gameState.scoreP1) {
        winnerMessage = `${gameState.playerNameP2} wins with ${gameState.scoreP2} points!`;
    } else {
        winnerMessage = `It's a tie with ${gameState.scoreP1} points each!`;
    }

    const celebrationOverlay = document.getElementById('celebration-overlay');
    document.getElementById('celebration-title').textContent = `Game Over!`;
    document.getElementById('celebration-badge').textContent = '🏁';
    document.getElementById('celebration-message').textContent = winnerMessage;
    document.getElementById('celebration-continue-btn').textContent = 'Play Again';
    
    celebrationOverlay.style.display = 'flex';
    startFireworks();
    speak(winnerMessage, 0.85);
}

    }

// --- FIREWORKS ---
const fireworksCanvas = document.getElementById('fireworks-canvas');
const ctx = fireworksCanvas.getContext('2d');
let fireworks = [];
let particles = [];
let fireworksAnimationId;

function startFireworks() {
    fireworksCanvas.width = window.innerWidth;
    fireworksCanvas.height = window.innerHeight;
    function loop() {
        if (Math.random() < 0.05) fireworks.push(new Firework());
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        ctx.globalCompositeOperation = 'lighter';
        
        for (let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].update();
            fireworks[i].draw();
            if (fireworks[i].done()) fireworks.splice(i, 1);
        }
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].done()) particles.splice(i, 1);
        }
        fireworksAnimationId = requestAnimationFrame(loop);
    }
    loop();
}

function stopFireworks() {
    cancelAnimationFrame(fireworksAnimationId);
    fireworks = [];
    particles = [];
    ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 2 + 1;
        this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
    done() { return this.alpha <= this.decay; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

class Firework {
    constructor() {
        this.x = Math.random() * fireworksCanvas.width;
        this.y = fireworksCanvas.height;
        this.targetY = Math.random() * (fireworksCanvas.height / 2);
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        this.exploded = false;
    }
    update() {
        if (!this.exploded) {
            this.y -= 3;
            if (this.y < this.targetY) {
                this.exploded = true;
                for (let i = 0; i < 30; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
        }
    }
    done() { return this.exploded; }
    draw() {
        if (!this.exploded) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
}


// --- INITIALIZATION ---
window.onload = () => {
    showScreen('mode-screen');
    if (Tone.context.state !== 'running') {
        Tone.start().catch(e => console.error("Could not start Tone.js AudioContext:", e));
    }
    loadVoices();
};

</script>
