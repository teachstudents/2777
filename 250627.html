<!DOCTYPE html>
<html lang="en">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Applying the font to the whole page */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-200 via-orange-200 to-red-300 min-h-screen">

    <!-- Main container for the application -->
    <div id="app-container" class="p-4 sm:p-8 flex items-center justify-center min-h-screen">
        <!-- Game content will be rendered here by JavaScript -->
    </div>

    <script>

        const stories = [

              { part1: "Suddenly, they see many", part2: "in the sky.", options: ["colorful balloons", "big clouds", "fast birds"] },
              { part1: "Elsa points and says,", part2: "!", options: ["'Look!'", "'Wow!'", "'So pretty!'"] },
              { part1: "It is time to go", part2: ".", options: ["home", "to the car", "back"] },
              { part1: "For dinner, they have", part2: ".", options: ["pizza with cheese", "soup and bread", "chicken and rice"] },
              { part1: "Leo drinks a glass of", part2: ".", options: ["cold milk", "fresh water", "apple juice"] },
              { part1: "Elsa eats a", part2: "for dessert.", options: ["chocolate cake", "red strawberry", "sweet cookie"] },
              { part1: "After dinner, they", part2: "a book.", options: ["read", "look at", "choose"] },
              { part1: "The book is about a", part2: ".", options: ["funny cat", "big bear", "smart fox"] },
              { part1: "Leo feels", part2: ".", options: ["happy", "good", "great"] },
              { part1: "Elsa is", part2: "too.", options: ["happy", "sleepy", "good"] },
              { part1: "They go to bed and have", part2: "dreams.", options: ["good", "happy", "nice"] },
              { part1: "It was a very", part2: "day.", options: ["good", "fun", "happy"] }
            ]
          },
          {
            title: "Level A2: The Lost Kite",
            level: "A2 (Elementary)",
            sentences: [
              { part1: "Yesterday, Leo and Elsa went to the park because it was", part2: ".", options: ["a beautiful day", "warm and sunny", "perfect for playing"] },
              { part1: "Leo brought his new kite; it was", part2: ".", options: ["red and yellow", "shaped like a dragon", "very big"] },
              { part1: "Elsa helped him", part2: "the kite.", options: ["to fly", "get it in the air", "hold"] },
              { part1: "The wind was strong and pulled the kite", part2: ".", options: ["high in the sky", "up, up, up", "very hard"] },
              { part1: "Suddenly, the string broke and the kite", part2: ".", options: ["flew away", "disappeared", "was gone"] },
              { part1: "Leo felt", part2: ", so Elsa said, 'Don't worry!'", options: ["a little sad", "unhappy", "bad"] },
              { part1: "'We can", part2: "it!' she told him.", options: ["find", "look for", "get"] },
              { part1: "They started to look", part2: "the kite.", options: ["behind the big trees", "near the playground", "everywhere for"] },
              { part1: "First, they asked a man who was", part2: ".", options: ["walking his dog", "reading a newspaper", "sitting on a bench"] },
              { part1: "He said, 'I think I saw it go", part2: ".'", options: ["over there", "towards the woods", "past the flowers"] },
              { part1: "So, they walked to the woods and saw a", part2: ".", options: ["small, friendly squirrel", "colorful, pretty bird", "quick, brown rabbit"] },
              { part1: "The squirrel was holding something", part2: ".", options: ["red and yellow", "long and thin", "bright"] },
              { part1: "It was a piece of their", part2: "!", options: ["lost kite", "broken string", "kite's tail"] },
              { part1: "They followed the squirrel to an old", part2: ".", options: ["oak tree", "tall pine tree", "apple tree"] },
              { part1: "The kite was stuck high", part2: ".", options: ["in the branches", "at the top", "up in the tree"] },
              { part1: "Leo tried to", part2: "the tree, but it was too high.", options: ["climb", "reach", "get up"] },
              { part1: "Elsa had a clever idea to use a", part2: ".", options: ["long stick", "friend's help", "ball"] },
              { part1: "She threw the ball and it", part2: "the kite.", options: ["hit a branch near", "touched", "moved"] },
              { part1: "The kite moved and then it", part2: ".", options: ["floated down", "fell from the tree", "came loose"] },
              { part1: "Leo caught it and was very", part2: ".", options: ["happy and thankful", "excited", "relieved"] },
              { part1: "He said, 'Thank you, Elsa! You are the", part2: ".'", options: ["best sister", "smartest", "most helpful"] },
              { part1: "They fixed the kite's string with some", part2: ".", options: ["tape they had", "help from a friend", "a knot"] },
              { part1: "Then, they", part2: "the kite again.", options: ["flew", "played with", "enjoyed"] },
              { part1: "They went home when it started to get", part2: ".", options: ["dark", "late", "cloudy"] },
              { part1: "It was an", part2: "day at the park.", options: ["exciting", "adventurous", "unforgettable"] }
            ]
          },
            {
            title: "Level A2-B1: The City Adventure",
            level: "A2-B1 (Pre-intermediate)",
            sentences: [
              { part1: "For their birthday treat, Leo and Elsa's parents decided to", part2: ".", options: ["take them to the city", "organize a city trip", "plan a day downtown"] },
              { part1: "They took a train, which was much more", part2: "than taking the car.", options: ["exciting", "interesting", "enjoyable"] },
              { part1: "Their first destination was the", part2: ", which was full of amazing things.", options: ["Natural History Museum", "Science Center", "Art Gallery"] },
              { part1: "Leo was fascinated by the", part2: ".", options: ["enormous dinosaur skeletons", "interactive space exhibit", "ancient Egyptian artifacts"] },
              { part1: "Elsa thought the most interesting part was the", part2: ".", options: ["collection of rare butterflies", "room full of optical illusions", "beautiful, colorful paintings"] },
              { part1: "After the museum, they felt hungry, so they looked for a place to", part2: ".", options: ["have lunch", "get something to eat", "find a meal"] },
              { part1: "They found a small cafe that sold", part2: "sandwiches.", options: ["delicious", "freshly-made", "unusual"] },
              { part1: "While they were eating, a street performer started", part2: "nearby.", options: ["playing the guitar", "doing magic tricks", "juggling colorful balls"] },
              { part1: "The performance was so", part2: "that a large crowd gathered to watch.", options: ["entertaining", "impressive", "skillful"] },
              { part1: "Next on their plan was a visit to the city's", part2: ".", options: ["huge public library", "famous tall tower", "botanical garden"] },
              { part1: "From the top of the tower, the view was", part2: "; they could see the entire city.", options: ["absolutely incredible", "quite spectacular", "breathtaking"] },
              { part1: "Leo tried to find their house, but everything looked so", part2: ".", options: ["tiny and far away", "different from above", "small"] },
              { part1: "Elsa bought a", part2: "from the gift shop.", options: ["souvenir postcard", "small snow globe", "keychain with the tower's picture"] },
              { part1: "Later, they walked through a busy market where vendors were selling", part2: ".", options: ["handmade crafts", "fresh fruit and vegetables", "antique objects"] },
              { part1: "The market was noisy and full of", part2: ".", options: ["interesting smells", "people from all over", "vibrant colors"] },
              { part1: "Leo convinced his dad to buy him a", part2: ".", options: ["hand-carved wooden toy", "book about stars", "cool-looking hat"] },
              { part1: "Elsa received a", part2: "from her mom.", options: ["beautiful silver bracelet", " sketchbook and pencils", "colorful scarf"] },
              { part1: "As the sun began to set, the city lights started to", part2: ".", options: ["twinkle and glow", "turn on one by one", "illuminate the streets"] },
              { part1: "They decided to have", part2: "for dinner before going home.", options: ["an authentic Italian pizza", "a meal in Chinatown", "burgers at a diner"] },
              { part1: "The restaurant was", part2: ", but the food was worth the wait.", options: ["quite crowded", "a little noisy", "very busy"] },
              { part1: "On the train ride home, Leo and Elsa talked about their", part2: ".", options: ["favorite parts of the day", "most memorable moments", "exciting experiences"] },
              { part1: "Leo said he would never forget the", part2: ".", options: ["view from the tower", "dinosaur bones", "magic show"] },
              { part1: "Elsa's favorite memory was the", part2: ".", options: ["beautiful butterflies", "feeling of being in a big city", "lively market"] },
              { part1: "They both felt tired but", part2: "after their long day.", options: ["extremely happy", "wonderfully content", "pleasantly exhausted"] },
              { part1: "It was certainly an adventure they hoped to", part2: "again soon.", options: ["repeat", "experience", "do"] }
            ]
          },
          {
            title: "Level B1: The Mystery of the Hidden Room",
            level: "B1 (Intermediate)",
            sentences: [
              { part1: "During their summer holiday, Leo and Elsa visited their grandparents' house, which was", part2: ".", options: ["a large, historic building", "an old house full of character", "a charming, countryside cottage"] },
              { part1: "One rainy afternoon, they were exploring the attic when they discovered a", part2: ".", options: ["loose floorboard", "strange mark on the wall", "dusty old chest"] },
              { part1: "Driven by curiosity, they opened it and found a", part2: "inside.", options: ["complex, handwritten diary", "rolled-up, mysterious map", "single, ornate key"] },
              { part1: "The diary mentioned a 'hidden room' that no one had entered for", part2: ".", options: ["at least a century", "several decades", "more than fifty years"] },
              { part1: "They decided they had to", part2: "this mystery.", options: ["investigate the", "attempt to solve", "get to the bottom of"] },
              { part1: "The first clue instructed them to find 'the place where the sun never", part2: ".'", options: ["reaches", "shines", "appears"] },
              { part1: "After some consideration, they realized it must be the", part2: ".", options: ["dark, old wine cellar", "windowless hallway", "pantry at the back"] },
              { part1: "Down in the cellar, they had to", part2: "to find the next clue.", options: ["solve a difficult riddle", "rearrange some old barrels", "measure the walls precisely"] },
              { part1: "The riddle led them to the library, a room with", part2: "books.", options: ["floor-to-ceiling", "thousands of", "countless leather-bound"] },
              { part1: "They were looking for a specific book titled 'The Architect's", part2: "'.", options: ["Secret", "Design", "Folly"] },
              { part1: "When they finally located the book, a hidden", part2: "was revealed.", options: ["lever behind the shelf", "button inside the cover", "switch on the wall"] },
              { part1: "Pulling the lever caused a section of the bookcase to", part2: ".", options: ["slide silently aside", "swing inwards", "move to the left"] },
              { part1: "Behind it was a dark, narrow passage that smelled of", part2: ".", options: ["dust and old wood", "damp stone", "forgotten memories"] },
              { part1: "Feeling both nervous and excited, they", part2: "into the darkness.", options: ["ventured cautiously", "stepped bravely", "proceeded slowly"] },
              { part1: "The passage opened into a small room, which was", part2: ".", options: ["completely untouched", "frozen in time", "perfectly preserved"] },
              { part1: "In the center of the room was a desk with a", part2: "on it.", options: ["half-finished letter", "spectacular model ship", "collection of scientific instruments"] },
              { part1: "The letter was from their great-great-grandfather, explaining that he had built the room as a", part2: ".", options: ["private study", "peaceful escape", "place to hide his inventions"] },
              { part1: "He wrote that he hoped whoever found it would share his love for", part2: ".", options: ["discovery and adventure", "knowledge and learning", "creativity and imagination"] },
              { part1: "On the wall, there were", part2: "of stars and planets.", options: ["incredibly detailed charts", "hand-drawn maps", "complex astronomical diagrams"] },
              { part1: "They also found a small box containing a", part2: ".", options: ["beautiful antique compass", "pocket watch that had stopped", "magnifying glass with a pearl handle"] },
              { part1: "Leo and Elsa were", part2: "by their discovery.", options: ["absolutely astonished", "completely amazed", "truly fascinated"] },
              { part1: "They spent the rest of the afternoon", part2: "the room's contents.", options: ["carefully examining", "investigating all of", "looking through"] },
              { part1: "When their grandparents heard the story, they were", part2: ".", options: ["equally surprised and delighted", "shocked but very proud", "speechless with amazement"] },
              { part1: "They decided to preserve the room exactly as they had", part2: ".", options: ["found it", "discovered it", "unearthed it"] },
              { part1: "The experience made Leo and Elsa realize that every old place has its own", part2: ".", options: ["unique stories to tell", "hidden secrets to share", "special history"] }
            ]
          }
        ];

        // --- STATE MANAGEMENT ---
        let currentStoryIndex = null;
        let choices = [];
        const appContainer = document.getElementById('app-container');

        // --- RENDER FUNCTIONS ---
        
        /**
         * Clears the main container and renders the main UI shell.
         * @returns {HTMLElement} The main content area to which other elements can be appended.
         */
        function renderShell() {
            appContainer.innerHTML = ''; // Clear previous content
            const shell = document.createElement('div');
            shell.className = "w-full max-w-4xl bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-6 sm:p-10 transition-all duration-500";
            
            const header = document.createElement('header');
            header.className = 'text-center mb-8';
            header.innerHTML = `
                <h1 class="text-4xl sm:text-5xl font-bold text-gray-800 tracking-tight">Leo & Elsa's Story Adventure</h1>
                <p class="text-gray-600 mt-2 text-lg">Choose an adventure and build your story!</p>`;
            
            const main = document.createElement('main');
            
            shell.appendChild(header);
            shell.appendChild(main);
            appContainer.appendChild(shell);

            return main;
        }

        /**
         * Renders the initial story selection screen.
         */
        function renderStorySelection() {
            const main = renderShell();
            
            const content = document.createElement('div');
            content.innerHTML = `<h2 class="text-2xl font-semibold text-center text-gray-700 mb-6">Choose a Story Level</h2>`;
            
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 sm:grid-cols-2 gap-6";

            stories.forEach((story, index) => {
                const button = document.createElement('button');
                button.className = "text-left p-6 bg-gradient-to-br from-white to-gray-50 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-orange-400 focus:ring-opacity-50";
                button.innerHTML = `
                    <h3 class="text-xl font-bold text-orange-700">${story.title}</h3>
                    <p class="text-gray-500 mt-1 font-semibold">${story.level}</p>`;
                button.onclick = () => selectStory(index);
                grid.appendChild(button);
            });

            content.appendChild(grid);
            main.appendChild(content);
        }

        /**
         * Renders the screen for making choices for each sentence.
         */
        function renderSentenceChoiceScreen() {
            const main = renderShell();
            const story = stories[currentStoryIndex];

            const content = document.createElement('div');
            content.innerHTML = `
                <h2 class="text-2xl font-semibold text-center text-gray-700 mb-2">${story.title}</h2>
                <h3 class="text-lg font-medium text-center text-orange-600 mb-6">${story.level}</h3>`;
            
            const sentencesContainer = document.createElement('div');
            sentencesContainer.className = 'space-y-6';

            story.sentences.forEach((sentence, index) => {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.className = "bg-gray-50 p-4 rounded-xl shadow-sm";
                sentenceDiv.innerHTML = `
                    <p class="text-gray-700 text-lg mb-3 text-center">
                        ${index + 1}. ${sentence.part1}
                        <span class="font-bold text-orange-500 mx-2">_____</span>
                        ${sentence.part2}
                    </p>`;
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = "flex flex-col sm:flex-row justify-center gap-3";
                
                sentence.options.forEach(option => {
                    const button = document.createElement('button');
                    button.textContent = option;
                    button.className = `w-full text-center p-3 rounded-lg border-2 transition-all duration-200 ${choices[index] === option ? 'bg-orange-500 border-orange-600 text-white font-bold shadow-md' : 'bg-white border-gray-200 hover:bg-orange-100 hover:border-orange-300'}`;
                    button.onclick = () => handleChoiceChange(index, option);
                    optionsDiv.appendChild(button);
                });

                sentenceDiv.appendChild(optionsDiv);
                sentencesContainer.appendChild(sentenceDiv);
            });
            content.appendChild(sentencesContainer);
            
            // Add error message placeholder
            const errorP = document.createElement('p');
            errorP.id = 'error-message';
            errorP.className = "text-red-500 text-center mt-6 font-semibold";
            content.appendChild(errorP);

            // Add action buttons
            const actionsDiv = document.createElement('div');
            actionsDiv.className = "mt-8 flex flex-col sm:flex-row items-center justify-center gap-4";
            
            const createBtn = document.createElement('button');
            createBtn.textContent = 'Create My Story!';
            createBtn.className = "w-full sm:w-auto bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-orange-300";
            createBtn.onclick = generateStory;
            
            const resetBtn = document.createElement('button');
            resetBtn.textContent = 'Choose Another Story';
            resetBtn.className = "w-full sm:w-auto bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-full hover:bg-gray-300 transition-colors duration-300 focus:outline-none focus:ring-4 focus:ring-gray-300";
            resetBtn.onclick = resetGame;

            actionsDiv.appendChild(createBtn);
            actionsDiv.appendChild(resetBtn);
            content.appendChild(actionsDiv);

            main.appendChild(content);
        }

        /**
         * Renders the final, completed story.
         */
        function renderFinalStoryScreen() {
            const main = renderShell();
            const story = stories[currentStoryIndex];

            const content = document.createElement('div');
            content.innerHTML = `<h2 class="text-3xl font-bold text-center text-gray-800 mb-4">${story.title}</h2>`;

            const storyContainer = document.createElement('div');
            storyContainer.className = "bg-gray-50 p-6 rounded-2xl shadow-inner prose prose-lg max-w-none";

            const storyP = document.createElement('p');
            story.sentences.forEach((sentence, index) => {
                storyP.innerHTML += `${sentence.part1} <strong class="text-orange-600">${choices[index]}</strong> ${sentence.part2} `;
            });
            storyContainer.appendChild(storyP);
            content.appendChild(storyContainer);
            
            // Add action buttons
            const actionsDiv = document.createElement('div');
            actionsDiv.className = "mt-8 flex flex-col sm:flex-row items-center justify-center gap-4";
            
            const againBtn = document.createElement('button');
            againBtn.textContent = 'Play This Story Again';
            againBtn.className = "w-full sm:w-auto bg-gradient-to-r from-green-400 to-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-green-300";
            againBtn.onclick = playAgain;
            
            const resetBtn = document.createElement('button');
            resetBtn.textContent = 'Choose Another Story';
            resetBtn.className = "w-full sm:w-auto bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-full hover:bg-gray-300 transition-colors duration-300 focus:outline-none focus:ring-4 focus:ring-gray-300";
            resetBtn.onclick = resetGame;

            actionsDiv.appendChild(againBtn);
            actionsDiv.appendChild(resetBtn);
            content.appendChild(actionsDiv);

            main.appendChild(content);
        }


        // --- LOGIC FUNCTIONS ---
        
        function selectStory(index) {
            currentStoryIndex = index;
            choices = Array(stories[currentStoryIndex].sentences.length).fill('');
            renderSentenceChoiceScreen();
        }

        function handleChoiceChange(sentenceIndex, choice) {
            choices[sentenceIndex] = choice;
            // Re-render the screen to show the selection
            renderSentenceChoiceScreen();
        }

        function generateStory() {
            if (choices.some(choice => choice.trim() === '')) {
                document.getElementById('error-message').textContent = 'Please make a choice for every sentence!';
                return;
            }
            renderFinalStoryScreen();
        }

        function playAgain() {
            choices = Array(stories[currentStoryIndex].sentences.length).fill('');
            renderSentenceChoiceScreen();
        }

        function resetGame() {
            currentStoryIndex = null;
            choices = [];
            renderStorySelection();
        }

        // --- INITIALIZATION ---
        // Start the application when the DOM is fully loaded.
        document.addEventListener('DOMContentLoaded', renderStorySelection);

    </script>

</body>
</html>
