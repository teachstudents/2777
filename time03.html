<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Location Listen-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
  <style>
    :root {
      --bg-main: #2d3436;
      --bg-container: #5c5c5c;
      --primary-color: #ff8c42;
      --primary-dark: #ff6b00;
      --text-light: #f5f5f5;
      --text-dark: #ffcc00;
      --border-color: #7d7d7d;
      --correct-color: #7cfc00;
      --incorrect-color: #ff4757;
      --gold-color: #ffd700;
      --accent-cyan: #4ecdc4;
    }

    @keyframes background-pan {
        0% { background-color: #2d3436; }
        20% { background-color: #0c2461; }
        40% { background-color: #4a69bd; }
        60% { background-color: #1e3799; }
        80% { background-color: #3a3a3a; }
        100% { background-color: #2d3436; }
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      color: var(--text-light);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: background-pan 90s linear infinite;
      position: relative;
      overflow-x: hidden;
    }
    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }
    .screen {
      display: none;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem;
      box-sizing: border-box;
      text-align: center;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: var(--primary-color);
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      margin-bottom: 1rem;
    }
    h2 {
      color: var(--text-dark);
      margin: 1rem 0 0.5rem;
    }
    label {
      font-size: 1.1rem;
      color: var(--accent-cyan);
      margin-bottom: 0.5em;
      font-weight: bold;
    }
    input[type="text"] {
      padding: 0.7em 1em;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-container);
      color: var(--text-light);
      font-size: 1.1rem;
      outline: none;
      width: 90%;
      max-width: 400px;
      margin-bottom: 1.5em;
      text-align: center;
    }
    input[type="text"]:focus {
      border-color: var(--primary-color);
    }
    button, .option-btn {
      background: var(--primary-color);
      color: var(--bg-main);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0.8em 2em;
      margin: 0.5em 0.25em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      min-width: 120px;
    }
    button:focus, .option-btn:focus {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 2px;
    }
    button:hover, .option-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    .level-selection {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 1.5em;
    }
    .level-btn {
        background: var(--bg-container);
        color: var(--text-light);
        border: 2px solid var(--border-color);
        padding: 0.6em 1.2em;
    }
    .level-btn.selected {
        background: var(--accent-cyan);
        color: var(--bg-main);
        border-color: var(--accent-cyan);
        transform: scale(1.05);
    }
    .option-btn {
      display: block;
      width: 100%;
      margin: 0.5em 0;
      min-height: 3em;
      text-align: center;
      color: var(--text-light);
      background: rgba(0,0,0,0.15);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      text-transform: capitalize;
    }
    .option-btn.correct {
      background: var(--correct-color);
      color: #222;
      border-color: var(--correct-color);
      animation: pulse-correct 0.5s;
    }
    @keyframes pulse-correct {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    .option-btn.incorrect {
      background: var(--incorrect-color);
      color: #fff;
      border-color: var(--incorrect-color);
    }
    .hud {
      width: 100%;
      background: rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: space-around;
      align-items: center;
      margin: 1em 0 1.5em 0;
      padding: 0.5em 1em;
      border-radius: 8px;
      font-size: 1em;
    }
    .hud-item span {
      color: var(--text-light);
      font-weight: bold;
    }
    .progress-bar-container {
      width: 100%;
      background: rgba(0,0,0,0.25);
      height: 14px;
      border-radius: 8px;
      margin-bottom: 1em;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff8c42, #ffcc00, #7cfc00, #4ecdc4);
      transition: width 0.4s;
      width: 100%;
    }
    .feedback-display {
      font-size: 1.5em;
      min-height: 2em;
      margin: 0.5em 0;
      font-weight: bold;
    }
    .feedback-correct { color: var(--correct-color);}
    .feedback-incorrect { color: var(--incorrect-color);}
    #challenge-script em {
        color: var(--accent-cyan);
        font-size: 0.9em;
    }
    .results-container {
      background: var(--bg-container);
      padding: 1.5em 1em;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      margin: 1em auto;
      color: var(--text-light);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1em;
    }
    .stat-item h4 { color: var(--accent-cyan); margin: 0 0 0.5em 0; font-size: 1em;}
    .stat-item p { font-size: 1.3em; font-weight: bold; margin:0;}
    .badges-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5em;
      justify-content: center;
      margin-top: 0.5em;
    }
    .badge {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.5em;
      text-align: center;
      width: 75px;
    }
    .badge-icon { font-size: 1.5em;}
    .badge-name { font-size: 0.85em;}
    #feature-warning, #error-message {
      color: #fff;
      background: #e53935;
      padding: 0.5em 1em;
      border-radius: 6px;
      margin: 1em 0;
      font-weight: bold;
      display: none;
      text-align: center;
      max-width: 700px;
    }
    #leaderboard-list {
        list-style: none;
        padding: 0;
        text-align: left;
    }
    #leaderboard-list li {
        background: rgba(0,0,0,0.2);
        padding: 0.75em;
        border-radius: 6px;
        margin-bottom: 0.5em;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }
     #leaderboard-list li span {
        display: inline-block;
     }
    .leaderboard-rank { font-size: 1.2em; color: var(--primary-color); width: 30px;}
    .leaderboard-name { flex-grow: 1; }
    .leaderboard-level { background: var(--accent-cyan); color: var(--bg-main); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 10px;}
    .leaderboard-score { color: var(--gold-color); margin-right: 10px;}
    .leaderboard-time { color: var(--text-light); font-size: 0.9em; }

    .token {
        position: fixed;
        width: 20px;
        height: 20px;
        background-color: var(--gold-color);
        border-radius: 50%;
        border: 2px solid #fff;
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        animation: fly-to-score 1s ease-out forwards;
    }

    @keyframes fly-to-score {
        0% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            opacity: 0;
            transform: scale(0.2);
            top: var(--target-y);
            left: var(--target-x);
        }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .screen { padding: 1.5rem 0.5rem;}
      .results-container { padding: 1em 0.5em;}
      .stats-grid { grid-template-columns: 1fr;}
      .hud { font-size: 0.9em;}
      .badge { width: 65px;}
    }
  </style>
</head>
<body>
  <main>
    <div id="feature-warning"></div>
    <!-- START SCREEN -->
    <form id="start-form" class="screen active" autocomplete="off">
      <h1>Location Listen-Up</h1>
      <p style="color: var(--text-dark); max-width: 500px">Listen to the announcement and choose the new location. Answer 25 questions to win!</p>
      
      <label for="player-name-input">Player Name</label>
      <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off" aria-label="Player Name">
      
      <label>Select Level (CEFR)</label>
      <div id="level-selection" class="level-selection">
          <button type="button" class="level-btn" data-level="A1">A1</button>
          <button type="button" class="level-btn" data-level="A2">A2</button>
          <button type="button" class="level-btn" data-level="B1">B1</button>
          <button type="button" class="level-btn" data-level="B2">B2</button>
          <button type="button" class="level-btn" data-level="C1">C1</button>
      </div>
      <input type="hidden" id="selected-level-input">
      <div id="error-message"></div>

      <button type="submit" id="start-game-btn">Start Game</button>
    </form>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen" role="main" aria-live="polite">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="hud" id="hud">
        <div class="hud-item">Player: <span id="hud-player">?</span></div>
        <div class="hud-item" id="score-hud-item">Score: <span id="hud-score">0</span></div>
        <div class="hud-item">Level: <span id="hud-level">A1</span></div>
        <div class="hud-item">Correct: <span id="hud-correct">0/25</span></div>
        <div class="hud-item">Time: <span id="hud-time">10:00</span></div>
        <div class="hud-item">Question: <span id="hud-question">1/25</span></div>
      </div>
      <div class="feedback-display" id="feedback"></div>
      <div id="challenge-script" style="font-size:1.2em; margin-bottom:1em; min-height: 3em;"></div>
      <div id="options-container"></div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen" role="main">
      <h1 id="end-title">Game Over</h1>
      <div class="results-container">
        <h2 id="final-name">Player</h2>
        <div class="stats-grid">
          <div class="stat-item"><h4>Score</h4><p id="final-score">0</p></div>
          <div class="stat-item"><h4>Time Taken</h4><p id="final-time">00:00</p></div>
          <div class="stat-item"><h4>Correct</h4><p id="final-correct">0/25</p></div>
          <div class="stat-item"><h4>Accuracy</h4><p id="final-accuracy">0%</p></div>
        </div>
        <h4>Badges Earned</h4>
        <div class="badges-grid" id="final-badges"></div>
      </div>
      
      <div class="results-container" id="leaderboard-container">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list"></ol>
      </div>

      <button id="play-again-btn">Play Again</button>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script>
    // --- Feature Detection & User Feedback ---
    function checkFeatures() {
      let msg = '';
      if (!('speechSynthesis' in window)) msg += 'Speech Synthesis not supported. ';
      if (typeof Tone === 'undefined') msg += 'Sounds disabled (Tone.js not loaded). ';
      if (msg) {
        $('feature-warning').textContent = msg;
        $('feature-warning').style.display = 'block';
      }
    }
    checkFeatures();

    // --- Data & Utility Functions ---
    const badgeData = {
      'A1_COMPLETE': { name: 'A1 Navigator', icon: '🗺️' }, 'A2_COMPLETE': { name: 'A2 Coordinator', icon: '📅' },
      'B1_COMPLETE': { name: 'B1 Planner', icon: '📋' }, 'B2_COMPLETE': { name: 'B2 Strategist', icon: '🧠' },
      'C1_COMPLETE': { name: 'C1 Mastermind', icon: '👑'},
      'STREAK_5': { name: 'On a Roll', icon: '👍'},
      'STREAK_10': { name: 'In the Zone', icon: '🔥' }, 
      'PERFECT_LEVEL': { name: 'Perfect Itinerary', icon: '🎯' },
      'GAME_COMPLETE': { name: 'Logistics Guru', icon: '🧑‍⚖️' },
      'QUICK_THINKER': { name: 'On the Dot', icon: '⏰' }
    };

    const correctFeedback = ["That's right!", "You got it!", "Excellent!", "Perfect!", "Great listening!", "You're on fire!"];
    const incorrectFeedback = ["Not quite!", "Listen carefully to the new location!", "Keep trying!", "Don't give up!", "You'll get the next one!"];
    
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    
    function generateLocationData() {
        const PLACES = ["the library", "the park", "the community center", "town hall", "the stadium", "the museum", "the cafe", "the bookstore", "the university", "the auditorium", "the gallery", "the theater", "conference room a", "the main hall", "the gymnasium", "room 201", "the west wing"];
        const EVENTS = ["the meeting", "the workshop", "the seminar", "the gathering", "the presentation", "the briefing", "the lecture", "the conference", "the ceremony"];
        const TIMES = ["1:00", "1:30", "2:00", "2:30", "3:00", "3:30", "4:00", "4:30", "5:00"];
        const DAYS = ["monday", "tuesday", "wednesday", "thursday", "friday"];

        const difficultyConfig = {
            'A1': {
                templates: [
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} at ${p1} is moved. It is now at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Change of plans for the ${evt}. We will meet at ${p2} instead.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Hello, the ${evt} is not at ${p1}. Please go to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This is an announcement for the ${evt}. The location is now ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${day} ${evt} has a new room. It is in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} is at a new place. Go to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `For the ${evt}, please go to ${p2}, not ${p1}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The location for the ${evt} is not ${p1}. It is ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Attention: The ${evt} will be in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} on ${day} has moved to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Update: The ${evt} is now at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We changed the room for the ${evt}. It's in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} is no longer at ${p1}. Find us at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please go to ${p2} for the ${evt}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The room for the ${evt} is now ${p2}.`
                ],
                distractorCount: 3,
            },
            'A2': {
                templates: [
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Attention everyone, the ${evt} planned for this ${timeOfDay} at ${p1} has been relocated to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please note a schedule change. The ${evt} at ${p1} will now take place at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Just a quick update for everyone attending the ${evt} this ${timeOfDay}. We are no longer meeting in ${p1}, we will be in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `There has been a last-minute change for the ${day} ${evt}. We've moved from ${p1} to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Could I have your attention please? The ${timeOfDay}'s ${evt} has been moved to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} will not be in ${p1} as planned. The new venue is ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We are moving the ${day} ${evt}. Instead of ${p1}, it will be in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `For this ${timeOfDay}'s ${evt}, please proceed to ${p2}. The location has been updated from ${p1}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This is an important message about the ${evt}. We will now be at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} has been switched to ${p2} for this ${timeOfDay}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We've had to change the location for the ${evt}. Please find us at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${day} ${evt} is now in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please be advised that the ${evt} is now located at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `A quick announcement: the ${evt} will be held in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Let's move the ${evt} to ${p2} this ${timeOfDay}.`
                ],
                distractorCount: 4,
            },
            'B1': {
                templates: [
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `An important update regarding the ${evt} at ${p1}. The venue has changed to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We have a schedule change for the ${evt}. Instead of being at ${p1}, it will now begin at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `For those of you here for the ${evt} this ${timeOfDay}, please be advised that we have shifted to a new location. We will now be in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This is a notification about the ${day} ${evt}. The original location, ${p1}, is unavailable, so we will convene in ${p2} instead.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We've had to make a slight alteration to our plans for the ${timeOfDay} ${evt}. We will now be gathering in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Due to a booking error, the ${evt} has been reassigned from ${p1} to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please make a note that the ${evt} on ${day} will be held in ${p2}, which is a change from the original schedule.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} has been relocated to ${p2} to better accommodate everyone.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please adjust your schedules; the ${evt} for this ${timeOfDay} is now in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `There's been a venue change for the ${evt}. We are now meeting at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The room for the ${evt} has been updated to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We will now hold the ${evt} at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Let's gather for the ${evt} at our new spot, ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The location for the ${evt} is confirmed as ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This ${timeOfDay}, find the ${evt} at ${p2}.`
                ],
                distractorCount: 4,
            },
            'B2': {
                templates: [
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We'd like to announce a change for the ${evt} at ${p1}. Due to a scheduling conflict, the event will now take place at ${p2}. We apologize for any inconvenience.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Due to unforeseen circumstances, the ${evt} scheduled for this ${timeOfDay} at ${p1} has been relocated. We are now expecting to hold the event at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This is a general announcement concerning the ${evt} on ${day}. Logistical considerations have necessitated a change of venue from ${p1} to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please be aware of an adjustment to this ${timeOfDay}'s schedule. The ${evt} will no longer be held in ${p1}; please make your way to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We regret to inform you of a necessary change to the ${evt}. The new location will be ${p2}, and we ask that you head there directly.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `To better accommodate our attendees, this ${timeOfDay}'s ${evt} has been transferred from ${p1} to the more spacious ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `A final location has been confirmed for the ${day} ${evt}. Disregard the previous notice about ${p1}; we will be at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} has been moved to ${p2} to facilitate better access.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Kindly update your agendas. The ${evt} is now at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The venue for the ${evt} has been officially changed to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please redirect yourselves to ${p2} for the ${evt}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We've secured a new location for the ${evt}: ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} will now commence in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This ${timeOfDay}'s ${evt} will be held at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Let's reconvene at ${p2} for the ${evt}.`
                ],
                distractorCount: 4,
            },
             'C1': {
                templates: [
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This is a general announcement concerning the ${evt} originally scheduled in ${p1}. Logistical considerations have necessitated a change of venue to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Your attention please. The forthcoming ${evt} has been rescheduled. We will no longer be convening at ${p1}, but rather at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We must inform all participants of the ${evt} of a critical update. The event's location has been revised from ${p1} to ${p2} due to an unforeseen facilities issue.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `To ensure the smooth execution of this ${timeOfDay}'s ${evt}, we have preemptively relocated the proceedings from ${p1} to ${p2}. We appreciate your understanding.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `There has been an unavoidable modification to the itinerary for ${day}. The ${evt} will now be hosted in ${p2} instead of the previously communicated location.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `All attendees of the ${evt}, please note that the designated location has been amended from ${p1} to ${p2} to better facilitate the event's requirements.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Subsequent to a final review, the ${evt} on ${day} has been reassigned to ${p2}. Please disregard previous communications indicating ${p1} as the venue.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} will now be conducted at ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `Please be informed that the ${evt} venue is now ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We are transitioning the ${evt} to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The updated venue for the ${evt} is ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `All personnel for the ${evt} should report to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `The ${evt} has been officially moved to ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `We will now be holding the ${evt} in ${p2}.`,
                    (evt, p1, t1, p2, t2, day, timeOfDay) => `This ${timeOfDay}'s ${evt} is relocated to ${p2}.`
                ],
                distractorCount: 4,
            }
        };

        function makeLevel(level) {
            const config = difficultyConfig[level];
            let levelData = [];
            let usedCombos = new Set();

            while (levelData.length < 25) {
                const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
                const originalTime = TIMES[Math.floor(Math.random() * TIMES.length)];
                const newTime = TIMES[Math.floor(Math.random() * TIMES.length)];
                const day = DAYS[Math.floor(Math.random() * DAYS.length)];
                const timeOfDay = ["morning", "afternoon", "evening"][Math.floor(Math.random() * 3)];

                let originalPlace, newPlace;
                do {
                    originalPlace = PLACES[Math.floor(Math.random() * PLACES.length)];
                    newPlace = PLACES[Math.floor(Math.random() * PLACES.length)];
                } while (originalPlace === newPlace);
                
                const comboKey = [event, originalPlace, newPlace].sort().join(',');
                if (usedCombos.has(comboKey)) continue;
                usedCombos.add(comboKey);

                const distractors = PLACES.filter(p => p !== newPlace && p !== originalPlace);
                let options = [newPlace, originalPlace];
                while(options.length < config.distractorCount && distractors.length > 0) {
                    const randomIndex = Math.floor(Math.random() * distractors.length);
                    options.push(distractors.splice(randomIndex, 1)[0]);
                }
                shuffleArray(options);

                const template = config.templates[Math.floor(Math.random() * config.templates.length)];
                const script = template(event, originalPlace, originalTime, newPlace, newTime, day, timeOfDay);
                
                levelData.push({ script, favorite: newPlace, options });
            }
            return levelData;
        }

        return {
            'A1': makeLevel('A1'), 'A2': makeLevel('A2'),
            'B1': makeLevel('B1'), 'B2': makeLevel('B2'),
            'C1': makeLevel('C1')
        };
    }
    const locationData = generateLocationData();

    // --- Game State ---
    let game = {};
    const TOTAL_QUESTIONS = 25;
    const TOTAL_GAME_TIME = 600; // 10 min

    // --- Audio Setup ---
    let synth, streakSynth;
    if (typeof Tone !== 'undefined') {
      synth = new Tone.PolySynth(Tone.Synth).toDestination();
      streakSynth = new Tone.FMSynth({
            harmonicity: 3,
            modulationIndex: 10,
            envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 },
            modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 }
        }).toDestination();
    }
    function playCorrectSound() { if (synth) synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", Tone.now()); }
    function playIncorrectSound() { if (synth) synth.triggerAttackRelease(["C3", "C#3"], "8n", Tone.now()); }
    function playStreakSound() { if (streakSynth) streakSynth.triggerAttackRelease("C6", "8n", Tone.now()); }
    function playLevelUpSound() {
      if (!synth) return;
      const now = Tone.now();
      synth.triggerAttackRelease("C4", "8n", now);
      synth.triggerAttackRelease("E4", "8n", now + 0.1);
      synth.triggerAttackRelease("G4", "8n", now + 0.2);
    }
    
    // --- Speech Synthesis ---
    let voices = [];
    function loadVoices() {
      // This function tries to get voices. It may be called multiple times if voices are not ready initially.
      voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
    }
    
    if ('speechSynthesis' in window) {
      // This event is crucial but can be unreliable. We will have fallbacks.
      speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices(); // Initial attempt
    }

    function getNextVoice() {
      if (voices.length === 0) {
        loadVoices(); // Re-attempt to load voices if the array is empty.
        if (voices.length === 0) {
          // If still no voices, it's a persistent issue.
          return null;
        }
      }
      // Prioritize "Natural" or "Google" voices if available, as they often sound better.
      const preferredVoices = voices.filter(v => v.name.includes('Natural') || v.name.includes('Google'));
      const voicePool = preferredVoices.length > 0 ? preferredVoices : voices;
      
      voiceIndex = (voiceIndex + 1) % voicePool.length;
      return voicePool[voiceIndex];
    }
    let voiceIndex = 0;

    // --- DOM Elements ---
    const $ = s => document.getElementById(s);
    const startForm = $('start-form'), gameScreen = $('game-screen'), endScreen = $('end-screen');
    const feedback = $('feedback');
    const optionsContainer = $('options-container'), challengeScript = $('challenge-script');
    const progressBar = $('progress-bar'), errorMessage = $('error-message');
    const hud = {
      player: $('hud-player'), score: $('hud-score'), level: $('hud-level'),
      correct: $('hud-correct'), time: $('hud-time'), question: $('hud-question'),
      scoreItem: $('score-hud-item')
    };
    const finalName = $('final-name'), finalScore = $('final-score'),
      finalTime = $('final-time'), finalCorrect = $('final-correct'),
      finalAccuracy = $('final-accuracy'), finalBadges = $('final-badges');

    // --- Game Functions ---
    function showScreen(screen) {
      [startForm, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function formatTime(s) {
      s = Math.max(0, s);
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }

    function updateHUD() {
      hud.player.textContent = game.playerName;
      hud.score.textContent = game.score;
      hud.level.textContent = game.selectedLevel;
      hud.correct.textContent = `${game.correctAnswers}/${TOTAL_QUESTIONS}`;
      hud.time.textContent = formatTime(game.remainingTime);
      hud.question.textContent = `${game.questionIndex + 1}/${TOTAL_QUESTIONS}`;
      progressBar.style.width = `${Math.max(0, (game.remainingTime / TOTAL_GAME_TIME) * 100)}%`;
    }

    function resetGame() {
        game = {
            playerName: $('player-name-input').value.trim() || 'Player',
            selectedLevel: $('selected-level-input').value,
            score: 0,
            correctAnswers: 0,
            questionIndex: 0,
            consecutiveCorrect: 0,
            badges: new Set(),
            startTime: Date.now(),
            questionStartTime: null,
            remainingTime: TOTAL_GAME_TIME,
            timerID: null,
            perQuestionTime: 20,
            isFinished: false,
            challenge: null
        };
    }

    function startGame() {
      resetGame();
      showScreen(gameScreen);
      feedback.textContent = '';
      challengeScript.textContent = '';
      optionsContainer.innerHTML = '';
      updateHUD();
      startTimer();
      nextChallenge();
    }

    function startTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = setInterval(() => {
        game.remainingTime--;
        updateHUD();
        if (game.remainingTime <= 0) finishGame("Time's Up!");
      }, 1000);
    }

    function stopTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = null;
    }

    function nextChallenge() {
      if (game.questionIndex >= TOTAL_QUESTIONS || game.questionIndex >= locationData[game.selectedLevel].length) {
        finishGame("Congratulations!");
        return;
      }
      
      feedback.textContent = '';
      challengeScript.textContent = '';
      optionsContainer.innerHTML = '';
      
      const challenges = locationData[game.selectedLevel];
      game.challenge = challenges[game.questionIndex];
      
      setTimeout(() => {
        playClueAudio(game.challenge.script, () => {
            game.questionStartTime = Date.now();
            startQuestionTimer(); // Timer starts after audio finishes
        });
      }, 200);

      showOptions(game.challenge);
      updateHUD();
    }

    let questionTimerID = null;
    function startQuestionTimer() {
      if (questionTimerID) clearInterval(questionTimerID);
      let questionTimeLeft = game.perQuestionTime;
      questionTimerID = setInterval(() => {
        questionTimeLeft--;
        if (questionTimeLeft <= 0) {
          clearInterval(questionTimerID);
          handleGuess(null, true); // timeout
        }
      }, 1000);
    }
    function stopQuestionTimer() {
      if (questionTimerID) clearInterval(questionTimerID);
      questionTimerID = null;
    }

    function showOptions(challenge) {
      optionsContainer.innerHTML = '';
      shuffleArray([...challenge.options]).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.onclick = () => handleGuess(option, false, btn);
        optionsContainer.appendChild(btn);
      });
    }

    function createFlyingTokens() {
        const scoreBox = hud.scoreItem.getBoundingClientRect();
        const targetX = scoreBox.left + scoreBox.width / 2;
        const targetY = scoreBox.top + scoreBox.height / 2;

        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                const token = document.createElement('div');
                token.className = 'token';
                document.body.appendChild(token);

                const startX = Math.random() * window.innerWidth;
                const startY = window.innerHeight - 50;

                token.style.left = `${startX}px`;
                token.style.top = `${startY}px`;
                token.style.setProperty('--target-x', `${targetX}px`);
                token.style.setProperty('--target-y', `${targetY}px`);

                setTimeout(() => {
                    token.remove();
                }, 1000);
            }, i * 50);
        }
    }

    function handleGuess(selected, timedOut = false, btn) {
      stopQuestionTimer();
      const answerTime = (Date.now() - game.questionStartTime) / 1000;
      
      if (timedOut) {
        feedback.textContent = "⏱️ Time's up!";
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        game.consecutiveCorrect = 0;
        challengeScript.innerHTML = `The correct announcement was:<br><em>"${game.challenge.script}"</em>`;
      } else if (selected === game.challenge.favorite) {
        const praise = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
        feedback.textContent = praise;
        playFeedbackAudio(praise);

        feedback.className = "feedback-display feedback-correct";
        challengeScript.textContent = '';
        
        if (game.consecutiveCorrect >= 10) {
            playStreakSound();
        } else {
            playCorrectSound();
        }
        
        createFlyingTokens();
        if (btn) btn.classList.add('correct');
        game.score += 4; // Adjusted score for 25 questions
        game.correctAnswers++;
        game.consecutiveCorrect++;
        
        if (game.consecutiveCorrect > 0 && game.consecutiveCorrect % 10 === 0) {
            checkBadge('STREAK_10');
        } else if (game.consecutiveCorrect > 0 && game.consecutiveCorrect % 5 === 0) {
            checkBadge('STREAK_5');
        }

        if (answerTime < 3.0) {
            checkBadge('QUICK_THINKER');
        }

      } else {
        feedback.textContent = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        if (btn) btn.classList.add('incorrect');
        game.score = Math.max(0, game.score - 2);
        game.consecutiveCorrect = 0;
        challengeScript.innerHTML = `The correct announcement was:<br><em>"${game.challenge.script}"</em>`;
      }
      
      Array.from(optionsContainer.children).forEach(b => b.disabled = true);
      game.questionIndex++;
      setTimeout(nextChallenge, 3000);
      updateHUD();
    }

    function checkBadge(badge) {
      if (!game.badges.has(badge) && badgeData[badge]) {
        game.badges.add(badge);
      }
    }

    function finishGame(title) {
      stopTimer();
      stopQuestionTimer();
      game.isFinished = true;
      
      if (game.correctAnswers === TOTAL_QUESTIONS) {
        checkBadge('PERFECT_LEVEL');
        playLevelUpSound();
      }
      checkBadge(game.selectedLevel + '_COMPLETE');
      checkBadge('GAME_COMPLETE');

      showScreen(endScreen);
      $('end-title').textContent = title;
      finalName.textContent = game.playerName;
      finalScore.textContent = game.score;
      const timeTaken = TOTAL_GAME_TIME - game.remainingTime;
      finalTime.textContent = formatTime(timeTaken);
      const questionsAttempted = game.questionIndex > 0 ? game.questionIndex : 1;
      finalCorrect.textContent = `${game.correctAnswers}/${questionsAttempted}`;
      finalAccuracy.textContent = ((game.correctAnswers / questionsAttempted) * 100).toFixed(1) + "%";
      
      displayBadges();
      saveScoreToLeaderboard(timeTaken);
      displayLeaderboard();
    }
    
    function displayBadges() {
        finalBadges.innerHTML = '';
        if (game.badges.size === 0) {
            finalBadges.innerHTML = '<p style="font-size:0.9em; color:var(--text-dark)">No badges earned this round.</p>';
        } else {
            for (const badgeId of game.badges) {
                const badge = badgeData[badgeId];
                if (badge) {
                    const div = document.createElement('div');
                    div.className = 'badge';
                    div.innerHTML = `<div class="badge-icon">${badge.icon}</div><div class="badge-name">${badge.name}</div>`;
                    finalBadges.appendChild(div);
                }
            }
        }
    }

    function saveScoreToLeaderboard(timeTaken) {
        try {
            const newScore = {
                name: game.playerName,
                score: game.score,
                time: timeTaken,
                level: game.selectedLevel
            };
            let leaderboard = JSON.parse(localStorage.getItem('locationListenUpLeaderboard')) || [];
            leaderboard.push(newScore);
            leaderboard.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.time - b.time;
            });
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('locationListenUpLeaderboard', JSON.stringify(leaderboard));
        } catch (e) {
            console.error("Could not save to leaderboard:", e);
        }
    }

    function displayLeaderboard() {
        const leaderboardList = $('leaderboard-list');
        leaderboardList.innerHTML = '';
        try {
            const leaderboard = JSON.parse(localStorage.getItem('locationListenUpLeaderboard')) || [];
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<p>No scores yet. Be the first!</p>';
                return;
            }
            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="leaderboard-rank">${index + 1}.</span>
                    <span class="leaderboard-name">${entry.name}</span>
                    <span class="leaderboard-level">${entry.level}</span>
                    <span class="leaderboard-score">${entry.score} pts</span>
                    <span class="leaderboard-time">${formatTime(entry.time)}</span>
                `;
                leaderboardList.appendChild(li);
            });
        } catch (e) {
            leaderboardList.innerHTML = '<p>Could not load leaderboard.</p>';
            console.error("Could not display leaderboard:", e);
        }
    }
    
    function playFeedbackAudio(text) {
        if (!('speechSynthesis' in window) || speechSynthesis.speaking) {
            return; 
        }
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = getNextVoice();
        if (!utter.voice) return;
        speechSynthesis.speak(utter);
    }

    function playClueAudio(text, onend) {
      if (!('speechSynthesis' in window)) {
        console.warn("Speech synthesis not supported.");
        if (onend) setTimeout(onend, 0);
        return;
      }
      
      // Ensure voices are loaded before trying to speak.
      if (voices.length === 0) {
        loadVoices();
        if (voices.length === 0) {
            console.warn("Speech synthesis voices not available. Retrying in a moment.");
            setTimeout(() => playClueAudio(text, onend), 250); // Retry after a short delay
            return;
        }
      }

      speechSynthesis.cancel(); 

      const utter = new SpeechSynthesisUtterance(text);
      utter.voice = getNextVoice();
      
      // If getNextVoice still fails, we can't proceed with speech.
      if (!utter.voice) {
          console.error("Speech synthesis error: No suitable voice found.");
          if (onend) setTimeout(onend, 0); // Call the callback to not stall the game.
          return;
      }

      utter.onend = () => {
        if (onend) onend();
      };
      utter.onerror = (e) => {
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
            console.error("Speech synthesis error:", e.error);
        }
        // Always call the callback to ensure the game continues even if speech fails.
        if (onend) onend();
      };
      
      challengeScript.textContent = '🔊 Listen carefully...';
      speechSynthesis.speak(utter);
    }

    // --- UI Event Handlers ---
    $('level-selection').addEventListener('click', e => {
        if (e.target.classList.contains('level-btn')) {
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
            e.target.classList.add('selected');
            $('selected-level-input').value = e.target.dataset.level;
            errorMessage.style.display = 'none';
        }
    });

    startForm.onsubmit = async e => {
      e.preventDefault();
      const selectedLevel = $('selected-level-input').value;
      if (!selectedLevel) {
          errorMessage.textContent = "Please select a level to start.";
          errorMessage.style.display = 'block';
          return;
      }
      // Initialize audio context on user interaction
      if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
          await Tone.start();
      }
      
      // Warm up speech synthesis on user interaction
      if ('speechSynthesis' in window) {
          speechSynthesis.cancel();
          const warmUp = new SpeechSynthesisUtterance('');
          speechSynthesis.speak(warmUp);
      }
      
      startGame();
    };

    $('play-again-btn').onclick = () => {
      showScreen(startForm);
      $('player-name-input').focus();
      document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
      $('selected-level-input').value = '';
    };

    optionsContainer.addEventListener('keyup', e => {
      if (e.key === "Enter" && document.activeElement.classList.contains("option-btn")) {
        document.activeElement.click();
      }
    });

    window.onload = () => { $('player-name-input').focus(); };
  </script>
</body>
</html>
