<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Simulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS (Inline SVGs to replace lucide-react) ---
        const ChevronLeft = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m9 18 6-6-6-6"/></svg>;
        const Home = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const CheckCircle = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircle = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
        const Award = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
        const BookOpen = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Ear = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 0 4 0v-1a.5.5 0 0 1 1 0v1a2.5 2.5 0 0 0 5 0v-1a5.5 5.5 0 1 0-11 0"/></svg>;
        const FileText = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
        const EyeOff = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;

        // --- DATA STRUCTURES ---

        // Voice preferences configuration - Strictly Microsoft Online / Multilingual / Natural
        const PREFERRED_VOICES = {
            William: ["Microsoft William Online (Natural) - English", "Microsoft William", "Microsoft Server Speech Text to Speech Voice (en-US, William)"],
            Andrew: ["Microsoft Andrew Online (Natural) - English", "Microsoft Andrew", "Microsoft Server Speech Text to Speech Voice (en-US, Andrew)"],
            Brian: ["Microsoft Brian Online (Natural) - English", "Microsoft Brian", "Microsoft Server Speech Text to Speech Voice (en-US, Brian)"],
            Emma: ["Microsoft Emma Online (Natural) - English", "Microsoft Emma", "Microsoft Server Speech Text to Speech Voice (en-US, Emma)"],
            Ava: ["Microsoft Ava Online (Natural) - English", "Microsoft Ava", "Microsoft Server Speech Text to Speech Voice (en-US, Ava)"]
        };

        // Generators
        const generateGapFill = (id, question, answer, explanation) => ({
            id, type: 'gapfill', question, answer, explanation, points: 1
        });

        const generateMCQ = (id, question, options, answer, explanation) => ({
            id, type: 'mcq', question, options, answer, explanation, points: 1
        });

        const generateTF = (id, question, answer, explanation) => ({
            id, type: 'tf', question, answer: answer, options: ['True', 'False', 'Not Given'], explanation, points: 1
        });

        // --- CONTENT GENERATION ---
        const createTestContent = () => {
            const parts = { 1: [], 2: [], 3: [], 4: [] };

            // ==========================================
            // PART 1: Social Dialogue (Form Completion)
            // ==========================================

            // Test 1: Library
            parts[1].push({
                title: "Northside Library Registration",
                script: [
                { speaker: "William", text: "Good morning, Northside Library, William speaking. How can I help?" },
                { speaker: "Emma", text: "Hi, I've just moved to the area and I'd like to join the library." },
                { speaker: "William", text: "Certainly. I just need to take a few details. Can I have your full name?" },
                { speaker: "Emma", text: "Yes, it's Emma Bradley." },
                { speaker: "William", text: "Is that B-R-A-D-L-E-Y?" },
                { speaker: "Emma", text: "Yes, that's correct." },
                { speaker: "William", text: "Great. And what is your date of birth, Emma?" },
                { speaker: "Emma", text: "It's the 14th of March, 1998." },
                { speaker: "William", text: "14th of March. Okay. And your current address?" },
                { speaker: "Emma", text: "I'm at 45 Elm Road. That's E-L-M." },
                { speaker: "William", text: "Do you have the postcode?" },
                { speaker: "Emma", text: "Yes, it is CB4 2YD." },
                { speaker: "William", text: "Perfect. Now, regarding membership, are you a student or working full-time?" },
                { speaker: "Emma", text: "I'm a student at the City College." },
                { speaker: "William", text: "Okay, so for students, the registration fee is £5. For adults, it's normally £10." },
                { speaker: "Emma", text: "Oh, that's good. Here is my student card." },
                { speaker: "William", text: "Thank you. You can borrow up to 8 books at a time. It used to be 5, but we increased it." }
                ],
                questions: [
                generateMCQ(1, "What is the applicant's surname?", ["Bradly", "Bradley", "Broadley"], "Bradley", "Spelled B-R-A-D-L-E-Y."),
                generateMCQ(2, "Month of birth?", ["March", "May", "April"], "March", "She says 14th of March."),
                generateMCQ(3, "Current Occupation?", ["Full-time worker", "Unemployed", "Student"], "Student", "She states she is a student at City College."),
                generateMCQ(4, "Registration Fee?", ["£5", "£10", "Free"], "£5", "It is £10 normally, but £5 for students."),
                generateGapFill(5, "Maximum books allowed: ______", "8", "William says 'You can borrow up to 8 books'.")
                ]
            });

            // Test 2: Employment Agency
            parts[1].push({
                title: "Job Agency Enquiry",
                script: [
                { speaker: "Andrew", text: "Top Job Agency, Andrew here." },
                { speaker: "Ava", text: "Hello, I saw your advertisement for temporary work." },
                { speaker: "Andrew", text: "Yes, we have a few openings. Let me take your name first." },
                { speaker: "Ava", text: "It's Ava Riley. R-I-L-E-Y." },
                { speaker: "Andrew", text: "Thanks Ava. And a contact number?" },
                { speaker: "Ava", text: "My mobile is 07899 223 111." },
                { speaker: "Andrew", text: "07899 223 111. Got it. Now, what kind of work are you looking for?" },
                { speaker: "Ava", text: "I have experience in administration, but I prefer something outdoors." },
                { speaker: "Andrew", text: "Outdoors? We have a position as a gardening assistant." },
                { speaker: "Ava", text: "That sounds perfect. What is the pay?" },
                { speaker: "Andrew", text: "It starts at $12 an hour, rising to $15 after one month." },
                { speaker: "Ava", text: "That's fine. When does it start?" },
                { speaker: "Andrew", text: "Next Tuesday." }
                ],
                questions: [
                generateMCQ(1, "Correct spelling of surname?", ["Riley", "Rilly", "Reily"], "Riley", "Spelled R-I-L-E-Y."),
                generateMCQ(2, "Preferred type of work?", ["Administration", "Indoors", "Outdoors"], "Outdoors", "She explicitly says she prefers something outdoors."),
                generateMCQ(3, "Job offered?", ["Receptionist", "Gardening assistant", "Driver"], "Gardening assistant", "Andrew offers a gardening assistant role."),
                generateMCQ(4, "Starting pay per hour?", ["$15", "$12", "$10"], "$12", "It starts at $12, rising to $15 later."),
                generateGapFill(5, "Start day: Next ______", "Tuesday", "Andrew says 'Next Tuesday'.")
                ]
            });

            // Test 3: House Rental
            parts[1].push({
                title: "Renting an Apartment",
                script: [
                { speaker: "Brian", text: "City Rentals. How can I help?" },
                { speaker: "Emma", text: "I'm calling about the apartment on Hill Road." },
                { speaker: "Brian", text: "Ah yes. It's a lovely two-bedroom unit." },
                { speaker: "Emma", text: "What is the monthly rent?" },
                { speaker: "Brian", text: "It's currently $850 per month. That includes water, but electricity is separate." },
                { speaker: "Emma", text: "Okay, $850 is within my budget. Does it have parking?" },
                { speaker: "Brian", text: "It doesn't have a garage, I'm afraid, but there is a reserved spot in the driveway." },
                { speaker: "Emma", text: "That's fine. And when is it available?" },
                { speaker: "Brian", text: "The current tenant leaves on the 10th, so it's available from the 15th of September." },
                { speaker: "Emma", text: "Great. Can I view it tomorrow?" },
                { speaker: "Brian", text: "Yes, come by at 10 AM." }
                ],
                questions: [
                generateMCQ(1, "Number of bedrooms?", ["One", "Two", "Three"], "Two", "Brian mentions it is a two-bedroom unit."),
                generateMCQ(2, "Rent includes?", ["Electricity", "Water", "Gas"], "Water", "Includes water, electricity is separate."),
                generateMCQ(3, "Parking type?", ["Garage", "Street", "Reserved spot"], "Reserved spot", "No garage, but a reserved spot."),
                generateMCQ(4, "Availability date?", ["10th", "15th", "1st"], "15th", "Available from the 15th."),
                generateGapFill(5, "Viewing time: ______ AM", "10", "Come by at 10 AM.")
                ]
            });

            // Test 4: Medical Clinic
            parts[1].push({
                title: "Doctor Appointment",
                script: [
                { speaker: "Ava", text: "Westside Medical Centre." },
                { speaker: "William", text: "Hello, I need to make an appointment for my son." },
                { speaker: "Ava", text: "Is he a registered patient?" },
                { speaker: "William", text: "Yes, his name is Toby. That's T-O-B-Y." },
                { speaker: "Ava", text: "Okay. Which doctor do you usually see?" },
                { speaker: "William", text: "Dr. Smith, but I know she is busy. Anyone else is fine." },
                { speaker: "Ava", text: "Dr. Khan has an opening this afternoon. Spelled K-H-A-N." },
                { speaker: "William", text: "That works. What time?" },
                { speaker: "Ava", text: "We have 4:15 PM or 4:45 PM." },
                { speaker: "William", text: "4:45 PM please, so I can pick him up from school." }
                ],
                questions: [
                generateMCQ(1, "Child's name?", ["Toby", "Tony", "Tommy"], "Toby", "Spelled T-O-B-Y."),
                generateMCQ(2, "Usual doctor?", ["Dr. Khan", "Dr. Smith", "Dr. Jones"], "Dr. Smith", "He usually sees Dr. Smith."),
                generateMCQ(3, "Doctor available today?", ["Dr. Smith", "Dr. Khan", "Dr. Lee"], "Dr. Khan", "Dr. Khan has an opening."),
                generateMCQ(4, "Appointment time selected?", ["4:15 PM", "4:30 PM", "4:45 PM"], "4:45 PM", "He chooses 4:45 PM."),
                generateGapFill(5, "Reason for time: School ______", "pickup", "Pick him up from school.")
                ]
            });

            // Test 5: Laptop Repair
            parts[1].push({
                title: "Repair Service Call",
                script: [
                { speaker: "Andrew", text: "Tech Support, Andrew speaking." },
                { speaker: "Emma", text: "Hi, my laptop screen is flickering constantly." },
                { speaker: "Andrew", text: "I see. Is it a Dell or an HP?" },
                { speaker: "Emma", text: "It's a Satellite X-700." },
                { speaker: "Andrew", text: "Right. We can fix that. The screen replacement is usually $100, plus $20 labor." },
                { speaker: "Emma", text: "So $120 total?" },
                { speaker: "Andrew", text: "Yes. Can you bring it in on Saturday?" },
                { speaker: "Emma", text: "What time do you close?" },
                { speaker: "Andrew", text: "We are open from 9 AM until 1 PM on Saturdays." },
                { speaker: "Emma", text: "Okay, I'll be there at noon." }
                ],
                questions: [
                generateMCQ(1, "Problem description?", ["Broken key", "Flickering screen", "No power"], "Flickering screen", "Screen is flickering constantly."),
                generateMCQ(2, "Laptop Model?", ["Dell", "HP", "Satellite X-700"], "Satellite X-700", "She states the model."),
                generateMCQ(3, "Total Cost?", ["$100", "$120", "$20"], "$120", "$100 parts plus $20 labor."),
                generateMCQ(4, "Saturday closing time?", ["5 PM", "12 PM", "1 PM"], "1 PM", "Open until 1 PM."),
                generateGapFill(5, "Customer arrival time: ______", "noon", "She says she will be there at noon.")
                ]
            });

            // Test 6: Sports Centre
            parts[1].push({
                title: "Sports Centre Membership",
                script: [
                { speaker: "Brian", text: "Active Life Sports Centre. Brian speaking." },
                { speaker: "Ava", text: "Hi, I'd like to ask about membership prices." },
                { speaker: "Brian", text: "Sure. We have two tiers. Gold is $50 a month, Silver is $35." },
                { speaker: "Ava", text: "What does Silver include?" },
                { speaker: "Brian", text: "Silver includes the gym and pool, but not the classes. Gold includes everything." },
                { speaker: "Ava", text: "I'll go for Silver. I don't do classes." },
                { speaker: "Brian", text: "Okay. Can I take your surname?" },
                { speaker: "Ava", text: "Yes, it's Weston. W-E-S-T-O-N." },
                { speaker: "Brian", text: "And your post code?" },
                { speaker: "Ava", text: "It is AL5 4GP." }
                ],
                questions: [
                generateMCQ(1, "Membership type chosen?", ["Gold", "Silver", "Bronze"], "Silver", "Ava chooses Silver."),
                generateMCQ(2, "Silver cost?", ["$35", "$50", "$25"], "$35", "Silver is $35."),
                generateMCQ(3, "Silver excludes?", ["Pool", "Gym", "Classes"], "Classes", "Does not include classes."),
                generateMCQ(4, "Surname?", ["Weston", "Western", "Westin"], "Weston", "Spelled W-E-S-T-O-N."),
                generateGapFill(5, "Post code: AL5 ______", "4GP", "She says AL5 4GP.")
                ]
            });

            // Test 7: Hotel Reservation
            parts[1].push({
                title: "Hotel Booking",
                script: [
                { speaker: "Emma", text: "Grand Hotel Reservations. Emma speaking." },
                { speaker: "Andrew", text: "Hello, I'd like to book a room for next weekend." },
                { speaker: "Emma", text: "Friday the 24th?" },
                { speaker: "Andrew", text: "No, Saturday the 25th, for two nights." },
                { speaker: "Emma", text: "Okay. We have a double room with a sea view for $120 a night." },
                { speaker: "Andrew", text: "Do you have anything cheaper?" },
                { speaker: "Emma", text: "We have a standard twin room for $95." },
                { speaker: "Andrew", text: "I'll take that one. The name is Andrew Miller." },
                { speaker: "Emma", text: "Is that M-I-L-L-E-R?" },
                { speaker: "Andrew", text: "Yes." }
                ],
                questions: [
                generateMCQ(1, "Check-in date?", ["24th", "25th", "26th"], "25th", "Saturday the 25th."),
                generateMCQ(2, "Length of stay?", ["1 night", "2 nights", "3 nights"], "2 nights", "For two nights."),
                generateMCQ(3, "Room type chosen?", ["Sea view", "Double", "Standard twin"], "Standard twin", "He takes the standard twin."),
                generateMCQ(4, "Price per night?", ["$120", "$95", "$100"], "$95", "Standard twin is $95."),
                generateGapFill(5, "Guest Surname: ______", "Miller", "Spelled M-I-L-L-E-R.")
                ]
            });

            // Test 8: Lost Property
            parts[1].push({
                title: "Lost Property Report",
                script: [
                { speaker: "William", text: "City Transport Lost Property." },
                { speaker: "Ava", text: "Hello, I left my bag on the bus this morning." },
                { speaker: "William", text: "Okay. Which bus number was it?" },
                { speaker: "Ava", text: "The number 42, going to the city center." },
                { speaker: "William", text: "Can you describe the bag?" },
                { speaker: "Ava", text: "It's a small leather backpack. It's dark brown." },
                { speaker: "William", text: "And what was inside?" },
                { speaker: "Ava", text: "My wallet and a red scarf." },
                { speaker: "William", text: "We have one matching that description. You can collect it from the Depot." }
                ],
                questions: [
                generateMCQ(1, "Bus number?", ["42", "24", "44"], "42", "The number 42."),
                generateMCQ(2, "Bag material?", ["Canvas", "Plastic", "Leather"], "Leather", "Leather backpack."),
                generateMCQ(3, "Bag color?", ["Black", "Dark brown", "Red"], "Dark brown", "It's dark brown."),
                generateMCQ(4, "Item inside?", ["Phone", "Keys", "Red scarf"], "Red scarf", "Wallet and a red scarf."),
                generateGapFill(5, "Collection point: The ______", "Depot", "Collect it from the Depot.")
                ]
            });

            // Test 9: Car Insurance
            parts[1].push({
                title: "Insurance Quote",
                script: [
                { speaker: "Brian", text: "Safe Drive Insurance." },
                { speaker: "Emma", text: "Hi, I need a quote for my car." },
                { speaker: "Brian", text: "Okay. What is the make and model?" },
                { speaker: "Emma", text: "It's a Ford Fiesta." },
                { speaker: "Brian", text: "And the year of manufacture?" },
                { speaker: "Emma", text: "2018." },
                { speaker: "Brian", text: "Where is the car parked at night?" },
                { speaker: "Emma", text: "On the street. I don't have a garage." },
                { speaker: "Brian", text: "Okay. And your age?" },
                { speaker: "Emma", text: "I'm 26." }
                ],
                questions: [
                generateMCQ(1, "Car model?", ["Focus", "Fiesta", "Mondeo"], "Fiesta", "Ford Fiesta."),
                generateMCQ(2, "Year of car?", ["2015", "2018", "2020"], "2018", "Year 2018."),
                generateMCQ(3, "Parking location?", ["Garage", "Driveway", "Street"], "Street", "Parked on the street."),
                generateMCQ(4, "Driver's age?", ["24", "25", "26"], "26", "I'm 26."),
                generateGapFill(5, "Car make: ______", "Ford", "She says Ford Fiesta.")
                ]
            });

            // Test 10: Cooking Class
            parts[1].push({
                title: "Cooking Class Enquiry",
                script: [
                { speaker: "Andrew", text: "Community College. How can I help?" },
                { speaker: "Ava", text: "I'm interested in the evening cooking classes." },
                { speaker: "Andrew", text: "We have Italian on Mondays and Thai on Thursdays." },
                { speaker: "Ava", text: "I'd prefer Thai. What time does it start?" },
                { speaker: "Andrew", text: "It starts at 6:30 PM and lasts two hours." },
                { speaker: "Ava", text: "Do I need to bring ingredients?" },
                { speaker: "Andrew", text: "Just a container to take the food home. We provide the rest." },
                { speaker: "Ava", text: "Perfect. And the cost?" },
                { speaker: "Andrew", text: "$25 per session." }
                ],
                questions: [
                generateMCQ(1, "Cuisine chosen?", ["Italian", "Thai", "French"], "Thai", "She prefers Thai."),
                generateMCQ(2, "Day of class?", ["Monday", "Tuesday", "Thursday"], "Thursday", "Thai on Thursdays."),
                generateMCQ(3, "Start time?", ["6:00 PM", "6:30 PM", "7:00 PM"], "6:30 PM", "Starts at 6:30 PM."),
                generateMCQ(4, "Item to bring?", ["Ingredients", "Knives", "Container"], "Container", "Just a container."),
                generateGapFill(5, "Cost per session: $______", "25", "$25 per session.")
                ]
            });

            // ==========================================
            // PART 2: Monologue (Social Context)
            // ==========================================

            // Test 1: Town Festival
            parts[2].push({
                title: "Town Festival Orientation",
                script: [
                { speaker: "Brian", text: "Good morning everyone and welcome to the annual Town Festival. I'm Brian, your coordinator." },
                { speaker: "Brian", text: "I have a few changes to announce regarding the map. First, the food stalls. They were originally planned for the main gate area." },
                { speaker: "Brian", text: "However, due to the wind, we have moved all food stalls to the area next to the lake." },
                { speaker: "Brian", text: "Also, for those with kids, the Children's Zone is situated directly behind the main stage." },
                { speaker: "Brian", text: "If you need first aid, the tent is near the north exit, under the big oak trees." },
                { speaker: "Brian", text: "Finally, regarding parking. It is free for the first two hours. After that, you must pay £2 per hour." }
                ],
                questions: [
                generateMCQ(1, "Where are the food stalls now?", ["Main Gate", "Next to the lake", "Car park"], "Next to the lake", "Moved to the area next to the lake."),
                generateMCQ(2, "Where is the Children's Zone?", ["North Exit", "Behind Main Stage", "Near the lake"], "Behind Main Stage", "Situated directly behind the main stage."),
                generateMCQ(3, "Where is First Aid?", ["Main Stage", "Under oak trees", "South Gate"], "Under oak trees", "Near north exit under oak trees."),
                generateMCQ(4, "Parking is free for?", ["All day", "1 hour", "2 hours"], "2 hours", "Free for the first two hours."),
                generateGapFill(5, "Parking fee after free period: £______ /hr", "2", "Pay £2 per hour.")
                ]
            });

            // Test 2: Museum Guide
            parts[2].push({
                title: "Museum Tour Introduction",
                script: [
                { speaker: "Emma", text: "Welcome to the National History Museum. Before we enter, a few rules." },
                { speaker: "Emma", text: "Photography is permitted in the main hall. However, it is strictly forbidden in the art gallery to protect the paintings." },
                { speaker: "Emma", text: "Unfortunately, the Dinosaur exhibit is closed today for maintenance." },
                { speaker: "Emma", text: "But the Egyptian room is open. It is located on the second floor." },
                { speaker: "Emma", text: "If you wish to buy souvenirs, the gift shop is located near the exit, on your left." }
                ],
                questions: [
                generateMCQ(1, "Photography is forbidden where?", ["Main Hall", "Art Gallery", "Lobby"], "Art Gallery", "Strictly forbidden in the art gallery."),
                generateMCQ(2, "Which exhibit is closed?", ["Egyptian", "Dinosaur", "Space"], "Dinosaur", "Dinosaur exhibit is closed."),
                generateMCQ(3, "Egyptian room location?", ["First floor", "Second floor", "Basement"], "Second floor", "Located on the second floor."),
                generateMCQ(4, "Gift shop location?", ["Near entrance", "Near exit", "Next to café"], "Near exit", "Near the exit, on the left."),
                generateGapFill(5, "Gift shop is on the: ______", "left", "On your left.")
                ]
            });

            // Test 3: Gardening Club

                { speaker: "Ava", text: "This material allowed them to create shapes that were previously impossible, such as arches and domes." },
                { speaker: "Ava", text: "The Pantheon in Rome is a perfect example of this engineering." },
                { speaker: "Ava", text: "Unlike the Greeks who focused on beauty, Romans prioritized practicality and durability." }
                ],
                questions: [
                generateMCQ(1, "Major Roman invention?", ["Bricks", "Concrete", "Steel"], "Concrete", "Significant invention was concrete."),

            // Test 4: Business Psychology
            parts[4].push({
                title: "Psychology of Color in Marketing",
                script: [
                { speaker: "Brian", text: "In marketing, color is not just decoration. It influences consumer behavior." },
                { speaker: "Brian", text: "Let's look at Red. It creates a sense of urgency. That is why you see it in 'Clearance' or 'Sale' signs." },

                ],
                questions: [

                generateMCQ(2, "Red is used for?", ["New arrivals", "Clearance sales", "Luxury"], "Clearance sales", "Used in clearance or sale signs."),
                generateMCQ(3, "Blue is associated with?", ["Trust", "Danger", "Energy"], "Trust", "Associated with trust and security."),
                generateMCQ(4, "Green is associated with?", ["Tech", "Health", "Speed"], "Health", "Associated with health, nature."),

                ]
            });

            // Test 5: Bird Migration
            parts[4].push({
                title: "Bird Migration Patterns",
                script: [
                { speaker: "William", text: "Migration is one of the most fascinating survival strategies in nature." },
                { speaker: "William", text: "It is an instinctual behavior. But how do birds find their way?" },
                { speaker: "William", text: "They use a variety of tools. The primary method is using the position of the sun and stars." },
                { speaker: "William", text: "Some species travel incredible distances. The Arctic Tern travels over 40,000 miles a year." },

                ],
                questions: [
                generateMCQ(1, "Migration is?", ["Learned", "Instinctual", "Random"], "Instinctual", "It is an instinctual behavior."),
                generateMCQ(2, "Primary navigation tool?", ["Smell", "Sun and stars", "Wind"], "Sun and stars", "Position of the sun and stars."),
                generateMCQ(3, "Distance champion?", ["Eagle", "Arctic Tern", "Swallow"], "Arctic Tern", "Arctic Tern travels over 40,000 miles."),
                generateMCQ(4, "Travel distance?", ["10,000 miles", "20,000 miles", "40,000+ miles"], "40,000+ miles", "Over 40,000 miles."),
                generateGapFill(5, "Climate change affects: ______", "arrival", "Affecting... arriving earlier (arrival times).")
                ]
            });

            // Test 6: Spice Trade
            parts[4].push({
                title: "History of Spice Trade",
                script: [
                { speaker: "Ava", text: "For centuries, spices were the most valuable goods in the world." },
                { speaker: "Ava", text: "Pepper, for example, was once worth more than gold by weight." },
                { speaker: "Ava", text: "The search for new trade routes led to the Age of Discovery." },
                { speaker: "Ava", text: "Before sea routes were established, spices were transported overland via the Silk Road." },
                { speaker: "Ava", text: "This made them incredibly expensive due to taxes and transport costs." }
                ],
                questions: [
                generateMCQ(1, "Most valuable spice mentioned?", ["Cinnamon", "Pepper", "Saffron"], "Pepper", "Pepper... was once worth more than gold."),
                generateMCQ(2, "Search for routes caused?", ["War", "Age of Discovery", "Famine"], "Age of Discovery", "Led to the Age of Discovery."),
                generateMCQ(3, "Old transport route?", ["Silk Road", "Spice Trail", "Gold Road"], "Silk Road", "Overland via the Silk Road."),
                generateMCQ(4, "Reason for high cost?", ["Scarcity", "Taxes & Transport", "Quality"], "Taxes & Transport", "Expensive due to taxes and transport costs."),
                generateGapFill(5, "Pepper compared to: ______", "gold", "Worth more than gold.")
                ]
            });

            // Test 7: Marine Biology
            parts[4].push({
                title: "Coral Reef Ecosystems",
                script: [
                { speaker: "William", text: "Coral reefs are often called the rainforests of the sea." },
                { speaker: "William", text: "They support 25% of all marine life, despite covering less than 1% of the ocean floor." },
                { speaker: "William", text: "Corals are actually animals, not plants." },
                { speaker: "William", text: "They have a symbiotic relationship with algae, which provide them with food." },
                { speaker: "William", text: "Rising ocean temperatures cause bleaching, where the algae leaves the coral." }
                ],
                questions: [
                generateMCQ(1, "Nickname for reefs?", ["Gardens", "Rainforests", "Deserts"], "Rainforests", "Rainforests of the sea."),
                generateMCQ(2, "Ocean floor coverage?", ["1%", "10%", "25%"], "1%", "Less than 1%."),
                generateMCQ(3, "Corals are?", ["Plants", "Rocks", "Animals"], "Animals", "Corals are actually animals."),
                generateMCQ(4, "Symbiotic partner?", ["Fish", "Algae", "Sharks"], "Algae", "Relationship with algae."),
                generateGapFill(5, "Rising heat causes: ______", "bleaching", "Temperatures cause bleaching.")
                ]
            });

            // Test 8: Memory Techniques
            parts[4].push({
                title: "Psychology of Memory",
                script: [
                { speaker: "Emma", text: "Why do we forget? Today we discuss memory retention." },
                { speaker: "Emma", text: "Short-term memory can only hold about 7 items at once." },
                { speaker: "Emma", text: "To move information to long-term memory, we need repetition." },
                { speaker: "Emma", text: "One effective technique is 'chunking', breaking information into smaller groups." },
                { speaker: "Emma", text: "Another is visualization, creating a mental image of the concept." }
                ],
                questions: [
                generateMCQ(1, "Short-term capacity?", ["5 items", "7 items", "10 items"], "7 items", "Hold about 7 items."),
                generateMCQ(2, "Key for long-term memory?", ["Sleep", "Repetition", "Food"], "Repetition", "We need repetition."),
                generateMCQ(3, "Chunking means?", ["Grouping", "Deleting", "Writing"], "Grouping", "Breaking information into smaller groups."),
                generateMCQ(4, "Visualization uses?", ["Sounds", "Mental images", "Movement"], "Mental images", "Creating a mental image."),
                generateGapFill(5, "Technique name: ______", "chunking", "Technique is 'chunking'.")
                ]
            });

            // Test 9: Sustainable Architecture
            parts[4].push({
                title: "Green Building Materials",
                script: [
                { speaker: "Brian", text: "Sustainable architecture focuses on minimizing environmental impact." },
                { speaker: "Brian", text: "Traditional concrete has a huge carbon footprint." },
                { speaker: "Brian", text: "Architects are now returning to materials like bamboo." },
                { speaker: "Brian", text: "Bamboo grows incredibly fast and is stronger than steel in some cases." },
                { speaker: "Brian", text: "Recycled glass is also being used for insulation." }
                ],
                questions: [
                generateMCQ(1, "Goal of sustainable arch?", ["Low cost", "Minimizing impact", "Speed"], "Minimizing impact", "Minimizing environmental impact."),
                generateMCQ(2, "Problem with concrete?", ["Weak", "Carbon footprint", "Expensive"], "Carbon footprint", "Huge carbon footprint."),
                generateMCQ(3, "Alternative material?", ["Plastic", "Bamboo", "Iron"], "Bamboo", "Returning to materials like bamboo."),
                generateMCQ(4, "Bamboo advantage?", ["Fast growth", "Colorful", "Soft"], "Fast growth", "Grows incredibly fast."),
                generateGapFill(5, "Recycled glass used for: ______", "insulation", "Used for insulation.")
                ]
            });

            // Test 10: Astronomy
            parts[4].push({
                title: "Mars Exploration",
                script: [
                { speaker: "Andrew", text: "Humanity's next giant leap is Mars." },
                { speaker: "Andrew", text: "The journey takes about 7 months with current technology." },
                { speaker: "Andrew", text: "The biggest challenge is radiation exposure during the trip." },
                { speaker: "Andrew", text: "Once there, astronauts will need to extract water from the soil." },
                { speaker: "Andrew", text: "The ultimate goal is to establish a permanent colony." }
                ],
                questions: [
                generateMCQ(1, "Destination?", ["Moon", "Mars", "Venus"], "Mars", "Next giant leap is Mars."),
                generateMCQ(2, "Travel time?", ["3 months", "7 months", "1 year"], "7 months", "About 7 months."),
                generateMCQ(3, "Biggest challenge?", ["Food", "Gravity", "Radiation"], "Radiation", "Radiation exposure."),
                generateMCQ(4, "Resource to extract?", ["Oil", "Water", "Gold"], "Water", "Extract water from the soil."),
                generateGapFill(5, "Ultimate goal: Permanent ______", "colony", "Establish a permanent colony.")
                ]
            });

            return parts;
        };

        const TEST_DATA = createTestContent();

        // --- COMPONENTS ---

        const VoiceManager = () => {
            const [voices, setVoices] = useState([]);

            useEffect(() => {
                const loadVoices = () => {
                    const avail = window.speechSynthesis.getVoices();
                    setVoices(avail);
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }, []);

            const getBestVoice = (name) => {
                if (!voices.length) return null;
                const prefs = PREFERRED_VOICES[name] || [];
                
                // 1. Try exact match in preferences
                for (let pref of prefs) {
                    const found = voices.find(v => v.name.includes(pref));
                    if (found) return found;
                }
                
                // 2. Fallback to any Microsoft voice first if specific name not found
                const msVoice = voices.find(v => v.name.includes("Microsoft") && v.name.includes("Online"));
                if (msVoice) return msVoice;

                // 3. Fallback to any English voice
                return voices.find(v => v.lang.includes("en")) || voices[0];
            };

            return { getBestVoice };
        };

        function IELTSApp() {
            // State
            const [view, setView] = useState('menu'); // menu, test
            const [currentPart, setCurrentPart] = useState(1);
            const [currentTestIndex, setCurrentTestIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentLineIndex, setCurrentLineIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [score, setScore] = useState(0);
            const [showExplanation, setShowExplanation] = useState(false);
            const [showTranscript, setShowTranscript] = useState(false);

            const { getBestVoice } = VoiceManager();
            const transcriptRef = useRef(null);
            const testInitializedRef = useRef(false); // Prevents auto-play loop on re-renders
            const isPlayingRef = useRef(false); // Ref for sync access in callbacks

            // --- AUDIO LOGIC ---

            const stopAudio = useCallback(() => {
                window.speechSynthesis.cancel();
                setIsPlaying(false);
                isPlayingRef.current = false;
            }, []);

            const playLine = useCallback((lineIndex) => {
                const test = TEST_DATA[currentPart][currentTestIndex];
                if (lineIndex >= test.script.length) {
                    setIsPlaying(false);
                    isPlayingRef.current = false;
                    return;
                }

                if (!isPlayingRef.current) return; // Stop if paused/stopped

                const line = test.script[lineIndex];
                const utterance = new SpeechSynthesisUtterance(line.text);
                const voice = getBestVoice(line.speaker);
                if (voice) utterance.voice = voice;
                
                utterance.rate = 1.0; 
                utterance.pitch = 1.0;

                utterance.onstart = () => {
                    setCurrentLineIndex(lineIndex);
                    if (transcriptRef.current && showTranscript) {
                        const activeEl = document.getElementById(`line-${lineIndex}`);
                        if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                };

                utterance.onend = () => {
                    // Immediately trigger next line if we are still "playing"
                    if (isPlayingRef.current) {
                        playLine(lineIndex + 1);
                    }
                };
                
                utterance.onerror = () => {
                    // If error, try skip to next
                    if (isPlayingRef.current) {
                        playLine(lineIndex + 1);
                    }
                };

                window.speechSynthesis.speak(utterance);
            }, [currentPart, currentTestIndex, getBestVoice, showTranscript]);

            const startPlaybackSequence = useCallback(() => {
                window.speechSynthesis.cancel(); // Clear any existing
                setIsPlaying(true);
                isPlayingRef.current = true;
                playLine(0);
            }, [playLine]);

            const togglePlay = useCallback(() => {
                if (isPlaying) {
                    window.speechSynthesis.pause(); // Pause actual audio
                    setIsPlaying(false);
                    isPlayingRef.current = false;
                } else {
                    setIsPlaying(true);
                    isPlayingRef.current = true;
                    
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                    } else {
                        // If stopped or finished, restart from current index
                        playLine(currentLineIndex);
                    }
                }
            }, [isPlaying, currentLineIndex, playLine]);

            // Auto-play effect when entering test
            useEffect(() => {
                if (view === 'test' && !testInitializedRef.current) {
                    testInitializedRef.current = true; // Mark as initialized
                    
                    const timer = setTimeout(() => {
                        startPlaybackSequence();
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [view, currentPart, currentTestIndex, startPlaybackSequence]);


            // --- HANDLERS ---

            const handleStartTest = (part, index) => {
                stopAudio();
                testInitializedRef.current = false; // Reset initialization flag for new test
                setCurrentPart(part);
                setCurrentTestIndex(index);
                setView('test');
                resetTestState();
            };

            const resetTestState = () => {
                setCurrentLineIndex(0);
                setUserAnswers({});
                setScore(0);
                setShowExplanation(false);
                setShowTranscript(false); // Default hidden
            };

            const handleAnswer = (qId, answerValue, correctAnswer, points) => {
                if (userAnswers[qId]) return;

                const isCorrect = answerValue.toString().toLowerCase().trim() === correctAnswer.toString().toLowerCase().trim();
                
                setUserAnswers(prev => ({
                    ...prev,
                    [qId]: { value: answerValue, isCorrect }
                }));

                if (isCorrect) {
                    setScore(prev => prev + points);
                }

                const currentTest = TEST_DATA[currentPart][currentTestIndex];
                const answeredCount = Object.keys(userAnswers).length + 1;
                if (answeredCount === currentTest.questions.length) {
                    setShowExplanation(true);
                }
            };

            const handleNextTest = () => {
                stopAudio();
                testInitializedRef.current = false;
                if (currentTestIndex < 9) { // Updated to 9 (10 tests total)
                    setCurrentTestIndex(prev => prev + 1);
                    resetTestState();
                } else {
                    if (currentPart < 4) {
                        setCurrentPart(prev => prev + 1);
                        setCurrentTestIndex(0);
                        resetTestState();
                    } else {
                        setView('menu');
                    }
                }
            };

            const handlePrevTest = () => {
                stopAudio();
                testInitializedRef.current = false;
                if (currentTestIndex > 0) {
                    setCurrentTestIndex(prev => prev - 1);
                    resetTestState();
                }
            };

            // --- RENDERERS ---

            const renderMainMenu = () => (
                <div className="p-8 max-w-6xl mx-auto">
                <p className="text-slate-600 mb-8 mt-4">Select a part and test number to begin practice.</p>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    {[1, 2, 3, 4].map(part => (
                    <div key={part} className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                        <div className="bg-blue-600 text-white p-4 font-bold text-xl flex justify-between items-center">
                        Part {part}
                        <span className="text-sm bg-blue-500 px-2 py-1 rounded">10 Tests</span>
                        </div>
                        <div className="p-4 grid grid-cols-5 gap-2">
                        {Array.from({ length: 10 }, (_, i) => i).map(idx => (
                            <button
                            key={idx}
                            onClick={() => handleStartTest(part, idx)}
                            className="aspect-square flex items-center justify-center rounded-lg bg-slate-100 hover:bg-blue-100 text-slate-700 hover:text-blue-700 font-medium transition-colors border border-slate-200"
                            >
                            {idx + 1}
                            </button>
                        ))}
                        </div>
                        <div className="px-4 pb-4 text-xs text-slate-500">
                        {part === 1 ? "Social Conversation" : part === 2 ? "Social Monologue" : part === 3 ? "Academic Discussion" : "Academic Lecture"}
                        </div>
                    </div>
                    ))}
                </div>
                </div>
            );

            const renderTestInterface = () => {
                const test = TEST_DATA[currentPart][currentTestIndex];

                return (
                // "Touch has the TTS play" - wrapper onClick triggers resume if needed
                <div 
                    className="h-screen flex flex-col bg-slate-50"
                    onClick={() => { if (!isPlayingRef.current) togglePlay(); }}
                >
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b px-4 py-3 flex justify-between items-center z-20 sticky top-0">
                    <div className="flex items-center gap-3">
                        <button onClick={() => { stopAudio(); setView('menu'); }} className="p-2 hover:bg-slate-100 rounded-full text-slate-600">
                            <Home className="w-5 h-5" />
                        </button>
                        <div className="h-6 w-px bg-slate-300"></div>
                        <h2 className="font-bold text-md text-slate-800 hidden sm:block">
                            Part {currentPart} Test {currentTestIndex + 1}
                        </h2>
                        
                        {/* Ear Icon for Pause/Disable Sound */}
                        <button 
                            onClick={(e) => { e.stopPropagation(); togglePlay(); }} 
                            className={`ml-2 p-2 rounded-full ${isPlaying ? 'bg-blue-100 text-blue-600' : 'bg-slate-200 text-slate-500'}`}
                            title="Toggle Audio"
                        >
                            <Ear className="w-5 h-5" />
                        </button>
                        
                        {/* Transcript Toggle */}
                        <button
                            onClick={(e) => { e.stopPropagation(); setShowTranscript(!showTranscript); }}
                            className={`ml-2 p-2 rounded-full flex items-center gap-2 ${showTranscript ? 'bg-indigo-100 text-indigo-700' : 'hover:bg-slate-100 text-slate-600'}`}
                            title="Toggle Transcript"
                        >
                        {showTranscript ? <EyeOff className="w-5 h-5" /> : <FileText className="w-5 h-5" />}
                        <span className="text-xs font-medium hidden md:inline">{showTranscript ? "Hide Script" : "Show Script"}</span>
                        </button>
                    </div>
                    
                    <div className="flex items-center gap-4">
                        <div className="flex items-center gap-2 bg-blue-50 text-blue-800 px-3 py-1 rounded-full font-semibold text-sm">
                            <Award className="w-4 h-4" />
                            {score}/{test.questions.length}
                        </div>
                        <div className="flex gap-1">
                            <button onClick={(e) => { e.stopPropagation(); handlePrevTest(); }} disabled={currentTestIndex === 0} className="p-1.5 rounded hover:bg-slate-100 disabled:opacity-30">
                                <ChevronLeft className="w-5 h-5" />
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); handleNextTest(); }} className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors text-sm">
                                Next <ChevronRight className="w-4 h-4" />
                            </button>
                        </div>
                    </div>
                    </header>

                    {/* Main Content */}
                    <div className="flex-1 overflow-hidden flex relative">
                        
                        {/* LEFT: Transcript (Conditionally Visible) */}
                        {showTranscript && (
                            <div className="w-full md:w-1/2 lg:w-5/12 bg-white border-r overflow-y-auto p-6 absolute md:relative z-10 h-full shadow-xl md:shadow-none" ref={transcriptRef}>
                                <div className="space-y-4 pb-20">
                                    {test.script.map((line, idx) => {
                                        const isActive = idx === currentLineIndex;
                                        return (
                                            <div 
                                                key={idx} 
                                                id={`line-${idx}`}
                                                className={`transition-all duration-300 ${isActive ? 'bg-yellow-50 p-2 rounded' : 'text-slate-500'}`}
                                            >
                                                <span className="font-bold text-slate-900 mr-2 text-sm uppercase">{line.speaker}:</span>
                                                <span className={`text-base ${isActive ? 'text-slate-900 font-medium' : ''}`}>
                                                    {line.text}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* RIGHT: Questions (Full width if transcript hidden) */}
                        <div className={`flex-1 overflow-y-auto bg-slate-50 p-4 ${showTranscript ? 'hidden md:block' : 'w-full'}`}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-20 max-w-5xl mx-auto">
                                {test.questions.map((q, index) => {
                                    const userAnswer = userAnswers[q.id];
                                    const isAnswered = !!userAnswer;
                                    const isLastAndOdd = (index === test.questions.length - 1) && (test.questions.length % 2 !== 0);
                                    
                                    return (
                                        <div 
                                            key={q.id} 
                                            className={`bg-white p-4 rounded-lg shadow-sm border ${isAnswered ? (userAnswer.isCorrect ? 'border-green-200 bg-green-50/30' : 'border-red-200 bg-red-50/30') : 'border-slate-200'} ${isLastAndOdd ? 'md:col-span-2' : ''}`}
                                        >
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-medium text-base text-slate-800 leading-snug">
                                                    <span className="font-bold text-slate-400 mr-2 text-sm">{q.id}.</span> 
                                                    {q.type === 'gapfill' ? (
                                                        <span>
                                                            {q.question.split('______')[0]}
                                                            <span className="inline-block w-20 border-b-2 border-slate-300 mx-1"></span>
                                                            {q.question.split('______')[1]}
                                                        </span>
                                                    ) : q.question}
                                                </h4>
                                                {isAnswered && (
                                                    userAnswer.isCorrect 
                                                        ? <CheckCircle className="w-5 h-5 text-green-500 flex-shrink-0" />
                                                        : <XCircle className="w-5 h-5 text-red-500 flex-shrink-0" />
                                                )}
                                            </div>

                                            {/* Question Inputs - Compact */}
                                            <div className="ml-0 pl-6">
                                                {q.type === 'mcq' && (
                                                    <div className="space-y-1.5">
                                                        {q.options.map((opt, i) => (
                                                            <button
                                                                key={i}
                                                                disabled={isAnswered}
                                                                onClick={(e) => { e.stopPropagation(); handleAnswer(q.id, opt, q.answer, q.points); }}
                                                                className={`w-full text-left py-2 px-3 rounded text-sm border transition-all ${
                                                                    isAnswered && opt === q.answer 
                                                                        ? 'bg-green-100 border-green-400 text-green-900 font-medium' 
                                                                        : isAnswered && opt === userAnswer.value && !userAnswer.isCorrect
                                                                            ? 'bg-red-100 border-red-400 text-red-900'
                                                                            : 'hover:bg-slate-50 border-slate-200'
                                                                }`}
                                                            >
                                                                <span className="font-bold mr-2 text-slate-400">{String.fromCharCode(65+i)}.</span> {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}

                                                {q.type === 'tf' && (
                                                    <div className="flex gap-2">
                                                        {q.options.map((opt) => (
                                                            <button
                                                                key={opt}
                                                                disabled={isAnswered}
                                                                onClick={(e) => { e.stopPropagation(); handleAnswer(q.id, opt, q.answer, q.points); }}
                                                                className={`flex-1 py-1.5 px-2 rounded border text-sm font-medium transition-colors ${
                                                                    isAnswered && opt === q.answer
                                                                        ? 'bg-green-600 text-white border-green-600'
                                                                        : isAnswered && opt === userAnswer.value
                                                                            ? 'bg-red-600 text-white border-red-600'
                                                                            : 'bg-white text-slate-600 hover:bg-slate-50'
                                                                }`}
                                                            >
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}

                                                {q.type === 'gapfill' && (
                                                    <div className="flex flex-col gap-1">
                                                        <div className="flex gap-2">
                                                            <input 
                                                                type="text" 
                                                                placeholder="Answer..." 
                                                                className="border border-slate-300 p-1.5 text-sm rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-100"
                                                                disabled={isAnswered}
                                                                onKeyDown={(e) => {
                                                                    if (e.key === 'Enter') handleAnswer(q.id, e.target.value, q.answer, q.points);
                                                                }}
                                                                onBlur={(e) => {
                                                                    if (e.target.value) handleAnswer(q.id, e.target.value, q.answer, q.points);
                                                                }}
                                                                onClick={(e) => e.stopPropagation()} 
                                                            />
                                                            {!isAnswered && <button onClick={(e) => e.stopPropagation()} className="bg-blue-600 text-white px-3 py-1 text-sm rounded hover:bg-blue-700">OK</button>}
                                                        </div>
                                                        {isAnswered && !userAnswer.isCorrect && (
                                                            <div className="text-xs text-green-700 font-medium">
                                                                Correct: {q.answer}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Explanation Feedback */}
                                            {(showExplanation || isAnswered) && (
                                                <div className={`mt-2 p-3 rounded text-xs transition-all duration-500 ${isAnswered ? 'opacity-100' : 'opacity-0'} ${userAnswer?.isCorrect ? 'bg-green-50 text-green-800' : 'bg-slate-100 text-slate-700'}`}>
                                                    <span className="font-bold">Explanation:</span> {q.explanation}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-100 font-sans text-slate-900">
                {view === 'menu' ? renderMainMenu() : renderTestInterface()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IELTSApp />);
    </script>
</body>
</html>
