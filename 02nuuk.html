<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovering Nuuk – Life in Greenland’s Arctic Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overscroll-behavior: none;
            transition: background-color 2s ease-in-out;
            background-color: #0c4a6e; /* Darker blue for snowy night */
        }
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .page { 
            display: none; 
            position: relative;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-button, .nav-button, .quiz-option {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .action-button:hover, .nav-button:hover, .quiz-option:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .action-button:active, .nav-button:active, .quiz-option:active {
            transform: translateY(-1px) scale(0.98);
        }
        .feedback-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .feedback-modal.show { display: flex; }
        .ice-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid #0891b2;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .ice-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(8, 145, 178, 0.1);
        }
        /* --- 3D Animated Button Style --- */
        .btn-animated-3d {
            position: relative; overflow: hidden; transition: all 0.15s ease-out; border-bottom-width: 4px;
        }
        .btn-animated-3d:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-animated-3d::before, .btn-animated-3d::after {
            content: ''; position: absolute; width: 0; height: 2px; transition: width 0.3s ease-out;
        }
        .btn-animated-3d.green-btn::before, .btn-animated-3d.green-btn::after { background-color: #047857; }
        .btn-animated-3d.sky-btn::before, .btn-animated-3d.sky-btn::after { background-color: #0369a1; }
        .btn-animated-3d.cyan-btn::before, .btn-animated-3d.cyan-btn::after { background-color: #0e7490; }
        .btn-animated-3d.blue-btn::before, .btn-animated-3d.blue-btn::after { background-color: #1d4ed8; }
        .btn-animated-3d.indigo-btn::before, .btn-animated-3d.indigo-btn::after { background-color: #4338ca; }
        .btn-animated-3d.pink-btn::before, .btn-animated-3d.pink-btn::after { background-color: #be185d; }
        .btn-animated-3d.purple-btn::before, .btn-animated-3d.purple-btn::after { background-color: #6d28d9; }
        .btn-animated-3d.red-btn::before, .btn-animated-3d.red-btn::after { background-color: #b91c1c; }
        .btn-animated-3d::before { top: 0; left: 0; }
        .btn-animated-3d::after { bottom: 0; right: 0; }
        .btn-animated-3d:hover::before, .btn-animated-3d:hover::after { width: 100%; }
        .btn-animated-3d span::before, .btn-animated-3d span::after {
            content: ''; position: absolute; width: 2px; height: 0; transition: height 0.3s ease-out .15s;
        }
        .btn-animated-3d.green-btn span::before, .btn-animated-3d.green-btn span::after { background-color: #047857; }
        .btn-animated-3d.sky-btn span::before, .btn-animated-3d.sky-btn span::after { background-color: #0369a1; }
        .btn-animated-3d.cyan-btn span::before, .btn-animated-3d.cyan-btn span::after { background-color: #0e7490; }
        .btn-animated-3d.blue-btn span::before, .btn-animated-3d.blue-btn span::after { background-color: #1d4ed8; }
        .btn-animated-3d.indigo-btn span::before, .btn-animated-3d.indigo-btn span::after { background-color: #4338ca; }
        .btn-animated-3d.pink-btn span::before, .btn-animated-3d.pink-btn span::after { background-color: #be185d; }
        .btn-animated-3d.purple-btn span::before, .btn-animated-3d.purple-btn span::after { background-color: #6d28d9; }
        .btn-animated-3d.red-btn span::before, .btn-animated-3d.red-btn span::after { background-color: #b91c1c; }
        .btn-animated-3d span::before { bottom: 0; left: 0; }
        .btn-animated-3d span::after { top: 0; right: 0; }
        .btn-animated-3d:hover span::before, .btn-animated-3d:hover span::after { height: 100%; }
    </style>
</head>
<body class="antialiased text-gray-800 text-lg">
    <canvas id="snow-canvas"></canvas>

    <header id="nav-header" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-sm shadow-sm" style="display: none;">
        <div class="max-w-4xl mx-auto p-1.5 flex justify-between items-center">
            <button onclick="goBack()" class="nav-button bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Back</button>
            <div class="font-bold text-base text-cyan-600">Score: <span id="score-display">0</span></div>
            <button onclick="navigateTo(1)" class="nav-button bg-gray-800 text-white font-bold py-1.5 px-3 text-sm rounded-full hover:bg-gray-900 flex items-center gap-2">Home</button>
            <button onclick="goNext()" class="nav-button bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Next</button>
        </div>
    </header>

    <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pt-14">

        <!-- Page 0: Title Screen -->
        <section id="page-0" class="page active text-center bg-white rounded-2xl shadow-lg p-8">
            <div class="h-full flex flex-col justify-center items-center">
                <h1 class="text-5xl md:text-6xl font-bold text-cyan-700 mb-4">Unit 5: Discovering Nuuk</h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-8">Life in Greenland’s Arctic Capital 🇬🇱</p>
                <svg viewBox="0 0 600 300" class="rounded-lg shadow-md mb-8 w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ccfbf1;stop-opacity:1" /><stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" /></linearGradient></defs>
                    <rect width="600" height="300" fill="url(#skyGradient)"/>
                    <path d="M 0 300 L 0 200 L 50 180 L 100 220 L 150 190 L 200 250 L 250 220 L 300 300 Z" fill="#a5f3fc" opacity="0.8"/>
                    <path d="M 250 300 L 250 240 L 300 210 L 350 250 L 400 220 L 450 260 L 500 230 L 550 280 L 600 250 L 600 300 Z" fill="#e0f2fe" opacity="0.9"/>
                    <path d="M 0 150 Q 150 50 300 150 T 600 150" fill="none" stroke="#34d399" stroke-width="10" opacity="0.6"/>
                    <path d="M 0 160 Q 150 60 300 160 T 600 160" fill="none" stroke="#a7f3d0" stroke-width="8" opacity="0.5"/>
                    <rect x="180" y="230" width="30" height="20" fill="#ef4444"/><rect x="220" y="225" width="30" height="25" fill="#3b82f6"/><rect x="260" y="235" width="30" height="15" fill="#f59e0b"/>
                    <text x="50%" y="40%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#0891b2" font-weight="bold">NUUK</text>
                </svg>
                <button onclick="startApp()" class="action-button bg-cyan-600 text-white font-bold py-3 px-8 rounded-full text-2xl hover:bg-cyan-700">START LESSON</button>
            </div>
        </section>

        <!-- Page 1: Main Menu -->
        <section id="page-1" class="page">
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-4xl font-bold text-center text-cyan-700 mb-8">Main Menu</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="navigateTo(100)" class="btn-animated-3d green-btn bg-green-500 border-green-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>1. Think-Pair-Share</button>
                    <button onclick="navigateTo(200)" class="btn-animated-3d sky-btn bg-sky-500 border-sky-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>2. Vocabulary</button>
                    <button onclick="navigateTo(300)" class="btn-animated-3d cyan-btn bg-cyan-500 border-cyan-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>3. Lectures & Seminar</button>
                    <button onclick="navigateTo(400)" class="btn-animated-3d blue-btn bg-blue-500 border-blue-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>4. Geography & Climate</button>
                    <button onclick="navigateTo(500)" class="btn-animated-3d indigo-btn bg-indigo-500 border-indigo-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>5. Culture & Lifestyle</button>
                    <button onclick="navigateTo(600)" class="btn-animated-3d red-btn bg-red-500 border-red-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>6. Critical Thinking</button>
                    <button onclick="navigateTo(700)" class="btn-animated-3d pink-btn bg-pink-500 border-pink-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>7. Knowledge Quiz</button>
                    <button onclick="navigateTo(800)" class="btn-animated-3d purple-btn bg-purple-500 border-purple-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>8. Final Tasks</button>
                </div>
            </div>
        </section>
        
        <div id="dynamic-pages-container"></div>
    </div>

    <!-- Modals -->
    <div id="details-modal" class="feedback-modal"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Snow Animation ---
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let snowflakes = [];

            function createSnowflakes() {
                snowflakes = [];
                const count = Math.min(200, Math.floor(canvas.width / 5));
                for (let i = 0; i < count; i++) {
                    snowflakes.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 3 + 1,
                        speed: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }

            function drawSnowflakes() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                snowflakes.forEach(flake => {
                    ctx.beginPath();
                    ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                    ctx.globalAlpha = flake.opacity;
                    ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }

            function updateSnowflakes() {
                snowflakes.forEach(flake => {
                    flake.y += flake.speed;
                    if (flake.y > canvas.height) {
                        flake.y = -flake.radius;
                        flake.x = Math.random() * canvas.width;
                    }
                });
            }

            function animateSnow() {
                updateSnowflakes();
                drawSnowflakes();
                requestAnimationFrame(animateSnow);
            }
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                createSnowflakes();
            });

            createSnowflakes();
            animateSnow();

            // --- State & Config ---
            let score = 0;
            const scoreDisplay = document.getElementById('score-display');
            let timerInterval;
            let currentPage = 0;
            const pageHistory = [0];
            const pageSequence = [0, 1, 100, 101, 102, 103, 104, 200, 21, 22, 23, 24, 25, 26, 300, 301, 302, 303, 304, 305, 306, 307, 308, 400, 401, 500, 501, 600, 601, 602, 603, 700, 701, 800, 801, 802, 803];

            // --- Audio & TTS ---
            let audioReady = false;
            let toneSynth;
            let isTtsEnabled = true;
            const synthTTS = window.speechSynthesis;
            let defaultVoice = null;
            let professorVoice = null;
            
            window.startApp = async function() {
                if (!audioReady) try { await Tone.start(); toneSynth = new Tone.PolySynth(Tone.Synth).toDestination(); audioReady = true; } catch (e) { console.error("Tone.js failed to start:", e); }
                try {
                    const u = new SpeechSynthesisUtterance(' '); u.volume=0; synthTTS.speak(u); synthTTS.cancel();
                    await setupVoices();
                } catch (e) { console.error("Speech synthesis setup failed:", e); }
                navigateTo(1);
            }
            const playSound = (correct) => { if(audioReady && toneSynth) toneSynth.triggerAttackRelease(correct ? ["C5", "E5", "G5"] : "A2", "8n", Tone.now()); }
            
            const voicesPromise = new Promise(resolve => {
                if (synthTTS.getVoices().length > 0) { resolve(synthTTS.getVoices()); return; }
                synthTTS.onvoiceschanged = () => { resolve(synthTTS.getVoices()); };
            });

            async function setupVoices() {
                try {
                    const voices = await voicesPromise;
                    if (voices.length === 0) {
                        console.warn("No speech synthesis voices available.");
                        return;
                    }

                    const usEnglishVoices = voices.filter(v => v.lang === 'en-US');
                    
                    // --- Set up Professor Voice ---
                    const maleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('male'));
                    professorVoice = maleVoices.find(v => v.name.toLowerCase().includes('brian')) 
                                  || maleVoices[0];
                    if (professorVoice) {
                         console.log("Professor Voice set to:", professorVoice.name);
                    } else {
                         console.warn("Could not find a specific male voice for the professor.");
                    }

                    // --- Set up Default Voice (Female) ---
                    const qualityPriorities = [
                        'neural', 'wavenet', 'siri (enhanced)', 'google', 'turbo', 'multilingual', 'microsoft', 'samantha', 'ava', 'zira', 'premium'
                    ];
                    
                    const femaleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('female') || !v.name.toLowerCase().includes('male'));

                    const findBestVoice = (voiceList) => {
                        for (const priority of qualityPriorities) {
                            const foundVoice = voiceList.find(v => v.name.toLowerCase().includes(priority));
                            if (foundVoice) return foundVoice;
                        }
                        return null;
                    };

                    defaultVoice = findBestVoice(femaleVoices) || femaleVoices[0] || usEnglishVoices[0];
                    
                    // If no professor voice was found, fall back to the default voice.
                    if (!professorVoice) {
                        professorVoice = defaultVoice;
                    }

                    if (defaultVoice) {
                        console.log("Default Voice set to:", defaultVoice.name);
                    } else {
                        console.warn("Could not find a suitable default English voice.");
                    }

                } catch (e) {
                    console.error("Error setting up voices:", e);
                }
            }
            
            async function speak(text, voiceOverride = null) {
                if (!isTtsEnabled || !text) return;
                if (synthTTS.speaking) synthTTS.cancel();
                await new Promise(resolve => setTimeout(resolve, 50));
                
                const u = new SpeechSynthesisUtterance(text);
                
                // Use the override if provided, otherwise use the default voice.
                const finalVoice = voiceOverride || defaultVoice;
                if (finalVoice) {
                    u.voice = finalVoice;
                }
                
                u.rate = 0.85; // Slow down speech
                synthTTS.speak(u);
            }

            window.toggleTTS = (button) => {
                isTtsEnabled = !isTtsEnabled;
                if (!isTtsEnabled) {
                    synthTTS.cancel();
                    button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707a1 1 0 011.414 0v14a1 1 0 01-1.414 0L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" d="M17 14l-4-4m0 4l4-4" /></svg>`;
                } else {
                    button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707a1 1 0 011.414 0v14a1 1 0 01-1.414 0L5.586 15z" /></svg>`;
                    const readableContent = document.getElementById(`page-${currentPage}`)?.querySelector('.readable-content');
                    if (readableContent) {
                         const voiceToUse = (currentPage === 306) ? professorVoice : defaultVoice;
                         speak(readableContent.innerText, voiceToUse);
                    }
                }
            }

            // --- Navigation & Page Flow ---
            window.navigateTo = (pageId) => {
                const targetPage = document.getElementById(`page-${pageId}`);
                if (!targetPage) {
                    console.warn('navigateTo: no page found for id', pageId);
                    return;
                }
                if (pageId === currentPage) return;
                
                document.getElementById(`page-${currentPage}`)?.classList.remove('active');
                targetPage.classList.add('active');
                currentPage = pageId;
                if (pageHistory[pageHistory.length - 1] !== currentPage) pageHistory.push(currentPage);
                
                clearInterval(timerInterval);
                if (synthTTS.speaking) synthTTS.cancel();

                if (pageId === 101) {
                    const el = document.getElementById('timer-think');
                    if(el) startTimer(120, el, goNext);
                }
                if (pageId === 102) {
                    const el = document.getElementById('timer-pair');
                    if(el) startTimer(180, el, goNext);
                }
                if (pageId === 103) {
                    const el = document.getElementById('timer-share');
                    if(el) startTimer(300, el, goNext);
                }
                
                const readableContent = targetPage.querySelector('.readable-content');
                if (readableContent) {
                    // Use professor voice for the seminar page, otherwise use the default.
                    const voiceToUse = (pageId === 306) ? professorVoice : defaultVoice;
                    speak(readableContent.innerText, voiceToUse);
                }
                
                updateNavButtons();
                window.scrollTo(0, 0);
            }
            window.goNext = () => { 
                const currentIndex = pageSequence.indexOf(currentPage);
                if (currentIndex > -1 && currentIndex < pageSequence.length - 1) {
                    navigateTo(pageSequence[currentIndex + 1]);
                }
            }
            window.goBack = () => { 
                if (pageHistory.length > 1) { 
                    pageHistory.pop(); 
                    const prevPage = pageHistory.pop();
                    navigateTo(prevPage);
                } 
            }
            
            function updateNavButtons() {
                const nav = document.getElementById('nav-header');
                if(!nav) return;
                nav.style.display = (currentPage === 0) ? 'none' : 'flex';
                const backBtn = nav.querySelector('button:first-child');
                const nextBtn = nav.querySelector('button:last-child');
                backBtn.disabled = pageHistory.length <= 1;
                backBtn.classList.toggle('opacity-50', backBtn.disabled);
                const currentIndex = pageSequence.indexOf(currentPage);
                const isLast = currentIndex >= pageSequence.length - 1;
                nextBtn.disabled = isLast || currentPage === 1;
                nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            }
            function startTimer(duration, display, onComplete) {
                let timer = duration;
                const update = () => { display.textContent = `${String(Math.floor(timer/60)).padStart(2,'0')}:${String(timer%60).padStart(2,'0')}`; };
                update();
                timerInterval = setInterval(() => { 
                    timer--; 
                    update(); 
                    if (timer < 0) { 
                        clearInterval(timerInterval); 
                        if (onComplete) onComplete(); 
                    } 
                }, 1000);
            }
            
            // --- Modals & Interactivity ---
            const detailsData = {
                'inuit': { title: "Inuit Traditions", content: "Traditional Inuit culture in Nuuk includes hunting, fishing, storytelling, and crafts that have sustained Arctic communities for millennia. These traditions continue today alongside modern life, providing food security, cultural identity, and a deep connection to the land." },
                'modern': { title: "Modern Nuuk", content: "Contemporary Nuuk combines traditional culture with modern amenities. It features government buildings, the University of Greenland, modern hospitals, and cultural centers. Infrastructure is specially designed for Arctic conditions." },
                'education': { title: "Bilingual Education", content: "Nuuk's education system teaches in both Greenlandic (Kalaallisut) and Danish. This allows students to maintain their cultural identity while gaining skills for higher education and careers in Denmark or internationally." },
                'food': { title: "Arctic Diet", content: "Nuuk's food system combines traditional foods like seal, whale, and fish with imported goods. Food systems must account for short growing seasons, high import costs, and the nutritional needs of people in extreme cold." },
                'transport': { title: "Getting Around", content: "With no roads between cities, transportation relies on dog sleds, snowmobiles, boats, and aircraft. Modern GPS and weather forecasting make these methods safer and more reliable." },
                'community': { title: "Community Bonds", content: "Strong social connections and mutual support are essential for survival and wellbeing in Nuuk's isolated environment. Community sharing of resources and knowledge is a common practice." },
            };
            window.showDetails = (id) => {
                const details = detailsData[id];
                if (!details) { console.warn('No details for', id); return; }
                const modal = document.getElementById('details-modal');
                modal.innerHTML = `<div class="bg-white rounded-2xl max-w-lg w-full p-6 m-4"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-gray-800">${details.title}</h3><button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button></div><div class="text-gray-600">${details.content}</div></div>`;
                modal.classList.add('show');
                speak(details.title + ". " + details.content);
            }
            window.closeModal = () => document.getElementById('details-modal').classList.remove('show');
            
            window.checkAnswer = function(button) {
                const isCorrect = button.dataset.correct === 'true';
                const questionGroup = button.closest('.question-group');
                questionGroup.querySelectorAll('.quiz-option').forEach(opt => opt.disabled = true);
                if (isCorrect) {
                    playSound(true);
                    button.classList.remove('bg-white', 'hover:bg-gray-100');
                    button.classList.add('bg-green-500', 'border-green-600', 'text-white');
                    updateScore(10);
                } else {
                    playSound(false);
                    button.classList.remove('bg-white', 'hover:bg-gray-100');
                    button.classList.add('bg-red-500', 'border-red-600', 'text-white');
                    const correctButton = questionGroup.querySelector("[data-correct='true']");
                    if (correctButton) {
                        correctButton.classList.remove('bg-white', 'hover:bg-gray-100');
                        correctButton.classList.add('bg-green-500', 'border-green-600', 'text-white');
                    }
                }
            }

            function updateScore(points) {
                score += points;
                scoreDisplay.textContent = score;
            }
            
            window.generateCertificateU5 = function() {
                const nameInput = document.getElementById('name-input-u5');
                const name = nameInput ? nameInput.value || "Arctic Explorer" : "Arctic Explorer";
                
                const certNameEl = document.getElementById('certificate-name-u5');
                if (certNameEl) certNameEl.textContent = name;
                
                const certScoreEl = document.getElementById('certificate-score-u5');
                if(certScoreEl) certScoreEl.textContent = score;

                200: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-sky-700 mb-6">Vocabulary</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Learn the key terms for this unit. Click Next to cycle through the words.</p></div><button onclick="goNext()" class="action-button bg-sky-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-sky-700">Start Learning</button></div>`,
                300: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Lecture 1: Geopolitics of Nuuk</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Good afternoon. Today we will examine one of the most unique capital cities in the world, Nuuk, Greenland. Our essential question is, how can a community forge a modern identity while navigating the forces of climate change, globalization, and its own unique cultural heritage?</p><p>I will outline our discussion in three parts. First, we will cover the city's geography and historical founding. Second, we will review Greenland's political evolution. And third, we will analyze the modern economic and geopolitical forces, particularly those linked to climate change.</p><p>Let's begin. Nuuk is the capital of Greenland, an autonomous territory of the Kingdom of Denmark, geographically located on the continent of North America. The city is situated on the southwest coast, at the mouth of a vast fjord system. With a population of just over 19,000 people, it is one of the smallest capital cities in the world. It was founded by the Dano-Norwegian missionary Hans Egede in 1728 under the name Godthåb, meaning "Good Hope."</p><p>Now, let's turn to its political identity. For centuries, Greenland was a Danish colony. This changed significantly with the Greenland Home Rule Act of 1979. It was at this point that the city officially changed its name to Nuuk. I'll spell that, N-U-U-K. This act granted Greenland autonomy over most domestic matters, marking a crucial step towards self-governance.</p><p>Finally, we must discuss the profound impact of climate change on the region's geopolitics. The rapid melting of the Greenland ice sheet, losing hundreds of billions of tons of ice annually, is creating new economic opportunities. The potential opening of Arctic shipping lanes like the Northwest Passage, and the uncovering of vast mineral and rare earth element deposits, has intensified international interest in Greenland. So, to review, Nuuk is a small capital, founded in 1728, which became the seat of an autonomous government in 1979. Today, it finds itself at the center of global attention as climate change reshapes the economic and strategic map of the Arctic.</p></div></div>`,
                301: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture 1: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What was Nuuk's original name when founded in 1728?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Godthåb</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Hans Egede</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Kalaallisut</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. The Greenland Home Rule Act of 1979 resulted in what significant change?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Greenland became fully independent.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Greenland gained autonomy over most domestic matters.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Greenland joined the European Union.</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">3. According to the lecture, what is a major economic opportunity arising from climate change in Greenland?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Increased agricultural production.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. The growth of tropical forests.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. The uncovering of mineral and rare earth deposits.</button></div></div></div>`,
                302: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture 1: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. Nuuk's population is over 50,000 people.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. The name "Godthåb" means "Good Hope".</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">3. The Greenland ice sheet is growing larger each year.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div></div>`,
                303: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Lecture 2: Tensions in Nuuk</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Hello everyone. I want to paint a picture of Nuuk for you. Imagine brightly colored Scandinavian-style houses clinging to a rocky shoreline, set against a backdrop of immense, ancient mountains and the cold, clear waters of the North Atlantic. It's a city where modernity and wildness exist side by side. Our essential question is, how does a community forge a modern identity while navigating the forces of climate change, globalization, and its own unique cultural heritage?</p><p>I'll outline my talk by looking at three tensions. First, the tension between climate as a crisis and an opportunity. Second, the tension between Inuit heritage and Danish influence. And finally, we will review the central challenge of defining a future for Nuuk.</p><p>Let's start with climate change, which is not an abstract concept in Nuuk; it's a daily reality. The melting ice is a profound crisis, threatening global sea levels and the traditional hunting lifestyles of the Inuit people who rely on stable sea ice. But here is the paradox: the melt is also seen as an opportunity. It is uncovering land for potential mining and opening waterways that could bring new shipping and tourism revenue. This is the central, difficult conversation happening in Greenland today.</p><p>Next, there is the cultural landscape. The majority of Nuuk's 19,000 residents are Greenlandic Inuit, but the Danish influence from centuries of colonization is everywhere. A key challenge is the preservation of the Inuit language, Kalaallisut. I will spell that for you, K-A-L-A-A-L-L-I-S-U-T. While it's an official language, Danish and English are dominant in many areas, and there is a constant effort to keep the indigenous language and traditions thriving in an increasingly globalized world.</p><p>To review, the people of Nuuk are navigating a future defined by powerful, opposing forces. They face the direct consequences of climate change while also being presented with economic prospects because of it. They are working to celebrate and strengthen their unique Inuit identity while being closely tied to Denmark and the wider world. The key takeaway is that Nuuk is a microcosm of the 21st century, a community on the front lines, actively deciding what it means to be modern and indigenous in a rapidly changing world.</p></div></div>`,
                304: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture 2: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The lecture describes the melting ice in Greenland as a paradox because it is both a crisis and a(n)...</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. political issue.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. opportunity.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. tourist attraction.</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. What is the name of the official Inuit language mentioned in the lecture?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Danish</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Greenlandic</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Kalaallisut</button></div></div></div></div>`,
                305: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Lecture 2: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The lecture states that climate change is an abstract concept in Nuuk.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. The traditional Inuit hunting lifestyle relies on stable sea ice.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div></div></div>`,
                306: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Seminar: Life in Nuuk</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p><strong>Professor:</strong> Alright class, let's explore life in Nuuk, the capital of Greenland. Aisha, what are some difficulties people living in Nuuk might face?</p><p><strong>Aisha:</strong> Well, professor, I imagine the climate is a big one. It must be really cold and dark for long parts of the year. Access to resources too, probably. Like, is it hard to get supplies there?</p><p><strong>Professor:</strong> Those are key challenges, Aisha. Ben, anything to add?</p><p><strong>Ben:</strong> Yeah, I guess the isolation. It's a small community pretty far from other places. That could be tough.</p><p><strong>Professor:</strong> Absolutely. Now, Greenland has two official languages, Greenlandic and Danish. How does bilingual education play a role for students in Nuuk? Aisha?</p><p><strong>Aisha:</strong> I think it's really important for preserving their culture, and learning Danish probably helps them connect with the wider world.</p><p><strong>Professor:</strong> Precisely. We've touched upon the challenges and cultural resilience in Nuuk. Excellent discussion, everyone.</p></div></div>`,
                307: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Seminar: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. According to Aisha, what are two primary challenges of living in Nuuk?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Too much tourism and high population.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Harsh climate and difficult access to resources.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Lack of schools and poor internet.</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. What is the main benefit of bilingual education as identified by Aisha and Ben?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. It preserves culture while providing global opportunities.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. It makes it easier to learn a third language.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. It is required by the Kingdom of Denmark.</button></div></div></div></div>`,
                308: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-cyan-600 mb-4 text-center">Seminar: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The professor states that Nuuk is the largest capital city in the world.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. Greenland has three official languages: Greenlandic, Danish, and English.</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Not Given</button></div></div></div></div>`,
                400: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-blue-700 mb-6">Geography & Climate</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Explore the unique environment of Nuuk.</p></div><button onclick="goNext()" class="action-button bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-blue-700">Start Exploring</button></div>`,
                401: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-blue-700 mb-6">Explore: Nuuk's Environment</h2><div class="readable-content"><p class="text-center text-gray-600 mb-6">Nuuk is located on the southwest coast of Greenland, just south of the Arctic Circle. It sits at the mouth of one of the world's largest fjord systems. The climate is subarctic, with long, cold, snowy winters and short, cool summers.</p></div><div class="grid md:grid-cols-2 gap-6 text-center"><div class="bg-blue-50 p-4 rounded-lg"><div class="text-3xl mb-2">🌡️</div><h3 class="font-bold text-blue-800">Temperatures</h3><p>Winter Avg: -8°C (18°F)</p><p>Summer Avg: 7°C (45°F)</p></div><div class="bg-sky-50 p-4 rounded-lg"><div class="text-3xl mb-2">☀️</div><h3 class="font-bold text-sky-800">Daylight</h3><p>Winter: 4-5 hours</p><p>Summer: Up to 19 hours</p></div></div></div>`,
                500: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-indigo-700 mb-6">Culture & Lifestyle</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Discover how people live and adapt in Nuuk.</p></div><button onclick="goNext()" class="action-button bg-indigo-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-indigo-700">Start Exploring</button></div>`,
                501: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-indigo-700 mb-6">Explore: Life in Nuuk</h2><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"><div class="ice-card rounded-2xl p-6" onclick="showDetails('inuit')"><div class="text-4xl mb-2">🏕️</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Inuit Traditions</h3><p class="text-sm text-gray-600">Hunting, fishing, and storytelling are central to cultural heritage.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('modern')"><div class="text-4xl mb-2">🏢</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Modern Nuuk</h3><p class="text-sm text-gray-600">A vibrant city with universities, museums, and modern amenities.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('education')"><div class="text-4xl mb-2">🎓</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Bilingual Education</h3><p class="text-sm text-gray-600">Schools teach in Greenlandic and Danish, preserving culture.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('food')"><div class="text-4xl mb-2">🐟</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Arctic Diet</h3><p class="text-sm text-gray-600">A mix of traditional foods like seal and fish with imported goods.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('transport')"><div class="text-4xl mb-2">🛷</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Getting Around</h3><p class="text-sm text-gray-600">Travel relies on boats, planes, and snowmobiles, as there are no roads between cities.</p></div><div class="ice-card rounded-2xl p-6" onclick="showDetails('community')"><div class="text-4xl mb-2">🤝</div><h3 class="text-xl font-semibold mb-2 text-cyan-800">Community Bonds</h3><p class="text-sm text-gray-600">Strong social connections are essential for life in an isolated environment.</p></div></div></div>`,
                600: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-red-700 mb-6">Dilemma: Climate vs. Economics</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-red-600">Scenario:</h3><p>Nuuk is Greenland’s capital. Warming in the Arctic is melting sea ice, which opens up shipping routes and new fishing opportunities — but also threatens traditional Inuit livelihoods, fragile ecosystems, and global climate stability.</p><h3 class="font-bold text-xl text-red-600 mt-4">Dilemma for students:</h3><p>Should Nuuk’s local government encourage large‑scale commercial fishing and shipping to boost its economy, knowing this could accelerate environmental change and disrupt Indigenous culture?</p></div></div>`,
                601: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-orange-700 mb-6">Dilemma: The Port or the People?</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-orange-600">Setup:</h3><p>Nuuk's government has secured a one-time development grant. The municipal council must decide between two competing projects, as there is only enough funding for one:</p><ul class="list-disc list-inside ml-4 space-y-2"><li><strong>Project A: Port Expansion.</strong> Invest in dredging and expanding the commercial port. This will allow larger cargo ships to dock, lowering the cost of imported food and supplies for all 19,000 residents. It promises to create hundreds of modern jobs and strengthen the city's economic future.</li><li><strong>Project B: Hunting Fleet Revitalization.</strong> Invest in a new, subsidized fleet of modern, safer boats and high-tech equipment for the local Inuit hunters' association. This would preserve traditional hunting practices, improve the hunters' safety and success, ensure the passing of cultural knowledge, and bolster local food security with traditional foods.</li></ul><h3 class="font-bold text-xl text-orange-600 mt-4">Question:</h3><p>As a member of Nuuk's municipal council, which project do you vote to fund, and why?</p></div></div>`,
                602: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Dilemma: The Shipping Gamble</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-amber-600">Setup:</h3><p><strong>Players:</strong> Nuuk’s municipal council and an international shipping company.</p><p><strong>Choice:</strong> Both can <strong>invest in cleaner ice‑class ships</strong> (costly now, less pollution) or use <strong>older ships</strong> (cheaper now, more pollution).</p><div class="overflow-x-auto mt-4"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-200"><tr><th scope="col" class="px-6 py-3"></th><th scope="col" class="px-6 py-3">Shipping Company Invests</th><th scope="col" class="px-6 py-3">Shipping Company Skips</th></tr></thead><tbody><tr class="bg-white border-b"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Nuuk Invests</th><td class="px-6 py-4 bg-green-100 text-green-800">Arctic stays cleaner; long‑term tourism + fishing benefit both</td><td class="px-6 py-4 bg-red-100 text-red-800">Nuuk loses money while others profit</td></tr><tr class="bg-white"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Nuuk Skips</th><td class="px-6 py-4 bg-orange-100 text-orange-800">Nuuk’s economy gains short‑term, but loses clean‑Arctic tourism potential</td><td class="px-6 py-4 bg-red-200 text-red-900">Short‑term profit for both; faster ice melt, harming both long‑term</td></tr></tbody></table></div></div></div>`,
                603: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-lime-700 mb-6">Key Takeaways</h2><div class="readable-content text-lg leading-relaxed space-y-6 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><div><h3 class="font-bold text-xl text-lime-600">Enduring Understanding:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">Choices in one small Arctic city can ripple across global environmental, cultural, and economic systems — and local solutions require balancing multiple, often conflicting, values.</p></div><div><h3 class="font-bold text-xl text-lime-600">Essential Question:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">How should communities balance economic growth with cultural preservation and environmental responsibility in an interconnected world?</p></div></div></div>`,
                700: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-center text-pink-700 mb-6">Knowledge Quiz</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8 text-center">Test your understanding of life in Nuuk.</p></div><button onclick="goNext()" class="action-button bg-pink-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-pink-700">Start Quiz</button></div>`,
                701: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-pink-600 mb-4 text-center">Comprehension Questions</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What are the two main languages taught in Nuuk schools?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. English and Danish</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Greenlandic and Danish</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Greenlandic and English</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">2. Which of these is a major challenge for transportation in Greenland?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Too many cars</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Heavy traffic jams</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. No roads between cities</button></div></div><div class="question-group border-t pt-6 mt-6"><p class="font-semibold">3. What does 'adaptation' mean in the context of Arctic living?</p><div class="grid grid-cols-1 gap-2 mt-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">A. Changes made to survive in the environment</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">B. Moving to warmer places for the winter</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left bg-white hover:bg-gray-100 border">C. Learning a new language</button></div></div></div></div>`,
                800: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-purple-700 mb-6">Writing Activity & Final Mission</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8 text-center">Apply what you've learned to complete the final tasks.</p></div><button onclick="goNext()" class="action-button bg-purple-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-purple-700">Continue</button></div>`,
                801: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-pink-700 mb-6">Writing Activity ✍️</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><h3 class="font-bold text-xl text-pink-600">Prompt:</h3><p>In 200-250 words, compare life in Nuuk with life in your hometown.</p><h3 class="font-bold text-xl text-pink-600 mt-4">Scaffolding Sentence Stems:</h3><ul class="list-disc list-inside ml-4"><li>Nuuk is located in… and its climate is…</li><li>In my hometown, the environment is…</li><li>People in Nuuk adapt by… whereas we adapt by…</li><li>I think a key difference is…</li></ul><h3 class="font-bold text-xl text-pink-600 mt-4">Vocabulary Word Bank:</h3><p class="text-sm text-gray-600 bg-gray-100 p-3 rounded-md">Adaptation, Arctic, bilingual, climate, community, culture, Danish, education, environment, fjord, Greenlandic, Inuit, isolation, lifestyle, remote, snow, tradition</p></div></div>`,
                802: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-center text-purple-700 mb-6">Your Final Mission 🚀</h2><div class="readable-content text-xl leading-relaxed max-w-2xl mx-auto bg-gray-50 p-6 rounded-lg"><p class="mb-4">Your task is to create a multimedia presentation (e.g., a short video or slideshow) comparing life in Nuuk with your own hometown.</p><p class="mb-4">Your presentation should include:</p><ul class="list-disc list-inside text-left space-y-2"><li>A description of Nuuk’s location, climate, and culture.</li><li>A description of your hometown's environment and lifestyle.</li><li>At least three specific examples of how people adapt in each location.</li><li>A conclusion about what can be learned from comparing the two places.</li></ul></div></div>`,
                803: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-amber-600 mb-4">Congratulations!</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-6">You have completed the "Discovering Nuuk" unit.</p></div><div class="bg-cyan-50 border-4 border-dashed border-cyan-300 rounded-lg p-8 max-w-2xl mx-auto"><div class="flex justify-center mb-4"><span class="text-6xl">📜</span></div><h3 class="text-3xl font-bold text-cyan-800">Certificate of Completion</h3><p class="mt-4 text-lg">This certificate is awarded to</p><p id="certificate-name-u5" class="text-2xl font-bold text-cyan-600 my-2 border-b-2 border-gray-400 pb-2">[Enter Your Name Here]</p><p class="mt-4 text-lg">for successfully completing all challenges and demonstrating excellent knowledge of Arctic life and culture.</p><p class="mt-6 text-md"><strong>Final Score:</strong> <span id="certificate-score-u5" class="font-bold">0</span> points</p><p class="text-sm mt-1"><strong>Date of Completion:</strong> <span id="certificate-date-u5"></span></p></div><div class="mt-6"><input type="text" id="name-input-u5" placeholder="Enter your name for the certificate" class="text-center p-2 border rounded-lg w-full max-w-md"><button onclick="generateCertificateU5()" class="action-button mt-4 bg-cyan-600 text-white font-bold py-2 px-6 rounded-full hover:bg-cyan-700">Generate Certificate</button></div></div>`
