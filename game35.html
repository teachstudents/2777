<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Adventure Game!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #84fab0, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .correct-animation { animation: pulse 0.5s; }
        .incorrect-animation { animation: shake 0.5s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #praise-overlay.active { display: flex; animation: flash-praise 1.5s ease-out forwards; }
        @keyframes flash-praise {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .player-box { transition: box-shadow 0.3s ease-in-out, border-color 0.3s ease-in-out; }
        .winner-glow { box-shadow: 0 0 25px 5px rgba(74, 222, 128, 0.7); border-color: #4ade80 !important; }

        /* Circular Timer Styles */
        .timer-svg { transform: scaleX(-1) rotate(-90deg); }
        .timer-svg-circle { transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="quiz-container w-full max-w-4xl mx-auto bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-2xl shadow-2xl text-center relative">

        <div id="praise-overlay" class="hidden absolute inset-0 bg-black/30 items-center justify-center rounded-2xl z-50 pointer-events-none">
            <span id="praise-text" class="text-5xl md:text-7xl font-extrabold text-white" style="text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 5px #ffc107;"></span>
        </div>

        <div id="mode-screen">
            <h2 class="text-3xl sm:text-4xl font-bold text-blue-600 mb-8">Choose Your Adventure</h2>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button id="one-player-btn" class="game-button bg-blue-600 text-white font-bold py-4 px-8 rounded-full hover:bg-blue-700 transition-transform transform hover:scale-105 shadow-lg">1 Player</button>
                <button id="two-player-btn" class="game-button bg-purple-600 text-white font-bold py-4 px-8 rounded-full hover:bg-purple-700 transition-transform transform hover:scale-105 shadow-lg">2 Players</button>
            </div>
        </div>

        <div id="level-screen" class="hidden">
            <h2 class="text-3xl sm:text-4xl font-bold text-blue-600 mb-8">Choose Your Level</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <button class="level-btn game-button bg-green-500 text-white font-bold py-4 px-8 rounded-full hover:bg-green-600" data-level="A1">A1</button>
                <button class="level-btn game-button bg-yellow-500 text-white font-bold py-4 px-8 rounded-full hover:bg-yellow-600" data-level="A2">A2</button>
                <button class="level-btn game-button bg-orange-500 text-white font-bold py-4 px-8 rounded-full hover:bg-orange-600" data-level="B1">B1</button>
                <button class="level-btn game-button bg-red-500 text-white font-bold py-4 px-8 rounded-full hover:bg-red-600" data-level="B2">B2</button>
                <button class="level-btn game-button bg-rose-500 text-white font-bold py-4 px-8 rounded-full hover:bg-rose-600 col-span-2 sm:col-span-1" data-level="C1">C1</button>
            </div>
        </div>

        <div id="start-screen" class="hidden">
            <h2 class="text-3xl sm:text-4xl font-bold text-blue-600 mb-4">Ready Up!</h2>
            <p class="text-gray-600 mb-6">Enter player name(s) to begin.</p>
            <div id="player-inputs" class="space-y-4">
                <input type="text" id="username1" placeholder="Player 1 Name" class="w-full max-w-xs mx-auto block px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-blue-500" required>
                <input type="text" id="username2" placeholder="Player 2 Name" class="w-full max-w-xs mx-auto block px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-purple-500 hidden" required>
            </div>
            <button id="start-btn" class="mt-8 game-button bg-green-500 text-white font-bold py-3 px-8 rounded-full hover:bg-green-600">Start Adventure</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="quiz-header" class="flex flex-wrap justify-between items-center font-semibold text-gray-700 mb-4 text-xs sm:text-sm gap-2">
                <div id="questions-remaining-display" class="bg-indigo-200 text-indigo-800 px-3 py-2 rounded-full">Questions Left: 50</div>
                <div id="question-timer-display" class="bg-yellow-400 text-yellow-900 font-bold px-3 py-2 rounded-full">Time: 10</div>
                <div id="main-timer-container" class="relative w-10 h-10">
                    <svg id="main-timer-svg" class="timer-svg w-full h-full" viewBox="0 0 36 36">
                        <path class="text-gray-300" stroke-width="4" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="main-timer-progress" class="timer-svg-circle text-red-500" stroke-width="4" fill="none" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <span id="main-timer-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold">10:00</span>
                </div>
            </div>
            <div id="progress-bar-container" class="w-full bg-gray-200 rounded-full h-2.5 mb-5"><div id="progress-bar" class="bg-green-500 h-2.5 rounded-full"></div></div>
            <div id="question-area" class="text-xl sm:text-2xl font-bold text-gray-800 mb-6 min-h-[64px]"></div>
            <div id="options-area" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div id="player-1-box" class="player-box border-2 border-blue-300 bg-blue-50/50 p-4 rounded-xl">
                    <div id="score-display" class="text-blue-800 font-bold text-lg mb-3">P1 Score: 0</div>
                    <div id="p1-options-container" class="space-y-3"></div>
                </div>
                <div id="player-2-box" class="player-box border-2 border-purple-300 bg-purple-50/50 p-4 rounded-xl hidden">
                    <div id="score-display-p2" class="text-purple-800 font-bold text-lg mb-3">P2 Score: 0</div>
                    <div id="p2-options-container" class="space-y-3"></div>
                </div>
            </div>
            <div id="feedback" class="mt-4 font-semibold min-h-[50px]"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h3 class="text-3xl sm:text-4xl font-bold text-blue-600 mb-4">Adventure Complete!</h3>
            <div id="winner-display" class="text-2xl font-bold text-green-600 mb-4"></div>
            <div id="final-scores" class="text-xl font-semibold text-gray-800 mb-6"></div>
            <div id="badges-container" class="flex justify-center items-center gap-4 sm:gap-8 my-8"></div>
            <div id="error-report" class="text-left mt-8 max-h-60 overflow-y-auto p-2 bg-gray-50 rounded-lg"></div>
            <div class="mt-8 flex justify-center gap-4">
                <button id="play-again-btn" class="game-button bg-blue-600 text-white font-bold py-3 px-8 rounded-full">Play Again</button>
                <button id="review-mistakes-btn" class="hidden game-button bg-yellow-500 text-white font-bold py-3 px-8 rounded-full">Review Mistakes</button>
            </div>
        </div>
    </div>

        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } }
        function playSound(type) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            
            let duration = 0.3; // Default duration
            
            switch (type) {
                case 'correct': 
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                    oscillator.type = 'sine'; 
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    oscillator.frequency.linearRampToValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                    oscillator.frequency.linearRampToValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                    break;
                case 'incorrect': 
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                    oscillator.type = 'square'; 
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                    oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.15); 
                    break;
                case 'finish': 
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                    oscillator.type = 'triangle'; 
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                    break;
                case 'click': 
                    gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
                    oscillator.type = 'triangle'; 
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                    duration = 0.1;
                    break;
                case 'transition': 
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                    oscillator.type = 'sawtooth'; 
                    oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); 
                    oscillator.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.2); 
                    duration = 0.2;
                    break;
                case 'badge': 
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                    oscillator.type = 'sine'; 
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                    duration = 0.5;
                    break;
            }
            
            oscillator.start(audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        }

        function displayBadges(score, mistakes, time) {
            dom.badgesContainer.innerHTML = `<div class="badge opacity-30" id="badge-virtuoso"><svg class="w-20 h-20 sm:w-24 sm:h-24 inline-block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9 9l-7 1 5 5-1 7 6-4 6 4-1-7 5-5-7-1z"></path></svg><p class="mt-2 font-bold text-blue-600">Virtuoso</p></div><div class="badge opacity-30" id="badge-perfect"><svg class="w-20 h-20 sm:w-24 sm:h-24 inline-block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><p class="mt-2 font-bold text-blue-600">Perfectionist</p></div><div class="badge opacity-30" id="badge-speed"><svg class="w-20 h-20 sm:w-24 sm:h-24 inline-block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg><p class="mt-2 font-bold text-blue-600">Speed Demon</p></div>`;
            if (score > 0) { document.getElementById('badge-virtuoso').classList.add('earned'); playSound('badge'); }
            if (mistakes === 0) { document.getElementById('badge-perfect').classList.add('earned'); playSound('badge'); }
            if ((TOTAL_TEST_TIME - totalTimeRemaining) < (gameQuestions.length * 5)) { document.getElementById('badge-speed').classList.add('earned'); playSound('badge'); }
            document.querySelectorAll('.badge.earned').forEach(badge => { badge.classList.remove('opacity-30'); badge.style.transform = 'scale(1.1) rotate(-5deg)'; });
        }

        function displayErrorReport() {
            const allMistakes = gameMode === '1p' ? incorrectAnswers[1] : [...incorrectAnswers[1], ...incorrectAnswers[2]];
            if (allMistakes.length > 0) {
                dom.reviewMistakesBtn.classList.remove('hidden');
                let errorHtml = '<h4 class="text-xl font-bold text-gray-800 mb-4">Review your answers:</h4>';
                if (incorrectAnswers[1].length > 0) {
                    errorHtml += `<h5 class="font-bold mt-4 mb-2 text-blue-700">${p1Name}'s Mistakes:</h5>`;
                    incorrectAnswers[1].forEach(item => { errorHtml += formatErrorItem(item); });
                }
                if (gameMode === '2p' && incorrectAnswers[2].length > 0) {
                    errorHtml += `<h5 class="font-bold mt-4 mb-2 text-purple-700">${p2Name}'s Mistakes:</h5>`;
                    incorrectAnswers[2].forEach(item => { errorHtml += formatErrorItem(item); });
                }
                dom.errorReportDiv.innerHTML = errorHtml;
            } else {
                dom.errorReportDiv.innerHTML = '<h4 class="text-xl font-bold text-green-600 text-center">Great job! No mistakes!</h4>';
            }
        }

        function formatErrorItem(item) { return `<div class="error-item mb-4 p-3 bg-gray-100 rounded-lg border-l-4 border-red-500"><strong class="text-gray-700">Q:</strong> ${item.question}<br><strong>Your answer:</strong> <span class="text-red-600 font-semibold">${item.chosen}</span><br><strong>Correct answer:</strong> <span class="text-green-600 font-semibold">${item.correct}</span></div>`; }
        
        function startReviewMode() {
            isReviewMode = true;
            const mistakes = [...new Set([...incorrectAnswers[1], ...incorrectAnswers[2]])]; // Unique mistakes
            gameQuestions = mistakes;
            currentQuestionIndex = 0;
            dom.resultScreen.classList.add('hidden');
            dom.quizScreen.classList.remove('hidden');
            dom.mainTimerContainer.classList.add('hidden');
            dom.questionTimerDisplay.classList.add('hidden');
            dom.scoreDisplayP1.textContent = "Review Mode";
            if (gameMode === '2p') dom.scoreDisplayP2.classList.add('hidden');
            displayQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; }
            return array;
        }
    </script>
</body>
</html>
