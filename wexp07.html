<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 7: The Sun and the Sea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Using a system font stack for broad compatibility and performance -->
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overscroll-behavior: none;
            transition: background-color 2s ease-in-out;
            background-color: #e0f2fe; /* Initial color for Unit 7 */
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes correctBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .menu-button, .nav-button, .action-button {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .menu-button:hover, .nav-button:hover, .action-button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .menu-button:active, .nav-button:active, .action-button:active {
            transform: translateY(-1px) scale(0.98);
        }
        .quiz-option {
            transition: all 0.2s ease-in-out;
            border: 2px solid #e5e7eb;
        }
        .quiz-option:hover:not(:disabled) {
            background-color: #dbeafe; /* light blue */
            border-color: #3b82f6; /* blue */
            transform: scale(1.02);
        }
        .feedback-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .feedback-modal.show { display: flex; }
        .feedback-modal-content.correct { animation: correctBounce 0.5s ease; }
        .matching-line {
            stroke: #60a5fa; stroke-width: 3; stroke-dasharray: 5;
            animation: drawLine 0.8s ease-out forwards; transition: all 0.3s ease;
        }
        @keyframes drawLine {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }
        .point-token {
            position: fixed; left: 50%; top: 50%; width: 20px; height: 20px;
            background-color: #facc15; border-radius: 50%; border: 2px solid #ca8a04;
            z-index: 200; transition: all 1s cubic-bezier(0.5, -0.5, 0.5, 1.5);
            pointer-events: none; opacity: 1;
        }
    </style>
</head>
<body class="antialiased text-gray-800 text-lg">

    <!-- Tone.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <!-- Navigation Header -->
    <header id="nav-header" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-sm shadow-sm" style="display: none;">
        <div class="max-w-4xl mx-auto p-2 flex justify-between items-center">
            <button onclick="goBack()" class="nav-button bg-white text-gray-700 font-bold py-2 px-4 rounded-full hover:bg-gray-200 flex items-center gap-2 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
            Back
            </button>
            <div class="font-bold text-xl text-blue-600">
                Score: <span id="score-display">0</span>
            </div>
            <button onclick="navigateTo(1)" class="nav-button bg-gray-800 text-white font-bold py-2 px-4 rounded-full hover:bg-gray-900 flex items-center gap-2 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L10 4.414l5.293 5.293a1 1 0 001.414-1.414l-7-7z" /><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm0 2a10 10 0 100-20 10 10 0 000 20z" /></svg>
              Home
            </button>
            <button onclick="goNext()" class="nav-button bg-blue-500 text-white font-bold py-2 px-4 rounded-full hover:bg-blue-600 flex items-center gap-2 text-lg">
            Next
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
            </button>
        </div>
    </header>

    <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pt-20">

        <!-- Page 0: Title Screen -->
        <section id="page-0" class="page active text-center bg-white rounded-2xl shadow-lg p-8">
            <div class="h-full flex flex-col justify-center items-center">
                <h1 class="text-5xl md:text-6xl font-bold text-blue-700 mb-4">Unit 7: The Sun and the Sea</h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-8">Engineering with Nature to Solve Water Scarcity</p>
                <svg viewBox="0 0 600 300" class="rounded-lg shadow-md mb-8 w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="skyGradient7" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1" />
                        </linearGradient>
                         <linearGradient id="seaGradient7" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="600" height="300" fill="url(#skyGradient7)"/>
                    <path d="M 0 200 C 150 150, 450 250, 600 200 L 600 300 L 0 300 Z" fill="url(#seaGradient7)"/>
                    <circle cx="100" cy="100" r="40" fill="#fef08a"/>
                    <path d="M 70 100 L 130 100" stroke="#fde047" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 100 70 L 100 130" stroke="#fde047" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 80 80 L 120 120" stroke="#fde047" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 120 80 L 80 120" stroke="#fde047" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 450 150 C 450 120, 500 120, 500 150 C 500 180, 475 210, 475 210 S 450 180, 450 150 Z" fill="#60a5fa" stroke="#dbeafe" stroke-width="3"/>
                </svg>
                <button onclick="startApp()" class="action-button bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-2xl hover:bg-blue-700">
                    START LESSON
                </button>
            </div>
        </section>

        <!-- Page 1: Main Menu -->
        <section id="page-1" class="page">
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-4xl font-bold text-center text-blue-700 mb-8">Main Menu</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <button onclick="navigateTo(301)" class="menu-button bg-sky-500 text-white p-6 rounded-xl text-xl font-semibold">💡 Vocabulary</button>
                    <button onclick="navigateTo(312)" class="menu-button bg-blue-500 text-white p-6 rounded-xl text-xl font-semibold">📖 Reading</button>
                    <button onclick="navigateTo(317)" class="menu-button bg-indigo-500 text-white p-6 rounded-xl text-xl font-semibold">🗣️ Conversation</button>
                    <button onclick="navigateTo(320)" class="menu-button bg-cyan-500 text-white p-6 rounded-xl text-xl font-semibold">🎙️ Podcast</button>
                    <button onclick="navigateTo(340)" class="menu-button bg-teal-500 text-white p-6 rounded-xl text-xl font-semibold">🎤 Lecture</button>
                    <button onclick="navigateTo(345)" class="menu-button bg-red-500 text-white p-6 rounded-xl text-xl font-semibold">🤔 Dilemmas</button>
                    <button onclick="navigateTo(353)" class="menu-button bg-emerald-500 text-white p-6 rounded-xl text-xl font-semibold">🎯 Mission</button>
                    <button onclick="navigateTo(350)" class="menu-button bg-rose-500 text-white p-6 rounded-xl text-xl font-semibold">📜 Unit Plan</button>
                </div>
            </div>
        </section>

        <!-- Container for ALL lesson pages -->
        <div id="dynamic-pages-container"></div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="feedback-modal">
        <div id="modal-content" class="feedback-modal-content text-center p-8 rounded-2xl shadow-2xl w-80">
            <div id="modal-icon" class="mb-4 text-6xl flex justify-center"></div>
            <h2 id="modal-title" class="text-4xl font-bold mb-4"></h2>
            <p id="modal-message" class="text-gray-600"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Game State ---
            let score = 0;
            const scoreDisplay = document.getElementById('score-display');
            let modalTimeout;

            const correctFeedback = ["That's right!", "You got it!", "Excellent!", "Perfect!", "Great thinking!", "Awesome!", "Nailed it!", "Superb!"];
            const incorrectFeedback = ["Not quite!", "Try again!", "Keep trying!", "You'll get the next one!"];
            
            // --- Dynamic Background ---
            const backgroundColors = ['#e0f2fe', '#dbeafe', '#e0e7ff', '#dcfce7', '#fef3c7', '#fce7f3'];
            let bgColorIndex = 0;
            setInterval(() => {
                bgColorIndex = (bgColorIndex + 1) % backgroundColors.length;
                document.body.style.backgroundColor = backgroundColors[bgColorIndex];
            }, 5000);

            // --- Score Animation ---
            function animatePoints(points) {
                const scoreEl = document.getElementById('score-display');
                const rect = scoreEl.getBoundingClientRect();
                const targetX = rect.left + rect.width / 2;
                const targetY = rect.top + rect.height / 2;

                for (let i = 0; i < points; i++) {
                    const token = document.createElement('div');
                    token.className = 'point-token';
                    document.body.appendChild(token);
                    
                    const startX = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
                    const startY = window.innerHeight / 2 + (Math.random() - 0.5) * 100;
                    token.style.transform = `translate(${startX - (window.innerWidth/2)}px, ${startY - (window.innerHeight/2)}px)`;

                    setTimeout(() => {
                        token.style.left = `${targetX}px`;
                        token.style.top = `${targetY}px`;
                        token.style.transform = 'scale(0.5)';
                        token.style.opacity = '0';
                    }, 50 + i * 30);

                    setTimeout(() => {
                        token.remove();
                    }, 1050 + i * 30);
                }
            }

            function updateScore(points) {
                score += points;
                animatePoints(points);
                setTimeout(() => {
                    scoreDisplay.textContent = score;
                }, 800);
            }

            // --- Audio & TTS Initialization ---
            let audioReady = false;
            let ttsInitialized = false;
            let synth;
            const synthTTS = window.speechSynthesis;
            let maleVoice = null;
            let femaleVoice = null;
            let britishMaleVoice = null;
            let isSpeakingDialogue = false;

            const voicesPromise = new Promise(resolve => {
                let voices = synthTTS.getVoices();
                if (voices.length > 0) {
                    resolve(voices);
                    return;
                }
                const onVoicesChanged = () => {
                    voices = synthTTS.getVoices();
                    if (voices.length > 0) {
                        resolve(voices);
                        synthTTS.onvoiceschanged = null;
                    }
                };
                synthTTS.onvoiceschanged = onVoicesChanged;
            });

            async function setupVoices() {
                console.log("Attempting to set up voices...");
                const voices = await voicesPromise;
                console.log(`Found ${voices.length} voices.`);
                if (voices.length === 0) {
                    console.error("No speech synthesis voices available on this browser.");
                    return;
                }

                const englishVoices = voices.filter(v => v.lang.startsWith('en'));
                
                femaleVoice = englishVoices.find(v => /female/i.test(v.name)) || englishVoices.find(v => v.default);
                maleVoice = englishVoices.find(v => /male/i.test(v.name) && !v.lang.startsWith('en-GB')) || englishVoices.find(v => v !== femaleVoice);
                
                const britishVoices = englishVoices.filter(v => v.lang.startsWith('en-GB'));
                britishMaleVoice = britishVoices.find(v => /male/i.test(v.name)) || britishVoices[0];

                if (!femaleVoice && englishVoices.length > 0) femaleVoice = englishVoices[0];
                if (!maleVoice && englishVoices.length > 0) maleVoice = englishVoices.find(v => v !== femaleVoice) || englishVoices[0];

                console.log("Selected Female Voice:", femaleVoice ? femaleVoice.name : "None");
                console.log("Selected Male Voice:", maleVoice ? maleVoice.name : "None");
                console.log("Selected British Male Voice:", britishMaleVoice ? britishMaleVoice.name : "None (will use standard male)");
            }

            window.startApp = async function() {
                if (!audioReady) {
                    try {
                        await Tone.start();
                        synth = new Tone.PolySynth(Tone.Synth).toDestination();
                        audioReady = true;
                        console.log("Audio context started successfully.");
                    } catch (e) {
                        console.error("Could not start audio context:", e);
                    }
                }

                if (!ttsInitialized && synthTTS) {
                    try {
                        await setupVoices();
                        ttsInitialized = true;
                        console.log("TTS Initialized by user action.");
                    } catch (e) {
                        console.error("Could not initialize TTS:", e);
                    }
                }
                navigateTo(1);
            }

            window.playCorrectSound = () => { if (audioReady) synth.triggerAttackRelease(["C5", "E5", "G5"], "8n"); };
            window.playIncorrectSound = () => { if (audioReady) synth.triggerAttackRelease("C3", "8n"); };

            function speak(text, voice) {
                return new Promise(resolve => {
                    if (!ttsInitialized) { console.warn("TTS not initialized."); resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.voice = voice;
                    utterance.rate = 0.85;
                    utterance.onend = resolve;
                    utterance.onerror = (e) => { console.error("Speech synthesis error:", e); resolve(); };
                    synthTTS.speak(utterance);
                });
            }

            async function speakDialogue(lines) {
                isSpeakingDialogue = true;
                for (const line of lines) {
                    if (!isSpeakingDialogue) break;
                    await speak(line.text, line.voice);
                }
                isSpeakingDialogue = false;
            }
            
            window.readDialogue = async function(buttonElement) {
                if (isSpeakingDialogue) {
                    isSpeakingDialogue = false;
                    synthTTS.cancel();
                    return;
                }

                const contentParent = buttonElement.closest('.page');
                const readableContent = contentParent.querySelector('.readable-content');
                if (!readableContent) return;
                
                const speakerVoices = {
                    'Chris': britishMaleVoice || maleVoice,
                    'Alex': maleVoice, 'Lecturer': maleVoice, 'Ali': maleVoice,
                    'Sarah': femaleVoice, 'Bella': femaleVoice
                };

                const lines = Array.from(readableContent.querySelectorAll('p')).map(p => {
                    const speakerTag = p.querySelector('strong');
                    if (speakerTag) {
                        const speakerName = speakerTag.textContent.replace(':', '').trim();
                        const text = p.innerText.replace(speakerTag.innerText, '').trim();
                        return { text, voice: speakerVoices[speakerName] || femaleVoice };
                    }
                    return null;
                }).filter(Boolean);

                speakDialogue(lines);
            }

            window.readText = function(buttonElement) {
                if (isSpeakingDialogue) {
                    isSpeakingDialogue = false;
                    synthTTS.cancel();
                }
                const readableContent = buttonElement.closest('.page').querySelector('.readable-content');
                if (readableContent) {
                    const textToSpeak = readableContent.innerText.replace(/________/g, 'blank');
                    speak(textToSpeak, femaleVoice);
                }
            }
            
            // --- State Management & Navigation ---
            let currentPage = 0;
            const pageSequence = [0, 1, 301, 302, 303, 304, 305, 306, 307, 308, 309, 310, 311, 312, 313, 314, 315, 316, 317, 318, 319, 320, 321, 322, 323, 324, 340, 341, 342, 343, 344, 345, 346, 350, 351, 352, 353, 354];
            const pageHistory = [0];

            window.navigateTo = function(pageNumber) {
                const targetPage = document.getElementById(`page-${pageNumber}`);
                if (!targetPage) {
                    console.error(`Page with ID 'page-${pageNumber}' not found.`);
                    return;
                }
                if (pageNumber === currentPage) return;

                const currentPageEl = document.getElementById(`page-${currentPage}`);
                if (currentPageEl) currentPageEl.classList.remove('active');
                targetPage.classList.add('active');
                currentPage = pageNumber;
                if (pageHistory[pageHistory.length - 1] !== currentPage) {
                        pageHistory.push(currentPage);
                }
                updateNavButtons();
                window.scrollTo(0, 0);
            }

            window.goNext = function() {
                const currentIndex = pageSequence.indexOf(currentPage);
                if (currentIndex > -1 && currentIndex < pageSequence.length - 1) {
                    navigateTo(pageSequence[currentIndex + 1]);
                }
            }

            window.goBack = function() {
                if (pageHistory.length > 1) {
                    pageHistory.pop(); 
                    const previousPage = pageHistory[pageHistory.length - 1];
                    const currentPageEl = document.getElementById(`page-${currentPage}`);
                    if(currentPageEl) currentPageEl.classList.remove('active');
                    const previousPageEl = document.getElementById(`page-${previousPage}`);
                    if(previousPageEl) previousPageEl.classList.add('active');
                    currentPage = previousPage;
                    updateNavButtons();
                    window.scrollTo(0, 0);
                }
            }

            function updateNavButtons() {
                const navHeader = document.getElementById('nav-header');
                if (!navHeader) return;
                const backButton = navHeader.querySelector('button:first-child');
                const nextButton = navHeader.querySelector('button:last-child');
                
                navHeader.style.display = (currentPage === 0) ? 'none' : 'flex';
                backButton.disabled = pageHistory.length <= 1;
                backButton.classList.toggle('opacity-50', backButton.disabled);
                
                const currentIndex = pageSequence.indexOf(currentPage);
                const isLastPageOfSequence = currentIndex === -1 || currentIndex >= pageSequence.length - 1;
                const isMainMenu = currentPage === 1;

                nextButton.disabled = isLastPageOfSequence || isMainMenu;
                nextButton.classList.toggle('opacity-50', nextButton.disabled);
            }
            
            // --- Interactive Quiz & Modal Logic ---
            const modal = document.getElementById('feedback-modal');
            const modalContent = document.getElementById('modal-content');
            const modalTitle = document.getElementById('modal-title');
            const modalIcon = document.getElementById('modal-icon');
            const modalMessage = document.getElementById('modal-message');

            function showModal(title, message, type = 'info') {
                modalContent.classList.remove('correct');
                modalMessage.textContent = message || '';

                if (type === 'correct') {
                    playCorrectSound();
                    modalIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
                    modalTitle.textContent = title;
                    modalTitle.className = 'text-4xl font-bold mb-4 text-green-500';
                    modalContent.className = 'feedback-modal-content text-center p-8 rounded-2xl shadow-2xl w-80 bg-green-50 correct';
                } else if (type === 'error') {
                    playIncorrectSound();
                    modalIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
                    modalTitle.textContent = title;
                    modalTitle.className = 'text-4xl font-bold mb-4 text-red-500';
                    modalContent.className = 'feedback-modal-content text-center p-8 rounded-2xl shadow-2xl w-80 bg-red-50';
                }
                modal.classList.add('show');
                
                clearTimeout(modalTimeout);
                modalTimeout = setTimeout(closeModal, 1500);
             }
             
            window.showFeedback = function(isCorrect, buttonElement) {
                const parent = buttonElement.closest('.quiz-option');
                const buttons = parent.querySelectorAll('button');
                buttons.forEach(btn => btn.disabled = true);

                if (isCorrect) {
                    const feedbackText = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
                    speak(feedbackText, femaleVoice);
                    buttonElement.classList.remove('bg-blue-500', 'bg-red-500', 'bg-gray-500');
                    buttonElement.classList.add('bg-green-500');
                    buttonElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
                    showModal('Correct!', `${feedbackText} (+10 points)`, 'correct');
                    updateScore(10);
                } else {
                    const feedbackText = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
                    speak(feedbackText, femaleVoice);
                    buttonElement.classList.remove('bg-blue-500', 'bg-red-500', 'bg-gray-500');
                    buttonElement.classList.add('bg-red-500');
                    buttonElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>`;
                    showModal('Try Again!', feedbackText, 'error');
                }
            }

            window.checkAnswer = function(button, isCorrect) {
                const questionGroup = button.closest('.question-group');
                const options = questionGroup.querySelectorAll('.quiz-option');

                options.forEach(opt => {
                    opt.disabled = true;
                });

                if (isCorrect) {
                    const feedbackText = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
                    speak(feedbackText, femaleVoice);
                    button.classList.remove('bg-white');
                    button.classList.add('bg-green-500', 'border-green-600', 'text-white');
                    button.innerHTML = `<span class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> ${button.textContent}</span>`;
                    showModal('Correct!', `${feedbackText} (+10 points)`, 'correct');
                    updateScore(10);
                } else {
                    const feedbackText = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
                    speak(feedbackText, femaleVoice);
                    button.classList.remove('bg-white');
                    button.classList.add('bg-red-500', 'border-red-600', 'text-white');
                    button.innerHTML = `<span class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg> ${button.textContent}</span>`;
                    
                    options.forEach(opt => {
                        if (opt.getAttribute('onclick').includes('true')) {
                            opt.classList.remove('bg-white');
                            opt.classList.add('bg-green-500', 'border-green-600', 'text-white');
                        }
                    });
                    showModal('Try Again!', feedbackText, 'error');
                }
            }
            
            window.closeModal = function() {
                clearTimeout(modalTimeout);
                modal.classList.remove('show');
            }

                    <section id="page-312" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-blue-700 mb-6">Reading: Pre-Reading 📖</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><ol class="list-decimal list-inside space-y-2"><li>Based on the keywords, draw a simple diagram showing how you think a solar still might work.</li><li>What materials do you think you would need to build a simple device to make fresh water from salt water?</li><li>Besides salt, what other things might need to be removed from water to make it safe to drink?</li></ol></div></div></section>
                    <section id="page-313" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-blue-700 mb-6">Reading Texts</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><h3 class="font-bold text-2xl text-blue-600">Making Fresh Water with the Sun</h3><p>In places with water scarcity, people need clean water. Seawater has high salinity, so it is not potable (safe to drink). A solar still is a simple box that uses the sun for water purification. The sun heats the salty water inside. This causes evaporation—the water turns into a gas (vapor) and the salt stays behind. The vapor touches a cool, clear lid. This causes condensation, and the vapor turns back into clean water drops. The drops run down the lid and are collected.</p><h3 class="font-bold text-2xl text-blue-600 mt-6">Solar Stills: A Simple Solution for Water Scarcity</h3><p>Many coastal communities face a critical paradox: they are surrounded by water, yet they lack safe, potable water due to the ocean’s high salinity. Desalination, the process of removing salt, is often expensive and requires a lot of energy. However, a simple, low-tech solution exists: the solar still. A solar still mimics the natural water cycle. A black basin filled with saltwater is covered by a tilted sheet of glass or clear plastic. Sunlight passes through the cover and heats the basin, causing evaporation. As the water turns to vapor, it leaves salts and other impurities behind. This pure water vapor rises and comes into contact with the cooler inner surface of the cover, where it undergoes condensation, forming droplets of pure, fresh water. Due to the tilt, these droplets run down to a collection channel, providing a slow but steady supply of clean water.</p><h3 class="font-bold text-2xl text-blue-600 mt-6">The Engineering Principles of Solar Desalination</h3><p>Addressing global water scarcity requires a diverse portfolio of solutions, from large-scale industrial plants to small, decentralized systems. Among the most sustainable of these is the solar still, a device that leverages the principles of thermodynamics for water purification. The efficiency of a solar still is determined by several key engineering factors. First, maximizing solar absorption is critical. A dark, insulated basin increases the rate of evaporation. Second, the temperature difference between the water vapor and the condensing surface must be maximized to promote rapid condensation. This is why the cover is often made of a material that allows sunlight in but does not retain as much heat as the basin. Third, the design must be perfectly sealed to prevent vapor from escaping. While a single-basin solar still is simple, its output is low. Advanced designs use multiple stages, pre-heating, or special materials to increase efficiency, making them a viable technology for providing potable water from seawater or brackish sources in off-grid, sun-rich environments.</p></div><div class="text-center mt-8"><button onclick="readText(this)" class="action-button bg-blue-500 text-white font-bold py-2 px-6 rounded-full">Read Aloud</button></div></div></section>

                    <section id="page-321" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Podcast: Vocabulary</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><ul class="space-y-3"><li><strong>Thermodynamics:</strong> The science of heat and energy flow</li><li><strong>Temperature gradient:</strong> Difference in temperature between two surfaces</li><li><strong>Multi-effect still:</strong> A more advanced solar still that reuses heat to improve efficiency</li><li><strong>Latent heat:</strong> Heat released when vapor turns into liquid</li><li><strong>Yield:</strong> The amount of clean water produced</li></ul></div></div></section>
                    <section id="page-322" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-cyan-700 mb-6">Podcast: Transcript 🎙️</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><p><strong>Alex:</strong> Hey everyone, Alex here, an environmental engineer from California. I've been fascinated lately by solar desalination, specifically using solar stills. How do you see these simple devices fitting into the future of water purification?</p><p><strong>Sarah:</strong> Hello Alex, I'm Sarah, a water resources expert from London. It's a great question. While they might seem basic, the fundamental principle of solar stills is quite elegant, isn't it? It's pure thermodynamics—using solar energy to evaporate water, leaving impurities behind, and then condensing the pure vapor. It's a natural process harnessed by design.</p><p><strong>Chris:</strong> G’Day, Alex and Sarah, Chris here, a material scientist from Sydney. I reckon the idea's got legs, especially for off-grid communities. But to make them work efficiently, you've got to maximize that solar absorption, eh? Using dark materials in the basin to soak up the sun's energy seems key. And keeping the glass cover clean is crucial too, so the sun can actually get through.</p><p><strong>Alex:</strong> Maximizing absorption makes sense, Chris. And Sarah, you mentioned condensation—isn't the temperature difference between the heated water and the cooler condensing surface, like the glass cover, really important for driving that condensation process?</p><p><strong>Sarah:</strong> Absolutely, Alex. A significant temperature gradient is vital. The hotter the water and the cooler the glass, the faster the vapor condenses into fresh water droplets. And Chris touched on another critical point—sealing. If the still isn't properly sealed, that precious vapor just escapes, drastically reducing efficiency. You need to prevent any leaks.</p><p><strong>Chris:</strong> Spongebob Sarah, sealing is fair dinkum important. I've seen setups fail just because of leaky seals. Now we've been talking mostly about simple single basin solar stills, which are straightforward but don't yield a heap of water. What about more advanced designs? I've heard of multi-effect stills that can produce a lot more. How do they work differently?</p><p><strong>Sarah:</strong> That's where the engineering gets more complex, Chris. Advanced designs, like multi-effect solar stills, essentially stack multiple stages. They use the latent heat released when vapor condenses in one stage to preheat the water in the next stage. This cascading effect increases the overall efficiency and water production significantly compared to a single basin. It's a clever way to reuse energy within the system.</p><p><strong>Alex:</strong> Precisely, Sarah. Multi-effect stills are a step up, but they are also more expensive and require more precise manufacturing. So while simple stills are great for basic household needs in sunny regions, these advanced designs could potentially be scaled up for small community use, where higher yields are necessary. It's about matching the technology to the need and the resources available.</p><p><strong>Chris:</strong> Right, so we've got the basic thermodynamics, the need for good absorption and temperature difference, crucial sealing, and the difference between simple and advanced designs. It seems like solar desalination—from basic stills to more complex systems—has a definite role to play in providing clean water, especially where conventional methods are impractical or energy intensive. A fair dinkum and promising technology, I reckon.</p></div><div class="text-center mt-8"><button onclick="readDialogue(this)" class="action-button bg-cyan-500 text-white font-bold py-2 px-6 rounded-full">Read Aloud</button></div></div></section>

                    <section id="page-340" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-teal-700 mb-6">Lecture: Warm-Up 🎤</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><ol class="list-decimal list-inside space-y-2"><li>Why is fresh water important for human life?</li><li>What do you know about desalination? How does it work?</li><li>How can solar energy be used to help solve water problems?</li><li>What do you think a “solar still” is?</li><li>Why might solar desalination be useful in poor or remote areas?</li></ol></div></div></section>
                    <section id="page-341" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-teal-700 mb-6">Lecture: Vocabulary</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><ul class="space-y-3"><li><strong>Scalability:</strong> Ability to grow or expand a technology for larger use</li></ul></div></div></section>
                    <section id="page-342" class="page"><div class="bg-white rounded-2xl shadow-lg p-8"><h2 class="text-4xl font-bold text-center text-teal-700 mb-6">Lecture: Transcript</h2><div class="readable-content text-xl leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><p><strong>Lecturer:</strong> Hello everyone and welcome. Today, we're diving into a topic that feels incredibly vital for our future: The Sun and the Sea, Solar Desalination. It's truly amazing how we can harness the power of the sun to create fresh water from salt water. In this lecture, we will explore the science and potential of this fascinating technology. First, we'll touch upon the critical need for fresh water and how solar desalination offers a hopeful alternative. Following that, we'll delve into the fundamental principles and various designs of solar stills, examining how they work. Finally, we will wrap up by discussing the challenges and the exciting prospects for scaling up this technology. Get ready for an insightful and inspiring exploration.</p><p><strong>Alex:</strong> Moving on, let's really understand the core science. The fundamental principle of solar desalination, especially in simple solar stills, is beautifully elegant. It's pure thermodynamics at play. We use solar energy to heat salt water in a basin. As the water heats up, it evaporates, leaving salts and impurities behind. It's like magic, isn't it? This process relies on maximizing solar absorption. Using dark materials in the basin floor helps to soak up as much sunlight as possible. Furthermore, the temperature difference between the hot water and a cooler condensing surface, typically a sloped glass cover, is absolutely crucial. The hotter the water and the cooler the glass, the more efficiently the water vapor will condense on the underside of that glass. And crucially, proper sealing is non-negotiable. Any leaks and that precious water vapor escapes, drastically reducing the freshwater yield. It's a real shame when that happens.</p><p><strong>Sarah:</strong> Building on Alex's points about the basics, let's look at the designs and scalability. While simple single-basin solar stills are straightforward and excellent for small-scale, off-grid use, providing maybe a few liters a day, which is a blessing in many places, their output is limited. Therefore, more advanced designs are being developed. For instance, multi-effect solar stills are incredibly clever. They capture the latent heat released during condensation in one stage to preheat the salt water in the next stage, effectively reusing energy and significantly boosting production. This feels like a brilliant step towards making solar desalination viable for larger applications. However, these advanced designs are more complex and expensive to manufacture. So while the potential for scaling up is exciting, we must also address the economic and manufacturing challenges to make this technology accessible to more communities.</p><p><strong>Lecturer:</strong> To wrap up this lecture, let's quickly review what we've covered. We began by emphasizing the urgent need for fresh water and positioning solar desalination as a promising, environmentally friendly solution. We then delved into the science, hearing from our experts about the fundamental thermodynamics, the importance of maximizing solar absorption, maintaining a temperature difference for condensation, and the critical need for effective sealing. These are truly vital engineering considerations. We also explored the difference between simple single-basin stills and the more efficient, but complex, advanced multi-effect designs. In conclusion, the sun and the sea is a powerful combination. Solar desalination, from simple stills to advanced systems, holds immense promise for providing clean water, particularly in water-scarce regions with abundant sunshine. It's a technology that fills me with hope for a more sustainable and equitable future. Thank you for joining me on this enlightening journey. I hope it has sparked your interest in the incredible potential of solar-powered water solutions.</p></div><div class="text-center mt-8"><button onclick="readDialogue(this)" class="action-button bg-teal-500 text-white font-bold py-2 px-6 rounded-full">Read Aloud</button></div></div></section>
