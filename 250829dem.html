<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP / A-Level Lesson Plan Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Corrected, browser-compatible library for Zhipu AI JWT generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsrsasign@11.1.0/lib/jsrsasign-all-min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .evidence-item {
            background-color: #f9fafb; /* bg-gray-50 */
            border-left: 3px solid #4f46e5; /* border-indigo-600 */
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 0.875rem;
            color: #374151; /* text-gray-700 */
        }
        #progress-bar {
            transition: width 0.4s ease-in-out;
        }
        /* Print-specific styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #lessonPlanOutput, #lessonPlanOutput * {
                visibility: visible;
            }
            #lessonPlanOutput {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none;
            }
            textarea {
                border: 1px solid #ccc !important;
                background-color: #fff !important;
                color: #000 !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <div class="container mx-auto p-4 sm:p-6 md:p-8">
        <header class="text-center mb-8 no-print">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900">AP / A-Level Lesson Plan Generator</h1>
        </header>

        <!-- Form for user input -->
        <div id="formContainer" class="form-container max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg border border-gray-200 no-print">
            <div class="space-y-6">
                <div>
                    <label for="curriculum" class="block text-sm font-medium text-gray-700 mb-1">Curriculum</label>
                    <select id="curriculum" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="AP">AP</option>
                        <option value="A-Level">A-Level</option>
                    </select>
                </div>

                <div>
                    <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                    <select id="subject" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="AP Psychology">AP Psychology</option>
                        <option value="AP Biology">AP Biology</option>
                        <option value="AP Microeconomics">AP Microeconomics</option>
                        <option value="AP Macroeconomics">AP Macroeconomics</option>
                        <option value="AP Calculus BC">AP Calculus BC</option>
                        <option value="AP Physics 1">AP Physics 1</option>
                        <option value="A-Level Mathematics">A-Level Mathematics</option>
                        <option value="A-Level Physics">A-Level Physics</option>
                    </select>
                </div>

                <div>
                    <label for="topic" class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                    <input type="text" id="topic" placeholder="e.g., Classical Conditioning or Fiscal Policy" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="deepseek-key" class="block text-sm font-medium text-gray-700 mb-1">DeepSeek API Key (BYOK)</label>
                        <input type="password" id="deepseek-key" placeholder="Enter your DeepSeek API key" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label for="zhipu-key" class="block text-sm font-medium text-gray-700 mb-1">Zhipu AI API Key (BYOK)</label>
                        <input type="password" id="zhipu-key" placeholder="Enter your Zhipu AI API key" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
                 <div>
                     <label for="gemini-key" class="block text-sm font-medium text-gray-700 mb-1">Gemini API Key (BYOK)</label>
                     <input type="password" id="gemini-key" placeholder="Enter your Gemini API key" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <div>
                    <label for="proxy-url" class="block text-sm font-medium text-gray-700 mb-1">Local Proxy URL</label>
                    <input type="text" id="proxy-url" value="http://localhost:3000/proxy" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <p class="text-xs text-gray-500 mt-1">Run the local server to bypass network restrictions.</p>
                </div>


                <div id="error-message" class="text-red-600 text-sm hidden"></div>

                <div>
                    <button id="generateBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition duration-300 ease-in-out transform hover:scale-105">
                        Generate Lesson Plan
                    </button>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progress-container" class="w-full max-w-2xl mx-auto bg-gray-200 rounded-full h-2.5 my-8 hidden no-print">
            <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div>
        </div>

        <!-- Container for the generated lesson plan -->
        <div id="lessonPlanOutput" class="lesson-plan-container max-w-6xl mx-auto mt-10">
            <!-- The generated lesson plan will be inserted here -->
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const lessonPlanOutput = document.getElementById('lessonPlanOutput');
        const errorMessage = document.getElementById('error-message');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        let progressInterval;

        // Event listener for the generate button
        generateBtn.addEventListener('click', async () => {
            const curriculum = document.getElementById('curriculum').value;
            const subject = document.getElementById('subject').value;
            const topic = document.getElementById('topic').value.trim();
            const deepSeekKey = document.getElementById('deepseek-key').value.trim();
            const zhipuKey = document.getElementById('zhipu-key').value.trim();
            const geminiKey = document.getElementById('gemini-key').value.trim();
            const proxyUrl = document.getElementById('proxy-url').value.trim();
            
            const prohibitedTopics = ['violence', 'hate speech', 'illegal acts', 'self-harm', 'explicit'];
            if (prohibitedTopics.some(keyword => topic.toLowerCase().includes(keyword))) {
                errorMessage.textContent = 'The topic is not allowed. Please choose a different topic.';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            if (!topic) {
                errorMessage.textContent = 'Please provide a topic.';
                errorMessage.classList.remove('hidden');
                return;
            }

            if (!deepSeekKey && !zhipuKey && !geminiKey) {
                errorMessage.textContent = 'Please provide at least one API key.';
                errorMessage.classList.remove('hidden');
                return;
            }
             if (!proxyUrl) {
                errorMessage.textContent = 'The local proxy URL is required. Please run the server and use the provided URL.';
                errorMessage.classList.remove('hidden');
                return;
            }
            errorMessage.classList.add('hidden');

            // UI updates for loading state
            lessonPlanOutput.innerHTML = '';
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'cursor-not-allowed');
            startProgressBar();

            try {
                let lessonData;
                if (deepSeekKey) {
                    lessonData = await getDeepSeekResponse(curriculum, subject, topic, deepSeekKey, proxyUrl);
                } else if (zhipuKey) {
                    lessonData = await getZhipuResponse(curriculum, subject, topic, zhipuKey, proxyUrl);
                } else if (geminiKey) {
                    lessonData = await getGeminiResponse(curriculum, subject, topic, geminiKey, proxyUrl);
                }

                if (lessonData) {
                    const lessonPlanHtml = generateLessonPlanContent(subject, topic, lessonData);
                    lessonPlanOutput.innerHTML = lessonPlanHtml;
                } else {
                     throw new Error("Received no data from AI.");
                }
            } catch (error) {
                console.error('Error generating lesson plan:', error);
                errorMessage.textContent = `${error.message}. Please check your API key and ensure your local proxy server is running.`;
                errorMessage.classList.remove('hidden');
            } finally {
                completeProgressBar();
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        // --- Progress Bar Functions ---
        function startProgressBar() {
            clearInterval(progressInterval);
            progressBar.style.width = '0%';
            progressContainer.classList.remove('hidden');
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += 5;
                if (progress <= 90) {
                    progressBar.style.width = `${progress}%`;
                } else {
                    clearInterval(progressInterval);
                }
            }, 150);
        }

        function completeProgressBar() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
            }, 500);
        }


        // --- AI Response Functions ---

        function getMasterPrompt(curriculum, subject, topic) {
             return `You are an expert instructional designer creating a 40-minute lesson plan for ${curriculum} ${subject} on the topic of "${topic}". Your response MUST be a single, valid JSON object, with no markdown formatting, comments, or any text outside of the JSON structure. The plan must be bilingual (English and Chinese) and based on Gagné's Nine Events of Instruction, focusing on mastering an exam-style question. For each of Gagné's events, select and list the most relevant indicators of an effective learning environment from the list below. **Learning Environment Indicators:** A. Equitable: A1. Differentiated opportunities. A2. Equal access. A3. Fair treatment. A4. Respect for differences. B. High Expectations: B1. Strive for high expectations. B2. Challenging but attainable. B3. Describe high-quality work. B4. Higher-order thinking. B5. Responsibility for learning. C. Supportive: C1. Positive community. C2. Take risks without fear. C3. Supported by teacher/peers. C4. Congenial relationship. D. Active: D1. Student discussions predominate. D2. Real-life connections. D3. Actively engaged. D4. Peer collaboration. E. Progress Monitoring: E1. Monitor own progress. E2. Receive/respond to feedback. E3. Demonstrate understanding. E4. Explain assessment. F. Well-Managed: F1. Respectful interactions. F2. Follow rules. F3. Smooth transitions. F4. Purposeful use of time. G. Digital: G1. Use tools to gather/evaluate info. G2. Use tools to solve problems/create. G3. Use tools to communicate/collaborate. Generate a bilingual word bank of 10 essential keywords. The entire output must conform to the following JSON structure: { "officialQuestion": {"english": "...", "chinese": "..."}, "aiGeneratedQuestion": {"english": "...", "chinese": "..."}, "wordBank": [{"english": "...", "chinese": "..."}, ...], "objectives": [{"english": "...", "chinese": "..."}, ...], "materials": [{"english": "...", "chinese": "..."}, ...], "gagneEvents": [{"eventNumber": 1, "eventName": "...", "timing": "...", "activity": {...}, "teacherStudentTalk": {...}, "evidence": [{"code": "...", "text": {...}}]}, ...], "inquiryQuestions": [{"english": "...", "chinese": "..."}, ...], "criticalThinkingQuestions": [{"english": "...", "chinese": "..."}, ...], "exitTicket": {"question": {...}}, "differentiation": {"scaffolds": [...], "extensions": [...]}, "rubric": [{"score": "5 - Exemplary / 典范", "criteria": {...}}], "homework": {"assignment": {...}} }`;
        }
        
        function generateZhipuToken(apiKey) {
            const parts = apiKey.split('.');
            if (parts.length !== 2) {
                throw new Error('Invalid Zhipu API Key format. Expected id.secret');
            }
            const id = parts[0];
            const secret = parts[1];
            const header = { alg: 'HS256', sign_type: 'SIGN' };
            const now = new Date().getTime();
            const payload = { api_key: id, exp: now + 3600 * 1000, timestamp: now };
            return KJUR.jws.JWS.sign('HS256', JSON.stringify(header), JSON.stringify(payload), secret);
        }

        function parseJsonFromText(text) {
            try {
                const startIndex = text.indexOf('{');
                const endIndex = text.lastIndexOf('}');
                if (startIndex === -1 || endIndex === -1) {
                    throw new Error("No JSON object found in the response.");
                }
                const jsonString = text.substring(startIndex, endIndex + 1);
                return JSON.parse(jsonString);
            } catch (error) {
                console.error("JSON Parsing Error:", error);
                throw new Error("Failed to parse JSON from the AI response.");
            }
        }
        
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 25000 } = options; // 25-second timeout
            
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);

            const response = await fetch(resource, {
                ...options,
                signal: controller.signal  
            });
            clearTimeout(id);
            return response;
        }


        async function getDeepSeekResponse(curriculum, subject, topic, apiKey, proxyUrl) {
            const prompt = getMasterPrompt(curriculum, subject, topic);
            
            try {
                const payload = {
                    apiUrl: 'https://api.deepseek.com/chat/completions',
                    payload: { model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], response_format: { type: 'json_object' } },
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }
                };
                const response = await fetchWithTimeout(proxyUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (!response.ok) {
                    const errorBody = await response.json();
                    throw new Error(`DeepSeek API error (via proxy)! Status: ${response.status}. Message: ${errorBody.error.message}`);
                }
                const result = await response.json();
                return parseJsonFromText(result.choices[0].message.content);
            } catch (error) {
                if (error.name === 'AbortError') throw new Error('Request to DeepSeek timed out.');
                throw error;
            }
        }

        async function getZhipuResponse(curriculum, subject, topic, apiKey, proxyUrl) {
            const prompt = getMasterPrompt(curriculum, subject, topic);
            try {
                const token = generateZhipuToken(apiKey);
                const payload = {
                    apiUrl: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
                    payload: { model: 'glm-4', messages: [{ role: 'user', content: prompt }] },
                    headers: { 'Content-Type': 'application/json', 'Authorization': token }
                };
                const response = await fetchWithTimeout(proxyUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (!response.ok) {
                    const errorBody = await response.json();
                    throw new Error(`Zhipu AI API error (via proxy)! Status: ${response.status}. Message: ${errorBody.error.message}`);
                }
                const result = await response.json();
                return parseJsonFromText(result.choices[0].message.content);
            } catch (error) {
                 if (error.name === 'AbortError') throw new Error('Request to Zhipu AI timed out.');
                 throw error;
            }
        }

        async function getGeminiResponse(curriculum, subject, topic, apiKey, proxyUrl) {
            const prompt = getMasterPrompt(curriculum, subject, topic);
            const schema = { type: "OBJECT", properties: { officialQuestion: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } }, aiGeneratedQuestion: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } }, wordBank: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, objectives: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, materials: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, gagneEvents: { type: "ARRAY", items: { type: "OBJECT", properties: { eventNumber: { type: "NUMBER" }, eventName: { type: "STRING" }, timing: { type: "STRING" }, activity: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } }, teacherStudentTalk: { type: "OBJECT", properties: { teacher: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } }, student: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } }, evidence: { type: "ARRAY", items: { type: "OBJECT", properties: { code: { type: "STRING" }, text: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } } } } } }, inquiryQuestions: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, criticalThinkingQuestions: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, exitTicket: { type: "OBJECT", properties: { question: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } }, differentiation: { type: "OBJECT", properties: { scaffolds: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } }, extensions: { type: "ARRAY", items: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } } }, rubric: { type: "ARRAY", items: { type: "OBJECT", properties: { score: { type: "STRING" }, criteria: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } } }, homework: { type: "OBJECT", properties: { assignment: { type: "OBJECT", properties: { english: { type: "STRING" }, chinese: { type: "STRING" } } } } } } };
            
            try {
                 const payload = {
                    apiUrl: `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
                    payload: { contents: [{ role: "user", parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json", responseSchema: schema } },
                    headers: { 'Content-Type': 'application/json' }
                };
                const response = await fetchWithTimeout(proxyUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) {
                    const errorBody = await response.json();
                    throw new Error(`Gemini API error (via proxy)! Status: ${response.status}. Message: ${errorBody.error.message}`);
                }
                const result = await response.json();
                if (result.candidates?.[0]?.content?.parts?.[0]) {
                    return parseJsonFromText(result.candidates[0].content.parts[0].text);
                } else { throw new Error("Invalid response structure from Gemini AI."); }
            } catch (error) {
                 if (error.name === 'AbortError') throw new Error('Request to Gemini timed out.');
                 throw error;
            }
        }

        function generateLessonPlanContent(subject, topic, data) {
            // Defensive coding: use fallback empty arrays to prevent 'map' of undefined error
            const objectives = (data.objectives || []).map(o => `<li>${o.english}<br><span class="text-sm text-gray-600">${o.chinese}</span></li>`).join('');
            const materials = (data.materials || []).map(m => `<li>${m.english}<br><span class="text-sm text-gray-600">${m.chinese}</span></li>`).join('');
            const wordBankHtml = `<ul class="grid grid-cols-2 md:grid-cols-3 gap-4 text-gray-700">${(data.wordBank || []).map(w => `<li class="bg-gray-50 p-3 rounded-lg border border-gray-200"><strong>${typeof w === 'string' ? w : w.english}</strong><br><span class="text-sm text-gray-600">${w.chinese || ''}</span></li>`).join('')}</ul>`;
            const procedure = (data.gagneEvents || data.procedure || []).map(e => `<tr><td class="p-4 border border-gray-300 align-top w-[15%]"><strong>(${e.timing || 'N/A'})</strong><br><span class="text-xs text-indigo-600">${e.eventName ? `Gagné ${e.eventNumber}: ${e.eventName}` : ''}</span></td><td class="p-4 border border-gray-300 align-top w-[85%]"><h4 class="font-bold text-lg mb-2">${e.activity.english} / ${e.activity.chinese}</h4>${e.teacherStudentTalk ? `<div class="mb-4"><h5 class="font-semibold mb-2">Teacher & Student Talk</h5><p class="text-sm"><strong>Teacher:</strong> ${e.teacherStudentTalk.teacher.english}<br><span class="text-xs text-gray-500">${e.teacherStudentTalk.teacher.chinese}</span></p><p class="text-sm"><strong>Student:</strong> ${e.teacherStudentTalk.student.english}<br><span class="text-xs text-gray-500">${e.teacherStudentTalk.student.chinese}</span></p></div>` : ''}<div>${e.evidence ? `<h5 class="font-semibold mb-2">Evidence of Effective Learning Environments</h5>${(e.evidence || []).map(ev => `<div class="evidence-item"><strong>[${ev.code}] ${ev.text.english}</strong><br><span class="text-xs text-gray-500">${ev.text.chinese}</span></div>`).join('')}` : ''}</div></td></tr>`).join('');
            const exitTicket = `<p class="text-gray-700 mb-2"><strong>Question:</strong></p><div class="bg-gray-50 p-4 rounded-lg border border-gray-200"><p>${data.exitTicket?.question?.english || ''}</p><p class="mt-2 text-sm text-gray-600">${data.exitTicket?.question?.chinese || ''}</p></div>`;
            const differentiation = `<h4 class="font-semibold text-gray-800 mb-2">Scaffolds for Support</h4><ul class="list-disc list-inside space-y-2 text-gray-700 mb-4">${(data.differentiation?.scaffolds || []).map(s => `<li>${s.english}<br><span class="text-sm text-gray-600">${s.chinese}</span></li>`).join('')}</ul><h4 class="font-semibold text-gray-800 mb-2">Extensions for Challenge</h4><ul class="list-disc list-inside space-y-2 text-gray-700">${(data.differentiation?.extensions || []).map(e => `<li>${e.english}<br><span class="text-sm text-gray-600">${e.chinese}</span></li>`).join('')}</ul>`;
            const inquiryAndCritical = `<h4 class="font-semibold text-gray-800 mb-2">Inquiry Questions</h4><ul class="list-disc list-inside space-y-2 text-gray-700 mb-4">${(data.inquiryQuestions || []).map(q => `<li>${q.english}<br><span class="text-sm text-gray-600">${q.chinese}</span></li>`).join('')}</ul><h4 class="font-semibold text-gray-800 mb-2">Critical Thinking Questions</h4><ul class="list-disc list-inside space-y-2 text-gray-700">${(data.criticalThinkingQuestions || []).map(q => `<li>${q.english}<br><span class="text-sm text-gray-600">${q.chinese}</span></li>`).join('')}</ul>`;
            const filteredRubricData = (data.rubric || []).filter(r => !r.score.startsWith('4 -') && !r.score.startsWith('3 -') && !r.score.startsWith('2 -') && !r.score.startsWith('1 -'));
            const rubric = `<table class="w-full border-collapse border border-gray-300">${filteredRubricData.map(r => `<tr><td class="p-3 border border-gray-300 font-bold bg-gray-100 w-1/4 align-top">${r.score}</td><td class="p-3 border border-gray-300">${r.criteria.english}<br><span class="text-sm text-gray-600">${r.criteria.chinese}</span></td></tr>`).join('')}</table>`;
            const homework = `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200"><p>${data.homework?.assignment?.english || ''}</p><p class="mt-2 text-sm text-gray-600">${data.homework?.assignment?.chinese || ''}</p></div>`;
            const reflection = `<ul class="list-disc list-inside space-y-3 text-gray-700"><li><strong>What went well?</strong><br><span class="text-sm text-gray-600">Which group's collaborative document was strongest and why? Did the peer feedback lead to meaningful revisions?</span></li><li><strong>What could be improved?</strong><br><span class="text-sm text-gray-600">Which part of the exam question did most students struggle with? Was the timing for each activity appropriate?</span></li><li><strong>Next Steps?</strong><br><span class="text-sm text-gray-600">Based on the exit ticket data, what follow-up activity is needed? Do we need to review a specific concept or skill?</span></li></ul>`;
            const teacherChecklist = `<table class="w-full border-collapse border border-gray-300"><thead><tr class="bg-gray-100"><th class="p-3 border border-gray-300 text-left w-1/2">Preparation Task</th><th class="p-3 border border-gray-300 text-left w-1/2">Notes</th></tr></thead><tbody><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">A. Equitable Environment</td></tr><tr><td class="p-2 border border-gray-300">Prepare both digital and physical copies of the exam question handout.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">B. High Expectations Environment</td></tr><tr><td class="p-2 border border-gray-300">Review the official AP/A-Level rubric for the selected question.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">C. Supportive Environment</td></tr><tr><td class="p-2 border border-gray-300">Pre-assign student groups to ensure mixed abilities.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">D. Active Environment</td></tr><tr><td class="p-2 border border-gray-300">Set up collaborative digital documents for each group.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">E. Progress Monitoring & Feedback Environment</td></tr><tr><td class="p-2 border border-gray-300">Prepare the Peer Feedback Protocol sheet with clear instructions.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">F. Well-Managed Environment</td></tr><tr><td class="p-2 border border-gray-300">Have timers ready for each segment of the lesson.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr><tr><td class="p-2 border border-gray-300 font-bold bg-gray-50" colspan="2">G. Digital Environment</td></tr><tr><td class="p-2 border border-gray-300">Create and test the link for the digital Exit Ticket.</td><td class="p-2 border border-gray-300"><textarea class="w-full p-1 border border-gray-200 rounded-md focus:ring-1 focus:ring-indigo-500" rows="1" placeholder="Notes..."></textarea></td></tr></tbody></table>`;
            const fullLessonPlan = `<div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-200"><div class="flex justify-between items-center mb-8"><div><h2 class="text-2xl md:text-3xl font-bold text-gray-900">${subject}: ${topic}</h2><p class="text-gray-600">40-Minute Lesson Plan</p></div><button onclick="window.print()" class="no-print bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-lg hover:bg-indigo-200 transition">Print / Save as PDF</button></div><div class="space-y-8"><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Learning Objectives</h3><ul class="list-disc list-inside space-y-2 text-gray-700">${objectives}</ul></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Suggested Word Bank</h3>${wordBankHtml}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Materials & Resources</h3><ul class="list-disc list-inside space-y-2 text-gray-700">${materials}</ul></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Lesson Procedure (Gagné's 9 Events)</h3><div class="overflow-x-auto"><table class="w-full border-collapse border border-gray-300"><tbody class="text-gray-800">${procedure}</tbody></table></div></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Inquiry & Critical Thinking Questions</h3>${inquiryAndCritical}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Differentiation Strategies</h3>${differentiation}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Scoring Rubric</h3>${rubric}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Exit Ticket (Assess Performance)</h3>${exitTicket}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Suggested Homework</h3>${homework}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Teacher Self-Reflection</h3>${reflection}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Teacher Pre-Lesson Checklist</h3>${teacherChecklist}</div></div></div>`;
            
            // Simplified template for when the full structure isn't returned
            const simplifiedLessonPlan = `<div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-200"><div class="flex justify-between items-center mb-8"><div><h2 class="text-2xl md:text-3xl font-bold text-gray-900">${subject}: ${topic}</h2><p class="text-gray-600">40-Minute Lesson Plan</p></div><button onclick="window.print()" class="no-print bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-lg hover:bg-indigo-200 transition">Print / Save as PDF</button></div><div class="space-y-8"><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Learning Objectives</h3><ul class="list-disc list-inside space-y-2 text-gray-700">${objectives}</ul></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Suggested Word Bank</h3>${wordBankHtml}</div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Materials & Resources</h3><ul class="list-disc list-inside space-y-2 text-gray-700">${materials}</ul></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Lesson Procedure</h3><div class="overflow-x-auto"><table class="w-full border-collapse border border-gray-300"><tbody class="text-gray-800">${procedure}</tbody></table></div></div><div><h3 class="text-xl font-semibold border-b-2 border-indigo-500 pb-2 mb-4 text-gray-800">Exit Ticket (Assess Performance)</h3>${exitTicket}</div></div></div>`;

            // Use the full template only if the detailed fields are present
            if (data.gagneEvents && data.rubric) {
                return fullLessonPlan;
            } else {
                return simplifiedLessonPlan;
            }
        }
    </script>
</body>
