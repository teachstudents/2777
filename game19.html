<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clothing Choices Listen-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
  <style>
    :root {
      --bg-main: #2d3436;
      --bg-container: #5c5c5c;
      --primary-color: #ff8c42;
      --primary-dark: #ff6b00;
      --text-light: #f5f5f5;
      --text-dark: #ffcc00;
      --border-color: #7d7d7d;
      --correct-color: #7cfc00;
      --incorrect-color: #ff4757;
      --gold-color: #ffd700;
      --accent-cyan: #4ecdc4;
    }

    @keyframes background-pan {
        0% { background-color: #2d3436; }
        20% { background-color: #0c2461; }
        40% { background-color: #4a69bd; }
        60% { background-color: #1e3799; }
        80% { background-color: #3a3a3a; }
        100% { background-color: #2d3436; }
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      color: var(--text-light);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: background-pan 90s linear infinite;
      position: relative;
      overflow-x: hidden;
    }
    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }
    .screen {
      display: none;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem;
      box-sizing: border-box;
      text-align: center;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: var(--primary-color);
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      margin-bottom: 1rem;
    }
    h2 {
      color: var(--text-dark);
      margin: 1rem 0 0.5rem;
    }
    label {
      font-size: 1.1rem;
      color: var(--accent-cyan);
      margin-bottom: 0.5em;
      font-weight: bold;
    }
    input[type="text"] {
      padding: 0.7em 1em;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-container);
      color: var(--text-light);
      font-size: 1.1rem;
      outline: none;
      width: 90%;
      max-width: 400px;
      margin-bottom: 1.5em;
      text-align: center;
    }
    input[type="text"]:focus {
      border-color: var(--primary-color);
    }
    button, .option-btn {
      background: var(--primary-color);
      color: var(--bg-main);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0.8em 2em;
      margin: 0.5em 0.25em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      min-width: 120px;
    }
    button:focus, .option-btn:focus {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 2px;
    }
    button:hover, .option-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    .level-selection {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 1.5em;
    }
    .level-btn {
        background: var(--bg-container);
        color: var(--text-light);
        border: 2px solid var(--border-color);
        padding: 0.6em 1.2em;
    }
    .level-btn.selected {
        background: var(--accent-cyan);
        color: var(--bg-main);
        border-color: var(--accent-cyan);
        transform: scale(1.05);
    }
    .option-btn {
      display: block;
      width: 100%;
      margin: 0.5em 0;
      min-height: 3em;
      text-align: center;
      color: var(--text-light);
      background: rgba(0,0,0,0.15);
      border: 2px solid var(--border-color);
      border-radius: 10px;
    }
    .option-btn.correct {
      background: var(--correct-color);
      color: #222;
      border-color: var(--correct-color);
      animation: pulse-correct 0.5s;
    }
    @keyframes pulse-correct {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    .option-btn.incorrect {
      background: var(--incorrect-color);
      color: #fff;
      border-color: var(--incorrect-color);
    }
    .hud {
      width: 100%;
      background: rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: space-around;
      align-items: center;
      margin: 1em 0 1.5em 0;
      padding: 0.5em 1em;
      border-radius: 8px;
      font-size: 1em;
    }
    .hud-item span {
      color: var(--text-light);
      font-weight: bold;
    }
    .progress-bar-container {
      width: 100%;
      background: rgba(0,0,0,0.25);
      height: 14px;
      border-radius: 8px;
      margin-bottom: 1em;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff8c42, #ffcc00, #7cfc00, #4ecdc4);
      transition: width 0.4s;
      width: 100%;
    }
    .feedback-display {
      font-size: 1.5em;
      min-height: 2em;
      margin: 0.5em 0;
      font-weight: bold;
    }
    .feedback-correct { color: var(--correct-color);}
    .feedback-incorrect { color: var(--incorrect-color);}
    #challenge-script em {
        color: var(--accent-cyan);
        font-size: 0.9em;
    }
    .results-container {
      background: var(--bg-container);
      padding: 1.5em 1em;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      margin: 1em auto;
      color: var(--text-light);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1em;
    }
    .stat-item h4 { color: var(--accent-cyan); margin: 0 0 0.5em 0; font-size: 1em;}
    .stat-item p { font-size: 1.3em; font-weight: bold; margin:0;}
    .badges-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5em;
      justify-content: center;
      margin-top: 0.5em;
    }
    .badge {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.5em;
      text-align: center;
      width: 75px;
    }
    .badge-icon { font-size: 1.5em;}
    .badge-name { font-size: 0.85em;}
    #feature-warning, #error-message {
      color: #fff;
      background: #e53935;
      padding: 0.5em 1em;
      border-radius: 6px;
      margin: 1em 0;
      font-weight: bold;
      display: none;
      text-align: center;
      max-width: 700px;
    }
    #leaderboard-list {
        list-style: none;
        padding: 0;
        text-align: left;
    }
    #leaderboard-list li {
        background: rgba(0,0,0,0.2);
        padding: 0.75em;
        border-radius: 6px;
        margin-bottom: 0.5em;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }
     #leaderboard-list li span {
        display: inline-block;
     }
    .leaderboard-rank { font-size: 1.2em; color: var(--primary-color); width: 30px;}
    .leaderboard-name { flex-grow: 1; }
    .leaderboard-level { background: var(--accent-cyan); color: var(--bg-main); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 10px;}
    .leaderboard-score { color: var(--gold-color); margin-right: 10px;}
    .leaderboard-time { color: var(--text-light); font-size: 0.9em; }

    .token {
        position: fixed;
        width: 20px;
        height: 20px;
        background-color: var(--gold-color);
        border-radius: 50%;
        border: 2px solid #fff;
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        animation: fly-to-score 1s ease-out forwards;
    }

    @keyframes fly-to-score {
        0% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            opacity: 0;
            transform: scale(0.2);
            top: var(--target-y);
            left: var(--target-x);
        }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .screen { padding: 1.5rem 0.5rem;}
      .results-container { padding: 1em 0.5em;}
      .stats-grid { grid-template-columns: 1fr;}
      .hud { font-size: 0.9em;}
      .badge { width: 65px;}
    }
  </style>
</head>
<body>
  <main>
    <div id="feature-warning"></div>
    <!-- START SCREEN -->
    <form id="start-form" class="screen active" autocomplete="off">
      <h1>Clothing Choices</h1>
      <p style="color: var(--text-dark); max-width: 500px">Listen to the situation and choose the best outfit. Answer 50 questions to win!</p>
      
      <label for="player-name-input">Player Name</label>
      <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="20" autocomplete="off" aria-label="Player Name">
      
      <label>Select Level (CEFR)</label>
      <div id="level-selection" class="level-selection">
          <button type="button" class="level-btn" data-level="A1">A1</button>
          <button type="button" class="level-btn" data-level="A2">A2</button>
          <button type="button" class="level-btn" data-level="B1">B1</button>
          <button type="button" class="level-btn" data-level="B2">B2</button>
          <button type="button" class="level-btn" data-level="C1">C1</button>
      </div>
      <input type="hidden" id="selected-level-input">
      <div id="error-message"></div>

      <button type="submit" id="start-game-btn">Start Game</button>
    </form>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen" role="main" aria-live="polite">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="hud" id="hud">
        <div class="hud-item">Player: <span id="hud-player">?</span></div>
        <div class="hud-item" id="score-hud-item">Score: <span id="hud-score">0</span></div>
        <div class="hud-item">Level: <span id="hud-level">A1</span></div>
        <div class="hud-item">Correct: <span id="hud-correct">0/50</span></div>
        <div class="hud-item">Time: <span id="hud-time">10:00</span></div>
        <div class="hud-item">Question: <span id="hud-question">1/50</span></div>
      </div>
      <div class="feedback-display" id="feedback"></div>
      <div id="challenge-script" style="font-size:1.2em; margin-bottom:1em; min-height: 3em;"></div>
      <div id="options-container"></div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen" role="main">
      <h1 id="end-title">Game Over</h1>
      <div class="results-container">
        <h2 id="final-name">Player</h2>
        <div class="stats-grid">
          <div class="stat-item"><h4>Score</h4><p id="final-score">0</p></div>
          <div class="stat-item"><h4>Time Taken</h4><p id="final-time">00:00</p></div>
          <div class="stat-item"><h4>Correct</h4><p id="final-correct">0/50</p></div>
          <div class="stat-item"><h4>Accuracy</h4><p id="final-accuracy">0%</p></div>
        </div>
        <h4>Badges Earned</h4>
        <div class="badges-grid" id="final-badges"></div>
      </div>
      
      <div class="results-container" id="leaderboard-container">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list"></ol>
      </div>

      <button id="play-again-btn">Play Again</button>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script>
    // --- Feature Detection & User Feedback ---
    function checkFeatures() {
      let msg = '';
      if (!('speechSynthesis' in window)) msg += 'Speech Synthesis not supported. ';
      if (typeof Tone === 'undefined') msg += 'Sounds disabled (Tone.js not loaded). ';
      if (msg) {
        $('feature-warning').textContent = msg;
        $('feature-warning').style.display = 'block';
      }
    }
    checkFeatures();

    // --- Data & Utility Functions ---
    const badgeData = {
      'A1_COMPLETE': { name: 'A1 Stylist', icon: '👕' }, 'A2_COMPLETE': { name: 'A2 Designer', icon: '👖' },
      'B1_COMPLETE': { name: 'B1 Fashionista', icon: '👗' }, 'B2_COMPLETE': { name: 'B2 Trendsetter', icon: '🌟' },
      'C1_COMPLETE': { name: 'C1 Style Icon', icon: '👑'},
      'STREAK_5': { name: 'Hot Streak', icon: '👍'},
      'STREAK_10': { name: 'Top Model', icon: '🔥' }, 
      'PERFECT_LEVEL': { name: 'Perfect Fit', icon: '🎯' },
      'GAME_COMPLETE': { name: 'Fashion Guru', icon: '🧑‍⚖️' },
      'QUICK_THINKER': { name: 'Quick Change', icon: '⚡️' }
    };

    const correctFeedback = ["Great choice!", "Perfect match!", "You've got style!", "Excellent!", "Looks great!", "You're on fire!"];
    const incorrectFeedback = ["Not quite the right fit!", "Close one!", "Keep trying!", "Don't give up!", "You'll get the next one!"];
    
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function formatClothingName(color, clothing) {
        const pairItems = ["pants", "shoes", "shorts", "jeans", "trousers", "gloves", "boots", "loafers", "sandals", "sneakers", "flats", "culottes", "espadrilles", "oxfords", "leggings", "chinos", "socks"];
        const vowels = ['a', 'e', 'i', 'o', 'u'];
        
        if (pairItems.includes(clothing)) {
            return `a pair of ${color} ${clothing}`;
        }

        if (vowels.includes(color.charAt(0))) {
            return `an ${color} ${clothing}`;
        }

        return `a ${color} ${clothing}`;
    }

    function generateClothingData() {
        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        const WEATHER = ["sunny", "cloudy", "rainy", "windy", "cold", "warm", "chilly", "hot", "foggy", "humid"];
        
        const COLORS = {
            A1: ["red", "blue", "green", "yellow", "black", "white"],
            A2: ["purple", "orange", "brown", "pink", "gray", "silver"],
            B1: ["navy", "maroon", "teal", "beige", "olive", "cream"],
            B2: ["indigo", "crimson", "charcoal", "ivory", "khaki", "fuchsia"],
            C1: ["magenta", "cyan", "chartreuse", "vermilion", "taupe", "cerulean"]
        };

        const CLOTHING = {
            A1: ["shirt", "pants", "hat", "shoes", "coat", "socks", "t-shirt", "cap"],
            A2: ["jacket", "dress", "skirt", "shorts", "jeans", "sweater", "sweatshirt", "sneakers"],
            B1: ["blouse", "trousers", "boots", "scarf", "gloves", "cardigan", "leggings", "beanie", "flats"],
            B2: ["blazer", "trench coat", "vest", "loafers", "sandals", "hoodie", "polo shirt", "chinos", "bomber jacket"],
            C1: ["peacoat", "culottes", "espadrilles", "bolero", "windbreaker", "turtleneck", "ascot", "blouson", "oxfords"]
        };

        const templates = [
            "Okay, it's [DAY] and it looks pretty [WEATHER] outside. I think [D1] is a bit much. I'll go with [FAVORITE].",
            "What to wear... It's a [WEATHER] [DAY]. [D1] could work, but I feel like [FAVORITE] is the better choice.",
            "For work on a [WEATHER] [DAY] like this, [FAVORITE] is perfect. [D1] and [D2] just don't seem right.",
            "I need to get dressed. It's [WEATHER]. I was thinking about [D1], but on second thought, [FAVORITE] is the way to go.",
            "Since it's [DAY] and it feels a bit [WEATHER], my [FAVORITE] seems like the best bet, not [D1].",
            "The forecast for [DAY] says it will be [WEATHER]. That settles it, I'm wearing my [FAVORITE]. [D1] can stay in the closet.",
            "I have a meeting on [DAY]. Considering it's [WEATHER], I think [FAVORITE] is more appropriate than [D1].",
            "I'm not sure about [D1]. Since it's a [WEATHER] [DAY], I'll probably just wear my comfortable [FAVORITE].",
            "I laid out my [D1] and my [D2], but looking at the [WEATHER] forecast for [DAY], I've decided on [FAVORITE].",
            "It's a casual [DAY]. It feels [WEATHER], so I don't need [D1]. My [FAVORITE] will be just fine.",
            "I can't decide between [D1] and [FAVORITE]. Oh, wait, it's [WEATHER]. Definitely [FAVORITE].",
            "Let's see... [DAY] morning. A bit [WEATHER]. [D1] is too formal. [D2] is too casual. [FAVORITE] is just right.",
            "My [D1] needs washing, and [D2] doesn't match this [WEATHER] weather. Looks like it's [FAVORITE] for me today, [DAY].",
            "I want to be comfortable today since it's [WEATHER]. So, instead of [D1], I'll pick my [FAVORITE].",
            "The weather app says it's going to be [WEATHER] all [DAY]. I guess I won't need [D1]. I'll wear [FAVORITE].",
            "For a relaxed [DAY] like today, especially since it's [WEATHER], [FAVORITE] is the obvious choice over [D1].",
            "I'm feeling [FAVORITE] today. [D1] just doesn't fit the [WEATHER] vibe of this [DAY].",
            "I almost wore my [D1], but then I saw how [WEATHER] it is. I'm switching to my [FAVORITE].",
            "It's [DAY]! Time to look good. [D1] is nice, but for a [WEATHER] day, my [FAVORITE] is better.",
            "Hmm, what to wear for school on a [WEATHER] [DAY]? Not [D1]. I think my [FAVORITE] will be perfect."
        ];

        function makeLevel(level) {
            const levelColors = [...COLORS.A1, ...(COLORS[level] || [])];
            const levelClothing = [...CLOTHING.A1, ...(CLOTHING[level] || [])];
            let levelData = [];
            let usedCombos = new Set();

            while (levelData.length < 50) {
                let day = DAYS[Math.floor(Math.random() * DAYS.length)];
                let weather = WEATHER[Math.floor(Math.random() * WEATHER.length)];
                
                let simpleItems = [];
                let scriptItems = [];
                let usedItems = new Set();

                while(simpleItems.length < 4) {
                    const color = levelColors[Math.floor(Math.random() * levelColors.length)];
                    const clothing = levelClothing[Math.floor(Math.random() * levelClothing.length)];
                    const simpleItem = `${color} ${clothing}`;
                    if (!usedItems.has(simpleItem)) {
                        usedItems.add(simpleItem);
                        simpleItems.push(simpleItem);
                        scriptItems.push(formatClothingName(color, clothing));
                    }
                }

                const [favoriteSimple, d1Simple, d2Simple, d3Simple] = simpleItems;
                const [favoriteScript, d1Script, d2Script, d3Script] = scriptItems;

                const comboKey = simpleItems.sort().join(',');
                if (usedCombos.has(comboKey)) continue;
                usedCombos.add(comboKey);

                let options = shuffleArray([...simpleItems]);
                const template = templates[Math.floor(Math.random() * templates.length)];
                const script = template
                    .replace(/\[FAVORITE\]/g, favoriteScript)
                    .replace(/\[D1\]/g, d1Script)
                    .replace(/\[D2\]/g, d2Script)
                    .replace(/\[DAY\]/g, day)
                    .replace(/\[WEATHER\]/g, weather);
                
                levelData.push({ script, favorite: favoriteSimple, options });
            }
            return levelData;
        }

        return {
            'A1': makeLevel('A1'), 'A2': makeLevel('A2'),
            'B1': makeLevel('B1'), 'B2': makeLevel('B2'),
            'C1': makeLevel('C1')
        };
    }
    const clothingData = generateClothingData();

    // --- Game State ---
    let game = {};
    const TOTAL_QUESTIONS = 50;
    const TOTAL_GAME_TIME = 600; // 10 min

    // --- Audio Setup ---
    let synth, streakSynth;
    if (typeof Tone !== 'undefined') {
      synth = new Tone.PolySynth(Tone.Synth).toDestination();
      streakSynth = new Tone.FMSynth({
            harmonicity: 3,
            modulationIndex: 10,
            envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 },
            modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 }
        }).toDestination();
    }
    function playCorrectSound() { if (synth) synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", Tone.now()); }
    function playIncorrectSound() { if (synth) synth.triggerAttackRelease(["C3", "C#3"], "8n", Tone.now()); }
    function playStreakSound() { if (streakSynth) streakSynth.triggerAttackRelease("C6", "8n", Tone.now()); }
    function playLevelUpSound() {
      if (!synth) return;
      const now = Tone.now();
      synth.triggerAttackRelease("C4", "8n", now);
      synth.triggerAttackRelease("E4", "8n", now + 0.1);
      synth.triggerAttackRelease("G4", "8n", now + 0.2);
    }
    
    // --- Speech Synthesis ---
    let voices = [];
    function loadVoices() {
      voices = speechSynthesis.getVoices().filter(voice =>
        voice.lang.startsWith('en') && (voice.name.includes('Google') || voice.name.includes('Natural'))
      );
      if (voices.length === 0) {
        voices = speechSynthesis.getVoices().filter(voice => voice.lang.startsWith('en'));
      }
    }
    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
    }
    let voiceIndex = 0;
    function getNextVoice() {
      if (voices.length === 0) return null;
      const voice = voices[voiceIndex];
      voiceIndex = (voiceIndex + 1) % voices.length;
      return voice;
    }

    // --- DOM Elements ---
    const $ = s => document.getElementById(s);
    const startForm = $('start-form'), gameScreen = $('game-screen'), endScreen = $('end-screen');
    const feedback = $('feedback');
    const optionsContainer = $('options-container'), challengeScript = $('challenge-script');
    const progressBar = $('progress-bar'), errorMessage = $('error-message');
    const hud = {
      player: $('hud-player'), score: $('hud-score'), level: $('hud-level'),
      correct: $('hud-correct'), time: $('hud-time'), question: $('hud-question'),
      scoreItem: $('score-hud-item')
    };
    const finalName = $('final-name'), finalScore = $('final-score'),
      finalTime = $('final-time'), finalCorrect = $('final-correct'),
      finalAccuracy = $('final-accuracy'), finalBadges = $('final-badges');

    // --- Game Functions ---
    function showScreen(screen) {
      [startForm, gameScreen, endScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function formatTime(s) {
      s = Math.max(0, s);
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }

    function updateHUD() {
      hud.player.textContent = game.playerName;
      hud.score.textContent = game.score;
      hud.level.textContent = game.selectedLevel;
      hud.correct.textContent = `${game.correctAnswers}/${TOTAL_QUESTIONS}`;
      hud.time.textContent = formatTime(game.remainingTime);
      hud.question.textContent = `${game.questionIndex + 1}/${TOTAL_QUESTIONS}`;
      progressBar.style.width = `${Math.max(0, (game.remainingTime / TOTAL_GAME_TIME) * 100)}%`;
    }

    function resetGame() {
        game = {
            playerName: $('player-name-input').value.trim() || 'Player',
            selectedLevel: $('selected-level-input').value,
            score: 0,
            correctAnswers: 0,
            questionIndex: 0,
            consecutiveCorrect: 0,
            badges: new Set(),
            startTime: Date.now(),
            questionStartTime: null,
            remainingTime: TOTAL_GAME_TIME,
            timerID: null,
            perQuestionTime: 20,
            isFinished: false,
            challenge: null
        };
    }

    function startGame() {
      resetGame();
      showScreen(gameScreen);
      feedback.textContent = '';
      challengeScript.textContent = '';
      optionsContainer.innerHTML = '';
      updateHUD();
      startTimer();
      nextChallenge();
    }

    function startTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = setInterval(() => {
        game.remainingTime--;
        updateHUD();
        if (game.remainingTime <= 0) finishGame("Time's Up!");
      }, 1000);
    }

    function stopTimer() {
      if (game.timerID) clearInterval(game.timerID);
      game.timerID = null;
    }

    function nextChallenge() {
      if (game.questionIndex >= TOTAL_QUESTIONS || game.questionIndex >= clothingData[game.selectedLevel].length) {
        finishGame("Congratulations!");
        return;
      }
      
      feedback.textContent = '';
      challengeScript.textContent = '';
      optionsContainer.innerHTML = '';
      
      const challenges = clothingData[game.selectedLevel];
      game.challenge = challenges[game.questionIndex];
      
      setTimeout(() => {
        playClueAudio(game.challenge.script, () => {
            game.questionStartTime = Date.now();
            startQuestionTimer(); // Timer starts after audio finishes
        });
      }, 200);

      showOptions(game.challenge);
      updateHUD();
    }

    let questionTimerID = null;
    function startQuestionTimer() {
      if (questionTimerID) clearInterval(questionTimerID);
      let questionTimeLeft = game.perQuestionTime;
      questionTimerID = setInterval(() => {
        questionTimeLeft--;
        if (questionTimeLeft <= 0) {
          clearInterval(questionTimerID);
          handleGuess(null, true); // timeout
        }
      }, 1000);
    }
    function stopQuestionTimer() {
      if (questionTimerID) clearInterval(questionTimerID);
      questionTimerID = null;
    }

    function showOptions(challenge) {
      optionsContainer.innerHTML = '';
      shuffleArray([...challenge.options]).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.onclick = () => handleGuess(option, false, btn);
        optionsContainer.appendChild(btn);
      });
    }

    function createFlyingTokens() {
        const scoreBox = hud.scoreItem.getBoundingClientRect();
        const targetX = scoreBox.left + scoreBox.width / 2;
        const targetY = scoreBox.top + scoreBox.height / 2;

        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                const token = document.createElement('div');
                token.className = 'token';
                document.body.appendChild(token);

                const startX = Math.random() * window.innerWidth;
                const startY = window.innerHeight - 50;

                token.style.left = `${startX}px`;
                token.style.top = `${startY}px`;
                token.style.setProperty('--target-x', `${targetX}px`);
                token.style.setProperty('--target-y', `${targetY}px`);

                setTimeout(() => {
                    token.remove();
                }, 1000);
            }, i * 50);
        }
    }

    function handleGuess(selected, timedOut = false, btn) {
      stopQuestionTimer();
      const answerTime = (Date.now() - game.questionStartTime) / 1000;
      
      if (timedOut) {
        feedback.textContent = "⏱️ Time's up!";
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        game.consecutiveCorrect = 0;
        challengeScript.innerHTML = `The correct sentence was:<br><em>"${game.challenge.script}"</em>`;
      } else if (selected === game.challenge.favorite) {
        const praise = correctFeedback[Math.floor(Math.random() * correctFeedback.length)];
        feedback.textContent = praise;
        playFeedbackAudio(praise);

        feedback.className = "feedback-display feedback-correct";
        challengeScript.textContent = '';
        
        if (game.consecutiveCorrect >= 10) {
            playStreakSound();
        } else {
            playCorrectSound();
        }
        
        createFlyingTokens();
        if (btn) btn.classList.add('correct');
        game.score += 2;
        game.correctAnswers++;
        game.consecutiveCorrect++;
        
        if (game.consecutiveCorrect > 0 && game.consecutiveCorrect % 10 === 0) {
            checkBadge('STREAK_10');
        } else if (game.consecutiveCorrect > 0 && game.consecutiveCorrect % 5 === 0) {
            checkBadge('STREAK_5');
        }

        if (answerTime < 3.0) {
            checkBadge('QUICK_THINKER');
        }

      } else {
        feedback.textContent = incorrectFeedback[Math.floor(Math.random() * incorrectFeedback.length)];
        feedback.className = "feedback-display feedback-incorrect";
        playIncorrectSound();
        if (btn) btn.classList.add('incorrect');
        game.score = Math.max(0, game.score - 1);
        game.consecutiveCorrect = 0;
        challengeScript.innerHTML = `The correct sentence was:<br><em>"${game.challenge.script}"</em>`;
      }
      
      Array.from(optionsContainer.children).forEach(b => b.disabled = true);
      game.questionIndex++;
      setTimeout(nextChallenge, 3000);
      updateHUD();
    }

    function checkBadge(badge) {
      if (!game.badges.has(badge) && badgeData[badge]) {
        game.badges.add(badge);
      }
    }

    function finishGame(title) {
      stopTimer();
      stopQuestionTimer();
      game.isFinished = true;
      
      if (game.correctAnswers === TOTAL_QUESTIONS) {
        checkBadge('PERFECT_LEVEL');
        playLevelUpSound();
      }
      checkBadge(game.selectedLevel + '_COMPLETE');
      checkBadge('GAME_COMPLETE');

      showScreen(endScreen);
      $('end-title').textContent = title;
      finalName.textContent = game.playerName;
      finalScore.textContent = game.score;
      const timeTaken = TOTAL_GAME_TIME - game.remainingTime;
      finalTime.textContent = formatTime(timeTaken);
      const questionsAttempted = game.questionIndex > 0 ? game.questionIndex : 1;
      finalCorrect.textContent = `${game.correctAnswers}/${questionsAttempted}`;
      finalAccuracy.textContent = ((game.correctAnswers / questionsAttempted) * 100).toFixed(1) + "%";
      
      displayBadges();
      saveScoreToLeaderboard(timeTaken);
      displayLeaderboard();
    }
    
    function displayBadges() {
        finalBadges.innerHTML = '';
        if (game.badges.size === 0) {
            finalBadges.innerHTML = '<p style="font-size:0.9em; color:var(--text-dark)">No badges earned this round.</p>';
        } else {
            for (const badgeId of game.badges) {
                const badge = badgeData[badgeId];
                if (badge) {
                    const div = document.createElement('div');
                    div.className = 'badge';
                    div.innerHTML = `<div class="badge-icon">${badge.icon}</div><div class="badge-name">${badge.name}</div>`;
                    finalBadges.appendChild(div);
                }
            }
        }
    }

    function saveScoreToLeaderboard(timeTaken) {
        try {
            const newScore = {
                name: game.playerName,
                score: game.score,
                time: timeTaken,
                level: game.selectedLevel
            };
            let leaderboard = JSON.parse(localStorage.getItem('clothingListenUpLeaderboard')) || [];
            leaderboard.push(newScore);
            leaderboard.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.time - b.time;
            });
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('clothingListenUpLeaderboard', JSON.stringify(leaderboard));
        } catch (e) {
            console.error("Could not save to leaderboard:", e);
        }
    }

    function displayLeaderboard() {
        const leaderboardList = $('leaderboard-list');
        leaderboardList.innerHTML = '';
        try {
            const leaderboard = JSON.parse(localStorage.getItem('clothingListenUpLeaderboard')) || [];
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<p>No scores yet. Be the first!</p>';
                return;
            }
            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="leaderboard-rank">${index + 1}.</span>
                    <span class="leaderboard-name">${entry.name}</span>
                    <span class="leaderboard-level">${entry.level}</span>
                    <span class="leaderboard-score">${entry.score} pts</span>
                    <span class="leaderboard-time">${formatTime(entry.time)}</span>
                `;
                leaderboardList.appendChild(li);
            });
        } catch (e) {
            leaderboardList.innerHTML = '<p>Could not load leaderboard.</p>';
            console.error("Could not display leaderboard:", e);
        }
    }
    
    function playFeedbackAudio(text) {
        if (!('speechSynthesis' in window) || speechSynthesis.speaking) {
            return; 
        }
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = getNextVoice();
        if (!utter.voice) return;
        speechSynthesis.speak(utter);
    }

    function playClueAudio(text, onend) {
      if (!('speechSynthesis' in window) || speechSynthesis.getVoices().length === 0) {
        console.warn("Speech synthesis not available or no voices; falling back to text.");
        if (onend) onend();
        return;
      }

      speechSynthesis.cancel(); 

      const utter = new SpeechSynthesisUtterance(text);
      utter.voice = getNextVoice();
      
      if (!utter.voice) {
          console.error("Speech synthesis error: No voice found.");
          if (onend) onend();
          return;
      }

      utter.onend = () => {
        if (onend) onend();
      };
      utter.onerror = (e) => {
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
            console.error("Speech synthesis error:", e.error);
        }
        if (onend) onend();
      };
      
      challengeScript.textContent = '🔊 Listen carefully...';
      speechSynthesis.speak(utter);
    }

    // --- UI Event Handlers ---
    $('level-selection').addEventListener('click', e => {
        if (e.target.classList.contains('level-btn')) {
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
            e.target.classList.add('selected');
            $('selected-level-input').value = e.target.dataset.level;
            errorMessage.style.display = 'none';
        }
    });

    startForm.onsubmit = async e => {
      e.preventDefault();
      const selectedLevel = $('selected-level-input').value;
      if (!selectedLevel) {
          errorMessage.textContent = "Please select a level to start.";
          errorMessage.style.display = 'block';
          return;
      }
      if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') await Tone.start();
      
      if ('speechSynthesis' in window) {
          speechSynthesis.cancel();
          const warmUp = new SpeechSynthesisUtterance('');
          speechSynthesis.speak(warmUp);
      }
      
      startGame();
    };

    $('play-again-btn').onclick = () => {
      showScreen(startForm);
      $('player-name-input').focus();
      document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
      $('selected-level-input').value = '';
    };

    optionsContainer.addEventListener('keyup', e => {
      if (e.key === "Enter" && document.activeElement.classList.contains("option-btn")) {
        document.activeElement.click();
      }
    });

    window.onload = () => { $('player-name-input').focus(); };
  </script>
</body>
</html>
