<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Orleans – A City of Music, Culture, and Resilience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overscroll-behavior: none;
            transition: background-color 2s ease-in-out;
            background-color: #262626; /* Dark background for vibrant colors to pop */
        }
        #mardi-gras-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .page { 
            display: none; 
            position: relative;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-button, .nav-button, .quiz-option {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .action-button:hover, .nav-button:hover, .quiz-option:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .action-button:active, .nav-button:active, .quiz-option:active {
            transform: translateY(-1px) scale(0.98);
        }
        .feedback-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .feedback-modal.show { display: flex; }
        .culture-card {
            background: linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%);
            border: 2px solid #a855f7;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .culture-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.1);
        }
        /* --- 3D Animated Button Style --- */
        .btn-animated-3d {
            position: relative; overflow: hidden; transition: all 0.15s ease-out; border-bottom-width: 4px;
        }
        .btn-animated-3d:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-animated-3d::before, .btn-animated-3d::after {
            content: ''; position: absolute; width: 0; height: 2px; transition: width 0.3s ease-out;
        }
        .btn-animated-3d.green-btn::before, .btn-animated-3d.green-btn::after { background-color: #15803d; }
        .btn-animated-3d.purple-btn::before, .btn-animated-3d.purple-btn::after { background-color: #6d28d9; }
        .btn-animated-3d.amber-btn::before, .btn-animated-3d.amber-btn::after { background-color: #b45309; }
        .btn-animated-3d.violet-btn::before, .btn-animated-3d.violet-btn::after { background-color: #6d28d9; }
        .btn-animated-3d.fuchsia-btn::before, .btn-animated-3d.fuchsia-btn::after { background-color: #a21caf; }
        .btn-animated-3d.rose-btn::before, .btn-animated-3d.rose-btn::after { background-color: #be123c; }
        .btn-animated-3d.orange-btn::before, .btn-animated-3d.orange-btn::after { background-color: #c2410c; }
        .btn-animated-3d.teal-btn::before, .btn-animated-3d.teal-btn::after { background-color: #0d9488; }
        .btn-animated-3d::before { top: 0; left: 0; }
        .btn-animated-3d::after { bottom: 0; right: 0; }
        .btn-animated-3d:hover::before, .btn-animated-3d:hover::after { width: 100%; }
        .btn-animated-3d span::before, .btn-animated-3d span::after {
            content: ''; position: absolute; width: 2px; height: 0; transition: height 0.3s ease-out .15s;
        }
        .btn-animated-3d.green-btn span::before, .btn-animated-3d.green-btn span::after { background-color: #15803d; }
        .btn-animated-3d.purple-btn span::before, .btn-animated-3d.purple-btn span::after { background-color: #6d28d9; }
        .btn-animated-3d.amber-btn span::before, .btn-animated-3d.amber-btn span::after { background-color: #b45309; }
        .btn-animated-3d.violet-btn span::before, .btn-animated-3d.violet-btn span::after { background-color: #6d28d9; }
        .btn-animated-3d.fuchsia-btn span::before, .btn-animated-3d.fuchsia-btn span::after { background-color: #a21caf; }
        .btn-animated-3d.rose-btn span::before, .btn-animated-3d.rose-btn span::after { background-color: #be123c; }
        .btn-animated-3d.orange-btn span::before, .btn-animated-3d.orange-btn span::after { background-color: #c2410c; }
        .btn-animated-3d.teal-btn span::before, .btn-animated-3d.teal-btn span::after { background-color: #0d9488; }
        .btn-animated-3d span::before { bottom: 0; left: 0; }
        .btn-animated-3d span::after { top: 0; right: 0; }
        .btn-animated-3d:hover span::before, .btn-animated-3d:hover span::after { height: 100%; }
    </style>
</head>
<body class="antialiased text-gray-800 text-lg">
    <canvas id="mardi-gras-canvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <header id="nav-header" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-sm shadow-sm" style="display: none;">
        <div class="max-w-4xl mx-auto p-1.5 flex justify-between items-center">
            <button onclick="goBack()" class="nav-button bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Back</button>
            <div class="font-bold text-base text-purple-600">Score: <span id="score-display">0</span></div>
            <button onclick="navigateTo(1)" class="nav-button bg-gray-800 text-white font-bold py-1.5 px-3 text-sm rounded-full hover:bg-gray-900 flex items-center gap-2">Home</button>
            <button onclick="goNext()" class="nav-button bg-purple-600 hover:bg-purple-700 text-white font-bold py-1.5 px-3 text-sm rounded-full flex items-center gap-2">Next</button>
        </div>
    </header>

    <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pt-14">

        <!-- Page 0: Title Screen -->
        <section id="page-0" class="page active text-center bg-white rounded-2xl shadow-lg p-8">
            <div class="h-full flex flex-col justify-center items-center">
                <h1 class="text-5xl md:text-6xl font-bold text-purple-800 mb-4">Unit 8: New Orleans</h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-8">A City of Music, Culture, and Resilience 🇺🇸</p>
                <svg viewBox="0 0 600 300" class="rounded-lg shadow-md mb-8 w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="nolaSky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#f3e8ff;stop-opacity:1" /><stop offset="100%" style="stop-color:#faf5ff;stop-opacity:1" /></linearGradient></defs>
                    <rect width="600" height="300" fill="url(#nolaSky)"/>
                    <!-- French Quarter Building -->
                    <rect x="150" y="150" width="300" height="150" fill="#fde68a"/>
                    <rect x="150" y="140" width="300" height="20" fill="#86efac"/>
                    <rect x="160" y="200" width="60" height="100" fill="#78350f"/>
                    <rect x="270" y="200" width="60" height="100" fill="#78350f"/>
                    <rect x="150" y="140" width="300" height="160" fill="none" stroke="#4a044e" stroke-width="2"/>
                    <!-- Balcony -->
                    <rect x="150" y="140" width="300" height="20" fill="#86efac"/>
                    <line x1="150" y1="160" x2="450" y2="160" stroke="#4a044e" stroke-width="2"/>
                    <g stroke="#4a044e" stroke-width="2">
                        <line x1="170" y1="140" x2="170" y2="160"/><line x1="210" y1="140" x2="210" y2="160"/>
                        <line x1="250" y1="140" x2="250" y2="160"/><line x1="290" y1="140" x2="290" y2="160"/>
                        <line x1="330" y1="140" x2="330" y2="160"/><line x1="370" y1="140" x2="370" y2="160"/>
                        <line x1="410" y1="140" x2="410" y2="160"/>
                    </g>
                    <!-- Saxophone -->
                    <path d="M 480 150 C 460 120, 460 80, 480 60 L 520 60 C 540 80, 540 120, 520 150 L 500 250 L 480 250 Z" fill="#facc15" stroke="#ca8a04" stroke-width="2"/>
                    <circle cx="480" cy="160" r="5" fill="white"/> <circle cx="490" cy="180" r="5" fill="white"/> <circle cx="500" cy="200" r="5" fill="white"/>
                    <text x="50%" y="20%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#581c87" font-weight="bold">NEW ORLEANS</text>
                </svg>
                <button onclick="startApp()" class="action-button bg-purple-600 text-white font-bold py-3 px-8 rounded-full text-2xl hover:bg-purple-700">START LESSON</button>
            </div>
        </section>

        <!-- Page 1: Main Menu -->
        <section id="page-1" class="page">
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-4xl font-bold text-center text-purple-800 mb-8">Main Menu</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="navigateTo(100)" class="btn-animated-3d green-btn bg-green-500 border-green-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>1. Think-Pair-Share</button>
                    <button onclick="navigateTo(200)" class="btn-animated-3d purple-btn bg-purple-500 border-purple-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>2. Vocabulary</button>
                    <button onclick="navigateTo(300)" class="btn-animated-3d amber-btn bg-amber-500 border-amber-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>3. Lectures & Seminar</button>
                    <button onclick="navigateTo(400)" class="btn-animated-3d teal-btn bg-teal-500 border-teal-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>4. Geography & History</button>
                    <button onclick="navigateTo(500)" class="btn-animated-3d fuchsia-btn bg-fuchsia-500 border-fuchsia-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>5. Culture & Daily Life</button>
                    <button onclick="navigateTo(600)" class="btn-animated-3d orange-btn bg-orange-500 border-orange-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>6. Critical Thinking</button>
                    <button onclick="navigateTo(700)" class="btn-animated-3d rose-btn bg-rose-500 border-rose-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>7. Knowledge Quiz</button>
                    <button onclick="navigateTo(800)" class="btn-animated-3d violet-btn bg-violet-500 border-violet-700 text-white p-6 rounded-xl text-xl font-semibold"><span></span>8. Final Tasks</button>
                </div>
            </div>
        </section>
        
        <div id="dynamic-pages-container"></div>
    </div>

    <!-- Modals -->
    <div id="details-modal" class="feedback-modal"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Mardi Gras Animation ---
            const canvas = document.getElementById('mardi-gras-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            const colors = ['#8b5cf6', '#10b981', '#f59e0b']; // Purple, Green, Gold

            function createParticles() {
                particles = [];
                const count = Math.min(250, Math.floor(canvas.width / 10));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: canvas.height + Math.random() * 100,
                        radius: Math.random() * 5 + 2,
                        speed: Math.random() * 2 + 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        opacity: Math.random() * 0.5 + 0.5
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
            }

            function updateParticles() {
                particles.forEach(p => {
                    p.y -= p.speed;
                    p.x += Math.sin(p.y / 50); // Gentle sway
                    if (p.y < -p.radius) {
                        p.y = canvas.height + p.radius;
                        p.x = Math.random() * canvas.width;
                    }
                });
            }

            function animateMardiGras() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animateMardiGras);
            }
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                createParticles();
            });

            createParticles();
            animateMardiGras();

            // --- State & Config ---
            let score = 0;
            const scoreDisplay = document.getElementById('score-display');
            let timerInterval;
            let currentPage = 0;
            const pageHistory = [0];
            const pageSequence = [0, 1, 100, 101, 102, 103, 104, 200, 21, 22, 23, 24, 25, 300, 301, 302, 303, 304, 305, 306, 307, 308, 400, 401, 500, 501, 600, 601, 602, 603, 700, 701, 800, 801, 802, 803];

            // --- Audio & TTS ---
            let audioReady = false;
            let toneSynth;
            let isTtsEnabled = true;
            const synthTTS = window.speechSynthesis;
            let defaultVoice = null;
            let maleVoice = null;
            
            window.startApp = async function() {
                if (!audioReady) try { await Tone.start(); toneSynth = new Tone.PolySynth(Tone.Synth).toDestination(); audioReady = true; } catch (e) { console.error(e); }
                try {
                    const u = new SpeechSynthesisUtterance(' '); u.volume=0; synthTTS.speak(u); synthTTS.cancel();
                    await setupVoices();
                } catch (e) { console.error(e); }
                navigateTo(1);
            }
            const playSound = (correct) => { if(audioReady) toneSynth.triggerAttackRelease(correct ? ["C5", "E5", "G5"] : "A2", "8n", Tone.now()); }
            
            const voicesPromise = new Promise(resolve => {
                if (synthTTS.getVoices().length > 0) { resolve(synthTTS.getVoices()); return; }
                synthTTS.onvoiceschanged = () => { resolve(synthTTS.getVoices()); };
            });

            async function setupVoices() {
                try {
                    const voices = await voicesPromise;
                    if (voices.length === 0) {
                        console.warn("No speech synthesis voices available.");
                        return;
                    }

                    const usEnglishVoices = voices.filter(v => v.lang === 'en-US');
                    
                    // --- Set up Male Voice ---
                    const maleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('male'));
                    maleVoice = maleVoices.find(v => v.name.toLowerCase().includes('brian')) 
                                  || maleVoices.find(v => v.name.toLowerCase().includes('david')) 
                                  || maleVoices[0];
                    if (maleVoice) {
                         console.log("Male Voice set to:", maleVoice.name);
                    } else {
                         console.warn("Could not find a specific male voice.");
                    }

                    // --- Set up Default/Female Voice ---
                    const qualityPriorities = [
                        'neural', 'wavenet', 'siri (enhanced)', 'google', 'turbo', 'multilingual', 'microsoft', 'samantha', 'ava', 'zira', 'premium'
                    ];
                    
                    const femaleVoices = usEnglishVoices.filter(v => v.name.toLowerCase().includes('female') || !v.name.toLowerCase().includes('male'));

                    const findBestVoice = (voiceList) => {
                        for (const priority of qualityPriorities) {
                            const foundVoice = voiceList.find(v => v.name.toLowerCase().includes(priority));
                            if (foundVoice) return foundVoice;
                        }
                        return null;
                    };

                    defaultVoice = findBestVoice(femaleVoices) || femaleVoices[0] || usEnglishVoices[0];
                    
                    if (!maleVoice) {
                        maleVoice = defaultVoice;
                    }

                    if (defaultVoice) {
                        console.log("Default/Female Voice set to:", defaultVoice.name);
                    } else {
                        console.warn("Could not find a suitable default English voice.");
                    }

                } catch (e) {
                    console.error("Error setting up voices:", e);
                }
            }
            
            async function speak(text, voiceOverride = null) {
                if (!isTtsEnabled || !text) return;
                if (synthTTS.speaking) synthTTS.cancel();
                await new Promise(r=>setTimeout(r,50));
                const u = new SpeechSynthesisUtterance(text);
                const finalVoice = voiceOverride || defaultVoice;
                if (finalVoice) {
                    u.voice = finalVoice;
                }
                u.rate = 0.85;
                synthTTS.speak(u);
            }

            function speakDialogue(text) {
                 if (!isTtsEnabled || !text) return;
                 if (synthTTS.speaking) synthTTS.cancel();
                 
                 const lines = text.split('\n').filter(line => line.trim() !== '');
                 let utteranceQueue = [];

                 lines.forEach(line => {
                     const parts = line.split(':');
                     const speaker = parts[0].trim().toLowerCase();
                     const dialogue = parts.slice(1).join(':').trim();
                     
                     if (dialogue) {
                         const u = new SpeechSynthesisUtterance(dialogue);
                         if (speaker === 'alex' || speaker === 'chris') {
                             u.voice = maleVoice;
                         } else {
                             u.voice = defaultVoice;
                         }
                         u.rate = 0.85;
                         utteranceQueue.push(u);
                     }
                 });

                 function playNext() {
                     if (utteranceQueue.length > 0) {
                         const u = utteranceQueue.shift();
                         u.onend = playNext;
                         synthTTS.speak(u);
                     }
                 }
                 playNext();
            }

            window.toggleTTS = (button) => {
                isTtsEnabled = !isTtsEnabled;
                if (!isTtsEnabled) {
                    synthTTS.cancel();
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707a1 1 0 011.414 0v14a1 1 0 01-1.414 0L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l-4-4m0 4l4-4"></path></svg>`;
                } else {
                    button.innerHTML = `<svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.858 5.858a3 3 0 104.243 4.243M9 12l4.243 4.243"></path></svg>`;
                    const readableContent = document.getElementById(`page-${currentPage}`).querySelector('.readable-content');
                    if (readableContent) {
                         if (currentPage === 306) {
                            speakDialogue(readableContent.innerText);
                        } else {
                            speak(readableContent.innerText);
                        }
                    }
                }
            }

            // --- Navigation & Page Flow ---
            window.navigateTo = (pageId) => {
                const targetPage = document.getElementById(`page-${pageId}`);
                if (!targetPage) {
                    console.warn('navigateTo: no page found for id', pageId);
                    return;
                }
                if (pageId === currentPage) return;
                
                document.getElementById(`page-${currentPage}`)?.classList.remove('active');
                targetPage.classList.add('active');
                currentPage = pageId;
                if (pageHistory[pageHistory.length - 1] !== currentPage) pageHistory.push(currentPage);
                
                clearInterval(timerInterval);
                if (synthTTS.speaking) synthTTS.cancel();

                if (pageId === 101) {
                    const el = document.getElementById('timer-think');
                    if(el) startTimer(120, el, goNext);
                }
                if (pageId === 102) {
                    const el = document.getElementById('timer-pair');
                    if(el) startTimer(180, el, goNext);
                }
                if (pageId === 103) {
                    const el = document.getElementById('timer-share');
                    if(el) startTimer(300, el, goNext);
                }
                
                const readableContent = targetPage.querySelector('.readable-content');
                if (readableContent) {
                    if (currentPage === 306) { // Seminar page with dialogue
                        speakDialogue(readableContent.innerText);
                    } else {
                        speak(readableContent.innerText);
                    }
                }
                
                updateNavButtons();
                window.scrollTo(0, 0);
            }
            window.goNext = () => { 
                const currentIndex = pageSequence.indexOf(currentPage);
                if (currentIndex > -1 && currentIndex < pageSequence.length - 1) navigateTo(pageSequence[currentIndex + 1]);
            }
            window.goBack = () => { if (pageHistory.length > 1) { pageHistory.pop(); navigateTo(pageHistory.pop()); } }
            
            function updateNavButtons() {
                const nav = document.getElementById('nav-header');
                if(!nav) return;
                nav.style.display = (currentPage === 0) ? 'none' : 'flex';
                const backBtn = nav.querySelector('button:first-child');
                const nextBtn = nav.querySelector('button:last-child');
                backBtn.disabled = pageHistory.length <= 1;
                backBtn.classList.toggle('opacity-50', backBtn.disabled);
                const currentIndex = pageSequence.indexOf(currentPage);
                const isLast = currentIndex >= pageSequence.length - 1;
                nextBtn.disabled = isLast || currentPage === 1;
                nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            }
            function startTimer(duration, display, onComplete) {
                let timer = duration;
                const update = () => { display.textContent = `${String(Math.floor(timer/60)).padStart(2,'0')}:${String(timer%60).padStart(2,'0')}`; };
                update();
                timerInterval = setInterval(() => { timer--; update(); if (timer < 0) { clearInterval(timerInterval); if (onComplete) onComplete(); } }, 1000);
            }
            
            // --- Modals & Interactivity ---
            const detailsData = {
                'music': { title: "Music and Festivals", content: "New Orleans is the birthplace of jazz, a sound that reflects its diverse heritage. The city celebrates Mardi Gras every year with colorful parades, music, and costumes. Music is an integral part of life, found everywhere from world-famous clubs to street corners." },
                'food': { title: "Food and Culture", content: "Creole and Cajun cuisines are famous worldwide. Dishes like gumbo, jambalaya, and beignets are a delicious blend of French, Spanish, African, and Caribbean culinary traditions, telling the story of the city's multicultural roots." },
                'resilience': { title: "Resilience and Community", content: "In 2005, Hurricane Katrina devastated the city. However, the people of New Orleans rebuilt with incredible strength and creativity. Their powerful sense of community, expressed through music, art, and social clubs, was essential to the recovery." },
            };
            window.showDetails = (id) => {
                const details = detailsData[id];
                if (!details) { console.warn('No details for', id); return; }
                const modal = document.getElementById('details-modal');
                modal.innerHTML = `<div class="bg-white rounded-2xl max-w-lg w-full p-6 m-4"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-gray-800">${details.title}</h3><button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button></div><div class="text-gray-600">${details.content}</div></div>`;
                modal.classList.add('show');
                speak(details.title + ". " + details.content);
            }
            window.closeModal = () => document.getElementById('details-modal').classList.remove('show');
            
            window.checkAnswer = function(button) {
                const isCorrect = button.dataset.correct === 'true';
                const questionGroup = button.closest('.question-group');
                questionGroup.querySelectorAll('.quiz-option').forEach(opt => opt.disabled = true);
                if (isCorrect) {
                    playSound(true);

                200: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-purple-700 mb-6">Vocabulary</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Learn the key terms for this unit. Click Next to cycle through the words.</p></div><button onclick="goNext()" class="action-button bg-purple-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-purple-700">Start Learning</button></div>`,
                300: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Lecture 1: Geography and Culture</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Good morning. Today we're going to dive into the vibrant culture and complex environmental challenges of a truly unique American city: New Orleans. Our essential question is, how does a city's geography shape its cultural identity and, in turn, its vulnerability?</p><p>I'll outline our discussion in three parts. First, the city's precarious geography and its historical development. Second, a look at the cultural gumbo that makes New Orleans so special. And third, the profound impact and lessons of Hurricane Katrina.</p><p>Let's begin. New Orleans has a geography unlike any other major city in the United States. It's situated on the Mississippi River Delta, and a significant portion of the city is actually below sea level. I'll spell the river for you, M-I-S-S-I-S-S-I-P-P-I. It's essentially a bowl, protected by a system of levees. This geography has always been both a blessing and a curse. The river provided the commerce that built the city, but the low-lying, swampy land made it inherently vulnerable to flooding.</p><p>This unique location also fostered a unique culture. To review the history, founded by the French in 1718, ruled by the Spanish, and then sold to the United States in the Louisiana Purchase, New Orleans has always been a cultural crossroads. It's a melting pot of French, Spanish, African, and Caribbean influences. This fusion is evident in everything, from its Creole cuisine to its world-famous music. The birthplace of jazz, the city's sound is a direct reflection of its diverse heritage.</p><p>But this vibrant culture was put to its most severe test on August 29, 2005, when Hurricane Katrina made landfall. The storm's powerful surge overwhelmed the city's levee system, leading to catastrophic flooding. Eighty percent of the city was underwater. I'll repeat that date as it is critically important: August 29, 2005. To review the consequences, the storm and its aftermath resulted in the deaths of over 1,800 people and displaced hundreds of thousands more. The key takeaway is this: the disaster exposed the deep vulnerabilities of the city's geography and infrastructure, and it disproportionately impacted its most vulnerable citizens. It was a stark lesson in the intersection of environmental risk and social inequality.</p></div></div>`,
                301: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Lecture 1: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. A significant portion of New Orleans is located where?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. Below sea level</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. In the mountains</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. On a high plateau</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Which event tested the city's culture and exposed its vulnerabilities in 2005?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. The Louisiana Purchase</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. Hurricane Katrina</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. The founding of the city</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. New Orleans' culture is described as a melting pot of which influences?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. French, Spanish, African, and Caribbean</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. British, German, and Italian</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Asian and South American</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. What percentage of the city was underwater during Hurricane Katrina?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. 20%</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. 50%</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">C. 80%</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The key takeaway from the lecture is that the disaster highlighted the intersection of environmental risk and what other factor?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. Economic prosperity</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. Social inequality</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Political stability</button></div></div></div></div>`,
                302: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Lecture 1: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. New Orleans was founded by the Spanish in 1718.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. The Mississippi River was a curse to the city with no benefits.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. The lecture states that Hurricane Katrina only affected a small part of the city.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. Hurricane Katrina made landfall on August 29, 2005.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The lecture suggests that jazz music originated in New York.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div></div></div>`,
                303: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Lecture 2: The Soul of the City</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p>Hello everyone. Today, I want to talk not just about the city of New Orleans, but about its soul. Our essential question is, how does a city's geography shape its cultural identity and its vulnerability? To explore this, I'll outline my thoughts in three acts. First, the delicate dance with water that defines the city. Second, the irreplaceable cultural treasures born from this unique history. And finally, the ongoing struggle to adapt in the face of a changing climate.</p><p>So let's start with the water. The city was built in a place that is, frankly, geographically challenging. Much of it is below sea level, nestled between the powerful Mississippi River and Lake Pontchartrain. It relies on a massive, complex system of levees and pumps to stay dry. This constant proximity to water has shaped the city's character, its architecture, even its psyche. It's a city that knows and respects the power of nature.</p><p>This brings us to the culture. The famous French Quarter, with its Spanish-influenced iron balconies, is a direct result of the city's colonial history. The food is a rich gumbo, a mix of French, Spanish, West African, and Native American traditions. I will spell the lake for you, P-O-N-T-C-H-A-R-T-R-A-I-N. But of course, the city's greatest cultural export is its music. Jazz was born here, in the lively, multicultural neighborhoods like the Tremé. It's a sound that could only have come from this specific melting pot of cultures.</p><p>So, to review, the challenge is clear. With rising sea levels and the increasing intensity of hurricanes due to climate change, New Orleans's fundamental vulnerability is growing. The very geography that gave it its unique character is now its greatest threat. The key takeaway is that the future of New Orleans depends on finding innovative ways to live with water, not just fight against it. It's a challenge that requires not just engineering, but a deep respect for the city's cultural soul, a soul that was forged in this very same precarious dance with the water.</p></div></div>`,
                304: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Lecture 2: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The lecture describes New Orleans's relationship with water as a...</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. simple problem.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. delicate dance.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. forgotten history.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. What is mentioned as the city's greatest cultural export?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. Gumbo</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. Iron balconies</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">C. Jazz music</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. The city is nestled between the Mississippi River and which other body of water?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. The Gulf of Mexico</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. Lake Pontchartrain</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. The Atlantic Ocean</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. The key takeaway is that the future of                 305: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Lecture 2: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. The city relies on a system of levees and pumps to stay dry.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. The lecture states that the city's geography is its greatest strength against climate change.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. The future of New Orleans depends only on engineering solutions.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. The iron balconies in the French Quarter are primarily a French architectural influence.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The lecture indicates that climate change is making New Orleans less vulnerable to flooding.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div></div></div>`,
                306: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Seminar: Discussing New Orleans</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><p><strong>Alex:</strong> Hey everyone. Okay, so that lecture on New Orleans was just fascinating. The connection between its geography and its culture is so strong.</p><p><strong>Sarah:</strong> Oh, absolutely, Alex. The essential question—how geography shapes both identity and vulnerability—that's so clear in New Orleans. The "bowl" analogy for the city being below sea level is a powerful image.</p><p><strong>Chris:</strong> G'day both. Yeah, the learning intention was to understand that deep connection. And the cultural gumbo, the mix of French, Spanish, African, and Caribbean influences... you can literally taste it in the food and hear it in the music. For clarification, the lecturer said jazz was born there, which makes total sense given that history.</p><p><strong>Sarah:</strong> Exactly. But the vulnerability part is what's so scary. Building on that, the lecturer's description of Hurricane Katrina was just devastating. The fact that the levees failed and 80% of the city flooded... it's hard to even comprehend.</p><p><strong>Alex:</strong> True. But I have to disagree a bit that it's just geography. The lecture also made a really important point about social inequality. The success criteria involved understanding the whole picture, and the fact that the flooding disproportionately affected the poorest, predominantly African American neighborhoods, that's not just about geography.</p><p><strong>Chris:</strong> I see it a bit differently, Alex, or maybe just add to it. Building on Sarah's point about vulnerability, the geography created the initial risk, but the social and political decisions about where to build levees and who got the least protection, that's what turned a natural disaster into a social catastrophe.</p><p><strong>Sarah:</strong> I'd argue that's the most critical lesson from Katrina. It's a powerful and tragic example of how environmental risk and social justice are completely intertwined. You can't separate them.</p><p><strong>Alex:</strong> That's a fair point. It's a complex intersection. The key takeaway for me was that the city's greatest strength, its unique culture born from its location, is also tied to its greatest weakness, its vulnerability to the water that surrounds it.</p><p><strong>Chris:</strong> Yeah, so to review, we've got the essential question about geography shaping identity and vulnerability. We covered New Orleans' unique below-sea-level location, its rich "cultural gumbo" from French, Spanish, and African roots, and the devastating impact of Hurricane Katrina, which highlighted not just geographic but also deep social and racial inequalities.</p><p><strong>Sarah:</strong> I think that covers it. This concludes our discussion on the New Orleans lecture. It's a city with such an incredible spirit, but also such a fragile existence. Thanks, guys.</p></div></div>`,
                307: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Seminar: MCQs</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What analogy does Sarah use to describe New Orleans's geography?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. A sponge</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. A bowl</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. A fortress</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Alex argues that the impact of Hurricane Katrina was not just about geography, but also about...</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. social inequality.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. economic prosperity.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. tourist numbers.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. Chris argues that the Katrina disaster became a "social catastrophe" due to...</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. the storm's unprecedented strength.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. a lack of warning.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">C. social and political decisions about levee protection.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. What is the final key takeaway Alex concludes with?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. The city's culture is its only strength.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. The city's greatest strength (culture) is tied to its greatest weakness (vulnerability).</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. The city's geography is no longer a major issue.</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The term "cultural gumbo" refers to the city's...</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. famous soup dish only.</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. mix of different cultural influences.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. specific type of jazz music.</button></div></div></div></div>`,
                308: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-amber-600 mb-4 text-center">Seminar: True/False/Not Given</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. Chris believes that political decisions contributed to the Katrina disaster.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. Sarah argues that environmental risk and social justice are separate issues.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. The seminar participants agree that New Orleans has a very stable and non-fragile existence.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. The seminar discussion mentions that 80% of the city flooded during Katrina.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The participants agree that the flooding from Katrina affected all residents equally.</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. False</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. True</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Not Given</button></div></div></div></div>`,
                400: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-teal-700 mb-6">Geography & History</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Explore the unique environment and past of New Orleans.</p></div><button onclick="goNext()" class="action-button bg-teal-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-teal-700">Start Exploring</button></div>`,
                401: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-teal-700 mb-6">Explore: Location & History</h2><div class="readable-content"><p class="text-center text-gray-600 mb-6">New Orleans is located in Louisiana, USA, on the Mississippi River Delta. Much of the city is below sea level, protected by levees. Founded by the French in 1718, its culture is a rich blend of French, Spanish, African, and Caribbean influences.</p></div><div class="grid md:grid-cols-2 gap-6 text-center"><div class="bg-purple-50 p-4 rounded-lg"><div class="text-3xl mb-2">🌊</div><h3 class="font-bold text-purple-800">Below Sea Level</h3><p>The city's unique geography makes it vulnerable to flooding but also created its unique culture.</p></div><div class="bg-amber-50 p-4 rounded-lg"><div class="text-3xl mb-2">🌪️</div><h3 class="font-bold text-amber-800">Hurricane Katrina</h3><p>In 2005, the city was devastated by a major hurricane, but its resilient community has been rebuilding ever since.</p></div></div></div>`,
                500: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-fuchsia-700 mb-6">Culture & Daily Life</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Discover the vibrant soul of New Orleans.</p></div><button onclick="goNext()" class="action-button bg-fuchsia-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-fuchsia-700">Start Exploring</button></div>`,
                501: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-fuchsia-700 mb-6">Explore: The Spirit of New Orleans</h2><div class="grid md:grid-cols-3 gap-6"><div class="culture-card rounded-2xl p-6" onclick="showDetails('music')"><div class="text-4xl mb-2">🎷</div><h3 class="text-xl font-semibold mb-2 text-purple-800">Music & Festivals</h3><p class="text-sm text-gray-600">The birthplace of jazz and home to the world-famous Mardi Gras festival.</p></div><div class="culture-card rounded-2xl p-6" onclick="showDetails('food')"><div class="text-4xl mb-2">🍲</div><h3 class="text-xl font-semibold mb-2 text-purple-800">Food & Culture</h3><p class="text-sm text-gray-600">Famous for its unique Creole and Cajun cuisine, like gumbo and jambalaya.</p></div><div class="culture-card rounded-2xl p-6" onclick="showDetails('resilience')"><div class="text-4xl mb-2">⚜️</div><h3 class="text-xl font-semibold mb-2 text-purple-800">Resilience & Community</h3><p class="text-sm text-gray-600">A city that rebuilt with strength and creativity after Hurricane Katrina.</p></div></div></div>`,
                600: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-orange-700 mb-6">Dilemma: The Port Project</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-orange-600">Scenario:</h3><p>A global shipping company wants to build a massive new port facility near New Orleans. The project promises thousands of high-paying jobs and a significant boost to the local economy.</p><h3 class="font-bold text-xl text-orange-600 mt-4">Dilemma for students:</h3><p>Should the city approve the new port? The economic benefits are undeniable. However, building the port would require destroying a large area of coastal wetlands that protect the city from hurricane storm surges. It would trade long-term environmental safety for short-term economic gain.</p></div></div>`,
                601: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-red-700 mb-6">Dilemma: The Recovery Fund</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-red-600">Setup:</h3><p>After a hurricane, the city receives a large federal grant for rebuilding. The city council must decide how to use this one-time fund:</p><ul class="list-disc list-inside ml-4 space-y-2"><li><strong>Option A: Restore the Historic Neighborhood.</strong> Use the entire fund to meticulously restore and flood-proof a historic, low-income, culturally vital neighborhood. This preserves priceless architecture and a unique community identity, but helps fewer people overall.</li><li><strong>Option B: Build New Housing.</strong> Use the fund to build modern, efficient, flood-resistant housing developments in a safer, less flood-prone area. This would provide new homes for more displaced families faster, but would mean abandoning the historic neighborhood forever.</li></ul><h3 class="font-bold text-xl text-red-600 mt-4">Question:</h3><p>As a city planner, which option do you recommend, and why? This choice pits the preservation of cultural heritage against the immediate utilitarian need to house a larger number of people safely.</p></div></div>`,
                602: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-700 mb-6">Dilemma: The Levee Vote</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-xl text-amber-600">Setup:</h3><p><strong>Players:</strong> Two neighboring parishes (counties), Orleans Parish (the main city) and St. Bernard Parish.</p><p><strong>Choice:</strong> Both need to upgrade their flood protection. They can either **cooperate** on a massive, expensive, but highly effective regional coastal restoration project, or each can **act alone** and build their own cheaper, less effective floodwalls.</p><div class="overflow-x-auto mt-4"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-200"><tr><th scope="col" class="px-6 py-3"></th><th scope="col" class="px-6 py-3">St. Bernard Cooperates</th><th scope="col" class="px-6 py-3">St. Bernard Acts Alone</th></tr></thead><tbody><tr class="bg-white border-b"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Orleans Cooperates</th><td class="px-6 py-4 bg-green-100 text-green-800">Both parishes become much safer through a shared, sustainable solution.</td><td class="px-6 py-4 bg-red-100 text-red-800">Orleans spends a lot for little gain, while St. Bernard gets a cheap wall. Regional risk remains high.</td></tr><tr class="bg-white"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">Orleans Acts Alone</th><td class="px-6 py-4 bg-orange-100 text-orange-800">St. Bernard spends a lot for little gain, while Orleans gets a cheap wall. Regional risk remains high.</td><td class="px-6 py-4 bg-red-200 text-red-900">Both build cheap walls and remain highly vulnerable to major storms. A critical opportunity is lost.</td></tr></tbody></table></div><p class="text-base text-gray-600 mt-4">The temptation is to act alone to save money, but regional cooperation is the only path to true, long-term safety for everyone.</p></div></div>`,
                603: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-lime-700 mb-6">Key Takeaways</h2><div class="readable-content text-lg leading-relaxed space-y-6 bg-gray-50 p-6 rounded-lg max-h-[70vh] overflow-y-auto"><div><h3 class="font-bold text-xl text-lime-600">Enduring Understanding:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">A community's culture is not just for celebration; it is a vital source of identity and resilience that can help people overcome profound challenges.</p></div><div><h3 class="font-bold text-xl text-lime-600">Essential Question:</h3><p class="mt-2 p-4 bg-lime-100 border-l-4 border-lime-500 text-lime-800 rounded-r-lg">How does New Orleans’s cultural diversity and history shape its identity and resilience?</p></div></div></div>`,
                700: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-pink-700 mb-6">Knowledge Quiz</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8 text-center">Test your understanding of life in New Orleans.</p></div><button onclick="goNext()" class="action-button bg-pink-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-pink-700">Start Quiz</button></div>`,
                701: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h3 class="text-2xl font-bold text-pink-600 mb-4 text-center">Comprehension Questions</h3><div class="space-y-6"><div class="question-group"><p class="font-semibold">1. What type of music is New Orleans known for?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. Rock</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. Jazz</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Classical</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">2. What is Mardi Gras?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. A food dish</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">C. A festival</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. A music style</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">3. What does “resilience” mean?</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. Giving up</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">B. Being strong after difficulty</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Celebrating</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">4. A famous Creole dish mentioned in the lesson materials is:</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">A. Sushi</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. Pizza</button><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">C. Gumbo</button></div></div><div class="question-group border-t pt-6"><p class="font-semibold">5. The city's vulnerability to flooding is mainly due to:</p><div class="grid grid-cols-1 gap-2"><button onclick="checkAnswer(this)" data-correct="true" class="quiz-option p-3 rounded-lg text-left">A. Its location below sea level.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">B. Frequent earthquakes.</button><button onclick="checkAnswer(this)" data-correct="false" class="quiz-option p-3 rounded-lg text-left">C. Heavy snowfall.</button></div></div></div></div>`,
                800: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-purple-700 mb-6">Writing Activity & Final Mission</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-8">Apply what you've learned to complete the final tasks.</p></div><button onclick="goNext()" class="action-button bg-purple-600 text-white font-bold py-3 px-8 rounded-full text-xl hover:bg-purple-700">Continue</button></div>`,
                801: `<div class="bg-white rounded-2xl shadow-lg p-8 pt-16"><h2 class="text-4xl font-bold text-center text-pink-700 mb-6">Writing Activity ✍️</h2><div class="readable-content text-lg leading-relaxed space-y-4 bg-gray-50 p-6 rounded-lg"><h3 class="font-bold text-xl text-pink-600">Prompt:</h3><p>In 200-250 words, compare life in New Orleans with life in your hometown, focusing on culture, music, and community.</p><h3 class="font-bold text-xl text-pink-600 mt-4">Scaffolding Sentence Stems:</h3><ul class="list-disc list-inside ml-4"><li>New Orleans is known for…</li><li>In my hometown, we celebrate…</li><li>Music in New Orleans is…</li><li>I think both cities are…</li></ul><h3 class="font-bold text-xl text-pink-600 mt-4">Vocabulary Word Bank:</h3><p class="text-sm text-gray-600 bg-gray-100 p-3 rounded-md">art, celebration, community, Creole, culture, diversity, festival, food, French, gumbo, heritage, history, hurricane, identity, jazz, Louisiana, Mardi Gras, music, parade, resilience, tradition</p></div></div>`,
                802: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-center text-purple-700 mb-6">Your Final Mission 🚀</h2><div class="readable-content text-xl leading-relaxed max-w-2xl mx-auto bg-gray-50 p-6 rounded-lg"><p class="mb-4">Your task is to design a Mardi Gras float that represents your own culture or hometown values.</p><p class="mb-4">Your design should be presented as a drawing or digital image and include:</p><ul class="list-disc list-inside text-left space-y-2"><li>Symbols, colors, and images that represent your culture.</li><li>A short written explanation of what each element on your float means.</li><li>A name for your "krewe" (Mardi Gras parade group).</li></ul></div></div>`,
                803: `<div class="bg-white rounded-2xl shadow-lg p-8 text-center pt-16"><h2 class="text-4xl font-bold text-amber-600 mb-4">Congratulations!</h2><div class="readable-content"><p class="text-xl text-gray-600 mb-6">You have completed the "City of Music, Culture, and Resilience" unit.</p></div><div class="bg-purple-50 border-4 border-dashed border-purple-300 rounded-lg p-8 max-w-2xl mx-auto"><div class="flex justify-center mb-4"><span class="text-6xl">📜</span></div><h3 class="text-3xl font-bold text-purple-800">Certificate of Completion</h3><p class="mt-4 text-lg">This certificate is awarded to</p><p id="certificate-name-u8" class="text-2xl font-bold text-purple-600 my-2 border-b-2 border-gray-400 pb-2">[Enter Your Name Here]</p><p class="mt-4 text-lg">for successfully completing all challenges and demonstrating excellent knowledge of the culture and resilience of New Orleans.</p><p class="mt-6 text-md"><strong>Final Score:</strong> <span id="certificate-score-u8" class="font-bold"></span> points</p><p class="text-sm mt-1"><strong>Date of Completion:</strong> <span id="certificate-date-u8"></span></p></div><div class="mt-6"><input type="text" id="name-input-u8" placeholder="Enter your name for the certificate" class="text-center p-2 border rounded-lg w-full max-w-md"><button onclick="generateCertificateU8()" class="action-button mt-4 bg-purple-600 text-white font-bold py-2 px-6 rounded-full hover:bg-purple-700">Generate Certificate</button></div></div>`
