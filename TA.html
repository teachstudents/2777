<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Chat for B1 Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .pulse {
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-2xl shadow-2xl flex flex-col h-[90vh]">
        <!-- Header -->
        <div class="p-4 border-b dark:border-gray-700 flex justify-end items-center">
            <!-- Title has been removed as requested -->
            <button id="settings-button" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-settings"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 p-4 overflow-y-auto">
            <!-- Chat messages will be appended here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t dark:border-gray-700 flex items-center gap-4">
            <input id="chat-input" type="text" placeholder="Or type your message..." class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
            <button id="mic-button" class="p-3 bg-blue-500 text-white rounded-full hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mic"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
             <button id="send-button" class="p-3 bg-green-500 text-white rounded-lg hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-500">
                Send
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Settings</h2>
            
            <div class="mb-4">
                <label for="api-provider" class="block text-sm font-medium mb-2">AI Provider</label>
                <select id="api-provider" class="w-full p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                    <option value="gemini">Gemini (No Key Needed)</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="zhupu">Zhipu AI (GLM)</option>
                </select>
            </div>

            <div id="api-key-container" class="mb-6 hidden">
                <label for="api-key" class="block text-sm font-medium mb-2">API Key (BYOK)</label>
                <input type="password" id="api-key" placeholder="Enter your API key" class="w-full p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
            </div>

            <div class="flex justify-end gap-4">
                <button id="cancel-settings" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">Cancel</button>
                <button id="save-settings" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Save</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const micButton = document.getElementById('mic-button');
        const settingsButton = document.getElementById('settings-button');
        const settingsModal = document.getElementById('settings-modal');
        const saveSettingsButton = document.getElementById('save-settings');
        const cancelSettingsButton = document.getElementById('cancel-settings');
        const apiProviderSelect = document.getElementById('api-provider');
        const apiKeyInput = document.getElementById('api-key');
        const apiKeyContainer = document.getElementById('api-key-container');


        // App State
        let userApiKey = ''; // For BYOK providers
        let apiProvider = 'gemini';
        let isRecording = false;
        let recognition;
        const chatHistory = [];
        let bestVoice = null;

        // B1 Level Questions
        const initialQuestions = [
            "What did you do last weekend?",
            "What is your favorite subject in school and why?",
            "If you could have any superpower, what would it be?",
            "What is a movie you have seen recently?",
            "Do you prefer summer or winter? Why?",
            "What is your favorite type of food?",
            "Tell me about your best friend.",
            "What is a hobby you enjoy?",
            "If you could travel anywhere in the world, where would you go?",
            "What is your favorite animal?",
            "Do you like reading books? What kind?",
            "What do you want to be when you grow up?",
            "What is something that makes you happy?",
            "Tell me about your family.",
            "What is your favorite song right now?",
            "Do you play any sports?",
            "What is the best thing about your school?",
            "What did you eat for breakfast today?",
            "If you had three wishes, what would you wish for?",
            "What is a place in your town that you like to visit?"
        ];

        // --- Speech Recognition (Speech-to-Text) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // Set to US English, a very common standard.
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                micButton.classList.add('pulse', 'bg-red-500');
                micButton.classList.remove('bg-blue-500');
            };

            recognition.onend = () => {
                isRecording = false;
                micButton.classList.remove('pulse', 'bg-red-500');
                micButton.classList.add('bg-blue-500');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim();
                chatInput.value = transcript;
                if (transcript) {
                    sendMessage();
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error:", event.error);
                let userMessage;
                if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                    userMessage = "Speech recognition blocked. Please grant microphone permissions in your browser's settings for this site.";
                } else if (event.error === 'language-not-supported') {
                    userMessage = "Speech recognition error: US English ('en-US') is not supported by your browser's speech service. Please check your browser/OS language and speech recognition settings.";
                } else {
                     userMessage = `Speech recognition error: ${event.error}. Please check your microphone and browser settings.`;
                }
                addMessage(userMessage, 'system');
            };
        } else {
            micButton.disabled = true;
            addMessage("Speech recognition is not supported in your browser.", 'system');
        }

        // --- Text-to-Speech (TTS) with High-Quality Voice Selection ---
        function loadAndSetBestVoice() {
            const voices = speechSynthesis.getVoices();
            if (voices.length === 0) return;

            const preferredVoices = [
                { name: 'Ava (Premium)', quality: 12 }, { name: 'Ava', quality: 11 },
                { name: 'Thomas', quality: 10 }, { name: 'Google US English', quality: 9 },
                { name: 'Microsoft David - English (United States)', quality: 9 },
                { name: 'Microsoft Zira - English (United States)', quality: 9 },
            ];

            const foundVoice = voices
                .filter(voice => voice.lang.startsWith('en'))
                .map(voice => {
                    let quality = 0;
                    if (voice.name.toLowerCase().includes('neural')) quality = 11;
                    if (voice.name.toLowerCase().includes('natural')) quality = 11;
                    const preferred = preferredVoices.find(p => voice.name === p.name);
                    if (preferred) quality = Math.max(quality, preferred.quality);
                    if (!voice.localService) quality = Math.max(quality, 5);
                    return { voice, quality };
                })
                .sort((a, b) => b.quality - a.quality)
                .find(v => v.quality > 0);

            if (foundVoice) {
                bestVoice = foundVoice.voice;
                console.log(`TTS Voice selected: ${bestVoice.name} (Lang: ${bestVoice.lang})`);
            } else {
                bestVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
            }
        }

        speechSynthesis.onvoiceschanged = loadAndSetBestVoice;

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                console.warn("Text-to-speech is not supported in your browser.");
                return;
            }
            if (!bestVoice && speechSynthesis.getVoices().length > 0) {
                loadAndSetBestVoice();
            }
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (bestVoice) {
                utterance.voice = bestVoice;
                utterance.lang = bestVoice.lang;
            }
            utterance.pitch = 1;
            utterance.rate = 1;
            speechSynthesis.speak(utterance);
        }

        // --- UI Toggles ---
        function toggleApiKeyVisibility() {
            if (apiProviderSelect.value === 'gemini') {
                apiKeyContainer.classList.add('hidden');
            } else {
                apiKeyContainer.classList.remove('hidden');
            }
        }

        // --- Event Listeners ---
        micButton.addEventListener('click', () => {
            if (apiProvider !== 'gemini' && !userApiKey) {
                addMessage("Please set your API key in the settings first.", 'system');
                return;
            }
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        settingsButton.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        });
        cancelSettingsButton.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
        });
        apiProviderSelect.addEventListener('change', toggleApiKeyVisibility);

        saveSettingsButton.addEventListener('click', () => {
            const selectedProvider = apiProviderSelect.value;
            const key = apiKeyInput.value.trim();
            if (selectedProvider !== 'gemini' && !key) {
                addMessage("Please enter an API key for this provider.", 'system');
                // We don't return here, so the user can see the message without the modal closing.
                return;
            }
            userApiKey = key;
            apiProvider = selectedProvider;
            localStorage.setItem('userApiKey', userApiKey);
            localStorage.setItem('apiProvider', apiProvider);
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
            addMessage(`Settings saved. Provider set to ${apiProvider}.`, 'system');
        });

        // --- App Initialization ---
        window.addEventListener('load', () => {
            const savedApiKey = localStorage.getItem('userApiKey');
            const savedApiProvider = localStorage.getItem('apiProvider');
            if (savedApiProvider) {
                apiProvider = savedApiProvider;
                apiProviderSelect.value = apiProvider;
                if (savedApiKey) {
                    userApiKey = savedApiKey;
                    apiKeyInput.value = userApiKey;
                }
            }
            toggleApiKeyVisibility();
            startConversation();
        });

        // --- Core Functions ---
        function startConversation() {
            const greetings = [
                "Hello! Let's practice some English.", "Hi there! I'm ready to chat when you are.",
                "Hey! It's great to see you. Let's talk.", "Hi! I'm your AI teaching assistant from Instructor Joel Mitchell. Let's begin."
            ];
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            const randomQuestion = initialQuestions[Math.floor(Math.random() * initialQuestions.length)];
            
            const formattedQuestion = randomQuestion.charAt(0).toLowerCase() + randomQuestion.slice(1);
            const fullIntro = `${randomGreeting} To start, ${formattedQuestion}`;

            addMessage(fullIntro, 'bot');
            chatHistory.push({ role: "model", parts: [{ text: fullIntro }] });
            speak(fullIntro);
        }

        function addMessage(text, sender) {
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('flex', 'items-start', 'gap-3', 'mb-4');
            const messageElement = document.createElement('div');
            messageElement.classList.add('p-3', 'rounded-lg', 'max-w-lg', 'break-words');
            messageElement.textContent = text;
            if (sender === 'user') {
                messageWrapper.classList.add('justify-end');
                messageElement.classList.add('bg-blue-500', 'text-white');
            } else if (sender === 'bot') {
                messageElement.classList.add('bg-gray-200', 'dark:bg-gray-700');
            } else { // System messages
                messageWrapper.classList.add('justify-center');
                messageElement.classList.add('bg-yellow-200', 'dark:bg-yellow-800', 'text-yellow-800', 'dark:text-yellow-100', 'text-sm');
            }
            messageWrapper.appendChild(messageElement);
            chatContainer.appendChild(messageWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const messageText = chatInput.value.trim();
            if (!messageText) return;

            if (apiProvider !== 'gemini' && !userApiKey) {
                addMessage("Please set your API key in the settings first.", 'system');
                return;
            }

            addMessage(messageText, 'user');
            chatHistory.push({ role: "user", parts: [{ text: messageText }] });
            chatInput.value = '';
            const typingIndicator = createTypingIndicator();
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const botResponse = await getBotResponse();
                chatContainer.removeChild(typingIndicator);
                addMessage(botResponse, 'bot');
                chatHistory.push({ role: "model", parts: [{ text: botResponse }] });
                speak(botResponse);
            } catch (error) {
                chatContainer.removeChild(typingIndicator);
                console.error("API Error:", error);
                addMessage(`Error: ${error.message}. Please check your API key and network connection.`, 'system');
            }
        }
        
        function createTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.classList.add('flex', 'items-start', 'gap-3', 'mb-4', 'typing-indicator');
            wrapper.innerHTML = `<div class="bg-gray-200 dark:bg-gray-700 p-3 rounded-lg flex items-center space-x-1"><span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: -0.3s;"></span><span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: -0.15s;"></span><span class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></span></div>`;
            return wrapper;
        }

        async function getBotResponse() {
            const systemInstruction = {
                role: "system",
                parts: [{ text: "You are a friendly AI assistant for Instructor Joel Mitchell, talking to a high school student who is an English language learner at the B1 CEFR level. Your responses must be in simple, clear English. Do not use complex vocabulary or long sentences. Keep the conversation engaging and encouraging. Only respond in English." }]
            };
            
            let url = '';
            let headers = {};
            let body = {};
            // Use the last 10 messages for context, plus the system instruction
            const contextualHistory = [systemInstruction, ...chatHistory.slice(-10)];

            switch(apiProvider) {
                case 'gemini':
                    // The API key for the built-in Gemini is handled by the environment.
                    const geminiApiKey = ""; 
                    // **UPDATED for China accessibility**
                    // Using a community-provided proxy for the Gemini API.
                    // The original URL 'generativelanguage.googleapis.com' is often blocked.
                    url = `https://gemini.ramiel.eu.org/v1beta/models/gemini-pro:generateContent?key=${geminiApiKey}`;
                    headers = { 'Content-Type': 'application/json' };
                    body = { contents: contextualHistory };
                    break;
                case 'deepseek':
                    url = 'https://api.deepseek.com/chat/completions';
                    headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userApiKey}` };
                    const deepseekHistory = contextualHistory.map(item => ({
                        role: item.role === 'model' ? 'assistant' : item.role,
                        content: item.parts[0].text
                    }));
                    body = { model: "deepseek-chat", messages: deepseekHistory };
                    break;
                case 'zhupu':
                    addMessage("Zhipu AI (GLM) is not supported in this client-side demo due to security constraints.", 'system');
                    throw new Error("Zhipu AI not supported.");
            }

            const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body) });

            if (!response.ok) {
                const errorText = await response.text();
                try {
                    const errorData = JSON.parse(errorText);
                     throw new Error(`API request failed: ${errorData.error?.message || 'Unknown error'}`);
                } catch (e) {
                     throw new Error(`API request failed with status ${response.status}: ${errorText}`);
                }
            }
            const data = await response.json();
            
            if (apiProvider === 'gemini') {
                if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                    return data.candidates[0].content.parts[0].text;
                }
            } else if (apiProvider === 'deepseek') {
                if (data.choices && data.choices[0]?.message?.content) {
                    return data.choices[0].message.content;
                }
            }
            
            console.error("Invalid API response structure:", data);
            return "Sorry, I received an unexpected response from the AI.";
        }
    </script>
</body>
</html>
