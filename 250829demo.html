<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Instructional Lesson Plan Generator | 国际课程综合教学设计生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* bg-slate-50 */
        }
        .loader {
            border: 4px solid #e2e8f0; /* slate-200 */
            border-top: 4px solid #4f46e5; /* indigo-600 */
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .plan-section {
            background-color: #ffffff;
            border: 1px solid #e2e8f0; /* slate-200 */
            border-radius: 0.75rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .plan-section-header {
            background-color: #f1f5f9; /* slate-100 */
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #e2e8f0; /* slate-200 */
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
        }
        .plan-section-content {
            padding: 1.5rem;
        }
        .bloom-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .evidence-item {
            background-color: #f8fafc; /* bg-slate-50 */
            border-left: 3px solid #4f46e5; /* border-indigo-600 */
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 0.875rem;
            color: #334155; /* text-slate-700 */
        }
        @media print {
            body { background-color: #fff; }
            body * { visibility: hidden; }
            #lessonPlanOutput, #lessonPlanOutput * { visibility: visible; }
            #lessonPlanOutput { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
            .plan-section { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid;}
            textarea { border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div class="container mx-auto p-4 sm:p-6 md:p-8">
        <header class="text-center mb-8 no-print">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">Comprehensive Lesson Plan Generator</h1>
            <p class="text-lg text-slate-600 mt-2">国际课程综合教学设计生成器</p>
        </header>

        <div id="formContainer" class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg border border-slate-200 no-print">
            <div class="space-y-6">
                <div>
                    <label for="curriculum" class="block text-sm font-medium text-slate-700 mb-1">Curriculum / 课程体系</label>
                    <select id="curriculum" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="AP">AP</option>
                        <option value="A-Level">A-Level</option>
                    </select>
                </div>
                <div>
                    <label for="subject" class="block text-sm font-medium text-slate-700 mb-1">Subject / 学科</label>
                    <select id="subject" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="AP Microeconomics">AP Microeconomics</option>
                        <option value="AP Macroeconomics">AP Macroeconomics</option>
                        <option value="AP Psychology">AP Psychology</option>
                        <option value="AP Biology">AP Biology</option>
                        <option value="AP Calculus BC">AP Calculus BC</option>
                        <option value="AP Physics 1">AP Physics 1</option>
                        <option value="A-Level Mathematics">A-Level Mathematics</option>
                        <option value="A-Level Physics">A-Level Physics</option>
                    </select>
                </div>
                <div>
                    <label for="topic" class="block text-sm font-medium text-slate-700 mb-1">Topic / 课题</label>
                    <input type="text" id="topic" value="" placeholder="e.g., Classical Conditioning or Kinematics" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="deepseek-key" class="block text-sm font-medium text-slate-700 mb-1">DeepSeek API Key (BYOK)</label>
                        <input type="password" id="deepseek-key" placeholder="输入您的 DeepSeek API 密钥" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label for="zhipu-key" class="block text-sm font-medium text-slate-700 mb-1">Zhipu AI API Key (BYOK)</label>
                        <input type="password" id="zhipu-key" placeholder="输入您的智谱 AI API 密钥" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
                <div id="error-message" class="text-red-600 text-sm hidden"></div>
                <div>
                    <button id="generateBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition duration-300 ease-in-out transform hover:scale-105">
                        Generate Lesson Plan / 生成教学设计
                    </button>
                </div>
            </div>
        </div>

        <div id="loader" class="mx-auto my-10 loader hidden"></div>
        <div id="lessonPlanOutput" class="max-w-6xl mx-auto mt-10"></div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const lessonPlanOutput = document.getElementById('lessonPlanOutput');
        const errorMessage = document.getElementById('error-message');

        generateBtn.addEventListener('click', () => {
            const subject = document.getElementById('subject').value;
            const topic = document.getElementById('topic').value.trim();
            
            if (!topic) {
                errorMessage.textContent = 'Please provide a topic. / 请输入课题。';
                errorMessage.classList.remove('hidden');
                return;
            }
            errorMessage.classList.add('hidden');
            loader.classList.remove('hidden');
            lessonPlanOutput.innerHTML = '';

            setTimeout(() => {
                try {
                    const lessonData = getSimulatedAiResponse(subject, topic);
                    lessonPlanOutput.innerHTML = generateLessonPlanContent(subject, topic, lessonData);
                } catch (error) {
                    console.error('Error generating lesson plan:', error);
                    errorMessage.textContent = 'An error occurred while generating the lesson plan.';
                    errorMessage.classList.remove('hidden');
                } finally {
                    loader.classList.add('hidden');
                }
            }, 1000);
        });
        
        function getSimulatedAiResponse(subject, topic) {
            const instructionalDesigns = {
                "AP Microeconomics": {
                    "Tariff": {
                        "bigIdea": {"english": "Government intervention in free markets, such as tariffs, creates predictable gains for some, losses for others, and an overall reduction in total economic surplus (deadweight loss).", "chinese": "政府对自由市场的干预，如关税，会为一部分人带来可预见的收益，为另一部分人带来损失，并导致总体经济剩余的减少（无谓损失）。"},
                        "essentialQuestions": [
                            {"english": "Who wins and who loses when a tariff is imposed?", "chinese": "征收关税时，谁是赢家，谁是输家？"},
                            {"english": "How can a policy that reduces overall economic efficiency be politically popular?", "chinese": "一项降低整体经济效率的政策为何能在政治上受欢迎？"}
                        ],
                        "learningOutcomes": [
                            {"level": "Remember", "text": {"english": "Define 'tariff' and 'world price'.", "chinese": "定义“关税”和“世界价格”。"}, "color": "bg-sky-100 text-sky-800"},
                            {"level": "Understand", "text": {"english": "Explain why a tariff raises the domestic price of a good.", "chinese": "解释为什么关税会提高一种商品的国内价格。"}, "color": "bg-green-100 text-green-800"},
                            {"level": "Apply", "text": {"english": "Model the effects of a tariff on a supply and demand graph.", "chinese": "在供需图上模拟关税的影响。"}, "color": "bg-yellow-100 text-yellow-800"},
                            {"level": "Analyze", "text": {"english": "Calculate changes in consumer surplus, producer surplus, government revenue, and deadweight loss.", "chinese": "计算消费者剩余、生产者剩余、政府收入和无谓损失的变化。"}, "color": "bg-orange-100 text-orange-800"},
                            {"level": "Evaluate", "text": {"english": "Critique the arguments for and against protectionist policies like tariffs.", "chinese": "评判支持和反对关税等贸易保护主义政策的论点。"}, "color": "bg-red-100 text-red-800"}
                        ],
                        "officialQuestion": {"english": "Assume the U.S. government imposes a $2 per box tariff on imported oranges. On a correctly labeled graph, identify the new domestic price, quantity consumed, consumer surplus, producer surplus, government revenue, and deadweight loss after the tariff.", "chinese": "假设美国政府对进口橙子征收每箱2美元的关税。在一个正确标记的图上，确定关税后的新国内价格、消费数量、消费者剩余、生产者剩余、政府收入和无谓损失。"},
                        "aiGeneratedQuestion": {"english": "Consider the market for steel in a small country where the world price is $500 per ton. If the government imposes a $100 tariff, and this action reduces imports from 200 tons to 50 tons while increasing domestic production by 30 tons, calculate the total value of the deadweight loss.", "chinese": "考虑一个小国的钢铁市场，世界价格为每吨500美元。如果政府征收100美元的关税，此举导致进口从200吨减少到50吨，同时国内产量增加30吨，请计算无谓损失的总价值。"},
                        "materials": [{"english": "Whiteboards/markers for each student", "chinese": "每位学生的白板/马克笔"}, {"english": "Projector and computer", "chinese": "投影仪和电脑"}],
                        "gagneEvents": [
                            {"eventNumber": 1, "eventName": "Gain Attention", "timing": "0-2 Mins", "activity": {"english": "Hook: The Price of a T-Shirt", "chinese": "挂钩：一件T恤的价格"}, "teacherStudentTalk": {"teacher": {"english": "Show two identical t-shirts. One has a price tag of $10, the other $15. 'The $10 one is from Vietnam, the $15 one is made here. Why the difference? Today, we'll uncover the hidden tax that creates this gap: a tariff.'", "chinese": "展示两件相同的T恤。一件标价10美元，另一件15美元。“10美元的来自越南，15美元的是本地制造。为什么会有差价？今天，我们将揭示造成这种差距的隐藏税收：关税。”"}, "student": {"english": "Is it because it costs more to make it here?", "chinese": "是因为在这里制造的成本更高吗？"}}, "evidence": [{"code": "D2", "text": {"english": "Learners make connections from content to real-life experiences.", "chinese": "学习者将学习内容与现实生活经验联系起来。"}}]},
                            {"eventNumber": 2, "eventName": "Inform Objective", "timing": "2-3 Mins", "activity": {"english": "State Lesson Outcomes", "chinese": "阐明课程学习成果"}, "teacherStudentTalk": {"teacher": {"english": "Today, you will be able to analyze exactly who wins, who loses, and calculate the cost of a tariff to our economy.", "chinese": "今天，你将能够准确分析谁是赢家，谁是输家，并计算出关税对我们经济的成本。"}, "student": {"english": "(Listening and noting the objectives)", "chinese": "（倾听并记录目标）"}}, "evidence": [{"code": "B1", "text": {"english": "Learners strive to meet or are able to articulate the high expectations...", "chinese": "学习者努力达到或能够清晰阐述设定的高期望..."}}]},
                            {"eventNumber": 3, "eventName": "Stimulate Recall", "timing": "3-6 Mins", "activity": {"english": "Quick Draw: Surplus", "chinese": "快速绘画：剩余"}, "teacherStudentTalk": {"teacher": {"english": "On your whiteboards, draw a simple market in equilibrium and shade the area of consumer and producer surplus. This is our foundation.", "chinese": "在你们的白板上，画一个简单的均衡市场，并用阴影标出消费者和生产者剩余的区域。这是我们的基础。"}, "student": {"english": "(Draws graphs and holds them up)", "chinese": "（绘制图表并举起）"}}, "evidence": []},
                            {"eventNumber": 4, "eventName": "Present Stimulus", "timing": "6-12 Mins", "activity": {"english": "Live Modeling: Building the Tariff Graph", "chinese": "实时建模：构建关税图"}, "teacherStudentTalk": {"teacher": {"english": "Let's start with a market open to trade at the world price. Now, the government adds a tariff. Let's draw that new price line. What happens to quantity demanded vs. quantity supplied by our own factories?", "chinese": "我们从一个以世界价格开放贸易的市场开始。现在，政府增加了关税。我们来画这条新价格线。需求量与我们自己工厂的供给量相比会发生什么变化？"}, "student": {"english": "Demand decreases, domestic supply increases.", "chinese": "需求减少，国内供给增加。"}}, "evidence": [{"code": "B2", "text": {"english": "Learners engage in challenging but attainable learning.", "chinese": "学习者参与具有挑战性但可实现的学习。"}}]},
                            {"eventNumber": 5, "eventName": "Provide Guidance", "timing": "12-20 Mins", "activity": {"english": "Think-Pair-Share: Winners & Losers", "chinese": "思考-配对-分享：赢家与输家"}, "teacherStudentTalk": {"teacher": {"english": "Think silently for 1 minute: Who are the three groups that are better off because of the tariff? Now, turn to your partner and share your reasoning. Finally, let's share as a class.", "chinese": "静默思考1分钟：哪三个群体因为关税而受益？现在，和你的同伴分享你的理由。最后，我们全班分享。"}, "student": {"english": "(Thinks) Domestic producers and the government. (Pairs) I think consumers lose, but producers and the government win. (Shares) Domestic producers get a higher price, and the government gets revenue.", "chinese": "（思考）国内生产者和政府。（配对）我认为消费者受损，但生产者和政府获益。（分享）国内生产者得到更高的价格，政府得到收入。"}}, "evidence": [{"code": "C3", "text": {"english": "Learners are supported by the teacher, their peers, and/or other resources to understand content and accomplish tasks.", "chinese": "学习者得到教师、同伴和/或其他资源的支持以理解内容和完成任务。"}}]},
                            {"eventNumber": 6, "eventName": "Elicit Performance", "timing": "20-30 Mins", "activity": {"english": "Collaborative Problem Solving", "chinese": "协作解决问题"}, "teacherStudentTalk": {"teacher": {"english": "In your groups, create one perfect graph for the steel problem, calculate the deadweight loss, and prepare to explain it.", "chinese": "在你们的小组中，为钢铁问题创建一个完美的图表，计算无谓损失，并准备解释它。"}, "student": {"english": "Okay, so the base of this triangle is the change in quantity...", "chinese": "好的，所以这个三角形的底是数量的变化..."}}, "evidence": [{"code": "D4", "text": {"english": "Learners collaborate with their peers to accomplish projects, activities, and/or tasks.", "chinese": "学习者与同伴协作用以完成项目、活动和/或任务。"}}]},
                            {"eventNumber": 7, "eventName": "Provide Feedback", "timing": "30-35 Mins", "activity": {"english": "Gallery Walk & Peer Feedback", "chinese": "画廊漫步与同伴反馈"}, "teacherStudentTalk": {"teacher": {"english": "Post your work. Walk around and use sticky notes to leave one 'glow' (a strength) and one 'grow' (a suggestion) on other posters.", "chinese": "贴出你们的作品。四处走动，用便利贴在其他海报上留下一条‘亮点’（一个优点）和一条‘成长点’（一个建议）。"}, "student": {"english": "(Observes other posters and provides written feedback)", "chinese": "（观察其他海报并提供书面反馈）"}}, "evidence": [{"code": "E2", "text": {"english": "Learners receive/respond to feedback (from teachers/peers/other resources) to improve understanding and/or revise work.", "chinese": "学习者接收并回应来自教师、同伴或其他资源的反馈，以增进理解和/或进行修改。"}}]},
                            {"eventNumber": 8, "eventName": "Assess Performance", "timing": "35-38 Mins", "activity": {"english": "Individual Exit Ticket", "chinese": "个人离校票"}, "teacherStudentTalk": {"teacher": {"english": "On your own, answer the Exit Ticket question. This will show me your core understanding.", "chinese": "独立回答离校票上的问题。这将向我展示你的核心理解。"}, "student": {"english": "(Individual writing)", "chinese": "（独立写作）"}}, "evidence": [{"code": "E3", "text": {"english": "Learners demonstrate and/or verbalize understanding of the lesson/content.", "chinese": "学习者展示出和/或口头表达对课程/内容的理解。"}}]},
                            {"eventNumber": 9, "eventName": "Enhance Transfer", "timing": "38-40 Mins", "activity": {"english": "Connecting to the Real World", "chinese": "连接真实世界"}, "teacherStudentTalk": {"teacher": {"english": "Next time you read a news headline about a 'trade war,' you'll know the model behind it. How might this apply to quotas or subsidies?", "chinese": "下次你读到关于‘贸易战’的新闻标题时，你就会知道它背后的模型。这如何应用于配额或补贴？"}, "student": {"english": "A quota would also raise the price, but the government wouldn't get revenue!", "chinese": "配额也会提高价格，但政府不会得到收入！"}}, "evidence": [{"code": "B5", "text": {"english": "Learners take responsibility for and are self-directed in their learning.", "chinese": "学习者对自己的学习负责并进行自主学习。"}}] }
                        ],
                        "differentiation": {"scaffolds": [{"english": "Provide a vocabulary bank with key terms and definitions.", "chinese": "提供一个包含关键术语和定义的词汇库。"}], "extensions": [{"english": "Challenge students to research a real-world tariff and analyze its effects.", "chinese": "挑战学生研究一个现实世界中的关税并分析其影响。"}]},
                        "exitTicket": {"question": {"english": "On the provided graph of a market with a tariff, correctly shade and label the areas of (1) Consumer Surplus, (2) Producer Surplus, and (3) Deadweight Loss.", "chinese": "在提供的带有 tariff 的市场图上，正确地用阴影标出并标记 (1) 消费者剩余, (2) 生产者剩余, 和 (3) 无谓损失的区域。"}},
                        "homework": {"assignment": {"english": "Find a news article from the past month that discusses a specific tariff. Write a one-paragraph summary explaining the connection to today's lesson, identifying the winners and losers.", "chinese": "找一篇过去一个月内讨论特定关税的新闻文章。写一段话总结并解释其与今天课程的联系，并指出其中的赢家和输家。"}},
                        "reflection": [
                            {"question": {"english": "What went well?", "chinese": "哪些部分进行得很顺利？"}, "prompt": {"english": "Which group's collaborative document was strongest and why? Did the peer feedback lead to meaningful revisions?", "chinese": "哪个小组的协作文档最出色，为什么？同伴反馈是否促成了有意义的修改？"}},
                            {"question": {"english": "What could be improved?", "chinese": "哪些部分可以改进？"}, "prompt": {"english": "Which part of the exam question did most students struggle with? Was the timing for each activity appropriate?", "chinese": "大多数学生在考题的哪个部分感到困难？每个活动的时间安排是否恰当？"}},
                            {"question": {"english": "Next Steps?", "chinese": "下一步计划？"}, "prompt": {"english": "Based on the exit ticket data, what follow-up activity is needed? Do we need to review a specific concept or skill?", "chinese": "根据离校票的数据，需要进行哪些后续活动？我们是否需要复习某个特定的概念或技能？"}}
                        ],
                        "learningEnvironmentFramework": [
                            {"code": "A", "title": {"english": "Equitable Learning Environment", "chinese": "公平的学习环境"}, "criteria": [
                                {"english": "Learners engage in differentiated learning opportunities and/or activities that meet their needs.", "chinese": "学习者参与满足其需求的差异化学习机会和/或活动。"},
                                {"english": "Learners have equal access to classroom discussions, activities, resources, technology, and support.", "chinese": "学习者平等地参与课堂讨论、活动，并获得资源、技术和支持。"}
                            ]},
                            {"code": "B", "title": {"english": "High Expectations Environment", "chinese": "高期望的学习环境"}, "criteria": [
                                {"english": "Learners strive to meet or are able to articulate the high expectations established by themselves and/or the teacher.", "chinese": "学习者努力达到或能够清晰阐述由自己和/或教师设定的高期望。"},
                                {"english": "Learners engage in rigorous tasks that require higher-order thinking (analyzing, applying, evaluating, synthesizing).", "chinese": "学习者参与需要使用高阶思维（如分析、应用、评估、综合）的严谨任务。"}
                            ]},
                             {"code": "C", "title": {"english": "Supportive Learning Environment", "chinese": "支持性的学习环境"}, "criteria": [
                                {"english": "Learners take risks in learning (without fear of negative feedback).", "chinese": "学习者在学习中敢于冒险（不惧怕负面反馈）。"},
                                {"english": "Learners are supported by the teacher, their peers, and/or other resources to understand content and accomplish tasks.", "chinese": "学习者得到教师、同伴和/或其他资源的支持以理解内容和完成任务。"}
                            ]},
                             {"code": "D", "title": {"english": "Active Learning Environment", "chinese": "积极的学习环境"}, "criteria": [
                                {"english": "Learners make connections from content to real-life experiences.", "chinese": "学习者将学习内容与现实生活经验联系起来。"},
                                {"english": "Learners collaborate with their peers to accomplish projects, activities, and/or tasks.", "chinese": "学习者与同伴协作用以完成项目、活动和/或任务。"}
                            ]},
                             {"code": "E", "title": {"english": "Progress Monitoring and Feedback Environment", "chinese": "进度监控与反馈环境"}, "criteria": [
                                {"english": "Learners receive/respond to feedback (from teachers/peers/other resources) to improve understanding and/or revise work.", "chinese": "学习者接收并回应来自教师、同伴或其他资源的反馈，以增进理解和/或进行修改。"},
                                {"english": "Learners demonstrate and/or verbalize understanding of the lesson/content.", "chinese": "学习者展示出和/或口头表达对课程/内容的理解。"}
                            ]},
                            {"code": "F", "title": {"english": "Well-Managed Learning Environment", "chinese": "管理良好的学习环境"}, "criteria": [
                                {"english": "Learners transition smoothly and efficiently from one activity to another.", "chinese": "学习者在不同活动之间平稳高效地转换。"}
                            ]},
                            {"code": "G", "title": {"english": "Digital Learning Environment", "chinese": "数字化的学习环境"}, "criteria": [
                                {"english": "Learners use digital tools/technology to communicate and/or work collaboratively for learning.", "chinese": "学习者使用数字工具/技术进行交流和/或协作学习。"}
                            ]}
                        ]
                    }
                }
            };
            
            // Generic fallback logic
            if (!instructionalDesigns[subject] || !instructionalDesigns[subject][topic]) {
                const genericData = JSON.parse(JSON.stringify(instructionalDesigns["AP Microeconomics"]["Tariff"]));
                const replaceTopic = (obj) => {
                    for (const key in obj) {
                        if (typeof obj[key] === 'string') {
                            obj[key] = obj[key].replace(/tariff(s)?/gi, topic).replace(/oranges/gi, 'goods').replace(/T-Shirt/gi, 'item').replace(/steel/gi, 'products');
                        } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                            replaceTopic(obj[key]);
                        }
                    }
                };
                replaceTopic(genericData);
                // Add a generic official question
                genericData.officialQuestion.english = `Based on the principles of ${topic}, analyze the provided scenario and explain the likely outcomes.`;
                genericData.officialQuestion.chinese = `根据 ${topic} 的原理，分析所提供的情景并解释可能的结果。`;
                genericData.aiGeneratedQuestion.english = `Create a new scenario involving ${topic} and predict the short-term and long-term consequences.`;
                genericData.aiGeneratedQuestion.chinese = `创建一个涉及 ${topic} 的新情景，并预测其短期和长期后果。`;
                return genericData;
            }
            return instructionalDesigns[subject][topic];
        }

        function generateLessonPlanContent(subject, topic, data) {
            const createSection = (title, title_cn, content, noPadding = false) => `
                <div class="plan-section">
                    <div class="plan-section-header"><h3 class="text-xl font-semibold text-slate-800">${title} / ${title_cn}</h3></div>
                    <div class="${noPadding ? '' : 'plan-section-content'}">${content}</div>
                </div>`;
            
            const outcomes = data.learningOutcomes.map(o => `<li class="mb-2"><span class="bloom-badge ${o.color}">${o.level}</span> ${o.text.english}<br><span class="text-sm text-slate-600 ml-4">${o.text.chinese}</span></li>`).join('');
            
            const procedure = `<div class="overflow-x-auto"><table class="w-full border-collapse">
                ${data.gagneEvents.map(e => `
                <tr class="border-t border-slate-200">
                    <td class="p-4 align-top w-[15%] text-sm"><strong>(${e.timing})</strong><br><span class="text-xs text-indigo-600 font-semibold">Gagné ${e.eventNumber}:<br>${e.eventName}</span></td>
                    <td class="p-4 align-top w-[85%]">
                        <h4 class="font-bold text-slate-800 mb-2">${e.activity.english} / ${e.activity.chinese}</h4>
                        <div class="mb-3 p-3 bg-slate-50 rounded-md">
                            <p class="text-sm"><strong>Teacher:</strong> ${e.teacherStudentTalk.teacher.english}<br><span class="text-xs text-slate-500">${e.teacherStudentTalk.teacher.chinese}</span></p>
                            <p class="text-sm mt-1"><strong>Student:</strong> ${e.teacherStudentTalk.student.english}<br><span class="text-xs text-slate-500">${e.teacherStudentTalk.student.chinese}</span></p>
                        </div>
                        <div>${e.evidence.map(ev => `<div class="evidence-item"><strong>[${ev.code}] ${ev.text.english}</strong> ${ev.text.chinese}</div>`).join('') || ''}</div>
                    </td>
                </tr>`).join('')}
            </table></div>`;

            const reflection = `<ul class="list-disc list-inside space-y-3 text-slate-700">
                ${data.reflection.map(r => `<li><strong>${r.question.english} / ${r.question.chinese}</strong><br><span class="text-sm text-slate-600">${r.prompt.english}<br>${r.prompt.chinese}</span></li>`).join('')}
            </ul>`;

            const checklist = `<div class="overflow-x-auto"><table class="w-full border-collapse">
                ${data.learningEnvironmentFramework.map(cat => `
                    <tr class="bg-slate-100"><td class="p-2 border border-slate-200 font-bold" colspan="2">${cat.code}. ${cat.title.english} / ${cat.title.chinese}</td></tr>
                    ${cat.criteria.map(crit => `
                        <tr class="border-t border-slate-200">
                            <td class="p-3 border-l border-r border-slate-200 align-top">${crit.english}<br><span class="text-sm text-slate-500">${crit.chinese}</span></td>
                            <td class="p-3 border-r border-slate-200 align-top w-1/3"><textarea class="w-full p-1 border border-slate-300 rounded-md focus:ring-1 focus:ring-indigo-500" rows="2" placeholder="Notes / 笔记..."></textarea></td>
                        </tr>
                    `).join('')}
                `).join('')}
            </table></div>`;

            return `
                <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-slate-900">${subject}: ${topic}</h2>
                            <p class="text-slate-600">40-Minute Lesson Plan / 40分钟教学设计</p>
                        </div>
                        <button onclick="window.print()" class="no-print bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-lg hover:bg-indigo-200 transition">Print / Save as PDF</button>
                    </div>
                </div>

                ${createSection('Unit Framework / 单元框架', 'Big Idea & Essential Questions / 核心概念与基本问题', `
                    <h4 class="font-semibold text-slate-800 mb-2">Big Idea / 核心概念</h4>
                    <p class="text-slate-700 mb-4">${data.bigIdea.english}<br><span class="text-sm text-slate-600">${data.bigIdea.chinese}</span></p>
                    <h4 class="font-semibold text-slate-800 mb-2">Essential Questions / 基本问题</h4>
                    <ul class="list-disc list-inside space-y-2 text-slate-700">${data.essentialQuestions.map(q => `<li>${q.english}<br><span class="text-sm text-slate-600">${q.chinese}</span></li>`).join('')}</ul>
                `)}

                ${createSection('Student Learning Outcomes (SLOs) / 学生学习成果', 'Aligned with Bloom\'s Taxonomy / 对标布鲁姆分类法', `<ul class="space-y-2">${outcomes}</ul>`)}
                
                ${createSection('Materials & Resources / 材料与资源', 'Required for the lesson / 课程所需', `<ul class="list-disc list-inside space-y-2 text-slate-700">${data.materials.map(m => `<li>${m.english}<br><span class="text-sm text-slate-600">${m.chinese}</span></li>`).join('')}</ul>`)}

                ${createSection('Exam Question Focus / 考题焦点', 'AP/A-Level Style Questions / AP/A-Level 风格问题', `
                    <div class="mb-6">
                        <h4 class="font-semibold text-slate-800 mb-2">Actual Past AP/A-Level Question / 往届真题</h4>
                        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200"><p class="text-slate-700">${data.officialQuestion.english}<br><span class="text-sm text-slate-600">${data.officialQuestion.chinese}</span></p></div>
                    </div>
                    <div>
                        <h4 class="font-semibold text-slate-800 mb-2">New AI-Generated Practice Question / AI生成新练习题</h4>
                        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200"><p class="text-slate-700">${data.aiGeneratedQuestion.english}<br><span class="text-sm text-slate-600">${data.aiGeneratedQuestion.chinese}</span></p></div>
                    </div>
                `)}

                ${createSection('Lesson Procedure / 课程流程', 'Gagné\'s 9 Events of Instruction / 加涅的九个教学事件', procedure, true)}
                
                ${createSection('Differentiation Strategies / 差异化教学策略', 'Support & Extension / 辅助与拓展', `
                    <h4 class="font-semibold text-slate-800 mb-2">Scaffolds for Support / 辅助支架</h4>
                    <ul class="list-disc list-inside space-y-2 text-slate-700 mb-4">${data.differentiation.scaffolds.map(s => `<li>${s.english}<br><span class="text-sm text-slate-600">${s.chinese}</span></li>`).join('')}</ul>
                    <h4 class="font-semibold text-slate-800 mb-2">Extensions for Challenge / 挑战性拓展</h4>
                    <ul class="list-disc list-inside space-y-2 text-slate-700">${data.differentiation.extensions.map(e => `<li>${e.english}<br><span class="text-sm text-slate-600">${e.chinese}</span></li>`).join('')}</ul>
                `)}

                ${createSection('Exit Ticket (Assess Performance) / 离校票 (评估表现)', 'Checking for Understanding / 检查理解程度', `
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <p>${data.exitTicket.question.english}</p>
                        <p class="mt-2 text-sm text-slate-600">${data.exitTicket.question.chinese}</p>
                    </div>
                `)}

                ${createSection('Suggested Homework / 建议作业', 'Reinforcement Activity / 巩固活动', `
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <p>${data.homework.assignment.english}</p>
                        <p class="mt-2 text-sm text-slate-600">${data.homework.assignment.chinese}</p>
                    </div>
                `)}

                ${createSection('Teacher Self-Reflection / 教师自我反思', 'Post-Lesson Thoughts / 课后思考', reflection)}

                ${createSection('Learning Environment Framework & Checklist / 学习环境框架与清单', 'Observational Tool / 观察工具', checklist, true)}
            `;
        }
    </script>
</body>
